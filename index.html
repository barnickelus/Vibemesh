<!DOCTYPE html>
<html>
<head>
  <title>TextCall AR Avatar</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video, canvas {
      position: absolute;
      top: 0; left: 0;
    }
  </style>
</head>
<body>

<video id="video" playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let vibe = {
  emotion: "neutral",
  voice: 0
};

// Fake voice animation (replace later with mic)
setInterval(() => {
  vibe.voice = Math.random();
}, 100);

// MediaPipe Pose
const pose = new Pose({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity: 0,
  smoothLandmarks: true,
  enableSegmentation: false
});

pose.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  const lm = results.poseLandmarks;

  const leftShoulder = lm[11];
  const rightShoulder = lm[12];
  const nose = lm[0];

  drawEnergy(leftShoulder, rightShoulder, nose);
});

function drawEnergy(l, r, head) {
  let cx = (l.x + r.x) / 2 * canvas.width;
  let cy = (l.y + r.y) / 2 * canvas.height;

  let intensity = vibe.voice * 50;

  // Glow aura
  ctx.beginPath();
  ctx.arc(cx, cy, 100 + intensity, 0, Math.PI * 2);
  ctx.strokeStyle = getColor();
  ctx.lineWidth = 5;
  ctx.stroke();

  // Head orbit particles
  for (let i = 0; i < 20; i++) {
    let angle = i + performance.now() * 0.002;
    let radius = 50 + intensity;

    let x = head.x * canvas.width + Math.cos(angle) * radius;
    let y = head.y * canvas.height + Math.sin(angle) * radius;

    ctx.fillStyle = getColor();
    ctx.fillRect(x, y, 3, 3);
  }
}

function getColor() {
  if (vibe.emotion === "happy") return "#00ffff";
  if (vibe.emotion === "angry") return "#ff0033";
  return "#8888ff";
}

// Camera
const cam = new Camera(video, {
  onFrame: async () => {
    await pose.send({ image: video });
  },
  width: 640,
  height: 480
});

cam.start();
</script>

</body>
</html>
