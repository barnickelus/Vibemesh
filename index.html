<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeMesh | Dynamic LoBi-Net</title>
    <style>
        body { margin: 0; background: #070505; color: #ff9d6e; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .controls { pointer-events: auto; background: rgba(20, 10, 5, 0.9); padding: 20px; border: 1px solid #ff9d6e; border-radius: 2px; }
        button { background: transparent; color: #ff9d6e; border: 1px solid #ff9d6e; padding: 10px 15px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; transition: 0.3s; margin-top: 10px; width: 100%; }
        button:hover { background: #ff9d6e; color: #000; }
        button.active { background: #ff9d6e; color: #000; box-shadow: 0 0 15px #ff9d6e; }
        h1 { font-size: 14px; margin: 0 0 5px 0; letter-spacing: 4px; color: #fff; }
        p { font-size: 9px; opacity: 0.7; margin: 5px 0; }
        #packet-indicator { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="controls">
            <h1>VIBEMESH // LOBI-NET</h1>
            <p>STATUS: <span id="status">IDLE_SEARCHING</span></p>
            <p>PACKET_SYNC: <span id="packet-indicator">OFFLINE</span></p>
            <hr style="border: 0; border-top: 1px solid #331a10; margin: 15px 0;">
            <button id="connectBtn">Connect Spatial Ledger</button>
            <button id="audioBtn">Simulate Audio Pulse</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SHADERS (Copper Editorial Palette) ---
        const vShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fShader = `
            uniform float uTime;
            uniform float uVibeEnergy;
            uniform float uVibePitch;
            varying vec2 vUv;
            varying vec3 vNormal;

            void main() {
                vec2 uv = vUv * 75.0; 
                float a = 0.785;
                uv *= mat2(cos(a), -sin(a), sin(a), cos(a));
                vec2 f = fract(uv);
                float d = length(f - 0.5);

                vec3 base = vec3(0.4, 0.2, 0.1); 
                vec3 glow = vec3(1.0, 0.6, 0.3);
                vec3 accent = mix(vec3(1.0, 0.3, 0.1), vec3(0.1, 0.5, 1.0), uVibePitch);

                float mask = 1.0 - smoothstep(0.1 + (uVibeEnergy * 0.3), 0.45, d);
                vec3 color = mix(base * 0.3, glow, mask);
                color = mix(color, accent, mask * uVibeEnergy);

                float light = max(dot(vNormal, vec3(0.5, 0.8, 1.0)), 0.2);
                gl_FragColor = vec4(color * (light + 0.4), 1.0);
            }
        `;

        // --- 2. CORE SETUP ---
        const LANDMARKS = [
            new THREE.Vector3(0, -1.6, 1.2),   // 0: Chin
            new THREE.Vector3(-1.3, -0.6, 0.5),// 1: L Jaw
            new THREE.Vector3(1.3, -0.6, 0.5), // 2: R Jaw
            new THREE.Vector3(0, 0.2, 2.0),    // 3: Nose
            new THREE.Vector3(-0.5, 0.6, 1.4), // 4: L Eye
            new THREE.Vector3(0.5, 0.6, 1.4),  // 5: R Eye
            new THREE.Vector3(-0.7, 1.1, 1.2), // 6: L Brow
            new THREE.Vector3(0.7, 1.1, 1.2),  // 7: R Brow
            new THREE.Vector3(-0.4, -0.7, 1.6),// 8: Mouth L
            new THREE.Vector3(0.4, -0.7, 1.6)  // 9: Mouth R
        ];

        let isConnected = false;
        let isAudioActive = false;
        let lookTarget = new THREE.Vector3(0,0,0);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(2.3, 100, 100);
        const originalPos = geometry.attributes.position.clone();
        const targetPos = geometry.attributes.position.clone();
        const material = new THREE.ShaderMaterial({
            vertexShader: vShader, fragmentShader: fShader,
            uniforms: { uTime: { value: 0 }, uVibeEnergy: { value: 0 }, uVibePitch: { value: 0.5 } }
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        camera.position.z = 6;

        // --- 3. DYNAMIC PACKET SIMULATOR ---
        setInterval(() => {
            if (isConnected) {
                // Simulate the 'Head Turn' - shifting all landmarks slightly
                lookTarget.set(
                    (Math.random() - 0.5) * 0.4,
                    (Math.random() - 0.5) * 0.3,
                    0
                );
                document.getElementById('packet-indicator').innerText = 'RECV_PACKET_' + Math.floor(Math.random() * 999);
            }
        }, 1500);

        function updateGeometry() {
            const pos = geometry.attributes.position;
            const time = performance.now() * 0.001;
            const sigma = 0.8; // Larger radius for more noticeable morph

            // Apply Temporal Conductor (Breathing & Look Shifts)
            const activeL = LANDMARKS.map((l, i) => {
                let d = l.clone().add(lookTarget); // Apply the 'Look' shift
                if (isConnected) {
                    d.z += Math.sin(time * 1.5) * 0.15; // Aggressive Breathing
                    if (i >= 4 && i <= 7) { // Eye saccades
                        d.x += Math.sin(time * 40.0) * 0.04;
                        d.y += Math.cos(time * 35.0) * 0.04;
                    }
                }
                return d;
            });

            const energy = material.uniforms.uVibeEnergy.value;

            for (let i = 0; i < pos.count; i++) {
                let v = new THREE.Vector3(originalPos.getX(i), originalPos.getY(i), originalPos.getZ(i));
                
                if (isConnected) {
                    let agg = new THREE.Vector3(0,0,0);
                    let tw = 0;
                    activeL.forEach(l => {
                        const dist = v.distanceTo(l);
                        const w = Math.exp(-(dist*dist)/(2*sigma*sigma));
                        if (w > 0.001) { agg.addScaledVector(l, w); tw += w; }
                    });

                    if (tw > 0) {
                        agg.divideScalar(tw);
                        v.lerp(agg, Math.min(tw, 1.0) * 0.95);
                        
                        // Audio-driven mouth movement (Viseme)
                        const distM = (v.distanceTo(activeL[8]) + v.distanceTo(activeL[9])) / 2;
                        if (distM < 0.8) {
                            v.y -= (1.0 - distM/0.8) * energy * 0.8;
                            v.z += (1.0 - distM/0.8) * energy * 0.3;
                        }
                    }
                } else {
                    v.addScaledVector(v.clone().normalize(), Math.sin(v.y * 2.0 + time * 3.0) * 0.15);
                }
                targetPos.setXYZ(i, v.x, v.y, v.z);
            }
        }

        // --- 4. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            material.uniforms.uTime.value = time;

            if (isAudioActive) {
                const e = 0.4 + Math.sin(time * 20.0) * 0.4;
                material.uniforms.uVibeEnergy.value = THREE.MathUtils.lerp(material.uniforms.uVibeEnergy.value, e, 0.3);
                material.uniforms.uVibePitch.value = 0.5 + Math.sin(time * 5.0) * 0.4;
            } else {
                material.uniforms.uVibeEnergy.value *= 0.9;
            }

            updateGeometry();

            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const cur = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
                const tar = new THREE.Vector3(targetPos.getX(i), targetPos.getY(i), targetPos.getZ(i));
                cur.lerp(tar, 0.1); // Elastic interpolation
                pos.setXYZ(i, cur.x, cur.y, cur.z);
            }
            pos.needsUpdate = true;
            geometry.computeVertexNormals();
            renderer.render(scene, camera);
        }

        // --- 5. UI ---
        const cBtn = document.getElementById('connectBtn');
        const aBtn = document.getElementById('audioBtn');
        const st = document.getElementById('status');
        const pInd = document.getElementById('packet-indicator');

        cBtn.onclick = () => {
            isConnected = !isConnected;
            cBtn.classList.toggle('active');
            st.innerText = isConnected ? 'SPATIAL_SYNC_ACTIVE' : 'IDLE_SEARCHING';
            pInd.innerText = isConnected ? 'SYNCING_LIVE...' : 'OFFLINE';
            cBtn.innerText = isConnected ? 'Disconnect Ledger' : 'Connect Spatial Ledger';
        };

        aBtn.onclick = () => { aBtn.classList.toggle('active'); isAudioActive = !isAudioActive; };
        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
        
        animate();
    </script>
</body>
</html>
