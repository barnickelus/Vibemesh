<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoBi-Net // FULL SCULPT + PATCH + EXTRUDE</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { position: relative; width: 480px; height: 560px; border: 1px solid #111; box-shadow: 0 0 40px rgba(0,255,0,0.1); }
        canvas, video { position: absolute; top: 0; left: 0; }
        #ui { position: absolute; bottom: 10px; left: 10px; z-index: 100; font-size: 9px; background: rgba(0,0,0,0.9); padding: 8px; border: 1px solid #0f0; pointer-events: none; line-height: 1.5; text-transform: uppercase; }
        .hint { position: absolute; top: 10px; right: 10px; font-size: 8px; color: #333; z-index: 100; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" style="display:none"></video>
    <canvas id="ft_canvas" width="640" height="480" style="display:none"></canvas>
    <canvas id="final_canvas" width="480" height="560"></canvas>
    <div id="ui">
        LOBI-NET // SCULPT PROTOCOL v1.0<br>
        PHASE: <span id="phase_label" style="color:#f0f">SCULPTING...</span><br>
        PACKETS: <span id="packet_count" style="color:#0ff">0 / 468</span>
    </div>
    <div class="hint">PRESS 'D' FOR WIREFRAME/SOURCE</div>
</div>

<script>
'use strict';

const W=480, H=560;
let isDevMode = false; 
const vid = document.getElementById('input_video');
const ftCtx = document.getElementById('ft_canvas').getContext('2d', {willReadFrequently: true});

// Vibe & State
const LM={ NOSE:1, MOUTH_T:13, MOUTH_B:14, MOUTH_L:61, MOUTH_R:291 };
let vibe = { mouthOpen: 0, yaw: 0, pitch: 0 };
let liveLM = null;

// Indices for patches
const JAWLINE = [234, 93, 132, 58, 172, 136, 150, 149, 176, 148, 152, 377, 400, 378, 379, 365, 397, 288, 361, 323, 454];
const INNER_LIP_TOP = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308];
const INNER_LIP_BOT = [78, 95, 88, 178, 87, 14, 317, 402, 318, 324, 308];
const L_EYE_SOCKET = [33, 161, 160, 159, 158, 157, 173, 133, 155, 154, 153, 145, 144, 163, 7];
const R_EYE_SOCKET = [362, 384, 385, 386, 387, 388, 466, 263, 249, 390, 373, 374, 380, 381, 382];

// --- THREE.JS SETUP ---
const scene = new THREE.Scene();
const cam3 = new THREE.PerspectiveCamera(35, W/H, 0.1, 1000);
cam3.position.set(0, 0, 4.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);

// ══════════════════════════════════════════════════
//  1. ADVANCED TOPOLOGY (Stitching Voids & Neck)
// ══════════════════════════════════════════════════
function generateAdvancedTopology(tesselationEdges) {
    const adj = Array.from({length: 468}, () => []);
    tesselationEdges.forEach(edge => { adj[edge[0]].push(edge[1]); adj[edge[1]].push(edge[0]); });
    
    let tris = [];
    // Base Face Mesh
    for (let i = 0; i < 468; i++) {
        for (let j = 0; j < adj[i].length; j++) {
            const n1 = adj[i][j]; if (n1 <= i) continue;
            for (let k = j + 1; k < adj[i].length; k++) {
                const n2 = adj[i][k]; if (n2 <= i) continue;
                if (adj[n1].includes(n2)) tris.push(i, n1, n2);
            }
        }
    }

    // Mouth Patch (Fills the black hole)
    for (let i = 0; i < INNER_LIP_TOP.length - 1; i++) {
        tris.push(INNER_LIP_TOP[i], INNER_LIP_BOT[i], INNER_LIP_TOP[i+1]);
        tris.push(INNER_LIP_BOT[i], INNER_LIP_BOT[i+1], INNER_LIP_TOP[i+1]);
    }

    // Neck Extrusion (Jaw to Shoulder)
    for (let i = 0; i < JAWLINE.length - 1; i++) {
        const jawA = JAWLINE[i], jawB = JAWLINE[i+1];
        const neckA = 468 + i, neckB = 468 + i + 1;
        tris.push(jawA, neckA, jawB);
        tris.push(neckA, neckB, jawB);
    }

    return tris;
}

// ══════════════════════════════════════════════════
//  2. THE SCULPTING RECEIVER
// ══════════════════════════════════════════════════
class SculptingReceiver {
    constructor() {
        this.totalVerts = 468 + JAWLINE.length; // Face + Procedural Neck
        this.basePositions = new Float32Array(this.totalVerts * 3);
        this.targetPositions = new Float32Array(this.totalVerts * 3);
        this.positions = new Float32Array(this.totalVerts * 3);
        this.colors = new Float32Array(this.totalVerts * 3);
        this.targetColors = new Float32Array(this.totalVerts * 3);
        this.isFullySculpted = false;

        // Init as a Sphere
        for (let i = 0; i < this.totalVerts; i++) {
            const phi = Math.acos(1 - 2 * (i + 0.5) / this.totalVerts);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;
            const r = 0.65;
            const x = r * Math.cos(theta) * Math.sin(phi);
            const y = r * Math.sin(theta) * Math.sin(phi);
            const z = r * Math.cos(phi);
            
            [this.positions, this.targetPositions, this.basePositions].forEach(arr => {
                arr[i*3] = x; arr[i*3+1] = y; arr[i*3+2] = z;
            });
            [this.colors, this.targetColors].forEach(arr => {
                arr[i*3] = 0.1; arr[i*3+1] = 0.1; arr[i*3+2] = 0.1;
            });
        }

        this.geometry = new THREE.BufferGeometry();
        this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
        this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));
        this.material = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.DoubleSide });
        this.mesh = new THREE.Mesh(this.geometry, this.material);
        scene.add(this.mesh);
    }

    initTopology(triangles) { this.geometry.setIndex(triangles); }

    receiveBuildPacket(packet) {
        const i = packet.idx;
        // Face points
        this.basePositions[i*3]   = packet.x;
        this.basePositions[i*3+1] = packet.y;
        this.basePositions[i*3+2] = packet.z;
        this.targetPositions[i*3] = packet.x;
        this.targetPositions[i*3+1] = packet.y;
        this.targetPositions[i*3+2] = packet.z;
        
        let r = packet.r / 255, g = packet.g / 255, b = packet.b / 255;

        // Shadow the interior mouth points
        if (INNER_LIP_TOP.includes(i) || INNER_LIP_BOT.includes(i)) {
            r *= 0.15; g *= 0.1; b *= 0.1;
        }
        
        this.targetColors[i*3] = r; this.targetColors[i*3+1] = g; this.targetColors[i*3+2] = b;

        // Update Extruded Neck based on jaw discovery
        const jawIdx = JAWLINE.indexOf(i);
        if (jawIdx !== -1) {
            const neckI = 468 + jawIdx;
            this.basePositions[neckI*3] = packet.x * 1.05; // Slightly flare neck
            this.basePositions[neckI*3+1] = packet.y - 1.5; // Drop to shoulder
            this.basePositions[neckI*3+2] = packet.z - 0.4; // Push back
            this.targetPositions[neckI*3] = this.basePositions[neckI*3];
            this.targetPositions[neckI*3+1] = this.basePositions[neckI*3+1];
            this.targetPositions[neckI*3+2] = this.basePositions[neckI*3+2];
            this.targetColors[neckI*3] = r; this.targetColors[neckI*3+1] = g; this.targetColors[neckI*3+2] = b;
        }
    }

    applyLiveDelta(vibe) {
        this.targetPositions.set(this.basePositions);
        const pushY = vibe.mouthOpen * 0.18;
        this.targetPositions[LM.MOUTH_B * 3 + 1] -= pushY; // Lower lip drop
        
        // Tilt the head
        this.mesh.rotation.y = -vibe.yaw;
        this.mesh.rotation.x = vibe.pitch;
    }

    update() {
        const speed = this.isFullySculpted ? 0.3 : 0.08;
        let pUp = false, cUp = false;
        for (let i = 0; i < this.totalVerts * 3; i++) {
            const pd = this.targetPositions[i]-this.positions[i];
            if(Math.abs(pd)>0.001){this.positions[i]+=pd*speed; pUp=true;}
            const cd = this.targetColors[i]-this.colors[i];
            if(Math.abs(cd)>0.001){this.colors[i]+=cd*speed; cUp=true;}
        }
        if(pUp) this.geometry.attributes.position.needsUpdate=true;
        if(cUp) this.geometry.attributes.color.needsUpdate=true;
    }
}

const receiver = new SculptingReceiver();

// ══════════════════════════════════════════════════
//  3. TRANSMITTER & TICK
// ══════════════════════════════════════════════════
let packetIndex = 0;
const TRANSMIT_QUEUE = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109, 33, 246, 161, 160, 159, 158, 157, 173, 133, 155, 154, 153, 145, 144, 163, 7, 362, 398, 384, 385, 386, 387, 388, 466, 263, 249, 390, 373, 374, 380, 381, 382];
const s = new Set(TRANSMIT_QUEUE); for(let i=0;i<468;i++) if(!s.has(i)) TRANSMIT_QUEUE.push(i);

function runTransmitter(lm) {
    if (packetIndex < TRANSMIT_QUEUE.length) {
        ftCtx.drawImage(vid, 0, 0, 640, 480);
        const limit = Math.min(packetIndex + 15, TRANSMIT_QUEUE.length);
        for (let i = packetIndex; i < limit; i++) {
            const idx = TRANSMIT_QUEUE[i], pt = lm[idx];
            const px = Math.floor(Math.max(0,Math.min(pt.x*640,639))), py = Math.floor(Math.max(0,Math.min(pt.y*480,479)));
            const rgb = ftCtx.getImageData(px,py,1,1).data;
            receiver.receiveBuildPacket({idx:idx, x:(pt.x-0.5)*2.5, y:-(pt.y-0.5)*2.5, z:-pt.z*2.5, r:rgb[0], g:rgb[1], b:rgb[2]});
        }
        packetIndex = limit;
        document.getElementById('packet_count').innerText = `${packetIndex} / 468`;
        if (packetIndex >= TRANSMIT_QUEUE.length) {
            receiver.isFullySculpted = true;
            document.getElementById('phase_label').innerText = "LIVE (STABLE)";
            document.getElementById('phase_label').style.color = "#0f0";
        }
    } else {
        const top = lm[10], bot = lm[152], mT = lm[LM.MOUTH_T], mB = lm[LM.MOUTH_B];
        vibe.mouthOpen = Math.min(Math.abs(mT.y-mB.y)/(Math.abs(top.y-bot.y)+0.01)*8, 1.0);
        vibe.yaw = (lm[LM.NOSE].x - 0.5) * 1.5;
        vibe.pitch = (lm[LM.NOSE].y - 0.5) * -1.2;
        receiver.applyLiveDelta(vibe);
    }
}

function applyChuckClose(ctx) {
    const size = 8; 
    const imageData = ctx.getImageData(0, 0, W, H);
    ctx.clearRect(0,0,W,H);
    for (let y = 0; y < H; y += size) {
        for (let x = 0; x < W; x += size) {
            const idx = (y * W + x) * 4;
            ctx.fillStyle = `rgb(${imageData.data[idx]},${imageData.data[idx+1]},${imageData.data[idx+2]})`;
            ctx.beginPath(); ctx.arc(x+size/2, y+size/2, size/2.2, 0, 7); ctx.fill();
        }
    }
}

function tick() {
    receiver.update();
    const mainCtx = document.getElementById('final_canvas').getContext('2d');
    mainCtx.clearRect(0, 0, W, H);
    
    if (isDevMode) {
        renderer.setViewport(0, 0, W, H);
        receiver.material.wireframe = true;
        renderer.render(scene, cam3);
        mainCtx.drawImage(renderer.domElement, 0, 0, W, H);
    } else {
        renderer.setViewport(0, 0, W, H);
        receiver.material.wireframe = false;
        renderer.render(scene, cam3);
        mainCtx.drawImage(renderer.domElement, 0, 0, W, H);
        applyChuckClose(mainCtx);
    }
}

function onResults(results) {
    if (!results.multiFaceLandmarks || !results.multiFaceLandmarks[0]) return;
    liveLM = results.multiFaceLandmarks[0];
    if (receiver.geometry.getIndex() === null && window.FACEMESH_TESSELATION) {
        receiver.initTopology(generateAdvancedTopology(window.FACEMESH_TESSELATION));
    }
    runTransmitter(liveLM);
    tick();
}

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
faceMesh.onResults(onResults);
const camera = new Camera(vid, {onFrame: async () => { await faceMesh.send({image: vid}); }, width: 640, height: 480});
camera.start();

window.addEventListener('keydown', e => { if(e.key.toLowerCase()==='d') isDevMode = !isDevMode; });
</script>
</body>
</html>
