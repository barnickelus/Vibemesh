<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh v6.3 - Hybrid</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
/* ── Global & Scrollable Layout ── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#06060f;color:#fff;font-family:'Segoe UI',sans-serif;
  min-height:100vh; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
}

/* ── UI Components ── */
.hdr{text-align:center;padding:16px 12px 6px; flex-shrink: 0;}
.hdr h1{font-size:clamp(1.4em,4vw,2.1em);font-weight:900;letter-spacing:1px;
  background:linear-gradient(90deg,#00f0ff,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.call{display:flex;justify-content:center;gap:18px;padding:8px 14px 10px;flex-wrap:wrap; flex-shrink: 0;}
.avatar-box{display:flex;flex-direction:column;align-items:center;gap:6px}
.av-label{font-size:.72em;font-weight:700;color:#00ffcc;letter-spacing:2px;text-transform:uppercase}

.av-frame{
  position:relative;width:300px;height:360px;border-radius:16px;overflow:hidden;
  background:#08081a; box-shadow:0 0 0 1px #ffffff0a, 0 0 40px #00f0ff12;
}
.av-frame canvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* ── Panel (Sticky & Accessible) ── */
.panel{
  background:#0c0c1e; padding:18px 16px; margin:10px 14px 24px; border-radius:14px;
  border:1px solid #ffffff07; position: sticky; bottom: 10px; z-index: 100;
  box-shadow: 0 -10px 40px #000; align-self: center; width: calc(100% - 28px); max-width: 600px;
}

.style-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.sb{
  padding:6px 12px; font-size:.7em; font-weight:600; background:#121224; color:#666; 
  border:1px solid #ffffff0a; border-radius:7px; cursor:pointer;
}
.sb.on{background:#00f0ff18; color:#00f0ff; border-color:#00f0ff55}

.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.btn{
  flex:1; min-width:120px; padding:12px; font-size:.8em; font-weight:700;
  border:none; border-radius:10px; cursor:pointer;
}
.btn-primary{background:linear-gradient(135deg,#ff00aa,#00f0ff); color:#000}
.btn-orange{background:linear-gradient(135deg,#ff6600,#ffcc00); color:#000}

.statusbar{text-align:center; padding:10px; font-size:.7em; color:#444;}
.pip{position:absolute; bottom:10px; right:10px; width:60px; height:45px; border-radius:6px; overflow:hidden; border:1px solid #00f0ff44;}
.pip video{width:100%; height:100%; object-fit:cover; transform:scaleX(-1)}
</style>
</head>
<body>

<div class="hdr">
  <h1>🏖️ VibeMesh v6.3</h1>
  <sub>Hybrid Overlay · Wireframe + Chuck Close</sub>
</div>

<div class="call">
  <div class="avatar-box">
    <div class="av-label">Local User</div>
    <div class="av-frame" id="localFrame">
      <div class="pip"><video id="pipLocal" autoplay muted playsinline></video></div>
    </div>
  </div>
  <div class="avatar-box">
    <div class="av-label">Remote Peer</div>
    <div class="av-frame" id="remoteFrame"></div>
  </div>
</div>

<div class="panel">
  <div class="style-row">
    <button class="sb on" id="sb-hybrid" onclick="setStyle('hybrid')">🌀 Hybrid (Wire+Dots)</button>
    <button class="sb"    id="sb-wire"   onclick="setStyle('wire')">🕸 Wire Only</button>
    <button class="sb"    id="sb-dots"   onclick="setStyle('dots')">● Dots Only</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="camBtn" onclick="startCamera()">📷 Start Camera</button>
    <button class="btn btn-primary" id="snapBtn" onclick="startSnap()" disabled>📸 Snap Portrait</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-orange" id="liveBtn" onclick="toggleLive()" disabled>⚡ Live Puppet</button>
    <button class="btn btn-primary" style="background:#121224; color:#aaa;" onclick="location.reload()">🗑 Reset</button>
  </div>
</div>

<div class="statusbar" id="statusbar">Awaiting camera access...</div>
<video id="camFeed" autoplay muted playsinline style="display:none"></video>

<script>
'use strict';

let cellStyle = 'hybrid';
let localS, remoteS, lastLandmarks, cameraActive = false, puppetActive = false;

// 1. Scene Setup
function makeScene(id) {
  const el = document.getElementById(id);
  const sc = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(38, 300/360, 0.1, 100);
  cam.position.z = 2.2;
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(300, 360);
  el.insertBefore(renderer.domElement, el.firstChild);
  
  sc.add(new THREE.AmbientLight(0xffffff, 0.6), new THREE.DirectionalLight(0xffffff, 0.8));
  
  // We maintain two mesh references for the overlay effect
  return { scene: sc, camera: cam, renderer, mesh: null, wire: null, texCanvas: document.createElement('canvas') };
}

// 2. Camera & MediaPipe (Fixed)
async function startCamera() {
  const video = document.getElementById('camFeed');
  const pip = document.getElementById('pipLocal');
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    video.srcObject = stream;
    pip.srcObject = stream;
    
    const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    
    faceMesh.onResults((results) => {
      if (!results.multiFaceLandmarks?.[0]) return;
      lastLandmarks = results.multiFaceLandmarks[0];
      if (puppetActive) updatePuppet(localS, lastLandmarks);
    });

    const camera = new Camera(video, {
      onFrame: async () => { await faceMesh.send({ image: video }); },
      width: 640, height: 480
    });
    
    camera.start();
    cameraActive = true;
    document.getElementById('camBtn').textContent = "✅ Camera Active";
    document.getElementById('snapBtn').disabled = false;
    document.getElementById('statusbar').textContent = "Camera ready. Click Snap Portrait.";
  } catch (err) {
    console.error(err);
    document.getElementById('statusbar').textContent = "Camera Error: " + err.message;
  }
}

// 3. The Hybrid Build (Wire + Bitmap Overlay)
function startSnap() {
  if (!lastLandmarks) return;
  
  const sc = localS;
  const W = 20, H = 24; // Avatar3D Resolution
  const nV = (W+1) * (H+1);
  const pos = new Float32Array(nV * 3);
  const uv = new Float32Array(nV * 2);
  const indices = [];

  // Basic Grid Geometry
  for (let j=0; j<=H; j++) {
    for (let i=0; i<=W; i++) {
      const idx = j*(W+1)+i;
      pos[idx*3] = (i/W - 0.5) * 1.5;
      pos[idx*3+1] = (0.5 - j/H) * 1.8;
      pos[idx*3+2] = 0;
      uv[idx*2] = i/W;
      uv[idx*2+1] = 1 - j/H;
    }
  }
  for (let j=0; j<H; j++) {
    for (let i=0; i<W; i++) {
      const tl = j*(W+1)+i, tr = tl+1, bl = (j+1)*(W+1)+i, br = bl+1;
      indices.push(tl, bl, tr, bl, br, tr);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  geo.setIndex(indices);

  // Layer 1: The Wire Mesh
  const wireMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true, transparent: true, opacity: 0.4 });
  if (sc.wire) sc.scene.remove(sc.wire);
  sc.wire = new THREE.Mesh(geo, wireMat);
  sc.scene.add(sc.wire);

  // Layer 2: The Chuck Close Bitmap Dots
  const tex = new THREE.CanvasTexture(generateDummyDots(W, H));
  tex.magFilter = THREE.NearestFilter; // KEY: Keeps dots sharp
  const dotMat = new THREE.MeshStandardMaterial({ map: tex, transparent: true });
  if (sc.mesh) sc.scene.remove(sc.mesh);
  sc.mesh = new THREE.Mesh(geo.clone(), dotMat);
  sc.mesh.position.z = 0.001; // Tiny offset to prevent Z-fighting
  sc.scene.add(sc.mesh);

  sc.basePos = pos.slice();
  document.getElementById('liveBtn').disabled = false;
  document.getElementById('statusbar').textContent = "Portrait Snapped. Start Puppet.";
  setStyle(cellStyle);
}

function generateDummyDots(W, H) {
  const canvas = document.createElement('canvas');
  canvas.width = W * 32; canvas.height = H * 32;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let j=0; j<H; j++) {
    for(let i=0; i<W; i++) {
      ctx.beginPath(); ctx.arc(i*32+16, j*32+16, 10, 0, Math.PI*2);
      ctx.fillStyle = '#00f0ff'; ctx.fill();
      ctx.strokeStyle = '#ff00aa'; ctx.lineWidth = 2; ctx.stroke();
    }
  }
  return canvas;
}

// 4. Puppeting both layers simultaneously
function updatePuppet(sc, lm) {
  if (!sc.mesh || !sc.wire) return;
  const posDots = sc.mesh.geometry.attributes.position.array;
  const posWire = sc.wire.geometry.attributes.position.array;
  
  // Simple deformation logic tied to landmark movement
  const jaw = (lm[152].y - 0.5) * 2;
  for (let i=0; i<posDots.length/3; i++) {
    const yVal = sc.basePos[i*3+1];
    const strength = Math.max(0, 1.0 - Math.abs(yVal));
    const offset = jaw * strength;
    posDots[i*3+1] = sc.basePos[i*3+1] - offset;
    posWire[i*3+1] = sc.basePos[i*3+1] - offset;
  }
  
  sc.mesh.geometry.attributes.position.needsUpdate = true;
  sc.wire.geometry.attributes.position.needsUpdate = true;
}

function setStyle(s) {
  cellStyle = s;
  document.querySelectorAll('.sb').forEach(b => b.classList.remove('on'));
  document.getElementById('sb-' + s).classList.add('on');
  if (!localS.mesh) return;
  
  localS.wire.visible = (s === 'hybrid' || s === 'wire');
  localS.mesh.visible = (s === 'hybrid' || s === 'dots');
}

function toggleLive() {
  puppetActive = !puppetActive;
  document.getElementById('liveBtn').textContent = puppetActive ? "⏹ Stop Puppet" : "⚡ Live Puppet";
}

window.onload = () => {
  localS = makeScene('localFrame');
  remoteS = makeScene('remoteFrame');
  (function anim() { requestAnimationFrame(anim); localS.renderer.render(localS.scene, localS.camera); })();
};
</script>
</body>
</html>
