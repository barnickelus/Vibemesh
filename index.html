<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh | Fixed Index Surface v10.7</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --alert: #ff0055; --bg: #020205; --panel: #0a0a16; }
body{background:var(--bg);color:#fff;font-family:monospace;margin:0;overflow:hidden}
.app-container { display: flex; flex-direction: column; height: 100vh; }
.stage{display:flex;justify-content:center;gap:15px;padding:20px;flex-grow: 1;}
.viewport{position:relative;width:450px;height:500px;background:#000;border:1px solid #1a1a2a;border-radius:12px;overflow:hidden;}
.tag{position:absolute;top:15px;left:15px;font-size:0.7em;color:var(--neon);letter-spacing:2px;z-index:10;background:rgba(0,0,0,0.8);padding:4px 8px;}
.network-deck{background:var(--panel);padding:20px 30px;border-top:1px solid #1a1a2a;}
.controls { display: flex; gap: 10px; margin-top: 10px; }
.btn { flex: 1; padding: 15px; background: #111; color: #888; border: 1px solid #222; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;}
.btn.active { background: var(--neon); color: #000; border-color: var(--neon); }
video { display: none; }
</style>
</head>
<body>

<div class="app-container">
  <div class="stage">
    <div class="viewport" id="v-sender"><div class="tag">TX: DATA CAPTURE</div></div>
    <div class="viewport" id="v-receiver"><div class="tag" style="color:#b266ff">RX: SURFACE RENDER</div></div>
  </div>

  <div class="network-deck">
    <div class="controls">
      <button class="btn active" id="btn-init" onclick="initSystem()">1. Init Optics</button>
      <button class="btn" id="btn-snap" onclick="triggerDataDump()" disabled>2. Snap Color Surface</button>
      <button class="btn" id="btn-puppet" onclick="toggleNetwork()" disabled>3. Open XYZ Telemetry</button>
    </div>
  </div>
</div>

<video id="webcam" playsinline></video>

<script>
let localScene, remoteScene, isTransmitting = false, latestLandmarks = null;
let captureCanvas, captureCtx;

function buildNodeEnv(containerId, isReceiver) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 450/500, 0.1, 100);
    camera.position.set(0, 0, 4.5);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(450, 500);
    document.getElementById(containerId).appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(468 * 3);
    const col = new Float32Array(468 * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

    let mesh;
    if (isReceiver) {
        // High-Fidelity Receiver: Organic Node-Mesh
        const mat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, opacity: 0.9 });
        mesh = new THREE.Points(geo, mat);
    } else {
        // Low-Fidelity Sender: Technical Wireframe
        const mat = new THREE.PointsMaterial({ size: 0.02, color: 0x00f0ff });
        mesh = new THREE.Points(geo, mat);
    }
    scene.add(mesh);
    return { scene, camera, renderer, mesh, geo, pos, col };
}

async function initSystem() {
    const initBtn = document.getElementById('btn-init');
    initBtn.textContent = "Booting...";
    try {
        localScene = buildNodeEnv('v-sender', false);
        remoteScene = buildNodeEnv('v-receiver', true);
        const video = document.getElementById('webcam');
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream; video.play();

        captureCanvas = document.createElement('canvas');
        captureCanvas.width = 640; captureCanvas.height = 480;
        captureCtx = captureCanvas.getContext('2d', { willReadFrequently: true });

        const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
        faceMesh.onResults(res => {
            if (!res.multiFaceLandmarks?.[0]) return;
            latestLandmarks = res.multiFaceLandmarks[0];
            updateGeometry(localScene, latestLandmarks);
            if (isTransmitting) updateGeometry(remoteScene, latestLandmarks);
        });

        const cameraUtils = new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } });
        cameraUtils.start();

        requestAnimationFrame(function animate() {
            localScene.renderer.render(localScene.scene, localScene.camera);
            remoteScene.renderer.render(remoteScene.scene, remoteScene.camera);
            requestAnimationFrame(animate);
        });

        initBtn.textContent = "Optics Live";
        document.getElementById('btn-snap').disabled = false;
        document.getElementById('btn-snap').classList.add('active');
    } catch (e) { initBtn.textContent = "Error Accessing Cam"; }
}

function triggerDataDump() {
    if (!latestLandmarks) return;
    const video = document.getElementById('webcam');
    captureCtx.drawImage(video, 0, 0, 640, 480);
    const imgData = captureCtx.getImageData(0, 0, 640, 480).data;
    
    for (let i = 0; i < 468; i++) {
        const pt = latestLandmarks[i];
        const px = Math.floor(pt.x * 640);
        const py = Math.floor(pt.y * 480);
        const idx = (py * 640 + px) * 4;
        remoteScene.col[i*3] = imgData[idx]/255;
        remoteScene.col[i*3+1] = imgData[idx+1]/255;
        remoteScene.col[i*3+2] = imgData[idx+2]/255;
    }
    remoteScene.geo.attributes.color.needsUpdate = true;
    updateGeometry(remoteScene, latestLandmarks);
    
    document.getElementById('btn-snap').textContent = "Color Locked";
    document.getElementById('btn-snap').classList.remove('active');
    document.getElementById('btn-puppet').disabled = false;
    document.getElementById('btn-puppet').classList.add('active');
}

function updateGeometry(node, lm) {
    for (let i = 0; i < 468; i++) {
        node.pos[i*3] = (lm[i].x - 0.5) * -5;
        node.pos[i*3+1] = (lm[i].y - 0.5) * -5;
        node.pos[i*3+2] = (lm[i].z * -5);
    }
    node.geo.attributes.position.needsUpdate = true;
}

function toggleNetwork() {
    isTransmitting = !isTransmitting;
    const btn = document.getElementById('btn-puppet');
    btn.textContent = isTransmitting ? "Telemetry Live" : "Open XYZ Telemetry";
}
</script>
</body>
</html>
