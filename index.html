<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeMesh v9.1 | Chuck Close Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
  :root { --cyan: #00f0ff; --magenta: #ff00aa; --bg: #06060f; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
  
  .hdr { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .hdr h1 { font-size: 1.8em; background: linear-gradient(90deg, var(--cyan), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .call { display: flex; justify-content: center; gap: 20px; padding: 20px; flex-wrap: wrap; }
  .av-frame { 
    position: relative; width: 300px; height: 360px; border-radius: 16px; 
    background: #08081a; overflow: hidden; border: 1px solid rgba(0, 240, 255, 0.1); 
  }
  .av-frame canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  
  /* The Missing Build UI */
  .build-ov { 
    position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; 
    background: linear-gradient(transparent, #000); z-index: 10; 
  }
  .build-track { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
  .build-bar { height: 100%; width: 0%; background: var(--cyan); transition: width 0.2s; }
  .build-lbl { font-size: 0.6em; text-transform: uppercase; letter-spacing: 1px; color: var(--cyan); margin-bottom: 4px; }

  .panel { max-width: 640px; margin: 0 auto; background: #0c0c1e; padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
  .btn-row { display: flex; gap: 10px; margin-top: 15px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75em; }
  .btn-primary { background: linear-gradient(135deg, var(--magenta), var(--cyan)); color: #000; }
  .btn-ghost { background: #121224; color: #888; border: 1px solid rgba(255,255,255,0.05); }
  
  #camFeed { position: fixed; top: -1000px; }
  .pip { position: absolute; bottom: 10px; right: 10px; width: 70px; height: 55px; border: 2px solid var(--cyan); border-radius: 4px; overflow: hidden; z-index: 20; }
  .pip video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  .statusbar { text-align: center; padding: 10px; font-size: 0.7em; color: #444; }
</style>
</head>
<body>

<div class="hdr"><h1>VibeMesh v9.1</h1><sub>The Close Protocol</sub></div>

<div class="call">
  <div class="av-frame" id="localFrame">
    <div class="pip"><video id="pipLocal" autoplay muted playsinline></video></div>
    <div class="build-ov" id="localBuild">
      <div class="build-lbl" id="localBuildLbl">Ready to Scan</div>
      <div class="build-track"><div class="build-bar" id="localBuildBar"></div></div>
    </div>
  </div>
  <div class="av-frame" id="remoteFrame"></div>
</div>

<div class="panel">
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startCamera()">1. Init Optics</button>
    <button class="btn btn-primary" id="snapBtn" onclick="startSnap()" disabled>2. Snap Portrait</button>
    <button class="btn btn-ghost" id="liveBtn" onclick="toggleLive()" disabled>3. Live Puppet</button>
  </div>
</div>

<div class="statusbar" id="status">Awaiting camera...</div>
<video id="camFeed" autoplay muted playsinline></video>

<script>
'use strict';

const ANCHORS = [33,133,362,263,1,4,61,291,152,10]; // Eyes, Nose, Mouth, Chin, Forehead
const TIERS = { AVATAR3D: { W:20, H:24 }, PUPPET: { W:12, H:14 }, GLYPH: { W:5, H:6 } };
const CELL_STEP = 34; // Texture slot size

let localS, lastLM, cameraOn = false, puppetActive = false, buildRunning = false;

// --- THREE.JS SETUP ---
function makeScene(id) {
  const el = document.getElementById(id);
  const sc = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(38, 300/360, 0.1, 100);
  cam.position.z = 2.2;
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(300, 360);
  el.insertBefore(renderer.domElement, el.firstChild);
  
  return {
    scene: sc, camera: cam, renderer,
    texCanvas: document.createElement('canvas'),
    mesh: null, tex: null, basePos: null, curPos: null,
    snapLM: null, snapBBox: null, snapAnchors: null
  };
}

// --- THE CHUCK CLOSE DRAWING ENGINE ---
function drawCloseCell(ctx, cx, cy, r, g, b) {
  const rad = 16;
  const lum = (r*0.299 + g*0.587 + b*0.114) / 255;
  const dRGB = `rgb(${r-50},${g-50},${b-50})`;
  const hRGB = `rgb(${r+50},${g+50},${b+50})`;

  // Outer Background
  ctx.fillStyle = dRGB;
  ctx.fillRect(cx-rad, cy-rad, rad*2, rad*2);

  // Concentric Rings (The "Close" Signature)
  const nR = Math.max(3, Math.round(3 + lum * 5));
  for (let i = nR; i >= 1; i--) {
    const t = i / nR;
    ctx.beginPath();
    ctx.arc(cx, cy, rad * t * 0.9, 0, Math.PI*2);
    ctx.fillStyle = i % 2 === 0 ? `rgb(${r},${g},${b})` : hRGB;
    ctx.fill();
  }
}

// --- MESH & TEXTURE BUILDING ---
async function buildMesh(sc, lm, tierName) {
  const cfg = TIERS[tierName];
  const W = cfg.W, H = cfg.H;
  
  // Setup Bounding Box (Mirror for selfie)
  let x0=1, x1=0, y0=1, y1=0;
  lm.forEach(p => { 
    const mx = 1-p.x;
    if(mx<x0) x0=mx; if(mx>x1) x1=mx;
    if(p.y<y0) y0=p.y; if(p.y>y1) y1=p.y;
  });
  const bbox = { x0, x1, y0, y1, w: x1-x0, h: y1-y0 };
  
  sc.snapLM = lm.map(p => ({...p}));
  sc.snapBBox = bbox;
  sc.snapAnchors = ANCHORS.map(i => ({ idx:i, u: (1-lm[i].x-x0)/bbox.w, v: (lm[i].y-y0)/bbox.h }));

  // Texture Atlas
  sc.texCanvas.width = W * CELL_STEP;
  sc.texCanvas.height = H * CELL_STEP;
  const ctx = sc.texCanvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,sc.texCanvas.width, sc.texCanvas.height);

  const nV = (W+1)*(H+1);
  const pos = new Float32Array(nV*3);
  const uvs = new Float32Array(nV*2);
  const indices = [];

  for(let j=0; j<=H; j++) {
    for(let i=0; i<=W; i++) {
      const u = i/W, v = j/H, vi = j*(W+1)+i;
      pos[vi*3] = (u-0.5)*2; pos[vi*3+1] = (0.5-v)*2.4; pos[vi*3+2] = -lm[0].z;
      uvs[vi*2] = u; uvs[vi*2+1] = 1-v;
      if(i<W && j<H) {
        const tl=j*(W+1)+i, tr=tl+1, bl=(j+1)*(W+1)+i, br=bl+1;
        indices.push(tl,bl,tr, bl,br,tr);
      }
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geo.setIndex(indices);

  if(sc.mesh) sc.scene.remove(sc.mesh);
  sc.tex = new THREE.CanvasTexture(sc.texCanvas);
  sc.mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ map: sc.tex }));
  sc.scene.add(sc.mesh);
  sc.basePos = pos.slice();
  sc.curPos = pos.slice();

  // Draw the cells
  for(let j=0; j<H; j++) {
    for(let i=0; i<W; i++) {
      drawCloseCell(ctx, i*CELL_STEP + 17, j*CELL_STEP + 17, 100, 150, 200);
    }
  }
  sc.tex.needsUpdate = true;
}

async function startSnap() {
  buildRunning = true;
  const bar = document.getElementById('localBuildBar');
  const lbl = document.getElementById('localBuildLbl');
  
  const p = [{t:'GLYPH', p:30}, {t:'PUPPET', p:60}, {t:'AVATAR3D', p:100}];
  for(const pass of p) {
    lbl.textContent = `Building ${pass.t}...`;
    bar.style.width = pass.p + '%';
    await buildMesh(localS, lastLM, pass.t);
    await new Promise(r => setTimeout(r, 600));
  }
  
  lbl.textContent = "Portrait Ready";
  document.getElementById('liveBtn').disabled = false;
  buildRunning = false;
}

// --- THE PUPPETING ENGINE (RBF) ---
function puppet(sc, liveLM) {
  if(!sc.mesh || !sc.snapLM) return;
  const pos = sc.mesh.geometry.attributes.position.array;
  const W = (sc.texCanvas.width/CELL_STEP);
  const H = (sc.texCanvas.height/CELL_STEP);

  for(let j=0; j<=H; j++) {
    for(let i=0; i<=W; i++) {
      const vi = j*(W+1)+i;
      const u = i/W, v = j/H;

      let du=0, dv=0, tw=0;
      for(const a of sc.snapAnchors) {
        const d2 = (a.u-u)**2 + (a.v-v)**2;
        const w = Math.exp(-d2/0.005);
        const liveUV = { u: (1-liveLM[a.idx].x-sc.snapBBox.x0)/sc.snapBBox.w, v: (liveLM[a.idx].y-sc.snapBBox.y0)/sc.snapBBox.h };
        du += (liveUV.u - a.u) * w;
        dv += (liveUV.v - a.v) * w;
        tw += w;
      }
      
      if(tw > 0) {
        pos[vi*3] = sc.basePos[vi*3] + (du/tw)*2;
        pos[vi*3+1] = sc.basePos[vi*3+1] - (dv/tw)*2.4;
      }
    }
  }
  sc.mesh.geometry.attributes.position.needsUpdate = true;
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById('pipLocal').srcObject = stream;
  const feed = document.getElementById('camFeed');
  feed.srcObject = stream;
  
  const faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
  faceMesh.onResults(res => {
    if(!res.multiFaceLandmarks?.[0]) return;
    lastLM = res.multiFaceLandmarks[0];
    if(puppetActive) puppet(localS, lastLM);
  });

  const cam = new Camera(feed, { onFrame: async () => { await faceMesh.send({ image: feed }); } });
  cam.start();
  document.getElementById('snapBtn').disabled = false;
  document.getElementById('status').textContent = "Camera Active. Face Detected.";
}

function toggleLive() {
  puppetActive = !puppetActive;
  document.getElementById('liveBtn').textContent = puppetActive ? "Stop Puppet" : "Live Puppet";
}

window.onload = () => {
  localS = makeScene('localFrame');
  (function render() {
    requestAnimationFrame(render);
    localS.renderer.render(localS.scene, localS.camera);
  })();
};
</script>
</body>
</html>
