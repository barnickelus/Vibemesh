<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeMesh | First Principles</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .panel { pointer-events: auto; background: rgba(0, 10, 10, 0.95); border: 1px solid #00ffcc; padding: 20px; width: 300px; box-shadow: 0 0 25px rgba(0, 255, 204, 0.15); }
        button { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 12px; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; font-weight: bold; }
        button.active { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        #console { margin-top: 15px; font-size: 9px; color: #008877; border-top: 1px solid #004433; padding-top: 10px; height: 60px; overflow: hidden; }
        video { position: fixed; bottom: 10px; right: 10px; width: 140px; opacity: 0.3; transform: scaleX(-1); border: 1px solid #004433; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="ui">
        <div class="panel">
            <h1>VIBEMESH // CORE</h1>
            <p>ASSET: LIVING_CLAY_V6</p>
            <p>STATUS: <span id="status">INIT_SEARCHING</span></p>
            <button id="connectBtn">Connect Spatial Ledger</button>
            <div id="console">> LOG: System Booting...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. THE BIOLUMINESCENT CHUCK CLOSE SHADER ---
        // This shader discretizes the video into cells, samples the center of the cell,
        // and draws concentric shapes based on the luminance of that single pixel.
        const vShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            void main() {
                vUv = uv; // Standard UV mapping from the sphere
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fShader = `
            uniform sampler2D uVideoTexture;
            uniform float uTime;
            uniform float uGridSize;
            varying vec2 vUv;
            varying vec3 vNormal;

            void main() {
                // Map the front half of the sphere (uv.x from 0.25 to 0.75) to the full video
                vec2 mappedUv = vec2((vUv.x - 0.25) * 2.0, vUv.y);
                
                // Mirror the video horizontally
                mappedUv.x = 1.0 - mappedUv.x; 

                // If we are on the back of the head, render dark clay
                if (mappedUv.x < 0.0 || mappedUv.x > 1.0) {
                    gl_FragColor = vec4(0.01, 0.02, 0.02, 1.0);
                    return;
                }

                // Discretize UV space into cells
                vec2 cellUv = floor(mappedUv * uGridSize) / uGridSize;
                
                // Center the sample point within the cell to get one solid color per cell
                vec2 centerUv = cellUv + (0.5 / uGridSize); 
                
                // Local coordinate within the cell (-0.5 to 0.5)
                vec2 localUv = fract(mappedUv * uGridSize) - 0.5;

                // Sample the video AT THE CENTER of the cell
                vec4 cellColor = texture2D(uVideoTexture, centerUv);
                
                // Calculate luminance
                float lum = dot(cellColor.rgb, vec3(0.299, 0.587, 0.114));

                // Chuck Close Cellular Logic
                // Base background of the cell
                vec3 finalColor = cellColor.rgb * 0.2; 
                float dist = length(localUv);

                // Determine inner shape complexity based on luminance
                float size = lum * 0.45; // Max radius within cell

                // The "Bioluminescent Squid" Color Shift
                // We shift the color channels to create optical vibration
                vec3 shiftedColor = vec3(cellColor.b, cellColor.r, cellColor.g) * 1.5;

                // Draw outer ring if luminance is high enough
                if (dist < 0.45 && dist > 0.45 - (lum * 0.2)) {
                    finalColor = shiftedColor;
                }

                // Draw inner core pulsing with time
                if (dist < size) {
                    float pulse = sin(uTime * 5.0 + centerUv.x * 10.0 + centerUv.y * 10.0) * 0.5 + 0.5;
                    finalColor = mix(cellColor.rgb, vec3(1.0, 1.0, 1.0), pulse * 0.4);
                }

                // Add grid lines
                if (max(abs(localUv.x), abs(localUv.y)) > 0.46) {
                    finalColor *= 0.1;
                }

                // Apply basic 3D lighting
                float light = max(dot(vNormal, vec3(0.5, 0.5, 1.0)), 0.2);
                
                gl_FragColor = vec4(finalColor * (light + 0.3), 1.0);
            }
        `;

        // --- 2. CORE ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video);
        
        // High-Density living clay
        const geometry = new THREE.SphereGeometry(2.0, 128, 128);
        const basePositions = geometry.attributes.position.clone();
        const baseNormals = geometry.attributes.normal.clone();

        // Rotate sphere so UV seam is at the back, face is at +Z
        geometry.rotateY(-Math.PI / 2);

        const material = new THREE.ShaderMaterial({
            vertexShader: vShader,
            fragmentShader: fShader,
            uniforms: { 
                uVideoTexture: { value: videoTex }, 
                uTime: { value: 0 },
                uGridSize: { value: 50.0 } // The resolution of the Chuck Close cells
            }
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        camera.position.z = 6;

        // --- 3. RECONSTRUCTION PIPELINE ---
        let landmarks = null;
        let isConnected = false;
        const log = (msg) => { document.getElementById('console').innerText = "> LOG: " + msg; };

        const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6 });
        faceMesh.onResults((res) => { if (res.multiFaceLandmarks) landmarks = res.multiFaceLandmarks[0]; });

        const cameraStream = new Camera(video, { 
            onFrame: async () => { await faceMesh.send({ image: video }); }, 
            width: 640, height: 480 
        });
        cameraStream.start().then(() => log("Stream Active")).catch(() => log("Camera Failed"));

        function updateRecon() {
            if (!isConnected || !landmarks) return;
            const pos = geometry.attributes.position;
            const sigmaSq = 0.05; // Elasticity of the clay

            // 34 Core Semantic Anchors defining true face shape
            // (Silhouette, Jaw, Nose, Eyes, Cheeks)
            const anchorIndices = [
                10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109,
                1, 4, // Nose tip, base
                33, 263, // Eye corners
                61, 291 // Mouth corners
            ];

            // Convert landmarks to World Space once per frame
            const worldAnchors = anchorIndices.map(idx => {
                const lm = landmarks[idx];
                return {
                    // Map mediapipe space to a 4.0x4.0 unit plane
                    x: (lm.x - 0.5) * -4.0, // mirrored
                    y: -(lm.y - 0.5) * 4.0, 
                    z: -lm.z * 10.0 // Push depth map dramatically
                };
            });

            // NORMAL-BASED DISPLACEMENT
            // Instead of pulling vertices through the sphere, we only push them out along their normal
            for (let i = 0; i < pos.count; i++) {
                // Get base vertex info
                const bx = basePositions.getX(i);
                const by = basePositions.getY(i);
                const bz = basePositions.getZ(i);
                const nx = baseNormals.getX(i);
                const ny = baseNormals.getY(i);
                const nz = baseNormals.getZ(i);

                // Only calculate bump for the front half of the sphere
                let totalBump = 0;
                let weightSum = 0;

                if (bz > 0) {
                    worldAnchors.forEach(anchor => {
                        // Calculate distance in XY plane
                        const dx = bx - anchor.x;
                        const dy = by - anchor.y;
                        const dSq = (dx * dx) + (dy * dy);
                        
                        // Gaussian RBF weight
                        const w = Math.exp(-dSq / (2.0 * sigmaSq));
                        
                        if (w > 0.001) {
                            totalBump += anchor.z * w;
                            weightSum += w;
                        }
                    });

                    if (weightSum > 0) {
                        totalBump /= weightSum;
                    }
                }

                // Apply displacement strictly along the base normal
                // This guarantees the geometry will never collapse inward "black hole" style
                const finalRadius = 2.0 + (totalBump * 0.8); // 0.8 is intensity scalar
                pos.setXYZ(i, nx * finalRadius, ny * finalRadius, nz * finalRadius);
            }
            
            pos.needsUpdate = true;
            geometry.computeVertexNormals(); // Crucial for lighting to reflect the new face shape
        }

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value = performance.now() * 0.001;
            updateRecon();
            renderer.render(scene, camera);
        }

        document.getElementById('connectBtn').onclick = (e) => {
            isConnected = !isConnected;
            e.target.classList.toggle('active');
            log(isConnected ? "Spatial Ledger Connected" : "Ledger Disconnected");
            document.getElementById('status').innerText = isConnected ? 'SYNC_ACTIVE' : 'IDLE';
        };

        animate();
    </script>
</body>
</html>
