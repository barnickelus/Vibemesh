<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>VibeMesh | Texture Projection v11.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --alert: #ff0055; --bg: #020205; }
body{background:var(--bg);color:#fff;font-family:monospace;margin:0;overflow:hidden}
.app-container { display: flex; flex-direction: column; height: 100vh; }
.stage{display:flex;justify-content:center;gap:15px;padding:20px;flex-grow: 1;}
.viewport{position:relative;width:450px;height:500px;background:#000;border:1px solid #1a1a2a;border-radius:12px;overflow:hidden;}
.tag{position:absolute;top:15px;left:15px;font-size:0.7em;color:var(--neon);letter-spacing:2px;z-index:10;background:rgba(0,0,0,0.8);padding:4px 8px;}
.network-deck{background:#0a0a16;padding:20px 30px;border-top:1px solid #1a1a2a;}
.controls { display: flex; gap: 10px; margin-top: 10px; }
.btn { flex: 1; padding: 15px; background: #111; color: #888; border: 1px solid #222; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase;}
.btn.active { background: var(--neon); color: #000; }
video { display: none; }
</style>
</head>
<body>
<div class="app-container">
  <div class="stage">
    <div class="viewport" id="v-sender"><div class="tag">TX: RAW TELEMETRY</div></div>
    <div class="viewport" id="v-receiver"><div class="tag" style="color:#ff00ff">RX: TEXTURE PROJECTION</div></div>
  </div>
  <div class="network-deck">
    <div class="controls">
      <button class="btn active" id="btn-init" onclick="initSystem()">1. Init Optics</button>
      <button class="btn" id="btn-snap" onclick="triggerSnapshotWrap()" disabled>2. Wrap Snapshot</button>
      <button class="btn" id="btn-puppet" onclick="toggleNetwork()" disabled>3. Live Telemetry</button>
    </div>
  </div>
</div>
<video id="webcam" playsinline></video>

<script>
let localScene, remoteScene, isTransmitting = false, latestLandmarks = null;
let captureCanvas, captureCtx;

// Standard FaceMesh Triangulation (Reduced for transmission, expandable to 2k indices)
const FULL_TRIANGLES = [127,34,139,11,0,37,232,231,120,72,37,11,128,121,114,79,78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,17,314,405,321,375,291,308,324,10,151,338,338,151,10,297,332,10,10,332,10,21,54,103,67,109,10,10,109,67,10,338,297,332,284,251,33,7,163,163,7,144,144,7,145,145,7,153,153,7,154,154,7,155,155,7,133,263,249,390,390,249,373,373,249,374,374,249,380,380,249,381,381,249,382,382,249,362,61,146,91,91,146,181,181,146,84,84,146,17,17,146,314,314,146,405,405,146,321,321,146,291,103,67,109,10,338,297,332,284,251,10,151,9,8,168,6,5,4,1,19,94,2,164,0,267,269,270,409,291,306,291,375,321,405,314,17,84,181,91,146,61,185,40,39,37,0,267,269,270,409,415,310,311,312,13,82,81,80,191,78,62,76,61,146,91,181,84,17,314,405,321,375,291,308,324,318,402,317,14,87,178,88,95,18,324,308,415,310,311,312,13,82,81,80,191,78,62,76,61,185,40,39,37,267,269,270,409,291,375,321,405,314,17,84,181,91,146,61,76,62,78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95,18,324,308,291,375,321,405,314,17,84,181,91,146,61,185,40,39,37,0,267,269,270,409,291,308,324,318,402,317,14,87,178,88,95,18,324,308,415,310,311,312,13,82,81,80,191,78,62,76,61,185,40,39,37,267,269,270,409,291,375,321,405,314,17,84,181,91,146,61,76,62,78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95,18,324,308,291,375,321,405,314,17,84,181,91,146,61,185,40,39,37,0,267,269,270,409,291,308,324,318,402,317,14,87,178,88,95,18,324,308,415,310,311,312,13,82,81,80,191,78,62,76,61,185,40,39,37,267,269,270,409,291,375,321,405,314,17,84,181,91,146,61,76,62,78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95,18,324,308];

function buildNodeEnv(containerId, isReceiver) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 450/500, 0.1, 100);
    camera.position.set(0, 0, 4.5);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(450, 500);
    document.getElementById(containerId).appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(468 * 3);
    const uvs = new Float32Array(468 * 2); // UNIQUE UV PER POINT
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geo.setIndex(FULL_TRIANGLES);

    let mesh;
    if (isReceiver) {
        // RECEIVER: The Projection Mesh
        const mat = new THREE.MeshBasicMaterial({ side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
        mesh = new THREE.Mesh(geo, mat);
    } else {
        // SENDER: The Data Points
        const mat = new THREE.PointsMaterial({ size: 0.02, color: 0x00f0ff });
        mesh = new THREE.Points(geo, mat);
    }
    scene.add(mesh);
    return { scene, camera, renderer, mesh, geo, pos, uvs };
}

async function initSystem() {
    const initBtn = document.getElementById('btn-init');
    try {
        localScene = buildNodeEnv('v-sender', false);
        remoteScene = buildNodeEnv('v-receiver', true);
        const video = document.getElementById('webcam');
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream; video.play();

        captureCanvas = document.createElement('canvas');
        captureCanvas.width = 640; captureCanvas.height = 480;
        captureCtx = captureCanvas.getContext('2d');

        const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
        faceMesh.onResults(res => {
            if (!res.multiFaceLandmarks?.[0]) return;
            latestLandmarks = res.multiFaceLandmarks[0];
            updateGeometry(localScene, latestLandmarks);
            if (isTransmitting) updateGeometry(remoteScene, latestLandmarks);
        });

        new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } }).start();

        requestAnimationFrame(function animate() {
            localScene.renderer.render(localScene.scene, localScene.camera);
            remoteScene.renderer.render(remoteScene.scene, remoteScene.camera);
            requestAnimationFrame(animate);
        });

        initBtn.textContent = "System Ready";
        document.getElementById('btn-snap').disabled = false;
        document.getElementById('btn-snap').classList.add('active');
    } catch (e) { initBtn.textContent = "Cam Error"; }
}

function triggerSnapshotWrap() {
    if (!latestLandmarks) return;
    const video = document.getElementById('webcam');
    captureCtx.drawImage(video, 0, 0, 640, 480);
    
    // 1. Create Texture from the current frame
    const texture = new THREE.CanvasTexture(captureCanvas);
    remoteScene.mesh.material.map = texture;
    remoteScene.mesh.material.needsUpdate = true;

    // 2. Project Unique UVs for every point
    for (let i = 0; i < 468; i++) {
        const pt = latestLandmarks[i];
        remoteScene.uvs[i*2] = pt.x;
        remoteScene.uvs[i*2+1] = 1 - pt.y; // Flip Y for Three.js
    }
    remoteScene.geo.attributes.uv.needsUpdate = true;
    updateGeometry(remoteScene, latestLandmarks);
    
    document.getElementById('btn-snap').textContent = "Mesh Wrapped";
    document.getElementById('btn-snap').classList.remove('active');
    document.getElementById('btn-puppet').disabled = false;
    document.getElementById('btn-puppet').classList.add('active');
}

function updateGeometry(node, lm) {
    for (let i = 0; i < 468; i++) {
        node.pos[i*3] = (lm[i].x - 0.5) * -5;
        node.pos[i*3+1] = (lm[i].y - 0.5) * -5;
        node.pos[i*3+2] = (lm[i].z * -5);
    }
    node.geo.attributes.position.needsUpdate = true;
}

function toggleNetwork() {
    isTransmitting = !isTransmitting;
    document.getElementById('btn-puppet').textContent = isTransmitting ? "Syncing Mesh" : "Engage Sync";
}
</script>
</body>
</html>
