<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh v10.4 | Polygonal Color Telemetry</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --grid: rgba(0, 240, 255, 0.15); }
body{background:#010105;color:#fff;font-family:'Monaco', monospace;margin:0;overflow:hidden}

.stage{display:flex;justify-content:center;gap:10px;padding:10px;height:60vh}
.viewport{position:relative;width:450px;height:550px;background:#000;border:1px solid #1a1a2a;overflow:hidden}
.ui-overlay{position:absolute;top:10px;left:10px;font-size:0.5em;color:var(--neon);z-index:10;pointer-events:none}

.control-deck{position:fixed;bottom:0;left:0;right:0;background:#050510;padding:25px;border-top:1px solid #1a1a2a;display:grid;grid-template-columns:1fr 300px;gap:20px}
.metrics{display:grid;grid-template-columns:repeat(3, 1fr);gap:10px}
.m-tile{background:#0a0a1a;padding:10px;border:1px solid #1a1a2a;text-align:center}
.m-tile label{display:block;font-size:0.5em;color:#444;margin-bottom:5px}
.m-tile span{color:var(--neon);font-size:0.8em}

.btn{padding:15px;background:var(--neon);color:#000;border:none;font-weight:900;cursor:pointer;text-transform:uppercase;font-size:0.7em}
.btn-off{background:#111;color:#444}
</style>
</head>
<body>

<div class="stage">
  <div class="viewport" id="v1">
    <div class="ui-overlay">NODE_01 // SOURCE_CAPTURE</div>
  </div>
  <div class="viewport" id="v2">
    <div class="ui-overlay">NODE_02 // POLYGON_RENDER</div>
  </div>
</div>

<div class="control-deck">
  <div class="metrics">
    <div class="m-tile"><label>Color Telemetry</label><span id="valColor">Active</span></div>
    <div class="m-tile"><label>Polygonal Shapes</label><span>892 Faces</span></div>
    <div class="m-tile"><label>Bandwidth</label><span id="valBand">~24 KB/s</span></div>
  </div>
  <div style="display:flex; flex-direction:column; gap:10px">
    <button class="btn" onclick="initCore()">1. Initialize Spatial Grid</button>
    <button class="btn btn-off" id="syncBtn" onclick="isSyncing = !isSyncing" disabled>2. Engage Polygonal Sync</button>
  </div>
</div>

<video id="webcam" style="display:none" playsinline></video>

<script>
let scene1, scene2, isSyncing = false;
let colorCanvas, colorCtx;

// A sample of the structural triangles to demonstrate the shapes.
// (In production, this is the full 2676-integer array).
const TOPOLOGY_INDICES = [
  10,338,297, 332,284,251, 10,338,332, 10,151,338, 151,108,338, // Forehead
  61,146,91, 146,91,181, 91,181,84, 181,84,17, 84,17,314, // Chin/Mouth
  33,7,163, 7,163,144, 163,144,145, 144,145,153, 145,153,154, // Left Eye
  263,249,390, 249,390,373, 390,373,374, 373,374,380, 374,380,381, // Right Eye
  168,6,197, 197,6,195, 195,6,5, 5,6,4, 4,6,122 // Nose
];

function setupGridWorld(containerId) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 450/550, 0.1, 1000);
    camera.position.set(0, 0.5, 3.5);
    camera.lookAt(0,0,0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(450, 550);
    document.getElementById(containerId).appendChild(renderer.domElement);

    // ── THE SPATIAL GRID ──
    const gridHelper = new THREE.GridHelper(10, 20, 0x00f0ff, 0x111122);
    gridHelper.position.y = -1.5;
    scene.add(gridHelper);

    // ── AVATAR POLYGON MESH ──
    const faceGeo = new THREE.BufferGeometry();
    
    // Allocate space for 468 XYZ coordinates and 468 RGB colors
    const positions = new Float32Array(468 * 3);
    const colors = new Float32Array(468 * 3);
    
    faceGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    faceGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    faceGeo.setIndex(TOPOLOGY_INDICES); // This connects the dots into shapes

    // We use a BasicMaterial with vertexColors to render the color data sent from the camera
    const faceMat = new THREE.MeshBasicMaterial({ 
        vertexColors: true, 
        wireframe: false, 
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.95
    });
    
    // Also keep the points visible so you can see the vertices holding the shapes
    const pointsMat = new THREE.PointsMaterial({ size: 0.03, vertexColors: true });
    
    const faceMesh = new THREE.Mesh(faceGeo, faceMat);
    const facePoints = new THREE.Points(faceGeo, pointsMat);
    
    scene.add(faceMesh);
    scene.add(facePoints);

    return { scene, camera, renderer, faceGeo, positions, colors };
}

async function initCore() {
    const video = document.getElementById('webcam');
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    video.srcObject = stream;
    video.play();

    // Setup offscreen canvas for color extraction
    colorCanvas = document.createElement('canvas');
    colorCanvas.width = 640;
    colorCanvas.height = 480;
    colorCtx = colorCanvas.getContext('2d', { willReadFrequently: true });

    const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
    
    faceMesh.onResults(results => {
        if (!results.multiFaceLandmarks?.[0]) return;
        const landmarks = results.multiFaceLandmarks[0];
        
        // Draw current video frame to hidden canvas to extract color data
        if (video.readyState >= 2) {
            colorCtx.drawImage(video, 0, 0, colorCanvas.width, colorCanvas.height);
        }
        
        updateGridNode(scene1, landmarks);
        if (isSyncing) updateGridNode(scene2, landmarks);
    });

    const camera = new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } });
    camera.start();
    
    document.getElementById('syncBtn').disabled = false;
    document.getElementById('syncBtn').classList.remove('btn-off');
}

function updateGridNode(node, lm) {
    const pos = node.positions;
    const col = node.colors;
    
    lm.forEach((point, i) => {
        // Map to XYZ Grid Space (-2 to 2)
        pos[i * 3]     = (point.x - 0.5) * -4; 
        pos[i * 3 + 1] = (point.y - 0.5) * -4;
        pos[i * 3 + 2] = point.z * -4;

        // Map X/Y to Canvas pixels to grab the color data for this specific point
        const px = Math.min(Math.floor(point.x * colorCanvas.width), colorCanvas.width - 1);
        const py = Math.min(Math.floor(point.y * colorCanvas.height), colorCanvas.height - 1);
        
        // Get RGB from the canvas array
        const pixel = colorCtx.getImageData(px, py, 1, 1).data;
        col[i * 3]     = pixel[0] / 255;
        col[i * 3 + 1] = pixel[1] / 255;
        col[i * 3 + 2] = pixel[2] / 255;
    });

    node.faceGeo.attributes.position.needsUpdate = true;
    node.faceGeo.attributes.color.needsUpdate = true;
}

window.onload = () => {
    scene1 = setupGridWorld('v1');
    scene2 = setupGridWorld('v2');
    
    function animate() {
        requestAnimationFrame(animate);
        scene1.renderer.render(scene1.scene, scene1.camera);
        scene2.renderer.render(scene2.scene, scene2.camera);
    }
    animate();
};
</script>
</body>
</html>
