<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh v9.8 | Telemetry & Environment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --accent: #00f0ff; --panel: #0a0a1a; }
body{background:#04040a;color:#fff;font-family:'Inter',sans-serif;margin:0;overflow:hidden}
.hdr{padding:20px;text-align:center;border-bottom:1px solid #ffffff0a}
.hdr h1{font-size:1.2em;letter-spacing:4px;color:var(--accent);text-transform:uppercase}

.viewport{display:flex;justify-content:center;gap:30px;padding:20px;height:60vh}
.av-container{position:relative;width:360px;height:450px;border-radius:30px;background:#000;border:1px solid #ffffff10;box-shadow:0 40px 100px #000}
.label-tag{position:absolute;top:20px;left:20px;font-size:0.6em;color:rgba(255,255,255,0.3);letter-spacing:2px;z-index:10}

.ui-panel{max-width:800px;margin:0 auto;background:var(--panel);padding:30px;border-radius:30px 30px 0 0;border:1px solid #ffffff0a;position:fixed;bottom:0;left:0;right:0}
.data-stream{display:grid;grid-template-columns:repeat(4, 1fr);gap:15px;margin-bottom:25px}
.data-box{background:#111125;padding:12px;border-radius:12px;text-align:center}
.data-box label{display:block;font-size:0.5em;color:#444;margin-bottom:5px;text-transform:uppercase}
.data-box span{font-family:'Courier New';font-size:0.8em;color:var(--accent)}

.btn-group{display:flex;gap:15px}
.btn{flex:1;padding:18px;border-radius:15px;border:none;font-weight:900;text-transform:uppercase;font-size:0.7em;cursor:pointer;transition:0.3s}
.btn-on{background:var(--accent);color:#000}
.btn-off{background:#1a1a35;color:#666}
</style>
</head>
<body>

<div class="hdr"><h1>VibeMesh : Telemetry Protocol v9.8</h1></div>

<div class="viewport">
  <div class="av-container" id="senderView">
    <div class="label-tag">LOCAL.OPTIC (SENDER)</div>
  </div>
  <div class="av-container" id="recipientView">
    <div class="label-tag">REMOTE.MESH (RECIPIENT)</div>
  </div>
</div>

<div class="ui-panel">
  <div class="data-stream">
    <div class="data-box"><label>Estimated Kelvin</label><span id="valKelvin">--</span></div>
    <div class="data-box"><label>Light Azimuth</label><span id="valAzi">--</span></div>
    <div class="data-box"><label>Driver Points</label><span id="valPoints">0</span></div>
    <div class="data-box"><label>Packet Size</label><span id="valBytes">0 B</span></div>
  </div>
  
  <div class="btn-group">
    <button class="btn btn-off" id="camBtn" onclick="initSystem()">Initialize Optics</button>
    <button class="btn btn-off" id="syncBtn" onclick="toggleSync()" disabled>Establish Peer Sync</button>
  </div>
</div>

<video id="webcam" autoplay muted playsinline style="display:none"></video>

<script>
'use strict';

const ANCHORS = [33,133,362,263,1,4,61,291,152,10,187,411,13,14,78,308];
let sender, recipient, isSyncing = false;

function createStage(containerId) {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, 360/450, 0.1, 100);
  camera.position.z = 2.8;
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(360, 450);
  document.getElementById(containerId).appendChild(renderer.domElement);

  const amb = new THREE.AmbientLight(0xffffff, 0.2);
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(0, 1, 2);
  scene.add(amb, dir);

  return { scene, camera, renderer, dir, amb, mesh: null, basePos: null, tex: null };
}

// ── TELEMETRY SENSOR: ESTIMATE LIGHT FROM FEED ──
function analyzeEnvironment(video) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 64; canvas.height = 48;
  ctx.drawImage(video, 0, 0, 64, 48);
  const data = ctx.getImageData(0,0,64,48).data;
  
  let r=0, g=0, b=0, maxB = 0, maxPos = 0;
  for(let i=0; i<data.length; i+=4) {
    r += data[i]; g += data[i+1]; b += data[i+2];
    let bright = data[i] + data[i+1] + data[i+2];
    if(bright > maxB) { maxB = bright; maxPos = i/4; }
  }
  
  const avgR = r/(data.length/4), avgB = b/(data.length/4);
  const kelvin = Math.floor(6500 + (avgR - avgB) * 20); // Rough K-estimation
  const azi = ((maxPos % 64) / 64 - 0.5) * 180; // Rough Light Direction
  
  return { kelvin, azi };
}

function kelvinToColor(k) {
  let temp = k / 100, r, g, b;
  if (temp <= 66) {
    r = 255;
    g = 99.47 * Math.log(temp) - 161.11;
    b = temp <= 19 ? 0 : 138.51 * Math.log(temp - 10) - 305.04;
  } else {
    r = 329.69 * Math.pow(temp - 60, -0.133);
    g = 288.12 * Math.pow(temp - 60, -0.075);
    b = 255;
  }
  return new THREE.Color(r/255, g/255, b/255);
}

// ── MESH CONSTRUCTION ──
async function buildMesh(stg, lm, video) {
  const W = 32, H = 40, CELL = 34;
  const texCanvas = document.createElement('canvas');
  texCanvas.width = W*CELL; texCanvas.height = H*CELL;
  const ctx = texCanvas.getContext('2d');

  // Sampling coordinates
  let x0=1, x1=0, y0=1, y1=0;
  lm.forEach(p => { const mx=1-p.x; if(mx<x0) x0=mx; if(mx>x1) x1=mx; if(p.y<y0) y0=p.y; if(p.y>y1) y1=p.y; });
  stg.bbox = { x0, x1, y0, y1, w:x1-x0, h:y1-y0 };
  stg.snapLM = lm.map(p => ({...p}));

  // Render "Chuck Close" Texture
  const sC = document.createElement('canvas'); sC.width = video.videoWidth; sC.height = video.videoHeight;
  const sX = sC.getContext('2d'); sX.drawImage(video, 0, 0);

  for(let j=0; j<H; j++) {
    for(let i=0; i<W; i++) {
      const vx = Math.floor((x0 + (i/W)*(x1-x0)) * sC.width);
      const vy = Math.floor((y0 + (j/H)*(y1-y0)) * sC.height);
      const p = sX.getImageData(vx, vy, 1, 1).data;
      
      ctx.fillStyle = `rgb(${p[0]*0.2},${p[1]*0.2},${p[2]*0.2})`;
      ctx.fillRect(i*CELL, j*CELL, CELL, CELL);
      ctx.beginPath();
      ctx.arc(i*CELL+17, j*CELL+17, 14, 0, Math.PI*2);
      ctx.fillStyle = `rgb(${p[0]},${p[1]},${p[2]})`;
      ctx.fill();
    }
  }

  const geo = new THREE.PlaneGeometry(2.2, 2.8, W, H);
  stg.tex = new THREE.CanvasTexture(texCanvas);
  stg.mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ map: stg.tex, flatShading: true }));
  stg.scene.add(stg.mesh);
  stg.basePos = geo.attributes.position.array.slice();
}

// ── THE RECIPIENT PUPPETING ──
function updateRemote(packet) {
  if(!recipient.mesh) return;
  const { lm, kelvin, azi } = packet;
  
  // 1. Apply Environmental Telemetry
  const col = kelvinToColor(kelvin);
  recipient.dir.color = col;
  recipient.dir.position.set(Math.sin(azi * Math.PI/180)*3, 1, 2);
  
  // 2. Structural Mesh Deformation (Puppeting)
  const pos = recipient.mesh.geometry.attributes.position.array;
  const bb = recipient.bbox, W=32, H=40;
  
  for(let j=0; j<=H; j++) {
    for(let i=0; i<=W; i++) {
      const vi = j*(W+1)+i, u = i/W, v = j/H;
      let du=0, dv=0, tw=0;
      ANCHORS.forEach(idx => {
        const su = (1-recipient.snapLM[idx].x-bb.x0)/bb.w, sv = (recipient.snapLM[idx].y-bb.y0)/bb.h;
        const w = Math.exp(-((su-u)**2 + (sv-v)**2)/0.004);
        du += ((1-lm[idx].x-bb.x0)/bb.w - su)*w;
        dv += ((lm[idx].y-bb.y0)/bb.h - sv)*w;
        tw += w;
      });
      if(tw > 0) {
        pos[vi*3] = recipient.basePos[vi*3] + (du/tw)*2.2;
        pos[vi*3+1] = recipient.basePos[vi*3+1] - (dv/tw)*2.8;
      }
    }
  }
  recipient.mesh.geometry.attributes.position.needsUpdate = true;
}

async function initSystem() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  const video = document.getElementById('webcam');
  video.srcObject = stream;
  
  const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
  faceMesh.onResults(res => {
    if (!res.multiFaceLandmarks?.[0]) return;
    const lm = res.multiFaceLandmarks[0];
    
    // SENDER ACTIONS
    if (isSyncing) {
      const env = analyzeEnvironment(video);
      const packet = { lm, kelvin: env.kelvin, azi: env.azi };
      
      // UI Metrics
      document.getElementById('valKelvin').textContent = env.kelvin + "K";
      document.getElementById('valAzi').textContent = Math.round(env.azi) + "°";
      document.getElementById('valPoints').textContent = ANCHORS.length;
      document.getElementById('valBytes').textContent = (JSON.stringify(packet).length / 1024).toFixed(2) + " KB";
      
      // RECIPIENT ACTIONS (The "Puppet")
      updateRemote(packet);
    }
    
    if(!sender.mesh) buildMesh(sender, lm, video);
    if(!recipient.mesh) buildMesh(recipient, lm, video);
  });
  
  new Camera(video, { onFrame: async () => await faceMesh.send({ image: video }) }).start();
  document.getElementById('syncBtn').disabled = false;
  document.getElementById('syncBtn').classList.replace('btn-off', 'btn-on');
}

function toggleSync() { isSyncing = !isSyncing; }

window.onload = () => {
  sender = createStage('senderView');
  recipient = createStage('recipientView');
  (function render() {
    requestAnimationFrame(render);
    sender.renderer.render(sender.scene, sender.camera);
    recipient.renderer.render(recipient.scene, recipient.camera);
  })();
};
</script>
</body>
</html>
