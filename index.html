<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoBi-Net // ITERATION BUILD</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { position: relative; width: 480px; height: 560px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        canvas, video { position: absolute; top: 0; left: 0; }
        #ui { position: absolute; bottom: 10px; left: 10px; z-index: 10; font-size: 10px; background: rgba(0,0,0,0.85); padding: 8px; border: 1px solid #00ff0033; pointer-events: none; }
        .hint { position: absolute; top: 10px; right: 10px; font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" style="display:none"></video>
    <canvas id="final_canvas" width="480" height="560"></canvas>
    <div id="ui">
        LOBI-NET // PROTOCOL ANALYZER<br>
        STATUS: <span id="status" style="color:#fff">INIT...</span><br>
        DATA: <span id="packet_size" style="color:#00ffff">24-BYTE PACKET</span>
    </div>
    <div class="hint">PRESS 'D' TO TOGGLE DEV MODE</div>
</div>

<script>
'use strict';

const vid = document.getElementById('input_video');
const canvas = document.getElementById('final_canvas');
const finalCtx = canvas.getContext('2d');
const W=480, H=560;

// Iteration State
let isDevMode = true; 
let liveLM = null;
let vibe = { mouthOpen: 0, yaw: 0, pitch: 0 };

// Landmark Indices for Calibration
const LM = { NOSE:1, CHIN:152, TOP:10, MOUTH_T:13, MOUTH_B:14 };

// --- THREE.JS SETUP (THE PUPPET) ---
const scene = new THREE.Scene();
const cam3 = new THREE.PerspectiveCamera(35, (W/2)/H, 0.1, 1000);
cam3.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H); 

// High-Fidelity Protocol Asset (The "Clean" Version)
const hiFiMaterial = new THREE.MeshStandardMaterial({
    color: 0x111111, roughness: 0.1, metalness: 0.9, emissive: 0x001122
});
const headMesh = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.8, 1.2), hiFiMaterial);
scene.add(headMesh);

const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// --- CALIBRATION LOGIC (24-BYTE EXTRACTION) ---
function extractVibeData(lm) {
    // 1. Mouth Opening (Normalized to 0.0 - 1.0)
    const top = lm[LM.TOP], bot = lm[LM.CHIN];
    const mT = lm[LM.MOUTH_T], mB = lm[LM.MOUTH_B];
    const dist = Math.sqrt(Math.pow(mT.x - mB.x, 2) + Math.pow(mT.y - mB.y, 2));
    const faceSize = Math.sqrt(Math.pow(top.x - bot.x, 2) + Math.pow(top.y - bot.y, 2));
    
    // 2. Pose (Yaw/Pitch)
    const nose = lm[LM.NOSE];
    
    return {
        mouth: Math.min(dist / faceSize * 6.0, 1.0), // Gain multiplier
        yaw: (nose.x - 0.5) * 1.5,
        pitch: (nose.y - 0.5) * -1.2
    };
}

function onResults(results) {
    if (!results.multiFaceLandmarks || !results.multiFaceLandmarks[0]) return;
    document.getElementById('status').innerText = "STREAMING";
    liveLM = results.multiFaceLandmarks[0];
    
    const data = extractVibeData(liveLM);
    vibe.mouthOpen = data.mouth;
    vibe.yaw = data.yaw;
    vibe.pitch = data.pitch;
    
    tick();
}

function tick() {
    // Apply 24-byte protocol data to the 3D Puppet
    headMesh.rotation.y = -vibe.yaw;
    headMesh.rotation.x = vibe.pitch;
    headMesh.scale.y = 1 + (vibe.mouthOpen * 0.4); // Morph simulation

    if (isDevMode) {
        renderDevView();
    } else {
        renderImmersiveView();
    }
}

function renderDevView() {
    finalCtx.clearRect(0, 0, W, H);

    // LEFT: GROUND TRUTH (RAW CAMERA + TRACKING OVERLAY)
    finalCtx.save();
    finalCtx.drawImage(vid, 0, 0, W/2, H);
    drawDebugDots(finalCtx, liveLM, W/2, H);
    drawLabel(finalCtx, "GROUND TRUTH", 10, 20);
    finalCtx.restore();

    // RIGHT: PROTOCOL OUTPUT (CLEAN 3D PUPPET)
    renderer.setViewport(0, 0, W/2, H);
    renderer.render(scene, cam3);
    finalCtx.drawImage(renderer.domElement, W/2, 0, W/2, H);
    drawLabel(finalCtx, "PROTOCOL OUTPUT", W/2 + 10, 20);

    renderDataHUD(finalCtx);
}

function renderImmersiveView() {
    // Standard full-screen view (Placeholder for your pixel filter)
    renderer.setViewport(0, 0, W, H);
    renderer.render(scene, cam3);
    finalCtx.drawImage(renderer.domElement, 0, 0, W, H);
    drawLabel(finalCtx, "IMMERSIVE MODE", 10, 20);
}

function drawDebugDots(ctx, lm, w, h) {
    ctx.fillStyle = "#00ff00";
    for(let key in LM) {
        const pt = lm[LM[key]];
        ctx.beginPath(); ctx.arc(pt.x * w, pt.y * h, 3, 0, 7); ctx.fill();
    }
}

function renderDataHUD(ctx) {
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(W/2 - 70, H - 70, 140, 50);
    ctx.fillStyle = "#00ffff";
    ctx.font = "bold 11px monospace";
    ctx.fillText(`MOUTH: ${(vibe.mouthOpen*100).toFixed(1)}%`, W/2 - 60, H - 50);
    ctx.fillText(`YAW:   ${vibe.yaw.toFixed(2)}`, W/2 - 60, H - 35);
}

function drawLabel(ctx, txt, x, y) {
    ctx.fillStyle = "black";
    ctx.fillRect(x-2, y-12, ctx.measureText(txt).width+4, 15);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 9px sans-serif";
    ctx.fillText(txt, x, y);
}

// --- SETUP MEDIAPIPE ---
window.addEventListener('keydown', e => { if(e.key.toLowerCase()==='d') isDevMode = !isDevMode; });

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
faceMesh.onResults(onResults);

const camera = new Camera(vid, {onFrame: async () => { await faceMesh.send({image: vid}); }, width: 640, height: 480});
camera.start();
</script>
</body>
</html>
