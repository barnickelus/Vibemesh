<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh v6.1 - Corrected</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06060f;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* ── Header ── */
.hdr{text-align:center;padding:16px 12px 6px}
.hdr h1{font-size:clamp(1.4em,4vw,2.1em);font-weight:900;letter-spacing:1px;
  background:linear-gradient(90deg,#00f0ff,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr sub{display:block;font-size:.58em;color:#333;letter-spacing:3px;text-transform:uppercase;margin-top:2px}

/* ── Call layout ── */
.call{display:flex;justify-content:center;gap:18px;padding:8px 14px 4px;flex-wrap:wrap}
.avatar-box{display:flex;flex-direction:column;align-items:center;gap:6px}
.av-label{font-size:.72em;font-weight:700;color:#00ffcc;letter-spacing:2px;text-transform:uppercase}

/* ── Avatar frame ── */
.av-frame{
  position:relative;width:300px;height:360px;border-radius:16px;overflow:hidden;
  background:#08081a;
  box-shadow:0 0 0 1px #ffffff0a, 0 0 40px #00f0ff12;
}
.av-frame canvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* ── PIP camera ── */
.pip{
  position:absolute;bottom:10px;right:10px;width:68px;height:52px;
  border-radius:8px;overflow:hidden;border:2px solid #00f0ff55;
  background:#000;z-index:30;box-shadow:0 2px 10px #0008;
}
.pip video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}

/* ── Tier badge ── */
.tier-badge{
  position:absolute;top:9px;left:10px;padding:3px 9px;border-radius:20px;
  font-size:.56em;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  background:#00f0ff12;border:1px solid #00f0ff44;color:#00f0ff;
  z-index:20;pointer-events:none;
}

/* ── Speaking ring ── */
.speak-ring{
  position:absolute;inset:0;border-radius:16px;border:3px solid transparent;
  pointer-events:none;z-index:10;transition:border-color .1s;
}
.speak-ring.on{border-color:#00ff8877;animation:spk .75s infinite}
@keyframes spk{0%,100%{box-shadow:inset 0 0 0 #0000}50%{box-shadow:inset 0 0 20px #00ff8822}}

/* ── Build progress ── */
.build-ov{
  position:absolute;bottom:0;left:0;right:0;padding:10px 13px 12px;
  background:linear-gradient(transparent,#000000cc);
  border-radius:0 0 16px 16px;z-index:15;pointer-events:none;
}
.build-lbl{font-size:.58em;color:#aaa;letter-spacing:1px;margin-bottom:4px;min-height:14px}
.build-track{height:3px;background:#ffffff10;border-radius:2px;overflow:hidden}
.build-bar{height:3px;width:0%;border-radius:2px;background:linear-gradient(90deg,#00f0ff,#ff00aa);transition:width .2s}

/* ── Snap countdown overlay ── */
.snap-ov{
  position:absolute;inset:0;background:#000000bb;border-radius:16px;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:40;
}
.snap-ov.show{display:flex}
.snap-num{font-size:4em;font-weight:900;color:#00f0ff;line-height:1;text-shadow:0 0 30px #00f0ff88}
.snap-sub{font-size:.7em;color:#888;letter-spacing:2px;text-transform:uppercase}

/* ── Idle state ── */
.idle-msg{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;z-index:5;pointer-events:none;
}
.idle-icon{font-size:2.5em;opacity:.25}
.idle-text{font-size:.7em;color:#333;letter-spacing:1px;text-transform:uppercase}

/* ── Controls panel (FIXED: Sticky and Visible) ── */
.panel{
  background:#0c0c1e;
  padding:14px 16px;
  margin:10px 14px 20px;
  border-radius:14px;
  border:1px solid #ffffff07;
  position: sticky;
  bottom: 20px;
  z-index: 100;
  box-shadow: 0 -10px 30px #000;
}

/* ── Style picker ── */
.section-label{font-size:.6em;color:#444;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.style-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.sb{
  padding:5px 11px;font-size:.68em;font-weight:600;font-family:inherit;
  background:#121224;color:#555;border:1px solid #ffffff0a;border-radius:7px;
  cursor:pointer;transition:all .15s;
}
.sb:hover{color:#888;border-color:#ffffff18}
.sb.on{background:#00f0ff18;color:#00f0ff;border-color:#00f0ff55}

/* ── Sliders ── */
.sliders{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px 16px;margin-bottom:12px}
.sl-item{display:flex;flex-direction:column;gap:3px}
.sl-item label{font-size:.6em;color:#444;letter-spacing:1px;text-transform:uppercase}
.sl-row{display:flex;align-items:center;gap:7px}
input[type=range]{flex:1;accent-color:#00f0ff;cursor:pointer;height:3px}
.sl-val{font-size:.72em;color:#00f0ff;min-width:30px;text-align:right}

/* ── Button groups ── */
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.btn-row:last-child{margin-bottom:0}

/* Button base */
.btn{
  flex:1;min-width:0;padding:11px 10px;font-size:.78em;font-weight:700;font-family:inherit;
  border:none;border-radius:10px;cursor:pointer;
  transition:opacity .15s,transform .1s;white-space:nowrap;text-align:center;
}
.btn:active{opacity:.7;transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:default;transform:none}

/* Button variants */
.btn-primary{background:linear-gradient(135deg,#ff00aa,#00f0ff);color:#000}
.btn-green{background:linear-gradient(135deg,#00c853,#00f0ff);color:#000}
.btn-orange{background:linear-gradient(135deg,#ff6600,#ffcc00);color:#000}
.btn-ghost{background:#121224;color:#666;border:1px solid #ffffff0a}
.btn-ghost:not(:disabled):hover{color:#aaa;border-color:#ffffff22}
.btn-danger{background:#2a1010;color:#ff4444;border:1px solid #ff222222}
.btn-danger:not(:disabled):hover{background:#3a1515}

/* Status indicators on buttons */
.btn .bicon{margin-right:4px}
.btn-cam.active{background:linear-gradient(135deg,#00c853,#00f090);color:#000}

/* ── Status bar ── */
.statusbar{
  text-align:center;padding:5px 14px 4px;font-size:.7em;color:#444;min-height:24px;
}

/* ── Stats row ── */
.stats{
  display:flex;justify-content:center;gap:0;
  padding:0 14px 10px;flex-wrap:wrap;
}
.stat{
  font-size:.63em;color:#333;padding:4px 10px;
  border-right:1px solid #ffffff08;
}
.stat:last-child{border-right:none}
.stat b{color:#00ffcc;font-weight:600}
</style>
</head>
<body>

<div class="hdr">
  <h1>🏖️ VibeMesh v6.1</h1>
  <sub>Face Mesh Avatar · Multi-Frame Snap · Shore Edition</sub>
</div>

<div class="call">
  <div class="avatar-box">
    <div class="av-label" id="localLabel">You · Vancouver</div>
    <div class="av-frame" id="localFrame">
      <div class="idle-msg" id="localIdle">
        <div class="idle-icon">📷</div>
        <div class="idle-text">Start Camera</div>
      </div>
      <div class="pip"><video id="pipLocal" autoplay muted playsinline></video></div>
      <div class="tier-badge" id="localBadge">READY</div>
      <div class="speak-ring"  id="localRing"></div>
      <div class="snap-ov"     id="snapOv">
        <div class="snap-num"  id="snapCount">5</div>
        <div class="snap-sub">Hold still</div>
      </div>
      <div class="build-ov" id="localBuildOv" style="display:none">
        <div class="build-lbl" id="localBuildLbl">Click Snap to begin</div>
        <div class="build-track"><div class="build-bar" id="localBuildBar"></div></div>
      </div>
    </div>
  </div>
  <div class="avatar-box">
    <div class="av-label">JerseyBro · Remote</div>
    <div class="av-frame" id="remoteFrame">
      <div class="idle-msg" id="remoteIdle">
        <div class="idle-icon">📡</div>
        <div class="idle-text">Connect Peer</div>
      </div>
      <div class="tier-badge" id="remoteBadge">WAITING</div>
      <div class="speak-ring"  id="remoteRing"></div>
      <div class="build-ov" id="remoteBuildOv" style="display:none">
        <div class="build-lbl" id="remoteBuildLbl">Waiting for peer…</div>
        <div class="build-track"><div class="build-bar" id="remoteBuildBar"></div></div>
      </div>
    </div>
  </div>
</div>

<video id="camFeed" autoplay muted playsinline
  style="position:fixed;top:-9999px;left:-9999px;width:640px;height:480px;pointer-events:none"></video>

<div class="panel">
  <div class="section-label">Cell Style</div>
  <div class="style-row">
    <button class="sb on" id="sb-rings"    onclick="setStyle('rings')">● Rings</button>
    <button class="sb"    id="sb-diamonds" onclick="setStyle('diamonds')">◆ Diamonds</button>
    <button class="sb"    id="sb-dots"     onclick="setStyle('dots')">· Dots</button>
    <button class="sb"    id="sb-cross"    onclick="setStyle('cross')">✕ Crosshatch</button>
    <button class="sb"    id="sb-squares"  onclick="setStyle('squares')">■ Squares</button>
  </div>

  <div class="sliders">
    <div class="sl-item">
      <label>Bandwidth → Detail</label>
      <div class="sl-row">
        <input type="range" min="5" max="900" value="900" id="bwSlider" oninput="onBw(+this.value)">
        <div class="sl-val"><span id="bwVal">900</span>k</div>
      </div>
    </div>
    <div class="sl-item"><label>Battery</label><div class="sl-row"><input type="range" min="1" max="100" value="100" oninput="onBat(+this.value)"><div class="sl-val"><span id="batVal">100</span>%</div></div></div>
    <div class="sl-item"><label>Depth</label><div class="sl-row"><input type="range" min="1" max="14" value="12" oninput="onDepth(+this.value)"><div class="sl-val" id="depthVal">12×</div></div></div>
    <div class="sl-item"><label>Snap Frames (avg)</label><div class="sl-row"><input type="range" min="1" max="9" value="5" step="1" oninput="onSnapF(+this.value)"><div class="sl-val" id="snapFVal">5</div></div></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-green btn-cam" id="camBtn" onclick="startCamera()">📷 Start Camera</button>
    <button class="btn btn-primary" id="snapBtn" onclick="startSnap()" disabled>📸 Snap Portrait</button>
    <button class="btn btn-orange"  id="liveBtn" onclick="toggleLive()" disabled>⚡ Live Puppet</button>
    <button class="btn btn-ghost"   onclick="openModal()">📡 Connect Peer</button>
  </div>
</div>

<script>
'use strict';

const dbg = (() => {
  const el = document.getElementById('debugLog');
  return {
    log: (...args) => console.log(...args),
    err: (...args) => console.error(...args)
  };
})();

const FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
const ANCHORS = [33,133,362,263,159,145,386,374,70,63,300,293,105,334,1,4,94,61,291,0,17,37,267,84,314,152,234,454,10,187,411,116,345];
const TIERS = { AVATAR3D: { W:20, H:24 }, PUPPET: { W:12, H:14 }, SPRITE: { W:7, H:8 }, GLYPH: { W:4, H:5 } };
const CELL_R = 16, CELL_GAP = 2, CELL_STEP = CELL_R*2 + CELL_GAP;
const RBF_S2 = 2 * 0.03 * 0.03;
const LERP_T = 0.26;

let cellStyle = 'rings', bw = 900, bat = 100, depthScale = 12, snapFrames = 5;
let cameraOn = false, puppetActive = false, buildRunning = false, snapping = false;
let lastLandmarks = null, processingFrame = false, localS = null, remoteS = null;

function makeScene(frameId) {
  const container = document.getElementById(frameId);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, 300/360, 0.01, 50);
  camera.position.z = 2.2;
  scene.add(new THREE.AmbientLight(0xfff0ee, 0.42));
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(300, 360);
  renderer.setClearColor(0, 0);
  container.insertBefore(renderer.domElement, container.firstChild);
  return { scene, camera, renderer, mesh: null, tex: null, texCanvas: document.createElement('canvas'), basePos: null, curPos: null };
}

function renderLoop() {
  requestAnimationFrame(renderLoop);
  if (localS) localS.renderer.render(localS.scene, localS.camera);
  if (remoteS) remoteS.renderer.render(remoteS.scene, remoteS.camera);
}

function faceBBox(lm) {
  let x0=1, x1=0, y0=1, y1=0;
  FACE_OVAL.forEach(i => {
    const mx = 1 - lm[i].x;
    if (mx < x0) x0 = mx; if (mx > x1) x1 = mx;
    if (lm[i].y < y0) y0 = lm[i].y; if (lm[i].y > y1) y1 = lm[i].y;
  });
  return { x0, x1, y0, y1, w: x1-x0, h: y1-y0 };
}

function uvTo3D(u, v, z, bbox) {
  const ar = bbox.w / bbox.h;
  return { x: (u - 0.5) * 1.8 * ar, y: -(v - 0.5) * 1.8, z: z * depthScale };
}

function inPoly(px, py, pts) {
  let inside = false;
  for (let i=0, j=pts.length-1; i<pts.length; j=i++) {
    if (((pts[i].v>py) !== (pts[j].v>py)) && (px < (pts[j].u-pts[i].u)*(py-pts[i].v)/(pts[j].v-pts[i].v)+pts[i].u)) inside = !inside;
  }
  return inside;
}

function interpZ(lm, tx, ty) {
  const dists = lm.map(l => ({ d2: (1-l.x-tx)**2 + (l.y-ty)**2, z: l.z }));
  dists.sort((a,b) => a.d2-b.d2);
  let tw=0, tz=0;
  for (let k=0; k<8; k++) {
    const w = 1 / (dists[k].d2 + 1e-6);
    tw += w; tz += dists[k].z * w;
  }
  return tz/tw;
}

function drawCell(ctx, cx, cy, r, g, b) {
  const rad = CELL_R, lum = (r*0.299 + g*0.587 + b*0.114) / 255;
  const dRGB = `rgb(${r-60},${g-60},${b-60})`, hRGB = `rgb(${r+60},${g+60},${b+60})`;
  if (cellStyle === 'rings') {
    const nR = Math.max(3, Math.round(3 + lum * 5));
    for (let i = nR; i >= 1; i--) {
      ctx.beginPath(); ctx.arc(cx, cy, rad * (i/nR), 0, Math.PI*2);
      ctx.fillStyle = i % 2 === 0 ? `rgb(${r},${g},${b})` : hRGB; ctx.fill();
    }
  }
}

function buildMesh(sc, lm, videoEl, tierName) {
  const cfg = TIERS[tierName] || TIERS.AVATAR3D;
  const {W, H} = cfg, bbox = faceBBox(lm);
  sc.snapLM = lm.map(l => ({...l})); sc.snapBBox = bbox;
  sc.snapAnchors = ANCHORS.map(i => ({ idx: i, u: (1-lm[i].x-bbox.x0)/bbox.w, v: (lm[i].y-bbox.y0)/bbox.h }));
  sc.snapW = W; sc.snapH = H; sc.snapAR = bbox.w/bbox.h;

  const texW = W * CELL_STEP, texH = H * CELL_STEP;
  sc.texCanvas.width = texW; sc.texCanvas.height = texH;
  const texCtx = sc.texCanvas.getContext('2d');
  texCtx.fillStyle = '#000'; texCtx.fillRect(0,0,texW,texH);

  const nV = (W+1)*(H+1), pos = new Float32Array(nV*3), uv = new Float32Array(nV*2);
  for (let j=0; j<=H; j++) for (let i=0; i<=W; i++) {
    const u=i/W, v=j/H, vi=j*(W+1)+i;
    const p3 = uvTo3D(u, v, -interpZ(lm, bbox.x0+u*bbox.w, bbox.y0+v*bbox.h), bbox);
    pos[vi*3]=p3.x; pos[vi*3+1]=p3.y; pos[vi*3+2]=p3.z; uv[vi*2]=u; uv[vi*2+1]=1-v;
  }
  const indices = [];
  for (let j=0; j<H; j++) for (let i=0; i<W; i++) {
    const tl=j*(W+1)+i, tr=tl+1, bl=(j+1)*(W+1)+i, br=bl+1;
    indices.push(tl,bl,tr, bl,br,tr);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  geo.setIndex(indices); geo.computeVertexNormals();

  if (sc.tex) sc.tex.dispose();
  sc.tex = new THREE.CanvasTexture(sc.texCanvas);
  // FIX: Force Bitmap Aesthetic via Nearest Filtering
  sc.tex.magFilter = THREE.NearestFilter;
  sc.tex.minFilter = THREE.NearestFilter;

  if (sc.mesh) sc.scene.remove(sc.mesh);
  sc.mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ map: sc.tex }));
  sc.scene.add(sc.mesh); sc.basePos = pos.slice(); sc.curPos = pos.slice();
  
  const cells = [];
  const oval = FACE_OVAL.map(i => ({ u: (1-lm[i].x-bbox.x0)/bbox.w, v: (lm[i].y-bbox.y0)/bbox.h }));
  for (let j=0; j<H; j++) for (let i=0; i<W; i++) {
    cells.push({ cx: i*CELL_STEP+CELL_STEP/2, cy: j*CELL_STEP+CELL_STEP/2, r: 150, g: 150, b: 180, inside: inPoly((i+0.5)/W, (j+0.5)/H, oval) });
  }
  return cells;
}

async function fillCells(sc, cells) {
  const ctx = sc.texCanvas.getContext('2d');
  for (let c of cells) { if (c.inside) drawCell(ctx, c.cx, c.cy, c.r, c.g, c.b); }
  sc.tex.needsUpdate = true;
}

function puppet(sc, liveLM) {
  if (!sc.mesh) return;
  const pos = sc.mesh.geometry.attributes.position.array;
  for (let i=0; i<pos.length/3; i++) {
    pos[i*3+2] += (Math.random()-0.5)*0.01; // placeholder for RBF deformation
  }
  sc.mesh.geometry.attributes.position.needsUpdate = true;
}

async function startSnap() {
  const feed = document.getElementById('camFeed');
  snapping = true; setStatus('Snapping...');
  const cells = buildMesh(localS, lastLandmarks, feed, 'AVATAR3D');
  await fillCells(localS, cells);
  document.getElementById('liveBtn').disabled = false;
  snapping = false; setStatus('Snap complete. Hit Live Puppet.');
}

function toggleLive() {
  puppetActive = !puppetActive;
  document.getElementById('liveBtn').textContent = puppetActive ? '⏹ Stop Puppet' : '⚡ Live Puppet';
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById('pipLocal').srcObject = stream;
  document.getElementById('camFeed').srcObject = stream;
  const faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
  faceMesh.onResults(res => {
    if (res.multiFaceLandmarks?.[0]) {
      lastLandmarks = res.multiFaceLandmarks[0];
      if (puppetActive) puppet(localS, lastLandmarks);
    }
  });
  const cam = new Camera(document.getElementById('camFeed'), { onFrame: async () => await faceMesh.send({ image: document.getElementById('camFeed') }), width: 640, height: 480 });
  cam.start();
  document.getElementById('snapBtn').disabled = false;
  setStatus('Camera Active. Click Snap.');
}

function setStatus(m) { document.getElementById('statusbar').textContent = m; }
window.addEventListener('DOMContentLoaded', () => { localS = makeScene('localFrame'); renderLoop(); });
</script>
</body>
</html>
