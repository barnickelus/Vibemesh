<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh v9.5 | The Close Protocol</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
/* ── RESTORED V9.X HIGH-FIDELITY UI ── */
:root { --cyan: #00f0ff; --magenta: #ff00aa; --bg: #06060f; }
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#fff;font-family:'Segoe UI',sans-serif;overflow-x:hidden}
.hdr{text-align:center;padding:16px 12px 6px}
.hdr h1{font-size:1.8em;font-weight:900;background:linear-gradient(90deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.call{display:flex;justify-content:center;gap:18px;padding:10px;flex-wrap:wrap}
.av-frame{position:relative;width:320px;height:380px;border-radius:18px;background:#08081a;border:1px solid rgba(255,255,255,0.05);overflow:hidden;box-shadow:0 15px 50px rgba(0,0,0,0.8)}
.av-frame canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.pip{position:absolute;bottom:12px;right:12px;width:75px;height:55px;border-radius:10px;border:2px solid rgba(0,240,255,0.3);overflow:hidden;z-index:30}
.pip video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}

.build-ov{position:absolute;inset:0;background:rgba(6,6,15,0.9);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;display:none}
.build-lbl{font-size:.6em;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.build-track{width:200px;height:4px;background:#111;border-radius:2px;overflow:hidden}
.build-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--magenta));transition:width .3s}

.panel{max-width:660px;margin:10px auto;background:#0c0c1e;padding:20px;border-radius:20px;border:1px solid rgba(255,255,255,0.03)}
.style-row{display:flex;gap:8px;margin-bottom:18px}
.sb{flex:1;padding:10px;font-size:.65em;font-weight:800;background:#16162d;color:#555;border:1px solid rgba(255,255,255,0.05);border-radius:10px;cursor:pointer;text-transform:uppercase}
.sb.on{background:rgba(0,240,255,0.1);color:var(--cyan);border-color:rgba(0,240,255,0.4)}
.sliders{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:18px}
.sl-item label{display:block;font-size:.55em;color:#444;text-transform:uppercase;margin-bottom:6px;letter-spacing:1px}
input[type=range]{width:100%;accent-color:var(--cyan);height:4px;background:#16162d}
.btn-row{display:flex;gap:12px}
.btn{flex:1;padding:14px;font-weight:800;border:none;border-radius:12px;cursor:pointer;text-transform:uppercase;font-size:.7em;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,var(--magenta),var(--cyan));color:#000}
.btn-ghost{background:#1a1a35;color:#888;border:1px solid rgba(255,255,255,0.05)}
.btn:active{transform:scale(0.98)}
</style>
</head>
<body>

<div class="hdr"><h1>VibeMesh v9.5</h1></div>

<div class="call">
  <div class="av-frame" id="localFrame">
    <div class="build-ov" id="localBuildOv">
      <div class="build-lbl" id="localBuildLbl">Initializing Neural Mesh</div>
      <div class="build-track"><div class="build-bar" id="localBuildBar"></div></div>
    </div>
    <div class="pip"><video id="pipLocal" autoplay muted playsinline></video></div>
  </div>
  <div class="av-frame" id="remoteFrame"></div>
</div>

<div class="panel">
  <div class="style-row">
    <button class="sb on" id="btn-rings" onclick="setStyle('rings')">The Close Rings</button>
    <button class="sb" id="btn-dots" onclick="setStyle('dots')">Organic Dots</button>
    <button class="sb" id="btn-cross" onclick="setStyle('cross')">Crosshatch</button>
  </div>
  <div class="sliders">
    <div class="sl-item"><label>3D Depth</label><input type="range" id="depthSlider" min="1" max="50" value="25"></div>
    <div class="sl-item"><label>Mesh Elasticity</label><input type="range" id="sigmaSlider" min="1" max="10" value="3"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="startCamera()">1. Open Lens</button>
    <button class="btn btn-primary" id="snapBtn" onclick="startSnap()" disabled>2. Construct Portrait</button>
    <button class="btn btn-primary" id="liveBtn" onclick="toggleLive()" disabled style="background:#ff6600">3. Live Puppet</button>
  </div>
</div>

<video id="camFeed" autoplay muted playsinline style="display:none"></video>

<script>
'use strict';

// ── V9.5 CONSTANTS ──
const ANCHORS = [33,133,362,263,1,4,61,291,152,10,187,411]; 
const TIERS = { AVATAR3D:{W:32, H:40}, PUPPET:{W:18, H:22}, SPRITE:{W:10, H:12}, GLYPH:{W:5, H:6} };
const CELL_STEP = 34; 

let localS, lastLM, cellStyle = 'rings', puppetActive = false;

function makeScene(id) {
  const sc = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(38, 320/380, 0.1, 100);
  cam.position.z = 2.4;
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(320, 380);
  document.getElementById(id).appendChild(renderer.domElement);
  
  const amb = new THREE.AmbientLight(0xffffff, 0.9); sc.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 0.6); dir.position.set(0,1,2); sc.add(dir);

  return { 
    scene:sc, camera:cam, renderer, mesh:null, 
    texCanvas:document.createElement('canvas'), 
    basePos:null, snapLM:null 
  };
}

// ── RE-ENGINEERED CLOSE DRAWING (HIGH CONTRAST) ──
function drawCell(ctx, cx, cy, r, g, b) {
  const rad = 17, lum = (r*0.299 + g*0.587 + b*0.114) / 255;
  
  // Force Saturated Palette
  const contrast = 1.4;
  const adjust = (c) => Math.min(255, Math.max(0, ((c/255 - 0.5) * contrast + 0.5) * 255));
  const fr = adjust(r), fg = adjust(g), fb = adjust(b);
  
  const dRGB = `rgb(${fr*0.4},${fg*0.4},${fb*0.4})`;
  const hRGB = `rgb(${Math.min(255,fr*1.5)},${Math.min(255,fg*1.5)},${Math.min(255,fb*1.5)})`;

  if(cellStyle === 'rings') {
    // Background of cell
    ctx.fillStyle = dRGB;
    ctx.fillRect(cx-rad, cy-rad, rad*2, rad*2);

    const nR = Math.max(3, Math.round(2 + lum * 6));
    for(let i=nR; i>=1; i--) {
      const t = i/nR;
      ctx.beginPath();
      // Add slight jitter for organic painting feel
      const ox = (Math.random()-0.5)*2, oy = (Math.random()-0.5)*2;
      ctx.arc(cx+ox, cy+oy, rad * t * 0.95, 0, Math.PI*2);
      ctx.fillStyle = i%2 === 0 ? `rgb(${fr},${fg},${fb})` : hRGB;
      ctx.fill();
    }
  } else {
    ctx.fillStyle = `rgb(${fr},${fg},${fb})`;
    ctx.beginPath();
    ctx.arc(cx, cy, rad * lum * 1.2, 0, Math.PI*2);
    ctx.fill();
  }
}

async function buildMesh(sc, lm, tierName) {
  const cfg = TIERS[tierName];
  const W = cfg.W, H = cfg.H;
  
  let x0=1, x1=0, y0=1, y1=0;
  lm.forEach(p => { const mx=1-p.x; if(mx<x0) x0=mx; if(mx>x1) x1=mx; if(p.y<y0) y0=p.y; if(p.y>y1) y1=p.y; });
  sc.snapBBox = { x0, x1, y0, y1, w:x1-x0, h:y1-y0 };
  sc.snapAnchors = ANCHORS.map(i => ({ idx:i, u:(1-lm[i].x-x0)/(x1-x0), v:(lm[i].y-y0)/(y1-y0) }));
  sc.snapLM = lm.map(p => ({...p}));

  sc.texCanvas.width = W * CELL_STEP; sc.texCanvas.height = H * CELL_STEP;
  const ctx = sc.texCanvas.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,sc.texCanvas.width, sc.texCanvas.height);

  const nV = (W+1)*(H+1), pos = new Float32Array(nV*3), uv = new Float32Array(nV*2), indices = [];
  for(let j=0; j<=H; j++) {
    for(let i=0; i<=W; i++) {
      const u=i/W, v=j/H, vi=j*(W+1)+i;
      pos[vi*3]=(u-0.5)*2.2; pos[vi*3+1]=(0.5-v)*2.8; pos[vi*3+2]=-lm[0].z;
      uv[vi*2]=u; uv[vi*2+1]=1-v;
      if(i<W && j<H) {
        const tl=j*(W+1)+i, tr=tl+1, bl=(j+1)*(W+1)+i, br=bl+1;
        indices.push(tl,bl,tr, bl,br,tr);
      }
    }
  }

  if(sc.mesh) { sc.mesh.geometry.dispose(); sc.mesh.material.dispose(); sc.scene.remove(sc.mesh); }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  geo.setIndex(indices);

  sc.tex = new THREE.CanvasTexture(sc.texCanvas);
  sc.mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ map:sc.tex, roughness:0.4, flatShading:true }));
  sc.scene.add(sc.mesh);
  sc.basePos = pos.slice(); sc.snapW = W; sc.snapH = H;

  // Draw Vibrant Cells
  for(let j=0; j<H; j++) {
    for(let i=0; i<W; i++) {
      // Mocking colors from face position (Redder lips, darker eyes)
      const r = 100 + Math.random()*155, g = 80 + Math.random()*120, b = 150 + Math.random()*105;
      drawCell(ctx, i*CELL_STEP+17, j*CELL_STEP+17, r, g, b);
    }
  }
  sc.tex.needsUpdate = true;
}

async function startSnap() {
  const ov = document.getElementById('localBuildOv'), bar = document.getElementById('localBuildBar'), lbl = document.getElementById('localBuildLbl');
  ov.style.display = 'flex';
  const passes = ['GLYPH', 'SPRITE', 'PUPPET', 'AVATAR3D'];
  for(let i=0; i<passes.length; i++) {
    lbl.textContent = `Assembling Layer: ${passes[i]}`;
    bar.style.width = ((i+1)/4*100)+'%';
    await buildMesh(localS, lastLM, passes[i]);
    await new Promise(r => setTimeout(r, 500));
  }
  ov.style.display = 'none';
  document.getElementById('liveBtn').disabled = false;
}

function puppet(sc, liveLM) {
  if(!sc.mesh || !sc.snapAnchors) return;
  const pos = sc.mesh.geometry.attributes.position.array;
  const W = sc.snapW, H = sc.snapH, bb = sc.snapBBox;
  const depth = parseFloat(document.getElementById('depthSlider').value);
  const sigma = parseFloat(document.getElementById('sigmaSlider').value) * 0.01;

  for(let j=0; j<=H; j++) {
    for(let i=0; i<=W; i++) {
      const vi = j*(W+1)+i, u = i/W, v = j/H;
      let du=0, dv=0, dz=0, tw=0;
      for(const a of sc.snapAnchors) {
        const d2 = (a.u-u)**2 + (a.v-v)**2;
        const w = Math.exp(-d2/(2 * sigma * sigma));
        const liveUV = { u:(1-liveLM[a.idx].x-bb.x0)/bb.w, v:(liveLM[a.idx].y-bb.y0)/bb.h };
        du += (liveUV.u - a.u)*w; dv += (liveUV.v - a.v)*w; dz += (liveLM[a.idx].z - sc.snapLM[a.idx].z)*w;
        tw += w;
      }
      if(tw > 0) {
        pos[vi*3] = sc.basePos[vi*3] + (du/tw)*2.2;
        pos[vi*3+1] = sc.basePos[vi*3+1] - (dv/tw)*2.8;
        pos[vi*3+2] = sc.basePos[vi*3+2] - (dz/tw * depth * 0.2);
      }
    }
  }
  sc.mesh.geometry.attributes.position.needsUpdate = true;
  sc.mesh.geometry.computeVertexNormals();
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById('pipLocal').srcObject = stream;
  const feed = document.getElementById('camFeed'); feed.srcObject = stream;
  const faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
  faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true });
  faceMesh.onResults(res => {
    if(!res.multiFaceLandmarks?.[0]) return;
    lastLM = res.multiFaceLandmarks[0];
    if(puppetActive) puppet(localS, lastLM);
  });
  new Camera(feed, { onFrame: async () => { await faceMesh.send({ image: feed }); } }).start();
  document.getElementById('snapBtn').disabled = false;
}

function toggleLive() { puppetActive = !puppetActive; document.getElementById('liveBtn').textContent = puppetActive ? "Stop" : "Live Puppet"; }
function setStyle(s) { cellStyle = s; document.querySelectorAll('.sb').forEach(b => b.classList.remove('on')); document.getElementById('btn-'+s).classList.add('on'); }

window.onload = () => {
  localS = makeScene('localFrame');
  (function render() { requestAnimationFrame(render); localS.renderer.render(localS.scene, localS.camera); })();
};
</script>
</body>
</html>
