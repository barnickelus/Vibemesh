<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>VibeMesh | Geometry in Time</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:monospace;overflow:hidden;width:100vw;height:100vh}

canvas{position:fixed;top:0;left:0;width:100%;height:100%}

/* ── HUD ── */
.hud{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:20px 24px;pointer-events:none;z-index:50;
}
.hud-left{display:flex;flex-direction:column;gap:8px;pointer-events:all}
.hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:all}

.btn{
  padding:9px 16px;background:rgba(0,0,0,.7);color:#333;
  border:1px solid #111;border-radius:5px;
  font-family:monospace;font-size:.65rem;letter-spacing:2px;
  cursor:pointer;transition:all .25s;text-transform:uppercase;
  backdrop-filter:blur(8px);
}
.btn:hover:not(:disabled){color:#00f0ff;border-color:rgba(0,240,255,.3);background:rgba(0,240,255,.04)}
.btn.on{color:#00f0ff;border-color:rgba(0,240,255,.5);background:rgba(0,240,255,.06);box-shadow:0 0 20px rgba(0,240,255,.1)}
.btn.snap-on{color:#ff00ff;border-color:rgba(255,0,255,.5);background:rgba(255,0,255,.06);box-shadow:0 0 20px rgba(255,0,255,.1)}
.btn:disabled{opacity:.25;cursor:not-allowed}

.sl-row{display:flex;align-items:center;gap:10px;pointer-events:all}
.sl-row label{font-size:.55rem;color:#333;letter-spacing:2px;text-transform:uppercase;min-width:100px}
.sl-row input{accent-color:#00f0ff;width:100px;cursor:pointer}
.sl-row span{font-size:.55rem;color:#00f0ff;min-width:32px;text-align:right}

.lore{
  position:fixed;top:0;left:0;right:0;
  padding:16px 24px;
  font-size:.5rem;color:#1a1a1a;letter-spacing:3px;text-transform:uppercase;
  pointer-events:none;z-index:50;line-height:2;
}
.stat{
  position:fixed;top:12px;right:24px;
  font-size:.5rem;color:#111;letter-spacing:2px;
  pointer-events:none;z-index:50;text-align:right;line-height:2;
}
.pip{
  position:fixed;bottom:20px;right:24px;
  width:60px;height:76px;border-radius:4px;overflow:hidden;
  border:1px solid #111;opacity:.4;z-index:60;
  transition:opacity .3s;
}
.pip:hover{opacity:.8}
.pip video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}

video{display:none}
</style>
</head>
<body>

<div class="lore" id="lore">
  geometry in time · stable knots · compressed · stretched · folded
</div>
<div class="stat" id="stat">
  — knots · — hz
</div>

<div class="hud">
  <div class="hud-left">
    <div style="display:flex;gap:8px">
      <button class="btn" id="btn-init" onclick="initSystem()" disabled>Loading deps…</button>
      <button class="btn" id="btn-snap" onclick="snap()" disabled>Stabilise Field</button>
      <button class="btn" id="btn-live" onclick="toggleLive()" disabled>Live Knots</button>
    </div>

    <div class="sl-row">
      <label>Compression</label>
      <input type="range" min="0.5" max="8" step="0.1" value="3.5" id="sl-depth"
        oninput="depthScale=+this.value;document.getElementById('lbl-d').textContent=this.value">
      <span id="lbl-d">3.5</span>
    </div>
    <div class="sl-row">
      <label>Knot Density</label>
      <input type="range" min="1" max="4" step="1" value="3" id="sl-dens"
        oninput="setDensity(+this.value)">
      <span id="lbl-dens">3</span>
    </div>
    <div class="sl-row">
      <label>Pulse Rate</label>
      <input type="range" min="0" max="3" step="0.05" value="0.8" id="sl-pulse"
        oninput="pulseRate=+this.value;document.getElementById('lbl-p').textContent=this.value">
      <span id="lbl-p">0.8</span>
    </div>
    <div class="sl-row">
      <label>Field Opacity</label>
      <input type="range" min="0.1" max="1" step="0.05" value="0.85" id="sl-op"
        oninput="fieldOpacity=+this.value;document.getElementById('lbl-op').textContent=this.value">
      <span id="lbl-op">0.85</span>
    </div>
  </div>
  <div class="hud-right">
    <!-- mode toggles -->
    <div style="display:flex;gap:6px">
      <button class="btn"     id="mb-knots"   onclick="setView('knots')">Knots</button>
      <button class="btn"     id="mb-field"   onclick="setView('field')">Field</button>
      <button class="btn"     id="mb-fabric"  onclick="setView('fabric')">Fabric</button>
      <button class="btn on"  id="mb-realist" onclick="setView('realist')">Realist</button>
    </div>
  </div>
</div>

<div class="pip"><video id="pipVid" autoplay muted playsinline></video></div>
<video id="camFeed" autoplay muted playsinline></video>

// ════════════════════════════════════════════════

// ════════════════════════════════════════════════
const TESS = [

// ════════════════════════════════════════════════
//  SPLAT VERTEX SHADER — instanced billboard quads
//
//  Each landmark/centroid is a quad billboard that:
//  • faces the camera (billboard)
//  • is foreshortened along the direction the surface tilts away
//  • breathes in Z with a per-knot phase offset
//
//  Non-instanced attrs: position (quad corner), aUV (-1..1)
//  Instanced attrs:     iPos, iNorm, iSize, iCol, iComp, iPhase, iCent
// ════════════════════════════════════════════════
const SPLAT_VERT = `
  attribute vec2  aUV;
  attribute vec3  iPos;
  attribute vec3  iNorm;
  attribute float iSize;
  attribute vec3  iCol;
  attribute float iComp;
  attribute float iPhase;
  attribute float iCent;

  varying vec2  vUV;
  varying vec3  vCol;
  varying float vComp;
  varying float vPhase;
  varying float vCent;

  uniform float uTime;
  uniform float uPulse;

  void main(){
    vUV   = aUV;
    vCol  = iCol;
    vComp = iComp;
    vPhase= iPhase;
    vCent = iCent;

    // Splat centre in view space
    vec4 cv = modelViewMatrix * vec4(iPos, 1.0);

    // Surface normal in view space
    vec3 nv = normalize((modelViewMatrix * vec4(iNorm, 0.0)).xyz);

    // Foreshortening factor: 1.0 = fully facing camera, 0.12 minimum
    float fore = clamp(abs(nv.z), 0.12, 1.0);

    // Screen-space compression direction (projection of normal onto screen XY)
    float nsLen   = length(nv.xy);
    vec2  compDir = nsLen > 0.01 ? nv.xy / nsLen : vec2(0.0, 1.0);
    vec2  perpDir = vec2(-compDir.y, compDir.x);

    // Decompose quad UV into parallel / perpendicular components
    float along = dot(aUV, compDir);
    float perp  = dot(aUV, perpDir);

    // Compress along the surface-tilt direction, keep perp full-size
    vec2 scaledUV = compDir * along * fore + perpDir * perp;

    // Breathing pulse
    float pulse = 1.0 + sin(uTime * uPulse + iPhase) * 0.14 * iComp;
    float sz    = iSize * (0.45 + iComp * 0.55) * pulse;

    vec3 offset = vec3(scaledUV * sz, 0.0);
    gl_Position = projectionMatrix * (cv + vec4(offset, 0.0));
  }
`;

// ════════════════════════════════════════════════
//  SPLAT FRAGMENT SHADER — 3D Gaussian + RGB ring bands
//
//  Gaussian envelope gives the volumetric feel.
//  RGB ring bands inside the Gaussian encode face color
//  as physical wave frequency/amplitude — optical mixing
//  happens visually between adjacent colored stripes.
// ════════════════════════════════════════════════
const SPLAT_FRAG = `
  varying vec2  vUV;
  varying vec3  vCol;
  varying float vComp;
  varying float vPhase;
  varying float vCent;

  uniform float uTime;
  uniform float uPulse;
  uniform float uOpacity;

  void main(){
    float d = length(vUV);   // 0=centre, 1.41 at corner
    if(d > 1.0) discard;     // circular cutout

    // ── 3D Gaussian envelope — tight, not spread ──
    float gaussian = exp(-d * d * 7.5);   // was 2.8 — much tighter falloff

    // Ring distance: 1 at centre, 0 at edge
    float r = 1.0 - d;

    // ── Per-channel ring bands ──
    float rA = vCol.r, gA = vCol.g, bA = vCol.b;

    float rCount = max(1.0, floor(rA * (2.0 + vComp * 2.0)));
    float gCount = max(1.0, floor(gA * (3.0 + vComp * 3.0)));
    float bCount = max(1.0, floor(bA * (4.0 + vComp * 5.0)));

    float rPos = fract(r * rCount + uTime * uPulse * 0.50 + vPhase * 0.15);
    float gPos = fract(r * gCount + uTime * uPulse * 1.00 + vPhase * 0.12);
    float bPos = fract(r * bCount + uTime * uPulse * 1.80 + vPhase * 0.10);

    // Narrower bands = more gap between rings = more contrast
    float bw    = 0.42 + vComp * 0.06;  // was 0.58 — tighter bands
    float rBand = step(rPos, bw) * rA * rA * 2.0;  // boosted amplitude
    float gBand = step(gPos, bw) * gA * gA * 1.8;
    float bBand = step(bPos, bw) * bA * bA * 1.6;

    // Fully saturated channel colours
    vec3 col = vec3(0.0);
    col += vec3(1.5, 0.03, 0.0 ) * rBand;
    col += vec3(0.03, 1.3, 0.06) * gBand;
    col += vec3(0.0,  0.12, 1.6) * bBand;

    // ── Core: tight, bright, true face colour ──
    float core = exp(-d * d * 120.0) * (0.7 + vComp * 0.3);  // was 50 — much tighter
    col += vCol * core * 2.2;

    // ── Thin halo ring at face colour — edge definition ──
    float halo = exp(-pow(d - 0.82, 2.0) * 80.0) * 0.25;  // narrower, dimmer
    col += vCol * halo;

    // ── Depth brightness ── 
    col *= 0.45 + vComp * 0.55;

    // ── Centroids: clearly dimmer so landmarks dominate ──
    if(vCent > 0.5){
      col  = mix(col, col * vec3(0.6, 0.82, 1.05), 0.35);
      col *= 0.5;   // was 0.65 — more separation
    }

    // ── Alpha: tight Gaussian × luminance, no extra multiplier ──
    float lum   = dot(col, vec3(0.299, 0.587, 0.114));
    float alpha = lum * gaussian * uOpacity;  // removed the +0.04 floor that caused wash

    if(alpha < 0.008) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

// ════════════════════════════════════════════════
//  KNOT FRAGMENT SHADER — THICK RING BANDS
//
//  Each knot is divided into discrete ring slots.
//  Ring count per channel set by color amplitude:
//    R → low count (1-3 rings), outermost position
//    G → mid count (2-4 rings), middle position
//    B → high count (3-6 rings), innermost position
//
//  Each ring is a solid thick band (~18% of radius).
//  Rings are fully saturated so optical mixing happens
//  visually between adjacent bands — not mathematically.
//
//  A warm skin tone → orange outer rings, green middle, teal inner
//  A cool shadow → blue/teal dense rings
//  Bright highlight → all channels dense, white interference core
// ════════════════════════════════════════════════
// ════════════════════════════════════════════════
//  FIELD SHADER — density blobs with channel-frequency widths
// ════════════════════════════════════════════════
const FIELD_FRAG = `
  varying vec2  vUV;
  varying vec3  vCol;
  varying float vComp;
  varying float vPhase;
  varying float vCent;

  uniform float uTime;
  uniform float uPulse;
  uniform float uOpacity;

  void main(){
    vec2  uv = vUV * 0.5;
    float d  = length(uv);
    if(d > 0.5) discard;

    // Each channel gets its own gaussian width — red spreads wide, blue tight
    float rBlob = exp(-d*d * (8.0  + vComp*10.0)) * vCol.r;
    float gBlob = exp(-d*d * (14.0 + vComp*16.0)) * vCol.g;
    float bBlob = exp(-d*d * (22.0 + vComp*24.0)) * vCol.b;

    // Pulse each channel at its own rate
    rBlob *= 1.0 + sin(uTime * uPulse * 0.7 + vPhase       ) * 0.25;
    gBlob *= 1.0 + sin(uTime * uPulse * 1.2 + vPhase + 2.09) * 0.25;
    bBlob *= 1.0 + sin(uTime * uPulse * 2.0 + vPhase + 4.19) * 0.25;

    vec3 col = vec3(
      rBlob * 1.1 + gBlob * 0.05,
      gBlob * 1.1 + rBlob * 0.05 + bBlob * 0.1,
      bBlob * 1.2 + gBlob * 0.1
    );
    col *= (0.4 + vComp * 0.6);

    float alpha = length(col) * uOpacity * smoothstep(0.5, 0.0, d);
    if(alpha < 0.005) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

// ════════════════════════════════════════════════
//  FABRIC SHADER — woven interference grid
// ════════════════════════════════════════════════
const FABRIC_FRAG = `
  varying vec2  vUV;
  varying vec3  vCol;
  varying float vComp;
  varying float vPhase;
  varying float vCent;

  uniform float uTime;
  uniform float uPulse;
  uniform float uOpacity;

  void main(){
    vec2  uv = vUV * 0.5;
    float d  = length(uv);
    if(d > 0.5) discard;

    // Each channel weaves at its own grid frequency
    // Red = coarse weave, blue = fine weave
    float rFreq = 4.0  + vComp * 2.0;
    float gFreq = 7.0  + vComp * 3.5;
    float bFreq = 12.0 + vComp * 6.0;

    float rWeave = pow(abs(sin(uv.x * rFreq * 3.14159 - uTime*uPulse*0.7+vPhase)),2.5)
                 * pow(abs(sin(uv.y * rFreq * 3.14159 - uTime*uPulse*0.7+vPhase)),2.5);
    float gWeave = pow(abs(sin(uv.x * gFreq * 3.14159 - uTime*uPulse*1.2+vPhase)),2.5)
                 * pow(abs(sin(uv.y * gFreq * 3.14159 - uTime*uPulse*1.2+vPhase)),2.5);
    float bWeave = pow(abs(sin(uv.x * bFreq * 3.14159 - uTime*uPulse*2.0+vPhase)),2.5)
                 * pow(abs(sin(uv.y * bFreq * 3.14159 - uTime*uPulse*2.0+vPhase)),2.5);

    vec3 col = vec3(
      rWeave * vCol.r * 1.3,
      gWeave * vCol.g * 1.2,
      bWeave * vCol.b * 1.4
    );
    col *= (0.4 + vComp * 0.6);

    float core = exp(-d*d*70.0) * vComp;
    col += vCol * core;

    float alpha = dot(col, vec3(0.333)) * uOpacity * smoothstep(0.5, 0.25, d);
    if(alpha < 0.01) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

// ════════════════════════════════════════════════
//  REALIST SHADER — mimetic Gaussian splat
//
//  No ring encoding. Pure face color in a tight
//  anisotropic Gaussian — oriented along surface normal.
//  Three tiers: landmark (large), centroid (medium),
//  sub-centroid (small). Together they tile the face
//  surface continuously like a 3DGS reconstruction.
//
//  Subtle specular highlight and depth-driven SSS
//  (subsurface scatter approximation) for skin feel.
// ════════════════════════════════════════════════
const REALIST_FRAG = `
  varying vec2  vUV;
  varying vec3  vCol;
  varying float vComp;
  varying float vPhase;
  varying float vCent;

  uniform float uTime;
  uniform float uPulse;
  uniform float uOpacity;

  void main(){
    float d = length(vUV);
    if(d > 1.0) discard;

    // ── Gaussian envelope — crisp, not blurry ──
    // 3.2 was far too gentle. 8.0 gives sharp splats with clean edges.
    float g = exp(-d * d * 8.0);

    // ── True face color, slight gamma lift for sRGB footage ──
    vec3 col = pow(max(vCol, vec3(0.001)), vec3(0.88));

    // ── Depth warmth: forward=warm, recessed=cool ──
    vec3 warm = vec3(1.06, 0.97, 0.90);
    vec3 cool = vec3(0.90, 0.95, 1.05);
    col *= mix(cool, warm, vComp);

    // ── Specular: tight bright peak on forward-facing splats only ──
    float spec = exp(-d * d * 30.0) * vComp * vComp * 0.28;
    col += vec3(spec * 1.1, spec * 0.95, spec * 0.85); // warm specular

    // ── Tier dimming ──
    if(vCent > 1.5){
      col *= 0.80;
    } else if(vCent > 0.5){
      col *= 0.90;
    }

    // ── Vignette: smooth edge, no hard cutoff ──
    float alpha = g * uOpacity;
    if(alpha < 0.006) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

// ════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════
let depthScale   = 3.5;
let pulseRate    = 0.8;
let fieldOpacity = 0.85;
let densityStep  = 1;   // 1=all, 2=half, 3=third, 4=quarter triangles
let viewMode     = 'realist';
let liveColors   = false;

let latestLM  = null;
let snapColors = null;  // Float32Array r,g,b per landmark [468*3]

let captureCanvas, captureCtx;
let scene, camera, renderer;
let knotSystem = null;
let clock = new THREE.Clock();
let frameCount = 0, lastFPSt = Date.now();

// ════════════════════════════════════════════════
//  SCENE SETUP — full-viewport, dark, no background
// ════════════════════════════════════════════════
function initThree() {
  scene    = new THREE.Scene();
  camera   = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.01, 20);
  camera.position.z = 2.8;

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0, 0);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Render loop
  (function loop() {
    requestAnimationFrame(loop);
    const t = clock.getElapsedTime();

    // Subtle idle drift of the whole field
    if (knotSystem) {
      knotSystem.rotation.y = Math.sin(t*0.12) * 0.08;
      knotSystem.rotation.x = Math.sin(t*0.08) * 0.04;
      knotSystem.material.uniforms.uTime.value     = t;
      knotSystem.material.uniforms.uOpacity.value  = fieldOpacity;
      knotSystem.material.uniforms.uPulse.value    = pulseRate;
    }

    renderer.render(scene, camera);

    frameCount++;
    const now = Date.now();
    if (now - lastFPSt > 1000) {
      if (latestLM) document.getElementById('stat').textContent =
        `${latestLM.length + TESS.length} knots · ${frameCount} hz`;
      frameCount = 0; lastFPSt = now;
    }
  })();
}

// ════════════════════════════════════════════════
//  SURFACE NORMAL COMPUTATION
//  For each landmark, average the cross products of
//  all adjacent TESS triangles → smooth vertex normal
// ════════════════════════════════════════════════
function computeNormals(posArr, nLM) {
  const norms  = new Float32Array(nLM * 3);
  const counts = new Uint32Array(nLM);
  for (const tri of TESS) {
    const [a,b,c] = tri;
    if (a>=nLM||b>=nLM||c>=nLM) continue;
    const ax=posArr[a*3],ay=posArr[a*3+1],az=posArr[a*3+2];
    const bx=posArr[b*3],by=posArr[b*3+1],bz=posArr[b*3+2];
    const cx=posArr[c*3],cy=posArr[c*3+1],cz=posArr[c*3+2];
    const e1x=bx-ax,e1y=by-ay,e1z=bz-az;
    const e2x=cx-ax,e2y=cy-ay,e2z=cz-az;
    const nx=e1y*e2z-e1z*e2y, ny=e1z*e2x-e1x*e2z, nz=e1x*e2y-e1y*e2x;
    for (const v of [a,b,c]) {
      norms[v*3]+=nx; norms[v*3+1]+=ny; norms[v*3+2]+=nz; counts[v]++;
    }
  }
  for (let i=0; i<nLM; i++) {
    if (!counts[i]) { norms[i*3+2]=1; continue; }
    const len=Math.sqrt(norms[i*3]**2+norms[i*3+1]**2+norms[i*3+2]**2);
    if (len>1e-6) { norms[i*3]/=len; norms[i*3+1]/=len; norms[i*3+2]/=len; }
    else norms[i*3+2]=1;
  }
  return norms;
}

// ════════════════════════════════════════════════
//  BUILD KNOT SYSTEM — instanced billboard splats
//  Three density tiers for realist mode:
//   T0: 468 landmarks       — large splats, source data
//   T1: ~460 tri centroids  — medium splats, inferred
//   T2: ~460 sub-centroids  — small splats, fill gaps
// ════════════════════════════════════════════════
function buildKnotSystem(lm, colors) {
  if (knotSystem) {
    scene.remove(knotSystem);
    knotSystem.geometry.dispose();
    knotSystem.material.dispose();
    knotSystem = null;
  }

  const isRealist = viewMode === 'realist';
  const nLM   = lm.length;
  const tris  = TESS.filter((_,i) => i % densityStep === 0);
  const nTri  = tris.length;

  // Sub-centroids: centroid of each tri's centroid with its neighbours
  // Simple approach: centroid-of-centroid for every other tri pair
  const nSub  = isRealist ? Math.floor(nTri / 2) : 0;
  const total = nLM + nTri + nSub;

  const posArr   = new Float32Array(total * 3);
  const normArr  = new Float32Array(total * 3);
  const sizeArr  = new Float32Array(total);
  const colArr   = new Float32Array(total * 3);
  const compArr  = new Float32Array(total);
  const phaseArr = new Float32Array(total);
  const centArr  = new Float32Array(total); // 0=LM, 1=centroid, 2=sub-centroid

  let zMin=Infinity, zMax=-Infinity;
  for (let i=0;i<nLM;i++) {
    if (lm[i].z<zMin) zMin=lm[i].z;
    if (lm[i].z>zMax) zMax=lm[i].z;
  }
  const zRange = Math.max(0.001, zMax-zMin);

  // ── Compute actual face center from oval landmarks ──
  // Don't assume center is at (0.5, 0.5) — it varies with head position
  const OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,
    379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
  let cx=0, cy=0;
  OVAL.forEach(i => { cx += lm[i].x; cy += lm[i].y; });
  cx /= OVAL.length; cy /= OVAL.length;

  // ── Uniform scale: fit face oval to ~80% of the shorter screen dimension ──
  // Using a fixed scale avoids portrait/landscape distortion entirely.
  // Camera is 640×480 → face oval spans ~40% of frame width typically.
  // We want that to map to ~1.6 units in 3D space (camera at z=2.8, FOV=38°).
  const SCALE = 3.8;

  // Size scales
  const lmSize   = isRealist ? 0.20 : 0.13;
  const centSize = isRealist ? 0.13 : 0.09;
  const subSize  = isRealist ? 0.09 : 0.06;

  // ── T0: Landmarks — centred on actual face, uniform XY scale ──
  for (let i=0; i<nLM; i++) {
    const compVal = 1.0 - (lm[i].z - zMin) / zRange;
    // Mirror X (selfie), centre on face, uniform scale
    posArr[i*3  ] = (cx - lm[i].x) * SCALE;
    posArr[i*3+1] = (cy - lm[i].y) * -SCALE;  // Y flipped for screen→3D
    posArr[i*3+2] = compVal * depthScale - depthScale * 0.5;

    if (colors) {
      colArr[i*3  ] = colors[i*3  ];
      colArr[i*3+1] = colors[i*3+1];
      colArr[i*3+2] = colors[i*3+2];
    } else {
      colArr[i*3  ] = 0.15 + compVal * 0.25;
      colArr[i*3+1] = 0.55 + compVal * 0.35;
      colArr[i*3+2] = 0.65 + compVal * 0.35;
    }
    compArr[i]  = compVal;
    phaseArr[i] = (i * 0.618033) % (Math.PI * 2);
    centArr[i]  = 0;
    sizeArr[i]  = lmSize;
  }

  // Surface normals
  const lmNorms = computeNormals(posArr, nLM);
  normArr.set(lmNorms);

  // ── T1: Triangle centroids ──
  for (let t=0; t<nTri; t++) {
    const [a,b,c] = tris[t];
    if (a>=nLM||b>=nLM||c>=nLM) continue;
    const idx = nLM + t;

    posArr[idx*3  ] = (posArr[a*3  ]+posArr[b*3  ]+posArr[c*3  ])/3;
    posArr[idx*3+1] = (posArr[a*3+1]+posArr[b*3+1]+posArr[c*3+1])/3;
    posArr[idx*3+2] = (posArr[a*3+2]+posArr[b*3+2]+posArr[c*3+2])/3;

    colArr[idx*3  ] = (colArr[a*3  ]+colArr[b*3  ]+colArr[c*3  ])/3;
    colArr[idx*3+1] = (colArr[a*3+1]+colArr[b*3+1]+colArr[c*3+1])/3;
    colArr[idx*3+2] = (colArr[a*3+2]+colArr[b*3+2]+colArr[c*3+2])/3;

    const nx=(normArr[a*3]+normArr[b*3]+normArr[c*3])/3;
    const ny=(normArr[a*3+1]+normArr[b*3+1]+normArr[c*3+1])/3;
    const nz=(normArr[a*3+2]+normArr[b*3+2]+normArr[c*3+2])/3;
    const nl=Math.sqrt(nx*nx+ny*ny+nz*nz);
    normArr[idx*3  ]=nl>1e-6?nx/nl:0;
    normArr[idx*3+1]=nl>1e-6?ny/nl:0;
    normArr[idx*3+2]=nl>1e-6?nz/nl:1;

    compArr[idx]  = (compArr[a]+compArr[b]+compArr[c])/3;
    phaseArr[idx] = ((a+b+c)*0.23)%(Math.PI*2);
    centArr[idx]  = 1;
    sizeArr[idx]  = centSize;
  }

  // ── T2: Sub-centroids (midpoints between adjacent centroid pairs) ──
  if (isRealist) {
    for (let t=0; t<nSub; t++) {
      const i0 = nLM + t*2;
      const i1 = nLM + t*2 + 1;
      if (i1 >= nLM+nTri) continue;
      const idx = nLM + nTri + t;
      posArr[idx*3  ] = (posArr[i0*3  ]+posArr[i1*3  ])/2;
      posArr[idx*3+1] = (posArr[i0*3+1]+posArr[i1*3+1])/2;
      posArr[idx*3+2] = (posArr[i0*3+2]+posArr[i1*3+2])/2;
      colArr[idx*3  ] = (colArr[i0*3  ]+colArr[i1*3  ])/2;
      colArr[idx*3+1] = (colArr[i0*3+1]+colArr[i1*3+1])/2;
      colArr[idx*3+2] = (colArr[i0*3+2]+colArr[i1*3+2])/2;
      normArr[idx*3  ]=(normArr[i0*3  ]+normArr[i1*3  ])/2;
      normArr[idx*3+1]=(normArr[i0*3+1]+normArr[i1*3+1])/2;
      normArr[idx*3+2]=(normArr[i0*3+2]+normArr[i1*3+2])/2;
      compArr[idx]   = (compArr[i0]+compArr[i1])/2;
      phaseArr[idx]  = (phaseArr[i0]+phaseArr[i1])/2;
      centArr[idx]   = 2;
      sizeArr[idx]   = subSize;
    }
  }

  const actualTotal = nLM + nTri + (isRealist ? nSub : 0);

  // ── Base quad ──
  const baseGeo = new THREE.BufferGeometry();
  baseGeo.setAttribute('position', new THREE.Float32BufferAttribute(
    new Float32Array([-1,-1,0, 1,-1,0, 1,1,0, -1,1,0]), 3));
  baseGeo.setAttribute('aUV', new THREE.Float32BufferAttribute(
    new Float32Array([-1,-1, 1,-1, 1,1, -1,1]), 2));
  baseGeo.setIndex(new THREE.BufferAttribute(new Uint16Array([0,1,2,0,2,3]), 1));

  // ── Instanced geometry ──
  const geo = new THREE.InstancedBufferGeometry();
  geo.instanceCount = actualTotal;
  geo.setAttribute('position', baseGeo.attributes.position);
  geo.setAttribute('aUV',      baseGeo.attributes.aUV);
  geo.setIndex(baseGeo.index);
  geo.setAttribute('iPos',   new THREE.InstancedBufferAttribute(posArr.slice(0, actualTotal*3),   3));
  geo.setAttribute('iNorm',  new THREE.InstancedBufferAttribute(normArr.slice(0, actualTotal*3),  3));
  geo.setAttribute('iSize',  new THREE.InstancedBufferAttribute(sizeArr.slice(0, actualTotal),    1));
  geo.setAttribute('iCol',   new THREE.InstancedBufferAttribute(colArr.slice(0, actualTotal*3),   3));
  geo.setAttribute('iComp',  new THREE.InstancedBufferAttribute(compArr.slice(0, actualTotal),    1));
  geo.setAttribute('iPhase', new THREE.InstancedBufferAttribute(phaseArr.slice(0, actualTotal),   1));
  geo.setAttribute('iCent',  new THREE.InstancedBufferAttribute(centArr.slice(0, actualTotal),    1));

  const fragShader = viewMode==='field'   ? FIELD_FRAG
                   : viewMode==='fabric'  ? FABRIC_FRAG
                   : viewMode==='realist' ? REALIST_FRAG
                   : SPLAT_FRAG;

  const mat = new THREE.ShaderMaterial({
    vertexShader:   SPLAT_VERT,
    fragmentShader: fragShader,
    transparent:    true,
    depthWrite:     false,
    blending:       isRealist ? THREE.NormalBlending : THREE.AdditiveBlending,
    side:           THREE.DoubleSide,
    uniforms: {
      uTime:    { value: 0 },
      uPulse:   { value: pulseRate },
      uOpacity: { value: fieldOpacity },
    },
  });

  knotSystem = new THREE.Mesh(geo, mat);
  scene.add(knotSystem);
  document.getElementById('stat').textContent =
    `${actualTotal} splats · ${nLM} lm + ${nTri} Δ${isRealist ? ' + '+nSub+' sub' : ''}`;
}

// ════════════════════════════════════════════════
//  CAPTURE — sample face colors from video
// ════════════════════════════════════════════════
function snap() {
  if (!latestLM) return;
  const lm  = latestLM;
  const vid = document.getElementById('camFeed');

  captureCtx.save();
  captureCtx.translate(640, 0); captureCtx.scale(-1, 1); // mirror
  captureCtx.drawImage(vid, 0, 0, 640, 480);
  captureCtx.restore();

  const px = captureCtx.getImageData(0, 0, 640, 480).data;
  snapColors = new Float32Array(lm.length * 3);

  for (let i=0; i<lm.length; i++) {
    // Canvas was drawn mirrored, so sample at (1 - lm.x) not lm.x
    const x   = Math.min(639, Math.max(0, Math.floor((1 - lm[i].x) * 640)));
    const y   = Math.min(479, Math.max(0, Math.floor(lm[i].y * 480)));
    const idx = (y * 640 + x) * 4;
    snapColors[i*3  ] = px[idx  ] / 255;
    snapColors[i*3+1] = px[idx+1] / 255;
    snapColors[i*3+2] = px[idx+2] / 255;
  }

  buildKnotSystem(latestLM, snapColors);
  document.getElementById('btn-snap').classList.add('snap-on');
  document.getElementById('btn-snap').textContent = 'Re-Stabilise';
  document.getElementById('btn-live').disabled = false;
  document.getElementById('lore').textContent =
    'structure · where imbalance stabilises · geometry in time';
}

function toggleLive() {
  liveColors = !liveColors;
  const btn = document.getElementById('btn-live');
  btn.textContent = liveColors ? 'Live: On' : 'Live Knots';
  btn.className   = liveColors ? 'btn on' : 'btn';
}

// ════════════════════════════════════════════════
//  VIEW MODE
// ════════════════════════════════════════════════
function setView(v) {
  viewMode = v;
  ['knots','field','fabric','realist'].forEach(id =>
    document.getElementById('mb-'+id)?.classList.toggle('on', id===v));
  if (latestLM) buildKnotSystem(latestLM, snapColors);
}

function setDensity(v) {
  densityStep = v;
  document.getElementById('lbl-dens').textContent = v;
  if (latestLM) buildKnotSystem(latestLM, snapColors);
}

// ════════════════════════════════════════════════
//  MEDIAPIPE
// ════════════════════════════════════════════════
async function initSystem() {
  const btn = document.getElementById('btn-init');
  btn.textContent = 'Initialising…';
  btn.disabled = true;

  // Safety check — Three.js must be loaded
  if (typeof THREE === 'undefined') {
    btn.textContent = 'Three.js missing';
    btn.disabled = false;
    return;
  }

  // Safety check — FaceMesh must be loaded
  if (typeof FaceMesh === 'undefined') {
    btn.textContent = 'FaceMesh missing';
    btn.disabled = false;
    return;
  }

  // Init Three.js renderer
  try {
    initThree();
  } catch(e) {
    console.error('Three init failed:', e);
    btn.textContent = 'Renderer Error';
    btn.disabled = false;
    return;
  }

  // Capture canvas for photo sampling
  captureCanvas = document.createElement('canvas');
  captureCanvas.width = 640; captureCanvas.height = 480;
  captureCtx = captureCanvas.getContext('2d');

  // Camera access
  let stream;
  try {
    btn.textContent = 'Requesting Camera…';
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width:640, height:480, facingMode:'user' },
      audio: false,
    });
  } catch(e) {
    console.error('Camera access denied:', e);
    btn.textContent = 'Camera Denied — Retry';
    btn.disabled = false;
    return;
  }

  // Attach stream to video elements
  const pipVid  = document.getElementById('pipVid');
  const camFeed = document.getElementById('camFeed');
  pipVid.srcObject  = stream;
  camFeed.srcObject = stream;

  // Play — don't await, it throws on some browsers; use event instead
  try { pipVid.play(); } catch(_) {}
  try { camFeed.play(); } catch(_) {}

  // Wait for video to be ready (max 6s)
  await new Promise((res, rej) => {
    if (camFeed.readyState >= 2) { res(); return; }
    camFeed.onloadeddata = res;
    setTimeout(() => rej(new Error('Video load timeout')), 6000);
  }).catch(e => { console.warn('Video ready warning:', e.message); });

  btn.textContent = 'Loading Face Mesh…';

  // MediaPipe FaceMesh
  let fm;
  try {
    fm = new FaceMesh({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    fm.setOptions({
      maxNumFaces: 1,
      refineLandmarks: false,
      minDetectionConfidence: 0.55,
      minTrackingConfidence:  0.50,
    });
    fm.onResults(res => {
      if (!res.multiFaceLandmarks?.[0]) return;
      latestLM = res.multiFaceLandmarks[0];

      // Auto-snap on very first frame so color appears immediately
      if (!snapColors && captureCanvas) {
        snap();
        return;
      }

      if (liveColors) {
        snap();
      } else if (knotSystem && knotSystem.geometry) {
        updatePositions(latestLM);
      } else {
        buildKnotSystem(latestLM, snapColors);
      }
    });
  } catch(e) {
    console.error('FaceMesh init failed:', e);
    btn.textContent = 'FaceMesh Error';
    btn.disabled = false;
    return;
  }

  // Start camera loop
  try {
    let processing = false;
    const mpCam = new Camera(camFeed, {
      onFrame: async () => {
        if (processing) return;
        processing = true;
        try { await fm.send({ image: camFeed }); }
        catch(e) { console.warn('Frame send error:', e.message); }
        finally { processing = false; }
      },
      width: 640, height: 480,
    });
    await mpCam.start();
  } catch(e) {
    console.error('Camera loop failed:', e);
    btn.textContent = 'Stream Error';
    btn.disabled = false;
    return;
  }

  // All good
  btn.textContent = 'Optics Live';
  btn.classList.add('on');
  btn.disabled = false;
  document.getElementById('btn-snap').disabled = false;
  document.getElementById('lore').textContent =
    'atoms aren\u2019t particles \u00b7 stable knots in time \u00b7 where imbalance stabilises';
}

// ════════════════════════════════════════════════
//  LIVE POSITION UPDATE (without rebuilding geometry)
//  Smoothly lerps landmark positions toward live data
// ════════════════════════════════════════════════
const LERP = 0.3;
function updatePositions(lm) {
  if (!knotSystem) return;
  const geo      = knotSystem.geometry;
  const posAttr  = geo.attributes.iPos;
  const compAttr = geo.attributes.iComp;
  const normAttr = geo.attributes.iNorm;
  if (!posAttr || !compAttr) return;

  const posArr  = posAttr.array;
  const compArr = compAttr.array;
  const normArr = normAttr ? normAttr.array : null;
  const nLM     = lm.length;
  const tris    = TESS.filter((_,i) => i % densityStep === 0);

  // Face centre from oval — same calculation as buildKnotSystem
  const OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,
    379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
  let fcx=0, fcy=0;
  OVAL.forEach(i => { fcx += lm[i].x; fcy += lm[i].y; });
  fcx /= OVAL.length; fcy /= OVAL.length;
  const SCALE = 3.8;

  let zMin=Infinity, zMax=-Infinity;
  for (let i=0;i<nLM;i++) {
    if (lm[i].z<zMin) zMin=lm[i].z;
    if (lm[i].z>zMax) zMax=lm[i].z;
  }
  const zRange = Math.max(0.001, zMax-zMin);

  for (let i=0; i<nLM && i*3+2<posArr.length; i++) {
    const compVal = 1.0 - (lm[i].z-zMin)/zRange;
    const tx = (fcx - lm[i].x) * SCALE;
    const ty = (fcy - lm[i].y) * -SCALE;
    const tz = compVal * depthScale - depthScale * 0.5;
    posArr[i*3  ] += (tx-posArr[i*3  ])*LERP;
    posArr[i*3+1] += (ty-posArr[i*3+1])*LERP;
    posArr[i*3+2] += (tz-posArr[i*3+2])*LERP;
    compArr[i]    += (compVal-compArr[i])*LERP;
  }

  // Recompute normals from updated landmark positions, lerp toward them
  if (normArr) {
    const fresh = computeNormals(posArr, nLM);
    for (let i=0;i<nLM*3;i++) normArr[i] += (fresh[i]-normArr[i])*LERP;
  }

  // Update centroid positions + normals from updated landmarks
  for (let t=0; t<tris.length; t++) {
    const [a,b,c] = tris[t];
    if (a>=nLM||b>=nLM||c>=nLM) continue;
    const idx = nLM+t;
    if (idx*3+2>=posArr.length) continue;
    posArr[idx*3  ] = (posArr[a*3  ]+posArr[b*3  ]+posArr[c*3  ])/3;
    posArr[idx*3+1] = (posArr[a*3+1]+posArr[b*3+1]+posArr[c*3+1])/3;
    posArr[idx*3+2] = (posArr[a*3+2]+posArr[b*3+2]+posArr[c*3+2])/3;
    compArr[idx]    = (compArr[a]+compArr[b]+compArr[c])/3;
    if (normArr) {
      const nx=(normArr[a*3]+normArr[b*3]+normArr[c*3])/3;
      const ny=(normArr[a*3+1]+normArr[b*3+1]+normArr[c*3+1])/3;
      const nz=(normArr[a*3+2]+normArr[b*3+2]+normArr[c*3+2])/3;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz);
      normArr[idx*3  ]=nl>1e-6?nx/nl:0;
      normArr[idx*3+1]=nl>1e-6?ny/nl:0;
      normArr[idx*3+2]=nl>1e-6?nz/nl:1;
    }
  }

  posAttr.needsUpdate  = true;
  compAttr.needsUpdate = true;
  if (normAttr) normAttr.needsUpdate = true;
}

// ════════════════════════════════════════════════
//  RESIZE
// ════════════════════════════════════════════════
window.addEventListener('resize', () => {
  if (!renderer) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ════════════════════════════════════════════════
//  GLOBAL ERROR SURFACE
//  Unsilences crashes so the button re-enables
// ════════════════════════════════════════════════
window.onerror = (msg, src, line) => {
  console.error('JS Error:', msg, 'line:', line);
  const btn = document.getElementById('btn-init');
  if (btn && btn.disabled && btn.textContent !== 'Optics Live') {
    btn.textContent = 'Error — see console';
    btn.disabled = false;
  }
};
window.onunhandledrejection = e => {
  console.error('Promise rejection:', e.reason);
  const btn = document.getElementById('btn-init');
  if (btn && btn.disabled && btn.textContent !== 'Optics Live') {
    btn.textContent = 'Error — see console';
    btn.disabled = false;
  }
};

// Wait for all CDN scripts before allowing init
window.addEventListener('load', () => {
  const btn = document.getElementById('btn-init');
  if (!btn) return;
  const missing = [
    typeof THREE    === 'undefined' && 'Three.js',
    typeof FaceMesh === 'undefined' && 'FaceMesh',
    typeof Camera   === 'undefined' && 'CameraUtils',
  ].filter(Boolean);
  if (missing.length) {
    btn.textContent = `Missing: ${missing.join(', ')}`;
    console.error('Missing deps:', missing);
  } else {
    btn.textContent = 'Init Optics';
    btn.disabled = false;
  }
});
