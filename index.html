<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh | Unified Cartesian Core</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --panel: #0a0a16; }
body{background:#020205;color:#fff;font-family:'Courier New', Courier, monospace;margin:0;overflow:hidden}

.stage{display:flex;justify-content:center;gap:15px;padding:20px;height:65vh}
.viewport{position:relative;width:480px;height:580px;background:#000;border:1px solid #1a1a2a;border-radius:12px;overflow:hidden;box-shadow: 0 10px 40px rgba(0,240,255,0.05)}
.tag{position:absolute;top:15px;left:15px;font-size:0.6em;color:var(--neon);letter-spacing:2px;z-index:10;text-transform:uppercase}

.dash{position:fixed;bottom:0;left:0;right:0;background:var(--panel);padding:30px;border-top:1px solid #1a1a2a}
.metrics{display:flex;justify-content:space-between;margin-bottom:20px;max-width:1000px;margin-left:auto;margin-right:auto}
.m-box{text-align:center;background:#05050a;padding:15px;border-radius:8px;border:1px solid #111;flex:1;margin:0 10px}
.m-box label{display:block;font-size:0.6em;color:#555;margin-bottom:8px;text-transform:uppercase}
.m-box span{color:var(--neon);font-size:1.1em;font-weight:bold}

.controls{display:flex;gap:15px;max-width:1000px;margin:0 auto}
.btn{flex:1;padding:20px;background:#111;color:#666;border:1px solid #222;border-radius:8px;font-weight:bold;cursor:pointer;text-transform:uppercase;transition:all 0.3s;letter-spacing:1px}
.btn.active{background:var(--neon);color:#000;border-color:var(--neon);box-shadow: 0 0 15px rgba(0,240,255,0.3)}
.btn:hover:not(:disabled){filter:brightness(1.2)}

video { display: none; }
</style>
</head>
<body>

<div class="stage">
  <div class="viewport" id="v-local">
    <div class="tag">NODE_01 // WIRE_CAPTURE</div>
  </div>
  <div class="viewport" id="v-remote">
    <div class="tag">NODE_02 // CHUCK_CLOSE_RECONSTRUCTION</div>
  </div>
</div>

<div class="dash">
  <div class="metrics">
    <div class="m-box"><label>Spatial Grid</label><span>Locked</span></div>
    <div class="m-box"><label>Node Count</label><span>468</span></div>
    <div class="m-box"><label>Transmission</label><span id="valBand">Idle</span></div>
  </div>
  <div class="controls">
    <button class="btn active" id="btn-init" onclick="initSystem()">1. Init Optics</button>
    <button class="btn" id="btn-snap" onclick="triggerDataDump()" disabled>2. Snap Data Dump</button>
    <button class="btn" id="btn-puppet" onclick="togglePuppet()" disabled>3. Engage Puppet</button>
  </div>
</div>

<video id="webcam" playsinline></video>

<script>
let localScene, remoteScene, isPuppeting = false;
let latestLandmarks = null;
let captureCanvas, captureCtx;

// --- AESTHETIC: PROCEDURAL DOT/RING TEXTURE ---
// This generates the concentric ring style you had in v9.4
function createRingTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    
    // Outer Ring
    ctx.beginPath();
    ctx.arc(32, 32, 28, 0, Math.PI * 2);
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#ffffff';
    ctx.stroke();

    // Inner Dot
    ctx.beginPath();
    ctx.arc(32, 32, 14, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    return new THREE.CanvasTexture(canvas);
}

const ringTex = createRingTexture();

// --- SCENE SETUP ---
function buildCartesianEnvironment(containerId, isRemote) {
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020205, 0.08);

    const camera = new THREE.PerspectiveCamera(45, 480/580, 0.1, 100);
    camera.position.set(0, 0, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(480, 580);
    document.getElementById(containerId).appendChild(renderer.domElement);

    // 1. The Global Environment Grid
    const roomGrid = new THREE.GridHelper(10, 30, 0x00f0ff, 0x111122);
    roomGrid.position.y = -1.5;
    roomGrid.position.z = -2;
    scene.add(roomGrid);

    // 2. The Avatar Structure
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(468 * 3);
    const col = new Float32Array(468 * 3);
    
    // Fill initial arrays
    for(let i=0; i<468*3; i++) { pos[i] = 0; col[i] = 1; }
    
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

    let mesh;
    if (!isRemote) {
        // LOCAL: Technical Wireframe Grid
        const mat = new THREE.PointsMaterial({ 
            size: 0.03, 
            color: 0x00f0ff,
            transparent: true,
            opacity: 0.5
        });
        mesh = new THREE.Points(geo, mat);
    } else {
        // REMOTE: Stylized High-Fidelity Data Dump (Chuck Close style)
        const mat = new THREE.PointsMaterial({ 
            size: 0.15, // Large overlapping dots
            map: ringTex,
            vertexColors: true, 
            transparent: true,
            alphaTest: 0.1,
            blending: THREE.AdditiveBlending
        });
        mesh = new THREE.Points(geo, mat);
    }

    scene.add(mesh);
    return { scene, camera, renderer, mesh, pos, col };
}

// --- SYSTEM INITIALIZATION ---
async function initSystem() {
    const btnInit = document.getElementById('btn-init');
    btnInit.textContent = "Booting...";
    
    localScene = buildCartesianEnvironment('v-local', false);
    remoteScene = buildCartesianEnvironment('v-remote', true);

    const video = document.getElementById('webcam');
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    video.srcObject = stream;
    video.play();

    captureCanvas = document.createElement('canvas');
    captureCanvas.width = 640; captureCanvas.height = 480;
    captureCtx = captureCanvas.getContext('2d');

    const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
    
    faceMesh.onResults(res => {
        if (!res.multiFaceLandmarks?.[0]) return;
        latestLandmarks = res.multiFaceLandmarks[0];
        
        // Always update Local Wireframe
        updateGeometry(localScene, latestLandmarks, false);

        // Update Remote only if syncing
        if(isPuppeting) {
            updateGeometry(remoteScene, latestLandmarks, false);
            document.getElementById('valBand').textContent = (Math.random() * 2 + 10).toFixed(1) + " KB/s";
        }
    });

    const cameraUtils = new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } });
    cameraUtils.start();

    // Start Render Loop
    requestAnimationFrame(function animate() {
        localScene.renderer.render(localScene.scene, localScene.camera);
        remoteScene.renderer.render(remoteScene.scene, remoteScene.camera);
        requestAnimationFrame(animate);
    });

    btnInit.textContent = "Optics Active";
    btnInit.classList.remove('active');
    
    const btnSnap = document.getElementById('btn-snap');
    btnSnap.disabled = false;
    btnSnap.classList.add('active');
}

// --- THE DATA DUMP (Color Mapping) ---
function triggerDataDump() {
    if (!latestLandmarks) return;
    
    // Draw current video frame to canvas to steal colors
    const video = document.getElementById('webcam');
    captureCtx.drawImage(video, 0, 0);

    const colArray = remoteScene.col;

    latestLandmarks.forEach((pt, i) => {
        const px = Math.min(Math.floor(pt.x * 640), 639);
        const py = Math.min(Math.floor(pt.y * 480), 479);
        const pixel = captureCtx.getImageData(px, py, 1, 1).data;
        
        // Over-saturate slightly to look like digital art
        colArray[i*3] = pixel[0] / 255;
        colArray[i*3+1] = pixel[1] / 255;
        colArray[i*3+2] = pixel[2] / 255;
    });

    remoteScene.mesh.geometry.attributes.color.needsUpdate = true;
    
    // Initial positional setup
    updateGeometry(remoteScene, latestLandmarks, false);

    document.getElementById('btn-snap').classList.remove('active');
    document.getElementById('btn-snap').textContent = "Dumped (3.2 MB)";
    
    const btnPup = document.getElementById('btn-puppet');
    btnPup.disabled = false;
    btnPup.classList.add('active');
}

// --- LOW-BIT PUPPETING (XYZ Only) ---
function updateGeometry(node, lm, updateColor) {
    const pos = node.pos;
    
    // Map to absolute Grid Scale
    lm.forEach((pt, i) => {
        pos[i*3] = (pt.x - 0.5) * -5;     // X Grid
        pos[i*3+1] = (pt.y - 0.5) * -5;   // Y Grid
        pos[i*3+2] = (pt.z * -4);         // Z Depth
    });

    node.mesh.geometry.attributes.position.needsUpdate = true;
}

function togglePuppet() {
    isPuppeting = !isPuppeting;
    const btn = document.getElementById('btn-puppet');
    if(isPuppeting) {
        btn.textContent = "Puppet Live";
        btn.style.background = "#ff0055"; // Red recording color
        btn.style.color = "#fff";
    } else {
        btn.textContent = "3. Engage Puppet";
        btn.style.background = "var(--neon)";
        btn.style.color = "#000";
        document.getElementById('valBand').textContent = "Idle";
    }
}
</script>
</body>
</html>
