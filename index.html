<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>VibeMesh | Surgical Surface v11.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --magenta: #ff00ff; --bg: #020205; }
body{background:var(--bg);color:#fff;font-family:monospace;margin:0;overflow:hidden}
.app-container { display: flex; flex-direction: column; height: 100vh; }
.stage{display:flex;justify-content:center;gap:15px;padding:20px;flex-grow: 1;}
.viewport{position:relative;width:480px;height:550px;background:#000;border:1px solid #1a1a2a;border-radius:8px;overflow:hidden;}
.tag{position:absolute;top:15px;left:15px;font-size:0.7em;color:var(--neon);letter-spacing:2px;z-index:10;background:rgba(0,0,0,0.8);padding:4px 8px;}
.network-deck{background:#0a0a16;padding:25px;border-top:1px solid #1a1a2a; display: flex; justify-content: center; gap: 15px;}
.btn { width: 220px; padding: 15px; background: #111; color: #555; border: 1px solid #222; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s;}
.btn.active { background: var(--neon); color: #000; border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }
video { display: none; }
</style>
</head>
<body>
<div class="app-container">
  <div class="stage">
    <div class="viewport" id="v-sender"><div class="tag">TX: DATA CAPTURE</div></div>
    <div class="viewport" id="v-receiver"><div class="tag" style="color:var(--magenta)">RX: SPATIAL RECONSTRUCTION</div></div>
  </div>
  <div class="network-deck">
    <button class="btn active" id="btn-init" onclick="initSystem()">1. BOOT OPTICS</button>
    <button class="btn" id="btn-snap" onclick="triggerSnapshotWrap()" disabled>2. WRAP SURFACE</button>
    <button class="btn" id="btn-puppet" onclick="toggleNetwork()" disabled>3. SYNC TELEMETRY</button>
  </div>
</div>
<video id="webcam" playsinline></video>

<script>
let localScene, remoteScene, isTransmitting = false, latestLandmarks = null;
let captureCanvas, captureCtx;

// A significantly expanded "High-Density" core map (Indices for a solid mask)
const MESH_INDICES = [
    // Forehead
    10,338,297, 332,284,251, 10,151,338, 67,109,10, 10,338,297,
    // Eyes (Outer to Inner)
    33,7,163, 163,7,144, 144,7,145, 145,7,153, 153,7,154, 154,7,155, 155,7,133,
    263,249,390, 390,249,373, 373,249,374, 374,249,380, 380,249,381, 381,249,382, 382,249,362,
    // Nose Bridge & Tip
    168,6,197, 197,6,195, 195,6,5, 5,6,4, 1,2,164, 164,2,5, 5,2,4,
    // Mouth & Cheeks
    61,146,91, 91,181,84, 84,17,314, 314,405,321, 321,375,291, 61,185,40, 40,39,37, 37,0,267, 267,269,270, 270,409,291,
    // Expansion for Solid Fill
    127,34,139, 139,34,227, 227,34,21, 21,54,103, 103,67,10, 251,284,332, 332,297,338,
    21,71,68, 68,71,104, 104,71,69, 69,71,108, 108,71,151, 151,108,337, 337,108,299, 299,108,333, 333,108,298, 298,108,332
];

function buildNodeEnv(containerId, isReceiver) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 480/550, 0.1, 100);
    camera.position.set(0, 0, 4.5);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(480, 550);
    document.getElementById(containerId).appendChild(renderer.domElement);

    // Light for high-fidelity skin rendering
    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(0, 2, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040, 0.8));

    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(468 * 3);
    const uvs = new Float32Array(468 * 2); 
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geo.setIndex(MESH_INDICES);

    let mesh;
    if (isReceiver) {
        // High-End Render Material
        const mat = new THREE.MeshPhongMaterial({ 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.95,
            shininess: 30,
            specular: 0x111111
        });
        mesh = new THREE.Mesh(geo, mat);
    } else {
        const mat = new THREE.PointsMaterial({ size: 0.02, color: 0x00f0ff });
        mesh = new THREE.Points(geo, mat);
    }
    scene.add(mesh);
    return { scene, camera, renderer, mesh, geo, pos, uvs };
}

async function initSystem() {
    const btn = document.getElementById('btn-init');
    try {
        localScene = buildNodeEnv('v-sender', false);
        remoteScene = buildNodeEnv('v-receiver', true);
        const video = document.getElementById('webcam');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video.srcObject = stream; video.play();

        captureCanvas = document.createElement('canvas');
        captureCanvas.width = 640; captureCanvas.height = 480;
        captureCtx = captureCanvas.getContext('2d');

        const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
        faceMesh.onResults(res => {
            if (!res.multiFaceLandmarks?.[0]) return;
            latestLandmarks = res.multiFaceLandmarks[0];
            updateGeometry(localScene, latestLandmarks);
            if (isTransmitting) updateGeometry(remoteScene, latestLandmarks);
        });

        new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } }).start();

        requestAnimationFrame(function animate() {
            localScene.renderer.render(localScene.scene, localScene.camera);
            remoteScene.renderer.render(remoteScene.scene, remoteScene.camera);
            requestAnimationFrame(animate);
        });

        btn.textContent = "OPTICS LIVE";
        document.getElementById('btn-snap').disabled = false;
        document.getElementById('btn-snap').classList.add('active');
    } catch (e) { btn.textContent = "HW ERROR"; }
}

function triggerSnapshotWrap() {
    if (!latestLandmarks) return;
    const video = document.getElementById('webcam');
    captureCtx.drawImage(video, 0, 0, 640, 480);
    
    // Create the Texture and apply to Mesh
    const texture = new THREE.CanvasTexture(captureCanvas);
    remoteScene.mesh.material.map = texture;
    remoteScene.mesh.material.needsUpdate = true;

    // UV projection logic: Every vertex gets a unique color from the photo
    for (let i = 0; i < 468; i++) {
        const pt = latestLandmarks[i];
        remoteScene.uvs[i*2] = pt.x;
        remoteScene.uvs[i*2+1] = 1 - pt.y; // Invert Y for GL context
    }
    remoteScene.geo.attributes.uv.needsUpdate = true;
    updateGeometry(remoteScene, latestLandmarks);
    
    document.getElementById('btn-snap').textContent = "SURFACE CONSTRUCTED";
    document.getElementById('btn-snap').classList.remove('active');
    document.getElementById('btn-puppet').disabled = false;
    document.getElementById('btn-puppet').classList.add('active');
}

function updateGeometry(node, lm) {
    for (let i = 0; i < 468; i++) {
        node.pos[i*3] = (lm[i].x - 0.5) * -5;
        node.pos[i*3+1] = (lm[i].y - 0.5) * -5;
        node.pos[i*3+2] = (lm[i].z * -5);
    }
    node.geo.attributes.position.needsUpdate = true;
}

function toggleNetwork() {
    isTransmitting = !isTransmitting;
    document.getElementById('btn-puppet').textContent = isTransmitting ? "TELEMETRY SYNCED" : "RE-SYNC GRID";
    document.getElementById('btn-puppet').classList.toggle('active', isTransmitting);
}
</script>
</body>
</html>
