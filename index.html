<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeMesh | LoBi-Net Reactive Prototype</title>
    <style>
        body { margin: 0; background: #070505; color: #ff9d6e; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .controls { pointer-events: auto; background: rgba(20, 10, 5, 0.9); padding: 20px; border: 1px solid #ff9d6e; border-radius: 2px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        button { background: transparent; color: #ff9d6e; border: 1px solid #ff9d6e; padding: 10px 15px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #ff9d6e; color: #000; }
        button.active { background: #ff9d6e; color: #000; box-shadow: 0 0 15px #ff9d6e; }
        h1 { font-size: 14px; margin: 0 0 5px 0; letter-spacing: 4px; color: #fff; }
        p { font-size: 9px; opacity: 0.7; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="controls">
            <h1>VIBEMESH // LOBI-NET</h1>
            <p>STATUS: <span id="status">IDLE_SEARCHING</span></p>
            <p>ASSET: LIVING_CLAY_V2</p>
            <hr style="border: 0; border-top: 1px solid #331a10; margin: 15px 0;">
            <button id="connectBtn">Connect Spatial Ledger</button><br>
            <button id="audioBtn">Simulate Audio Pulse</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. THE PRISMATIC "CHUCK CLOSE" SHADER ---
        const vShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPos;
            void main() {
                vUv = uv;
                vPos = position;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fShader = `
            uniform float uTime;
            uniform float uVibeEnergy;
            uniform float uVibePitch;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPos;

            void main() {
                // Rotated Diamond Grid
                vec2 uv = vUv * 65.0; 
                float a = 0.785;
                uv *= mat2(cos(a), -sin(a), sin(a), cos(a));
                
                vec2 id = floor(uv);
                vec2 f = fract(uv);
                float d = length(f - 0.5);

                // Editorial Palette (Copper / Gold / Flesh)
                vec3 base = vec3(0.45, 0.25, 0.15); // Deep Copper
                vec3 glow = vec3(1.0, 0.7, 0.4);   // Golden Highlight
                
                // Audio-Reactive Prismatic Shift
                vec3 accent = mix(vec3(1.0, 0.4, 0.2), vec3(0.2, 0.6, 1.0), uVibePitch);
                vec3 seedColor = mix(glow, accent, uVibeEnergy);

                // Nested Circles Math
                float outer = 1.0 - smoothstep(0.35, 0.45, d);
                float inner = 1.0 - smoothstep(0.1 + (uVibeEnergy * 0.2), 0.2 + (uVibeEnergy * 0.2), d);
                
                vec3 color = base * 0.2; // The "Grout"
                color = mix(color, base, outer);
                color = mix(color, seedColor, inner);

                // Lighting & Depth
                float light = max(dot(vNormal, vec3(0.5, 0.5, 1.0)), 0.1);
                gl_FragColor = vec4(color * (light + 0.3), 1.0);
            }
        `;

        // --- 2. SETUP & LANDMARKS ---
        const LANDMARKS = [
            new THREE.Vector3(0, -1.6, 1.2),   // 0: Chin
            new THREE.Vector3(-1.3, -0.6, 0.5),// 1: L Jaw
            new THREE.Vector3(1.3, -0.6, 0.5), // 2: R Jaw
            new THREE.Vector3(0, 0.1, 1.9),    // 3: Nose
            new THREE.Vector3(-0.5, 0.6, 1.4), // 4: L Eye
            new THREE.Vector3(0.5, 0.6, 1.4),  // 5: R Eye
            new THREE.Vector3(-0.7, 1.0, 1.2), // 6: L Brow
            new THREE.Vector3(0.7, 1.0, 1.2),  // 7: R Brow
            new THREE.Vector3(-0.4, -0.7, 1.5),// 8: Mouth L
            new THREE.Vector3(0.4, -0.7, 1.5)  // 9: Mouth R
        ];

        let isConnected = false;
        let isAudioActive = false;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(2.2, 90, 90);
        const originalPos = geometry.attributes.position.clone();
        const targetPos = geometry.attributes.position.clone();
        const material = new THREE.ShaderMaterial({
            vertexShader: vShader, fragmentShader: fShader,
            uniforms: { uTime: { value: 0 }, uVibeEnergy: { value: 0 }, uVibePitch: { value: 0.5 } }
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        camera.position.z = 5.5;

        // --- 3. THE TEMPORAL CONDUCTOR (DYNAMICS) ---
        function getVisemeOffset(vertex, l8, l9, energy) {
            const distM = (vertex.distanceTo(l8) + vertex.distanceTo(l9)) / 2;
            if (distM < 0.7) {
                const pull = Math.pow(1.0 - distM/0.7, 2) * energy;
                return new THREE.Vector3(0, -0.5 * pull, 0.2 * pull);
            }
            return new THREE.Vector3(0,0,0);
        }

        function updateGeometry() {
            const pos = geometry.attributes.position;
            const time = performance.now() * 0.001;
            const sigma = 0.7;

            // Generate Dynamic Landmarks (Breathing & Saccades)
            const dynamicL = LANDMARKS.map((l, i) => {
                let d = l.clone();
                if (isConnected) {
                    d.z += Math.sin(time * 2.0) * 0.05; // Breath
                    if (i >= 4 && i <= 7) { // Eye jitter
                        d.x += Math.sin(time * 30.0 + i) * 0.015;
                        d.y += Math.cos(time * 25.0 + i) * 0.015;
                    }
                }
                return d;
            });

            const energy = material.uniforms.uVibeEnergy.value;

            for (let i = 0; i < pos.count; i++) {
                let v = new THREE.Vector3(originalPos.getX(i), originalPos.getY(i), originalPos.getZ(i));
                
                if (isConnected) {
                    let agg = new THREE.Vector3(0,0,0);
                    let tw = 0;
                    dynamicL.forEach(l => {
                        const d = v.distanceTo(l);
                        const w = Math.exp(-(d*d)/(2*sigma*sigma));
                        if (w > 0.001) { agg.addScaledVector(l, w); tw += w; }
                    });

                    if (tw > 0) {
                        agg.divideScalar(tw);
                        v.lerp(agg, Math.min(tw, 1.0) * 0.85);
                        // Apply Mouth Viseme
                        const vOff = getVisemeOffset(v, dynamicL[8], dynamicL[9], energy);
                        v.add(vOff);
                    }
                } else {
                    // Idle Searching Wave
                    v.addScaledVector(v.clone().normalize(), Math.sin(v.y * 3.0 + time * 3.0) * 0.1);
                }
                targetPos.setXYZ(i, v.x, v.y, v.z);
            }
        }

        // --- 4. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            material.uniforms.uTime.value = time;

            if (isAudioActive) {
                const e = 0.3 + Math.sin(time * 15.0) * 0.3;
                material.uniforms.uVibeEnergy.value = THREE.MathUtils.lerp(material.uniforms.uVibeEnergy.value, e, 0.2);
                material.uniforms.uVibePitch.value = 0.5 + Math.sin(time * 4.0) * 0.4;
            } else {
                material.uniforms.uVibeEnergy.value *= 0.85;
            }

            updateGeometry();

            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const cur = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
                const tar = new THREE.Vector3(targetPos.getX(i), targetPos.getY(i), targetPos.getZ(i));
                cur.lerp(tar, 0.15); // Elastic interpolation
                pos.setXYZ(i, cur.x, cur.y, cur.z);
            }
            pos.needsUpdate = true;
            geometry.computeVertexNormals();
            renderer.render(scene, camera);
        }

        // --- 5. INTERFACE ---
        const cBtn = document.getElementById('connectBtn');
        const aBtn = document.getElementById('audioBtn');
        const st = document.getElementById('status');

        cBtn.onclick = () => {
            isConnected = !isConnected;
            cBtn.classList.toggle('active');
            st.innerText = isConnected ? 'SPATIAL_SYNC_ACTIVE' : 'IDLE_SEARCHING';
            cBtn.innerText = isConnected ? 'Disconnect Ledger' : 'Connect Spatial Ledger';
        };

        aBtn.onclick = () => { aBtn.classList.toggle('active'); isAudioActive = !isAudioActive; };
        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
        
        animate();
    </script>
</body>
</html>
