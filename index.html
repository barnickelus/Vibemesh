<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoBi-Net // SCULPTING RECEIVER</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { position: relative; width: 480px; height: 560px; border: 1px solid #222; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        canvas, video { position: absolute; top: 0; left: 0; }
        #ui { position: absolute; bottom: 10px; left: 10px; z-index: 100; font-size: 9px; background: rgba(0,0,0,0.9); padding: 8px; border: 1px solid #00ff0033; pointer-events: none; line-height: 1.5; text-transform: uppercase; }
        .hint { position: absolute; top: 10px; right: 10px; font-size: 8px; color: #444; z-index: 100; text-transform: uppercase; }
        #ft_canvas { display: none; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" style="display:none"></video>
    <canvas id="ft_canvas" width="640" height="480"></canvas>
    <canvas id="final_canvas" width="480" height="560"></canvas>
    <div id="ui">
        LOBI-NET // SCULPT PROTOCOL<br>
        PHASE: <span id="phase_label" style="color:#ff00ff">19-BYTE (BUILDING)</span><br>
        PACKETS: <span id="packet_count" style="color:#00ffff">0 / 468</span>
    </div>
    <div class="hint">PRESS 'D' TO TOGGLE DEV MODE</div>
</div>

<script>
'use strict';

const W=480, H=560;
let isDevMode = true; 
const vid = document.getElementById('input_video');
const ftCtx = document.getElementById('ft_canvas').getContext('2d', {willReadFrequently: true});

// Vibe & Calibration State
const LM={ NOSE:1, MOUTH_T:13, MOUTH_B:14, MOUTH_L:61, MOUTH_R:291 };
let vibe = { mouthOpen: 0, yaw: 0, pitch: 0 };
let liveLM = null;

// --- THREE.JS SETUP ---
const scene = new THREE.Scene();
const cam3 = new THREE.PerspectiveCamera(35, (W/2)/H, 0.1, 1000);
cam3.position.set(0, 0, 4.0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);

// ══════════════════════════════════════════════════
//  1. TRIANGLE EXTRACTOR & PRIORITY QUEUE
// ══════════════════════════════════════════════════
function generateTriangles(tesselationEdges) {
    const adj = Array.from({length: 468}, () => []);
    tesselationEdges.forEach(edge => {
        adj[edge[0]].push(edge[1]);
        adj[edge[1]].push(edge[0]);
    });
    const tris = [];
    for (let i = 0; i < 468; i++) {
        for (let j = 0; j < adj[i].length; j++) {
            const n1 = adj[i][j];
            if (n1 <= i) continue;
            for (let k = j + 1; k < adj[i].length; k++) {
                const n2 = adj[i][k];
                if (n2 <= i) continue;
                if (adj[n1].includes(n2)) tris.push(i, n1, n2);
            }
        }
    }
    return tris;
}

const SCULPT_PRIORITY = {
    OVAL: [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109],
    L_EYE: [33, 246, 161, 160, 159, 158, 157, 173, 133, 155, 154, 153, 145, 144, 163, 7],
    R_EYE: [362, 398, 384, 385, 386, 387, 388, 466, 263, 249, 390, 373, 374, 380, 381, 382],
    NOSE: [1, 2, 98, 327, 168, 6],
    MOUTH: [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 14, 317, 402, 318, 324, 308, 78, 191, 80, 81, 82, 13, 312, 311, 310, 415]
};

const PRIORITY_SET = new Set([...SCULPT_PRIORITY.OVAL, ...SCULPT_PRIORITY.L_EYE, ...SCULPT_PRIORITY.R_EYE, ...SCULPT_PRIORITY.NOSE, ...SCULPT_PRIORITY.MOUTH]);
const FILL = [];
for (let i = 0; i < 468; i++) if (!PRIORITY_SET.has(i)) FILL.push(i);
const TRANSMIT_QUEUE = [...SCULPT_PRIORITY.OVAL, ...SCULPT_PRIORITY.L_EYE, ...SCULPT_PRIORITY.R_EYE, ...SCULPT_PRIORITY.NOSE, ...SCULPT_PRIORITY.MOUTH, ...FILL];

// ══════════════════════════════════════════════════
//  2. THE SCULPTING RECEIVER
// ══════════════════════════════════════════════════
class SculptingReceiver {
    constructor() {
        this.numVertices = 468;
        this.isFullySculpted = false;
        this.basePositions = new Float32Array(this.numVertices * 3); // The measured resting face
        this.targetPositions = new Float32Array(this.numVertices * 3); // Where it's animating to
        this.positions = new Float32Array(this.numVertices * 3); // Active mesh positions
        this.colors = new Float32Array(this.numVertices * 3);
        this.targetColors = new Float32Array(this.numVertices * 3);
        
        // Init as Fibonacci Sphere
        const radius = 0.6;
        for (let i = 0; i < this.numVertices; i++) {
            const phi = Math.acos(1 - 2 * (i + 0.5) / this.numVertices);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;
            const x = radius * Math.cos(theta) * Math.sin(phi);
            const y = radius * Math.sin(theta) * Math.sin(phi);
            const z = radius * Math.cos(phi);
            
            [this.positions, this.targetPositions, this.basePositions].forEach(arr => {
                arr[i*3] = x; arr[i*3+1] = y; arr[i*3+2] = z;
            });
            [this.colors, this.targetColors].forEach(arr => {
                arr[i*3] = 0.5; arr[i*3+1] = 0.5; arr[i*3+2] = 0.5;
            });
        }

        this.geometry = new THREE.BufferGeometry();
        this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
        this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));
        
        this.material = new THREE.MeshBasicMaterial({ vertexColors: true, wireframe: false, side: THREE.DoubleSide });
        this.mesh = new THREE.Mesh(this.geometry, this.material);
        scene.add(this.mesh);
    }

    initTopology(triangles) {
        this.geometry.setIndex(triangles);
    }

    receiveBuildPacket(packet) {
        const i = packet.idx;
        this.basePositions[i*3]   = packet.x;
        this.basePositions[i*3+1] = packet.y;
        this.basePositions[i*3+2] = packet.z;
        this.targetPositions[i*3]   = packet.x;
        this.targetPositions[i*3+1] = packet.y;
        this.targetPositions[i*3+2] = packet.z;
        this.targetColors[i*3]   = packet.r / 255;
        this.targetColors[i*3+1] = packet.g / 255;
        this.targetColors[i*3+2] = packet.b / 255;
    }

    applyLiveDelta(vibe) {
        // Reset targets to base sculpted face
        this.targetPositions.set(this.basePositions);
        
        // Physically push mouth vertices based on vibe delta
        const pushY = vibe.mouthOpen * 0.15; // Max mouth drop amount in world space
        
        // Drop lower lip
        const botIdx = LM.MOUTH_B * 3 + 1;
        this.targetPositions[botIdx] -= pushY;
        
        // Slightly pull down corners
        this.targetPositions[LM.MOUTH_L * 3 + 1] -= pushY * 0.3;
        this.targetPositions[LM.MOUTH_R * 3 + 1] -= pushY * 0.3;

        // Apply Pose to entire Mesh object
        this.mesh.rotation.y = -vibe.yaw;
        this.mesh.rotation.x = vibe.pitch;
    }

    update() {
        const speed = this.isFullySculpted ? 0.3 : 0.08; // Fast for live delta, slow for build phase
        let pUpdate = false, cUpdate = false;
        
        for (let i = 0; i < this.numVertices * 3; i++) {
            const pDiff = this.targetPositions[i] - this.positions[i];
            if (Math.abs(pDiff) > 0.001) { this.positions[i] += pDiff * speed; pUpdate = true; }
            
            const cDiff = this.targetColors[i] - this.colors[i];
            if (Math.abs(cDiff) > 0.001) { this.colors[i] += cDiff * speed; cUpdate = true; }
        }
        
        if (pUpdate) this.geometry.attributes.position.needsUpdate = true;
        if (cUpdate) this.geometry.attributes.color.needsUpdate = true;
    }
}

const receiver = new SculptingReceiver();

// ══════════════════════════════════════════════════
//  3. THE TRANSMITTER (Sampling & Sending)
// ══════════════════════════════════════════════════
let packetIndex = 0;
const packetsPerFrame = 12; // Speed of the incoming data stream

function runTransmitter(lm) {
    if (packetIndex < TRANSMIT_QUEUE.length) {
        // BUILD PHASE (19-Byte Packets)
        ftCtx.drawImage(vid, 0, 0, 640, 480);
        const limit = Math.min(packetIndex + packetsPerFrame, TRANSMIT_QUEUE.length);
        
        for (let i = packetIndex; i < limit; i++) {
            const idx = TRANSMIT_QUEUE[i];
            const pt = lm[idx];
            
            const px = Math.floor(Math.max(0, Math.min(pt.x * 640, 639)));
            const py = Math.floor(Math.max(0, Math.min(pt.y * 480, 479)));
            const rgb = ftCtx.getImageData(px, py, 1, 1).data;
            
            receiver.receiveBuildPacket({
                idx: idx,
                x: (pt.x - 0.5) * 2.5,
                y: -(pt.y - 0.5) * 2.5,
                z: -pt.z * 2.5,
                r: rgb[0], g: rgb[1], b: rgb[2]
            });
        }
        packetIndex = limit;
        document.getElementById('packet_count').innerText = `${packetIndex} / 468`;
        
        if (packetIndex >= TRANSMIT_QUEUE.length) {
            receiver.isFullySculpted = true;
            document.getElementById('phase_label').innerText = "24-BYTE (LIVE DELTA)";
            document.getElementById('phase_label').style.color = "#00ff00";
        }
    } else {
        // LIVE PHASE (24-Byte Protocol)
        const top = lm[10], bot = lm[152], mT = lm[LM.MOUTH_T], mB = lm[LM.MOUTH_B];
        const dist = Math.sqrt(Math.pow(mT.x - mB.x, 2) + Math.pow(mT.y - mB.y, 2));
        const faceSize = Math.sqrt(Math.pow(top.x - bot.x, 2) + Math.pow(top.y - bot.y, 2));
        
        vibe.mouthOpen = Math.min(dist / faceSize * 8.0, 1.0);
        vibe.yaw = (lm[LM.NOSE].x - 0.5) * 1.5;
        vibe.pitch = (lm[LM.NOSE].y - 0.5) * -1.2;
        
        receiver.applyLiveDelta(vibe);
    }
}

// ══════════════════════════════════════════════════
//  4. RENDER LOOP & POST-PROCESSING
// ══════════════════════════════════════════════════
function applyChuckClose(ctx) {
    const size = isDevMode ? 4 : 8; 
    const imageData = ctx.getImageData(0, 0, W, H);
    ctx.clearRect(0,0,W,H);
    for (let y = 0; y < H; y += size) {
        for (let x = 0; x < W; x += size) {
            const idx = (y * W + x) * 4;
            const r = imageData.data[idx], g = imageData.data[idx+1], b = imageData.data[idx+2];
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.beginPath();
            ctx.arc(x + size/2, y + size/2, size/2.2, 0, Math.PI*2);
            ctx.fill();
        }
    }
}

function tick() {
    receiver.update();

    const mainCtx = document.getElementById('final_canvas').getContext('2d');
    mainCtx.clearRect(0, 0, W, H);

    if (isDevMode) {
        mainCtx.drawImage(vid, 0, 0, W/2, H); // Left: Source
        renderer.setViewport(0, 0, W/2, H);
        renderer.render(scene, cam3);
        mainCtx.drawImage(renderer.domElement, W/2, 0, W/2, H); // Right: Receiver
    } else {
        renderer.setViewport(0, 0, W, H);
        renderer.render(scene, cam3);
        mainCtx.drawImage(renderer.domElement, 0, 0, W, H);
        applyChuckClose(mainCtx);
    }
}

// ══════════════════════════════════════════════════
//  5. MEDIAPIPE BOOT
// ══════════════════════════════════════════════════
window.addEventListener('keydown', e => { if(e.key.toLowerCase()==='d') isDevMode = !isDevMode; });

function onResults(results) {
    if (!results.multiFaceLandmarks || !results.multiFaceLandmarks[0]) return;
    liveLM = results.multiFaceLandmarks[0];
    
    // Auto-generate topology on the very first frame
    if (receiver.geometry.getIndex() === null && window.FACEMESH_TESSELATION) {
        const tris = generateTriangles(window.FACEMESH_TESSELATION);
        receiver.initTopology(tris);
    }
    
    runTransmitter(liveLM);
    tick();
}

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
faceMesh.onResults(onResults);

const camera = new Camera(vid, {onFrame: async () => { await faceMesh.send({image: vid}); }, width: 640, height: 480});
camera.start();

</script>
</body>
</html>
