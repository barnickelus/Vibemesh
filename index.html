<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeMesh — Shore Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { margin:0; background:#0a0a1f; color:#fff; font-family:Impact,sans-serif; overflow:hidden; }
    .header { text-align:center; padding:15px; background:linear-gradient(#00f0ff,#ff00aa); -webkit-background-clip:text; color:transparent; font-size:2.5em; }
    .call { display:flex; justify-content:space-around; padding:20px; }
    .avatar-box { text-align:center; }
    .avatar { width:280px; height:280px; border-radius:20px; overflow:hidden; background:#000; box-shadow:0 0 30px #00f0ff; }
    .name { margin:10px 0; font-size:1.4em; color:#00ffcc; }
    .controls { background:#111; padding:20px; margin:20px; border-radius:16px; }
    button { width:100%; padding:16px; font-size:20px; background:linear-gradient(#ff00aa,#00f0ff); border:none; border-radius:12px; color:#000; margin:10px 0; cursor:pointer; }
    input[type=range] { width:100%; accent-color:#00f0ff; }
    .live { text-align:center; color:#00ffcc; font-size:1.1em; }
  </style>
</head>
<body>
  <div class="header">🏖️ VibeMesh v1.4 — LIVE CALL 🔥</div>
  
  <div class="call">
    <!-- Your avatar -->
    <div class="avatar-box">
      <div class="name">You (Vancouver)</div>
      <div class="avatar" id="local"></div>
    </div>
    
    <!-- Remote avatar -->
    <div class="avatar-box">
      <div class="name">JerseyBro</div>
      <div class="avatar" id="remote"></div>
    </div>
  </div>
  
  <div class="controls">
    <div>Bandwidth: <span id="bw">450</span> kbps</div>
    <input type="range" min="5" max="900" value="450" oninput="updateTier(this.value)">
    
    <div>Battery: <span id="bat">100</span>%</div>
    <input type="range" min="1" max="100" value="100" oninput="document.getElementById('bat').innerText=this.value">
    
    <button onclick="sendFistPump()">👊 SEND FIST PUMP</button>
    <button onclick="speak()">🎤 PLAY CLONED VOICE</button>
  </div>
  
  <div class="live">Tier: <span id="tier">AVATAR3D</span> • Packets: <span id="packets">0</span></div>

  <script>
    let packetCount = 0;
    const sceneLocal = new THREE.Scene(); const cameraLocal = new THREE.PerspectiveCamera(75, 280/280, 0.1, 1000); const rendererLocal = new THREE.WebGLRenderer({antialias:true}); rendererLocal.setSize(280, 280); document.getElementById('local').appendChild(rendererLocal.domElement);
    const sceneRemote = new THREE.Scene(); const cameraRemote = new THREE.PerspectiveCamera(75, 280/280, 0.1, 1000); const rendererRemote = new THREE.WebGLRenderer({antialias:true}); rendererRemote.setSize(280, 280); document.getElementById('remote').appendChild(rendererRemote.domElement);

    const headLocal = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshStandardMaterial({color:0xffaa00, metalness:0.6}));
    sceneLocal.add(headLocal); cameraLocal.position.z = 5;
    const headRemote = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshStandardMaterial({color:0x00aaff, metalness:0.6}));
    sceneRemote.add(headRemote); cameraRemote.position.z = 5;

    const light = new THREE.PointLight(0xffffff, 1);
    sceneLocal.add(light); sceneRemote.add(light);

    function animate() {
      requestAnimationFrame(animate);
      headLocal.rotation.y += 0.015;
      headRemote.rotation.y += 0.012;
      rendererLocal.render(sceneLocal, cameraLocal);
      rendererRemote.render(sceneRemote, cameraRemote);
    }
    animate();

    function updateTier(bw) {
      document.getElementById('bw').innerText = bw;
      const tier = bw < 30 ? 'GLYPH' : bw < 80 ? 'SPRITE' : bw < 250 ? 'PUPPET' : 'AVATAR3D';
      document.getElementById('tier').innerText = tier;
      document.getElementById('packets').innerText = ++packetCount;
    }

    function sendFistPump() {
      headLocal.scale.set(1.3,1.3,1.3);
      setTimeout(() => headLocal.scale.set(1,1,1), 200);
      alert("👊 FIST PUMP SENT TO JERSEY BRO!!!");
      document.getElementById('packets').innerText = ++packetCount;
    }

    function speak() {
      const u = new SpeechSynthesisUtterance("Yo CB from the Shore — 3 Guys pizza slice in hand bro!");
      u.pitch = 1.1;
      u.rate = 1.15;
      speechSynthesis.speak(u);
    }
  </script>
</body>
</html>
