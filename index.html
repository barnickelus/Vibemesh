<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeMesh v7.0 | Holo-Core</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
  :root {
    --bg: #050508;
    --panel: rgba(12, 12, 18, 0.7);
    --border: rgba(0, 240, 255, 0.15);
    --cyan: #00f0ff;
    --magenta: #ff00aa;
    --text-main: #e0e0e0;
    --text-dim: #666;
    --font-mono: 'SF Mono', Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: radial-gradient(circle at 50% 0%, #11111a 0%, var(--bg) 100%);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,240,255,0.05) 0%, transparent 100%);
  }
  h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
  h1 span { color: var(--cyan); }
  .subtitle { font-family: var(--font-mono); font-size: 0.65rem; color: var(--magenta); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; display: block; }

  /* ── Main Layout ── */
  main {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    padding: 30px 20px;
    flex-grow: 1;
  }

  /* ── Viewports ── */
  .viewport-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 320px;
  }
  
  .viewport-header {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--cyan);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .viewport {
    position: relative;
    width: 320px;
    height: 400px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    box-shadow: inset 0 0 40px rgba(0, 240, 255, 0.03), 0 10px 30px rgba(0,0,0,0.5);
  }

  .viewport canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Overlay Elements ── */
  .pip {
    position: absolute; bottom: 12px; right: 12px;
    width: 70px; height: 90px;
    border-radius: 6px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
    z-index: 10; opacity: 0.8;
  }
  .pip video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

  .status-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 5; pointer-events: none;
    font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); letter-spacing: 2px;
  }

  .scan-ring {
    width: 60px; height: 60px;
    border: 1px dashed var(--text-dim);
    border-radius: 50%;
    margin-bottom: 12px;
    animation: spin 8s linear infinite;
  }

  .tier-badge {
    position: absolute; top: 12px; left: 12px;
    font-family: var(--font-mono); font-size: 0.6rem;
    padding: 4px 8px; border-radius: 4px;
    background: rgba(0, 240, 255, 0.1); border: 1px solid var(--cyan); color: var(--cyan);
    z-index: 10;
  }

  /* ── Scan Animation ── */
  .scan-line {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    z-index: 20; opacity: 0;
  }
  .scanning .scan-line { animation: scan 2s ease-in-out infinite; opacity: 1; }

  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

  /* ── HUD Controls ── */
  .hud {
    width: 100%; max-width: 670px; margin: 0 auto;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column; gap: 20px;
    backdrop-filter: blur(10px);
  }

  .controls-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;
  }

  .btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-main); padding: 12px; border-radius: 8px;
    font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s ease; text-transform: uppercase;
  }
  .btn:hover:not(:disabled) { background: rgba(0,240,255,0.1); border-color: var(--cyan); color: var(--cyan); }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  
  .btn.active { background: rgba(0,240,255,0.2); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
  .btn.danger { background: rgba(255,0,170,0.1); border-color: var(--magenta); color: var(--magenta); }

  /* ── Sliders ── */
  .slider-group { display: flex; flex-direction: column; gap: 8px; }
  .slider-header { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }
  input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--cyan); cursor: pointer; margin-top: -5px; box-shadow: 0 0 10px var(--cyan); }
  input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255,255,255,0.2); }

  /* ── Telemetry Data ── */
  .telemetry {
    display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);
    font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim);
  }
  .telemetry span { color: var(--cyan); }

  /* Hidden video feed */
  #camFeed { position: absolute; top: -9999px; left: -9999px; opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<header>
  <h1>Vibe<span>Mesh</span></h1>
  <span class="subtitle">Primitive Holographic Comms // v7.0</span>
</header>

<main>
  <div class="viewport-container">
    <div class="viewport-header">
      <div>Local.Client</div>
      <div id="localStatus">Awaiting Optic</div>
    </div>
    <div class="viewport" id="localFrame">
      <div class="status-overlay" id="localIdle">
        <div class="scan-ring"></div>
        <div>NO SIGNAL</div>
      </div>
      <div class="pip"><video id="pipLocal" autoplay muted playsinline></video></div>
      <div class="tier-badge" id="localBadge">AVATAR_3D</div>
      <div class="scan-line"></div>
    </div>
  </div>

  <div class="viewport-container">
    <div class="viewport-header">
      <div>Remote.Peer</div>
      <div id="remoteStatus" style="color:var(--magenta)">Disconnected</div>
    </div>
    <div class="viewport" id="remoteFrame">
      <div class="status-overlay" id="remoteIdle">
        <div class="scan-ring" style="animation-direction: reverse;"></div>
        <div>AWAITING PEER</div>
      </div>
      <div class="tier-badge" id="remoteBadge" style="display:none;">---</div>
    </div>
  </div>
</main>

<div class="hud">
  <div class="controls-grid">
    <button class="btn" id="camBtn" onclick="startCamera()">1. Init Optics</button>
    <button class="btn" id="snapBtn" onclick="startSnap()" disabled>2. Biometric Scan</button>
    <button class="btn" id="liveBtn" onclick="toggleLive()" disabled>3. Stream Mesh</button>
    <button class="btn" onclick="clearLocal()">Reset Local</button>
  </div>

  <div class="controls-grid">
    <div class="slider-group">
      <div class="slider-header"><span>Bandwidth Tier</span> <span id="bwVal">900k</span></div>
      <input type="range" min="10" max="900" value="900" id="bwSlider" oninput="onBw(+this.value)">
    </div>
    <div class="slider-group">
      <div class="slider-header"><span>Holo-Density</span> <span id="densityVal">High</span></div>
      <input type="range" min="1" max="3" value="3" step="1" oninput="onDensity(+this.value)">
    </div>
  </div>

  <div class="telemetry">
    <div>TX: <span id="sentLbl">0</span> PKT</div>
    <div>RX: <span id="recvLbl">0</span> PKT</div>
    <div>LATENCY: <span id="rttLbl">--</span> MS</div>
    <div>VERTICES: <span id="vertsLbl">0</span></div>
  </div>
</div>

<video id="camFeed" autoplay muted playsinline></video>

<script>
'use strict';

// ==========================================
// SYSTEM CONFIG & CONSTANTS
// ==========================================
const FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
let densityLevel = 3; // 1 = Low (GLYPH), 2 = Med (SPRITE), 3 = High (AVATAR3D)
let bw = 900, cameraOn = false, puppetActive = false, snapping = false;
let lastLandmarks = null, lastSendT = 0, sentCount = 0, recvCount = 0;

// ==========================================
// 3D SCENE SETUP (PURE GPU HOLOGRAPHY)
// ==========================================
function makeScene(frameId, isLocal) {
  const container = document.getElementById(frameId);
  if (!container) return null;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 320/400, 0.1, 10);
  camera.position.z = 2.5;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(320, 400);
  renderer.setClearColor(0x000000, 0);
  container.insertBefore(renderer.domElement, container.firstChild);

  // Group to hold our hologram parts
  const holoGroup = new THREE.Group();
  scene.add(holoGroup);

  return { scene, camera, renderer, holoGroup, points: null, lines: null, basePositions: null, container };
}

let localS = null, remoteS = null;

function initScenes() {
  localS = makeScene('localFrame', true);
  remoteS = makeScene('remoteFrame', false);
  renderLoop();
}

function renderLoop() {
  requestAnimationFrame(renderLoop);
  
  // Subtle ambient rotation for the hologram effect
  if (localS && localS.holoGroup) {
      localS.holoGroup.rotation.y = Math.sin(Date.now() * 0.001) * 0.05;
      localS.renderer.render(localS.scene, localS.camera);
  }
  if (remoteS && remoteS.holoGroup) {
      remoteS.holoGroup.rotation.y = Math.sin(Date.now() * 0.001) * 0.05;
      remoteS.renderer.render(remoteS.scene, remoteS.camera);
  }
}

// ==========================================
// AVATAR GENERATION: THE HOLO-MESH
// ==========================================
// We use the raw MediaPipe triangulation to build a wireframe and point cloud.
// When density drops, we systematically cull vertices to create an intentional "low-bit" look.

function buildHoloMesh(sc, lm, density) {
  if (!sc) return;
  
  // Clean up old mesh
  if (sc.points) sc.holoGroup.remove(sc.points);
  if (sc.lines) sc.holoGroup.remove(sc.lines);

  const positions = [];
  const colors = [];
  
  // Decide how many points to render based on density
  // MediaPipe provides 468 points.
  const step = density === 3 ? 1 : density === 2 ? 3 : 7;
  
  // Center point for offset calculation (Nose tip is usually index 1)
  const cx = lm[1].x, cy = lm[1].y, cz = lm[1].z;

  for (let i = 0; i < lm.length; i += step) {
    // Mirror X, flip Y, scale up, adjust depth
    const x = (lm[i].x - cx) * -3.0; 
    const y = (lm[i].y - cy) * -3.0;
    const z = (lm[i].z - cz) * -3.0; // Push geometry forward
    
    positions.push(x, y, z);

    // Color mapping: deeper Z = darker, forward Z = bright cyan
    const normalizedZ = Math.max(0, Math.min(1, (z + 0.5)));
    colors.push(0, 0.5 + (normalizedZ * 0.5), 0.5 + (normalizedZ * 0.5));
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

  // 1. Point Cloud (The Nodes)
  const pMaterial = new THREE.PointsMaterial({ 
    size: density === 1 ? 0.08 : 0.03, 
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending
  });
  sc.points = new THREE.Points(geometry, pMaterial);
  sc.holoGroup.add(sc.points);

  // 2. Wireframe (The Connections) - Only on higher densities
  if (density > 1) {
      // Connect adjacent points simply to create a glitchy, webbed look
      const lineIndices = [];
      for(let i = 0; i < (positions.length/3) - 1; i++){
          if(Math.random() > 0.2) { // 80% chance to connect, creates organic gaps
              lineIndices.push(i, i+1);
          }
      }
      geometry.setIndex(lineIndices);
      const lMaterial = new THREE.LineBasicMaterial({ 
          color: 0x00f0ff, 
          transparent: true, 
          opacity: 0.15,
          blending: THREE.AdditiveBlending 
      });
      sc.lines = new THREE.LineSegments(geometry, lMaterial);
      sc.holoGroup.add(sc.lines);
  }

  sc.basePositions = [...positions]; // Store for delta updates
  
  if(sc === localS) document.getElementById('vertsLbl').textContent = positions.length / 3;
}

// Update existing mesh with new coordinates (Live Puppet)
function updateHoloMesh(sc, lm, density) {
    if (!sc || !sc.points) return;
    const posAttribute = sc.points.geometry.attributes.position;
    const step = density === 3 ? 1 : density === 2 ? 3 : 7;
    const cx = lm[1].x, cy = lm[1].y, cz = lm[1].z;
    
    let idx = 0;
    for (let i = 0; i < lm.length; i += step) {
        if(idx * 3 >= posAttribute.array.length) break;
        
        // Target positions
        const tx = (lm[i].x - cx) * -3.0; 
        const ty = (lm[i].y - cy) * -3.0;
        const tz = (lm[i].z - cz) * -3.0;
        
        // Linear Interpolation for smoothness
        posAttribute.array[idx*3] += (tx - posAttribute.array[idx*3]) * 0.4;
        posAttribute.array[idx*3+1] += (ty - posAttribute.array[idx*3+1]) * 0.4;
        posAttribute.array[idx*3+2] += (tz - posAttribute.array[idx*3+2]) * 0.4;
        idx++;
    }
    posAttribute.needsUpdate = true;
}

// ==========================================
// CAPTURE & TRACKING
// ==========================================
async function startCamera() {
  const btn = document.getElementById('camBtn'); 
  btn.disabled = true; btn.textContent = 'INIT...';
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width:480, height:640, facingMode:'user' }, audio: false });
    document.getElementById('pipLocal').srcObject = stream;
    
    const feed = document.getElementById('camFeed'); 
    feed.srcObject = stream;
    await new Promise(res => { feed.onloadedmetadata = res; }); 
    await feed.play();
    
    const faceMeshInst = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    faceMeshInst.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    faceMeshInst.onResults(onFaceResults);
    
    const mpCam = new Camera(feed, { onFrame: async () => { await faceMeshInst.send({ image: feed }); }, width: 480, height: 640 });
    await mpCam.start();
    
    cameraOn = true; 
    btn.classList.add('active'); btn.textContent = 'OPTICS LIVE';
    document.getElementById('snapBtn').disabled = false;
    document.getElementById('localStatus').textContent = 'Tracking Acquired';
    
  } catch(e) { 
      console.error(e); 
      btn.disabled = false; 
      document.getElementById('localStatus').textContent = 'Optic Failure';
  }
}

function onFaceResults(results) {
  if (!results.multiFaceLandmarks?.[0]) return;
  lastLandmarks = results.multiFaceLandmarks[0];
  
  if (puppetActive && localS?.points) {
    updateHoloMesh(localS, lastLandmarks, densityLevel);
  }
  
  // Throttle network sending
  const now = Date.now();
  if (now - lastSendT > 60 && puppetActive) { 
      lastSendT = now; 
      // Note: In actual WebRTC integration, you would pack and send 'lastLandmarks' here.
      sentCount++;
      document.getElementById('sentLbl').textContent = sentCount;
  }
}

async function startSnap() {
  if (!cameraOn || snapping || !lastLandmarks) return;
  snapping = true; 
  document.getElementById('snapBtn').disabled = true;
  document.getElementById('localIdle').style.display = 'none';
  document.getElementById('localFrame').classList.add('scanning');
  
  // Simulate scan delay
  await new Promise(r => setTimeout(r, 1200));
  
  document.getElementById('localFrame').classList.remove('scanning');
  buildHoloMesh(localS, lastLandmarks, densityLevel);
  
  document.getElementById('liveBtn').disabled = false; 
  snapping = false; 
  document.getElementById('snapBtn').disabled = false;
  document.getElementById('localStatus').textContent = 'Mesh Generated';
}

function toggleLive() {
  puppetActive = !puppetActive; 
  const btn = document.getElementById('liveBtn');
  if(puppetActive) {
      btn.classList.add('danger');
      btn.textContent = 'HALT STREAM';
      document.getElementById('localStatus').textContent = 'Streaming Live';
  } else {
      btn.classList.remove('danger');
      btn.textContent = 'STREAM MESH';
      document.getElementById('localStatus').textContent = 'Stream Paused';
  }
}

// ==========================================
// CONTROLS & UTILS
// ==========================================
function onBw(v) { 
    bw = v; 
    document.getElementById('bwVal').textContent = v + 'k'; 
    let tier = v < 100 ? 'GLYPH' : v < 300 ? 'SPRITE' : 'AVATAR_3D';
    document.getElementById('localBadge').textContent = tier;
}

function onDensity(v) {
    densityLevel = v;
    let label = v === 1 ? 'Low (GLYPH)' : v === 2 ? 'Med (SPRITE)' : 'High (AVATAR_3D)';
    document.getElementById('densityVal').textContent = label;
    // Rebuild immediately if we already have a mesh
    if(localS && localS.points && lastLandmarks && !puppetActive) {
        buildHoloMesh(localS, lastLandmarks, densityLevel);
    }
}

function clearLocal() { 
    if(!localS) return; 
    if(localS.points) localS.holoGroup.remove(localS.points); 
    if(localS.lines) localS.holoGroup.remove(localS.lines);
    localS.points = null; localS.lines = null;
    puppetActive = false; 
    document.getElementById('liveBtn').disabled = true; 
    document.getElementById('liveBtn').classList.remove('danger');
    document.getElementById('liveBtn').textContent = '3. Stream Mesh';
    document.getElementById('localIdle').style.display = 'flex'; 
    document.getElementById('localStatus').textContent = 'Awaiting Optic';
}

window.addEventListener('DOMContentLoaded', initScenes);
</script>
</body>
</html>
