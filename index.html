<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Protocol · 3D Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#151515;--border:#222222;
  --text:#e8e2d8;--muted:#555555;--accent:#c9a96e;--accent-dk:#7a5c2e;
  --green:#6a9e6a;--amber:#c9a050;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'JetBrains Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:32px 20px 56px;
}
header{position:relative;z-index:1;text-align:center;margin-bottom:24px}
.eyebrow{font-size:.55rem;letter-spacing:.32em;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.title{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:500;letter-spacing:.06em;line-height:1}
.title em{font-style:italic;color:var(--accent)}
.sub{font-size:.53rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-top:7px}
.stage{position:relative;z-index:1;display:flex;gap:18px;align-items:flex-start}
.avatar-col{display:flex;flex-direction:column;gap:8px}
.frame-wrap{position:relative}
.frame-wrap::before,.frame-wrap::after{content:'';position:absolute;width:14px;height:14px;z-index:3;pointer-events:none}
.frame-wrap::before{top:0;left:0;border-top:2px solid var(--accent-dk);border-left:2px solid var(--accent-dk)}
.frame-wrap::after{bottom:0;right:0;border-bottom:2px solid var(--accent-dk);border-right:2px solid var(--accent-dk)}
#display{display:block;border:1px solid var(--border); background:#000;}
#overlay{
  position:absolute;inset:0;
  background:rgba(10,10,10,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;z-index:5;transition:opacity .4s;
}
#overlay.gone{opacity:0;pointer-events:none}
.ov-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--accent)}
.ov-sub{font-size:.52rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;text-align:center;line-height:2;white-space:pre-line}
#startBtn{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.18em;
  text-transform:uppercase;padding:11px 28px;margin-top:4px;cursor:pointer;
  background:var(--accent);border:none;color:#0c0b09;font-weight:500;
}
.statusbar{
  display:flex;justify-content:space-between;
  font-size:.52rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;padding:0 2px;
}
.right-col{width:192px;display:flex;flex-direction:column;gap:13px;padding-top:2px}
.pip-wrap{position:relative;border:1px solid var(--border);background:#000;overflow:hidden}
#vid{display:block;width:192px;height:144px;object-fit:cover;transform:scaleX(-1)}
.panel{border:1px solid var(--border);padding:11px 10px;background:var(--surface)}
.phdr{font-size:.46rem;letter-spacing:.26em;text-transform:uppercase;color:var(--accent-dk);
  margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--border)}
.pdot.on{background:var(--green)}
.prow{margin-bottom:6px}
.plbl{font-size:.43rem;letter-spacing:.13em;color:var(--muted);text-transform:uppercase;margin-bottom:2px;display:flex;justify-content:space-between}
.pval{color:var(--accent);font-size:.43rem}
.btrack{height:3px;background:var(--border);position:relative}
.bfill{height:100%;background:var(--accent-dk);position:absolute;left:0}
.sw{width:12px;height:12px;border:1px solid var(--border)}
.slbl{font-size:.42rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.shex{font-size:.42rem;color:var(--text);margin-left:auto}
.srow{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.controls{margin-top:18px;display:flex;gap:10px;align-items:center}
.btn{font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;
  padding:6px 11px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer}
.btn.on{background:var(--accent);border-color:var(--accent);color:#0c0b09}
</style>
</head>
<body>

<header>
  <div class="eyebrow">Vibe Protocol · 3D Live v0.4.1</div>
  <h1 class="title">Your likeness. <em>Abstracted.</em></h1>
  <div class="sub">3D presence — derived from your face</div>
</header>

<div class="stage">
  <div class="avatar-col">
    <div class="frame-wrap">
      <canvas id="display" width="480" height="560"></canvas>
      <div id="overlay">
        <div class="ov-title" id="ovTitle">Vibe Protocol</div>
        <div class="ov-sub" id="ovSub">Camera access needed</div>
        <button id="startBtn">Enable Camera →</button>
      </div>
    </div>
    <div class="statusbar">
      <span id="sTier">Tier 02 · Mid</span>
      <span id="sPhase">Waiting</span>
      <span id="sCells">— cells</span>
    </div>
  </div>

  <div class="right-col">
    <div class="pip-wrap">
      <video id="vid" playsinline muted></video>
    </div>
    <div class="panel">
      <div class="phdr">Vibe Packet <div class="pdot" id="pdot"></div></div>
      <div class="prow"><div class="plbl">Mouth Open <span class="pval" id="v_mo">0.00</span></div><div class="btrack"><div class="bfill" id="b_mo"></div></div></div>
      <div class="prow"><div class="plbl">Eye Open <span class="pval" id="v_eo">1.00</span></div><div class="btrack"><div class="bfill" id="b_eo"></div></div></div>
    </div>
    <div class="panel">
      <div class="phdr">Likeness Palette</div>
      <div class="srow"><div class="sw" id="sw_skin"></div><div class="slbl">Skin</div><div class="shex" id="sh_skin">—</div></div>
      <div class="srow"><div class="sw" id="sw_hair"></div><div class="slbl">Hair</div><div class="shex" id="sh_hair">—</div></div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="btns" id="tierBtns">
    <button class="btn" data-tier="0">01</button>
    <button class="btn on" data-tier="1">02</button>
    <button class="btn" data-tier="2">03</button>
  </div>
</div>

<canvas id="glCanvas" width="480" height="560" style="display:none"></canvas>
<canvas id="sampCanvas" width="640" height="480" style="display:none"></canvas>

<script>
'use strict';

const W=480, H=560, VW=640, VH=480, FTW=1024, FTH=1024;
const FCX=FTW/2, FCY=FTH*0.48, FFW=260, FFH=330;

const TIERS=[
  {cs:28, gap:2, label:'Tier 01 · Low'},
  {cs:14, gap:1, label:'Tier 02 · Mid'},
  {cs:7,  gap:1, label:'Tier 03 · High'},
];

const LM={
  NOSE:1, CHIN:152, TOP:10, L_EYE_OUT:33, R_EYE_OUT:263,
  L_EYE_T:159, L_EYE_B:145, R_EYE_T:386, R_EYE_B:374,
  L_BROW:105, R_BROW:334, MOUTH_T:13, MOUTH_B:14,
  L_TEMPLE:127, R_TEMPLE:356, LIP_BOT:17, L_CHEEK:116, R_CHEEK:345
};

// ══════════════════════════════════════════════════
//  REFINED PROPORTIONS (Smaller features, larger skull)
// ══════════════════════════════════════════════════
let props={
  faceAspect:.75,
  jawWidthRatio:.78,
  eyeSpacingRatio:.42, 
  eyeYRatio:.50,       // Eyes exactly in middle of head
  eyeRX:.065,          // Smaller eyes
  eyeAspect:.28,
  browYRatio:.42,
  noseTipYRatio:.66,
  noseW:.16,
  mouthYRatio:.80,
  mouthW:.34,          // Smaller mouth
  upperLipH:.028,
  lowerLipH:.038,
};

let pal={
  skin:[198,154,122], shadow:[110,80,65], highlight:[225,190,160],
  hair:[35,28,22], lip:[145,85,75], iris:[60,70,80], brow:[45,35,30]
};

let vibe={mouthOpen:0, eyeOpen:1, browLift:0, yaw:0};
let pose={yaw:0, pitch:0, roll:0};

// ══════════════════════════════════════════════════
//  THREE.JS SETUP
// ══════════════════════════════════════════════════
const glCanvas=document.getElementById('glCanvas');
const renderer=new THREE.WebGLRenderer({canvas:glCanvas, antialias:true, alpha:true});
renderer.setSize(W,H);
const scene=new THREE.Scene();
const cam3=new THREE.PerspectiveCamera(38,W/H,0.1,100);
cam3.position.z=3.8;

const ftCvs=document.createElement('canvas');
ftCvs.width=FTW; ftCvs.height=FTH;
const ftCtx=ftCvs.getContext('2d');
const faceTex=new THREE.CanvasTexture(ftCvs);

const headMesh=new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 48),
  new THREE.MeshPhongMaterial({map:faceTex, shininess:10})
);
headMesh.scale.set(1.1, 1.35, 1.0); // Taller skull
headMesh.rotation.y=-Math.PI/2;
scene.add(headMesh);
scene.add(new THREE.AmbientLight(0xffffff, .4));
const keyL=new THREE.DirectionalLight(0xffffff, .8);
keyL.position.set(1,2,3); scene.add(keyL);

// ══════════════════════════════════════════════════
//  DRAW FACE (With Hair & Beard)
// ══════════════════════════════════════════════════
function drawFace(){
  const ctx=ftCtx, p=props, vi=vibe, pa=pal;
  const fW=FFW*2, fH=FFH*2;
  const toX=r=>FCX-FFW+r*fW, toY=r=>FCY-FFH+r*fH;

  ctx.fillStyle='#000'; ctx.fillRect(0,0,FTW,FTH);

  // 1. HAIR (Back Layer)
  ctx.fillStyle=`rgb(${pa.hair})`;
  ctx.beginPath();
  ctx.ellipse(FCX, FCY-FFH*0.1, FFW*1.1, FFH*1.15, 0, 0, Math.PI*2);
  ctx.fill();

  // 2. SKIN BASE
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(FCX, FCY, FFW, FFH, 0, 0, Math.PI*2);
  ctx.clip();
  const grd=ctx.createRadialGradient(FCX, FCY-FFH*0.2, FFW*0.2, FCX, FCY, FFW*1.2);
  grd.addColorStop(0, `rgb(${pa.highlight})`);
  grd.addColorStop(0.5, `rgb(${pa.skin})`);
  grd.addColorStop(1, `rgb(${pa.shadow})`);
  ctx.fillStyle=grd; ctx.fillRect(0,0,FTW,FTH);
  ctx.restore();

  // 3. BEARD & HAIR (Front Layer)
  ctx.fillStyle=`rgba(${pa.hair[0]},${pa.hair[1]},${pa.hair[2]}, 0.95)`;
  // Beard wrap
  ctx.beginPath();
  ctx.moveTo(FCX-FFW, FCY);
  ctx.bezierCurveTo(FCX-FFW, toY(1.05), FCX+FFW, toY(1.05), FCX+FFW, FCY);
  ctx.bezierCurveTo(FCX+FFW, toY(0.7), FCX-FFW, toY(0.7), FCX-FFW, FCY);
  ctx.fill();
  // Mustache
  ctx.beginPath();
  ctx.ellipse(FCX, toY(p.mouthYRatio-0.05), p.mouthW*fW*0.6, 25, 0, 0, Math.PI*2);
  ctx.fill();

  // 4. FEATURES (Eyes, Nose, Mouth)
  const eyeY=toY(p.eyeYRatio), mCenterY=toY(p.mouthYRatio);
  const lEyeX=FCX-p.eyeSpacingRatio*fW*.5, rEyeX=FCX+p.eyeSpacingRatio*fW*.5;
  const eRX=p.eyeRX*fW, eRY=eRX*p.eyeAspect*vi.eyeOpen;

  // Eyes
  ctx.fillStyle='#fff';
  [lEyeX, rEyeX].forEach(x=>{
    ctx.beginPath(); ctx.ellipse(x, eyeY, eRX, eRY, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgb(${pa.iris})`;
    ctx.beginPath(); ctx.arc(x, eyeY, eRY*0.8, 0, Math.PI*2); ctx.fill();
  });

  // Lips
  ctx.fillStyle=`rgb(${pa.lip})`;
  const mOpen=vi.mouthOpen*100;
  ctx.beginPath();
  ctx.ellipse(FCX, mCenterY, p.mouthW*fW*0.5, 12 + mOpen, 0, 0, Math.PI*2);
  ctx.fill();
}

// ══════════════════════════════════════════════════
//  POST-PROCESS (Background Sampling)
// ══════════════════════════════════════════════════
const display=document.getElementById('display');
const dCtx=display.getContext('2d');
const sampCvs=document.getElementById('sampCanvas');
const sampCtx=sampCvs.getContext('2d');
let glPixels=new Uint8Array(W*H*4);

function applyChuckClose(){
  const {cs, gap}=TIERS[tierIdx];
  const step=cs+gap;
  
  // Background: Sample and Blur Camera
  dCtx.save();
  dCtx.globalAlpha = 0.3;
  dCtx.filter = 'blur(20px) grayscale(100%)';
  dCtx.drawImage(sampCvs, 0, 0, W, H);
  dCtx.restore();
  dCtx.fillStyle = 'rgba(10,10,10,0.85)';
  dCtx.fillRect(0,0,W,H);

  renderer.getContext().readPixels(0,0,W,H,0x1908,0x1401,glPixels);

  for(let cx=step*.5; cx<W; cx+=step){
    for(let cy=step*.5; cy<H; cy+=step){
      const i=((H-1-(cy|0))*W+(cx|0))*4;
      if(glPixels[i+3]<20) continue;
      const r=glPixels[i], g=glPixels[i+1], b=glPixels[i+2];
      
      dCtx.fillStyle=`rgb(${r},${g},${b})`;
      dCtx.fillRect(cx-cs/2, cy-cs/2, cs, cs);
      // Small "compass" detail from the pixel grid
      if(Math.random()>0.9){
        dCtx.fillStyle='rgba(255,255,255,0.2)';
        dCtx.fillRect(cx, cy, 2, 2);
      }
    }
  }
}

// ══════════════════════════════════════════════════
//  CORE LOOP & CAMERA
// ══════════════════════════════════════════════════
let tierIdx=1, phase='waiting', faceMesh;

async function onResults(res){
  if(!res.multiFaceLandmarks?.length) return;
  const lm=res.multiFaceLandmarks[0];
  sampCtx.drawImage(document.getElementById('vid'),0,0,VW,VH);
  
  if(phase!=='live') { phase='live'; document.getElementById('overlay').classList.add('gone'); }

  // Extract Vibe
  const fH=Math.sqrt((lm[10].x-lm[152].x)**2 + (lm[10].y-lm[152].y)**2);
  vibe.mouthOpen = Math.abs(lm[13].y-lm[14].y)/fH;
  vibe.eyeOpen = Math.max(0.1, Math.abs(lm[159].y-lm[145].y)/(fH*0.1));
  
  pose.yaw = (lm[1].x - (lm[33].x+lm[263].x)*.5) * -1.5;
  pose.pitch = (lm[152].z - lm[10].z) * 2;

  drawFace(); faceTex.needsUpdate=true;
  headMesh.rotation.y = -Math.PI/2 + pose.yaw;
  headMesh.rotation.x = pose.pitch;
  renderer.render(scene,cam3);
  applyChuckClose();

  // Update UI
  document.getElementById('v_mo').textContent=vibe.mouthOpen.toFixed(2);
  document.getElementById('b_mo').style.width=(vibe.mouthOpen*500)+'%';
}

document.getElementById('startBtn').onclick=async()=>{
  const stream=await navigator.mediaDevices.getUserMedia({video:{width:640, height:480}});
  const vid=document.getElementById('vid');
  vid.srcObject=stream; vid.play();
  faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({refineLandmarks:true});
  faceMesh.onResults(onResults);
  const pump=async()=>{ await faceMesh.send({image:vid}); requestAnimationFrame(pump); };
  pump();
};

document.getElementById('tierBtns').onclick=e=>{
  if(e.target.dataset.tier){
    tierIdx=+e.target.dataset.tier;
    document.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));
    e.target.classList.add('on');
  }
};
</script>
</body>
</html>
