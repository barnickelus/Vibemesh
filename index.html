<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>VibeMesh | Inferred Splat v15.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --magenta: #ff00ff; --bg: #020205; }
body{background:var(--bg);color:#fff;font-family:monospace;margin:0;overflow:hidden}
/* Accessible Floating UI */
.control-deck { position: absolute; top: 20px; right: 20px; width: 260px; background: rgba(10,10,22,0.9); 
                border: 1px solid #1a1a2a; border-radius: 12px; padding: 20px; z-index: 100; backdrop-filter: blur(10px); }
.deck-title { font-size: 0.7em; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid #1a1a2a; padding-bottom: 8px; }
.viewport-container { display: flex; width: 100vw; height: 100vh; }
.viewport { flex: 1; position: relative; border-right: 1px solid #1a1a2a; }
.tag { position: absolute; top: 15px; left: 15px; font-size: 0.6em; color: #555; }
.btn { width: 100%; padding: 12px; background: #111; color: #444; border: 1px solid #222; border-radius: 6px; 
       font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.3s; text-transform: uppercase; font-size: 0.75em; }
.btn.active { background: var(--neon); color: #000; border-color: var(--neon); box-shadow: 0 0 15px rgba(0,240,255,0.3); }
.slider-box { margin-top: 15px; }
.slider-box label { display: block; font-size: 0.65em; color: #888; margin-bottom: 8px; }
input[type=range] { width: 100%; cursor: pointer; accent-color: var(--neon); }
video { display: none; }
</style>
</head>
<body>

<div class="control-deck">
    <div class="deck-title">VIBEMESH // COMMAND DECK</div>
    <button class="btn active" id="btn-init" onclick="initSystem()">1. Initialize HW</button>
    <button class="btn" id="btn-snap" onclick="captureInferredSurface()" disabled>2. Snap Surface</button>
    
    <div class="slider-box">
        <label id="label-inf">INFERENCE VOLUME: 0.25</label>
        <input type="range" id="inf-slider" min="0.05" max="0.8" step="0.01" value="0.25" oninput="updateInference(this.value)">
    </div>
    
    <div style="margin-top:20px; font-size:0.6em; color:#444;">BANDWIDTH: ~24 KB/s</div>
</div>

<div class="viewport-container">
    <div class="viewport" id="v-tx"><div class="tag">TX: OPTICS LIVE</div></div>
    <div class="viewport" id="v-rx"><div class="tag" style="color:var(--magenta)">RX: AMALGAMATED RECONSTRUCTION</div></div>
</div>

<video id="webcam" playsinline></video>

<script>
let localScene, remoteScene, latestLandmarks = null;
let captureCanvas, captureCtx;

// Custom Shader for "Amalgamated" Splats
const splatVertexShader = `
    attribute vec3 color;
    attribute float size;
    varying vec3 vColor;
    void main() {
        vColor = color;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const splatFragmentShader = `
    varying vec3 vColor;
    void main() {
        float r = distance(gl_PointCoord, vec2(0.5));
        if (r > 0.5) discard;
        float alpha = 1.0 - smoothstep(0.3, 0.5, r);
        gl_FragColor = vec4(vColor, alpha);
    }
`;

function buildNode(containerId, isReceiver) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, (window.innerWidth/2)/window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 4.5);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth/2, window.innerHeight);
    document.getElementById(containerId).appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(468 * 3);
    const colors = new Float32Array(468 * 3);
    const sizes = new Float32Array(468);
    
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const mat = new THREE.ShaderMaterial({
        uniforms: {},
        vertexShader: splatVertexShader,
        fragmentShader: splatFragmentShader,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);
    return { scene, camera, renderer, points, geo, pos, colors, sizes };
}

async function initSystem() {
    localScene = buildNode('v-tx', false);
    remoteScene = buildNode('v-rx', true);
    
    const video = document.getElementById('webcam');
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    video.srcObject = stream; video.play();

    captureCanvas = document.createElement('canvas');
    captureCanvas.width = 640; captureCanvas.height = 480;
    captureCtx = captureCanvas.getContext('2d');

    const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
    faceMesh.onResults(res => {
        if (!res.multiFaceLandmarks?.[0]) return;
        latestLandmarks = res.multiFaceLandmarks[0];
        updateFrame(localScene, latestLandmarks, false);
        updateFrame(remoteScene, latestLandmarks, true);
    });

    new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } }).start();

    requestAnimationFrame(function animate() {
        localScene.renderer.render(localScene.scene, localScene.camera);
        remoteScene.renderer.render(remoteScene.scene, remoteScene.camera);
        requestAnimationFrame(animate);
    });

    document.getElementById('btn-init').classList.remove('active');
    document.getElementById('btn-snap').disabled = false;
    document.getElementById('btn-snap').classList.add('active');
}

function updateFrame(node, lm, isRX) {
    const infValue = parseFloat(document.getElementById('inf-slider').value);
    for (let i = 0; i < 468; i++) {
        node.pos[i*3] = (lm[i].x - 0.5) * -5;
        node.pos[i*3+1] = (lm[i].y - 0.5) * -5;
        node.pos[i*3+2] = (lm[i].z * -5);
        
        // Dynamic size based on inference volume
        node.sizes[i] = isRX ? infValue : 0.05;

        // Default TX color (Cyan) vs RX (Inferred)
        if (!isRX) {
            node.colors[i*3] = 0.0; node.colors[i*3+1] = 0.94; node.colors[i*3+2] = 1.0;
        }
    }
    node.geo.attributes.position.needsUpdate = true;
    node.geo.attributes.size.needsUpdate = true;
    node.geo.attributes.color.needsUpdate = true;
}

function captureInferredSurface() {
    if (!latestLandmarks) return;
    const video = document.getElementById('webcam');
    captureCtx.drawImage(video, 0, 0, 640, 480);
    const pixelData = captureCtx.getImageData(0, 0, 640, 480).data;

    for (let i = 0; i < 468; i++) {
        const px = Math.floor(latestLandmarks[i].x * 640);
        const py = Math.floor(latestLandmarks[i].y * 480);
        const idx = (py * 640 + px) * 4;
        
        remoteScene.colors[i*3] = pixelData[idx] / 255;
        remoteScene.colors[i*3+1] = pixelData[idx+1] / 255;
        remoteScene.colors[i*3+2] = pixelData[idx+2] / 255;
    }
    document.getElementById('btn-snap').textContent = "Surface Inferred";
}

function updateInference(val) {
    document.getElementById('label-inf').textContent = `INFERENCE VOLUME: ${val}`;
}

window.addEventListener('resize', () => {
    [localScene, remoteScene].forEach(node => {
        node.renderer.setSize(window.innerWidth/2, window.innerHeight);
        node.camera.aspect = (window.innerWidth/2)/window.innerHeight;
        node.camera.updateProjectionMatrix();
    });
});
</script>
</body>
</html>
