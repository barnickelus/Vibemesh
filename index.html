<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>VibeMesh | Geometry in Time</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:monospace;overflow:hidden;width:100vw;height:100vh}

canvas{position:fixed;top:0;left:0;width:100%;height:100%}

/* ── HUD ── */
.hud{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:20px 24px;pointer-events:none;z-index:50;
}
.hud-left{display:flex;flex-direction:column;gap:8px;pointer-events:all}
.hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:all}

.btn{
  padding:9px 16px;background:rgba(0,0,0,.7);color:#333;
  border:1px solid #111;border-radius:5px;
  font-family:monospace;font-size:.65rem;letter-spacing:2px;
  cursor:pointer;transition:all .25s;text-transform:uppercase;
  backdrop-filter:blur(8px);
}
.btn:hover:not(:disabled){color:#00f0ff;border-color:rgba(0,240,255,.3);background:rgba(0,240,255,.04)}
.btn.on{color:#00f0ff;border-color:rgba(0,240,255,.5);background:rgba(0,240,255,.06);box-shadow:0 0 20px rgba(0,240,255,.1)}
.btn.snap-on{color:#ff00ff;border-color:rgba(255,0,255,.5);background:rgba(255,0,255,.06);box-shadow:0 0 20px rgba(255,0,255,.1)}
.btn:disabled{opacity:.25;cursor:not-allowed}

.sl-row{display:flex;align-items:center;gap:10px;pointer-events:all}
.sl-row label{font-size:.55rem;color:#333;letter-spacing:2px;text-transform:uppercase;min-width:100px}
.sl-row input{accent-color:#00f0ff;width:100px;cursor:pointer}
.sl-row span{font-size:.55rem;color:#00f0ff;min-width:32px;text-align:right}

.lore{
  position:fixed;top:0;left:0;right:0;
  padding:16px 24px;
  font-size:.5rem;color:#1a1a1a;letter-spacing:3px;text-transform:uppercase;
  pointer-events:none;z-index:50;line-height:2;
}
.stat{
  position:fixed;top:12px;right:24px;
  font-size:.5rem;color:#111;letter-spacing:2px;
  pointer-events:none;z-index:50;text-align:right;line-height:2;
}
.pip{
  position:fixed;bottom:20px;right:24px;
  width:60px;height:76px;border-radius:4px;overflow:hidden;
  border:1px solid #111;opacity:.4;z-index:60;
  transition:opacity .3s;
}
.pip:hover{opacity:.8}
.pip video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}

video{display:none}
</style>
</head>
<body>

<div class="lore" id="lore">
  geometry in time · stable knots · compressed · stretched · folded
</div>
<div class="stat" id="stat">
  — knots · — hz
</div>

<div class="hud">
  <div class="hud-left">
    <div style="display:flex;gap:8px">
      <button class="btn" id="btn-init" onclick="initSystem()">Init Optics</button>
      <button class="btn" id="btn-snap" onclick="snap()" disabled>Stabilise Field</button>
      <button class="btn" id="btn-live" onclick="toggleLive()" disabled>Live Knots</button>
    </div>

    <div class="sl-row">
      <label>Compression</label>
      <input type="range" min="0.5" max="8" step="0.1" value="3.5" id="sl-depth"
        oninput="depthScale=+this.value;document.getElementById('lbl-d').textContent=this.value">
      <span id="lbl-d">3.5</span>
    </div>
    <div class="sl-row">
      <label>Knot Density</label>
      <input type="range" min="1" max="4" step="1" value="3" id="sl-dens"
        oninput="setDensity(+this.value)">
      <span id="lbl-dens">3</span>
    </div>
    <div class="sl-row">
      <label>Pulse Rate</label>
      <input type="range" min="0" max="3" step="0.05" value="0.8" id="sl-pulse"
        oninput="pulseRate=+this.value;document.getElementById('lbl-p').textContent=this.value">
      <span id="lbl-p">0.8</span>
    </div>
    <div class="sl-row">
      <label>Field Opacity</label>
      <input type="range" min="0.1" max="1" step="0.05" value="0.85" id="sl-op"
        oninput="fieldOpacity=+this.value;document.getElementById('lbl-op').textContent=this.value">
      <span id="lbl-op">0.85</span>
    </div>
  </div>
  <div class="hud-right">
    <!-- mode toggles -->
    <div style="display:flex;gap:6px">
      <button class="btn on"  id="mb-knots"  onclick="setView('knots')">Knots</button>
      <button class="btn"     id="mb-field"  onclick="setView('field')">Field</button>
      <button class="btn"     id="mb-fabric" onclick="setView('fabric')">Fabric</button>
    </div>
  </div>
</div>

<div class="pip"><video id="pipVid" autoplay muted playsinline></video></div>
<video id="camFeed" autoplay muted playsinline></video>

<script>
'use strict';

// ════════════════════════════════════════════════
//  MEDIAPIPE TESSELLATION
//  ~460 triangles from the face mesh
// ════════════════════════════════════════════════
const TESS = [
  [127,34,139],[11,0,37],[232,231,120],[72,37,39],[128,121,47],[232,120,100],
  [213,215,138],[149,170,176],[209,198,92],[2,94,141],[49,64,98],[173,139,247],

  [356,389,251],[389,356,454],[10,109,67],[10,67,54],[10,54,21],[10,21,162],

  [10,172,136],[10,136,150],[10,150,149],[10,149,176],[10,176,148],[10,148,152],
  [10,152,377],[10,377,400],[10,400,378],[10,378,379],[10,379,365],[10,365,397],

  [33,7,163],[163,144,33],[33,144,145],[145,153,33],[153,154,33],[33,154,155],
  [155,133,33],[33,133,246],[246,161,33],[33,161,160],[160,159,33],[33,159,158],
  [158,157,33],[157,173,33],[33,173,133],
  [263,249,390],[390,373,263],[263,373,374],[374,380,263],[263,380,381],[381,382,263],
  [382,362,263],[263,362,466],[466,388,263],[263,388,387],[387,386,263],[263,386,385],
  [385,384,263],[384,398,263],[263,398,362],
  [0,267,269],[269,270,267],[270,409,267],[409,291,267],[291,375,267],
  [375,321,267],[321,405,267],[405,314,267],[314,17,267],[17,84,267],
  [84,181,267],[181,91,267],[91,146,267],[146,61,267],[61,185,267],
  [185,40,267],[40,39,267],[39,37,267],[37,0,267],
  [78,95,88],[95,78,191],[191,80,95],[80,81,95],[81,82,95],[82,13,95],
  [13,312,95],[312,311,95],[311,310,95],[310,415,95],[415,308,95],[308,324,95],
  [324,318,95],[318,402,95],[402,317,95],[317,14,95],[14,87,95],[87,178,95],
  [178,88,95],
  [454,323,361],[323,454,356],[234,127,162],[127,234,93],[93,132,127],
  [58,132,172],[172,149,148],[148,152,149],[152,148,377],[377,378,148],
  [378,400,148],[400,379,148],[379,365,148],[365,397,148],[397,288,148],
  [288,361,148],[361,454,148],
  [356,389,251],[389,251,284],[251,284,332],[284,332,297],[332,297,338],
  [356,454,323],[454,323,361],[323,361,288],[361,288,397],[288,397,365],
  [397,365,379],[365,379,378],[379,378,400],[378,400,377],[400,377,152],
  [377,152,148],[152,148,176],[148,176,149],[176,149,150],[149,150,136],
  [150,136,172],[136,172,58],[172,58,132],[58,132,93],[132,93,234],
  [93,234,127],[234,127,162],[127,162,21],[162,21,54],[21,54,103],
  [54,103,67],[103,67,109],[67,109,10],
  [33,246,161],[246,161,160],[161,160,159],[160,159,158],[159,158,157],
  [158,157,173],[157,173,133],[173,133,155],[133,155,154],[155,154,153],
  [154,153,145],[153,145,144],[145,144,163],[144,163,7],[163,7,33],
  [263,466,388],[466,388,387],[388,387,386],[387,386,385],[386,385,384],
  [385,384,398],[384,398,362],[398,362,382],[362,382,381],[382,381,380],
  [381,380,374],[380,374,373],[374,373,390],[373,390,249],[390,249,263],
];

// ════════════════════════════════════════════════
//  KNOT VERTEX SHADER
//  Each point is a temporal knot.
//  Compression (depth) drives size and pulse amplitude.
//  The ring pattern in fragment shader = orbital structure.
// ════════════════════════════════════════════════
const KNOT_VERT = `
  attribute vec3  aCol;       // face RGB color
  attribute float aComp;      // compression: 0=recessed 1=forward
  attribute float aPhase;     // per-knot phase offset for async pulsing
  attribute float aIsCent;    // 1=centroid(inferred) 0=landmark

  varying vec3  vCol;
  varying float vComp;
  varying float vIsCent;
  varying float vPhase;

  uniform float uTime;
  uniform float uPulse;
  uniform float uOpacity;

  void main(){
    vCol    = aCol;
    vComp   = aComp;
    vIsCent = aIsCent;
    vPhase  = aPhase;

    // Position pulse — knot breathes slightly in Z
    vec3 pos = position;
    pos.z += sin(uTime * uPulse + aPhase) * 0.012 * aComp;

    vec4 mv = modelViewMatrix * vec4(pos, 1.0);

    // Size: compressed knots are tighter/smaller when recessed,
    //       larger when forward (they've stabilised more strongly)
    float baseSize = aIsCent > 0.5 ? 180.0 : 280.0;
    float pulse    = 1.0 + sin(uTime * uPulse * 1.3 + aPhase * 2.1) * 0.25 * aComp;
    gl_PointSize   = (baseSize * aComp * pulse + 40.0) / -mv.z;
    gl_Position    = projectionMatrix * mv;
  }
`;

const KNOT_FRAG = `
  varying vec3  vCol;
  varying float vComp;
  varying float vIsCent;
  varying float vPhase;

  uniform float uTime;
  uniform float uPulse;
  uniform float uOpacity;

  void main(){
    vec2  uv = gl_PointCoord - 0.5;  // [-0.5, 0.5]
    float d  = length(uv);
    if(d > 0.5) discard;

    // ── KNOT PATTERN ──
    // Each point renders as concentric orbital rings —
    // the "stable structure" of compressed time.
    // Ring count driven by compression (forward = more rings = more stable)

    float rings = 3.0 + vComp * 4.0;  // 3–7 rings based on compression
    float r     = d * 2.0;            // 0 at center, 1 at edge

    // Ring pattern: bright bands at periodic radii
    float ring  = abs(sin(r * rings * 3.14159));
    ring        = pow(ring, 2.5 + vComp * 2.0);  // sharper rings when more compressed

    // Pulse — rings breathe
    float pulse = 1.0 + sin(uTime * uPulse + vPhase) * 0.15;

    // Core glow — compressed knots have a bright hot centre
    float core  = exp(-d * d * 80.0) * vComp;

    // Color:
    // Landmark (○): actual face color, brightened by compression
    // Centroid (△): interpolated color, slightly shifted toward field freq
    vec3 col = vCol;
    if(vIsCent > 0.5){
      // Centroids are slightly cooler, more transparent — they're emergent
      col = mix(col, col * 0.7 + vec3(0.0, 0.15, 0.2), 0.3);
    }

    // Depth→brightness: forward knots are more energetic
    col *= (0.4 + vComp * 0.6);

    // Final: ring structure + core
    float alpha = (ring * (0.4 + vComp*0.5) + core) * uOpacity * pulse;
    alpha      *= smoothstep(0.5, 0.35, d); // soft edge falloff

    if(alpha < 0.01) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

// ════════════════════════════════════════════════
//  FIELD SHADER (secondary mode — shows connections)
// ════════════════════════════════════════════════
const FIELD_FRAG = `
  varying vec3  vCol;
  varying float vComp;
  varying float vIsCent;
  varying float vPhase;

  uniform float uTime;
  uniform float uPulse;
  uniform float uOpacity;

  void main(){
    vec2  uv = gl_PointCoord - 0.5;
    float d  = length(uv);
    if(d > 0.5) discard;

    // Field mode: each knot shows as a soft gaussian blob
    // revealing the underlying density field
    float blob = exp(-d*d * (12.0 + vComp * 20.0));
    blob *= 1.0 + sin(uTime*uPulse + vPhase)*0.2;

    vec3 col = vCol * (0.3 + vComp * 0.7);
    float alpha = blob * uOpacity;
    if(alpha < 0.005) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

// ════════════════════════════════════════════════
//  FABRIC SHADER (third mode — fabric of spacetime)
// ════════════════════════════════════════════════
const FABRIC_FRAG = `
  varying vec3  vCol;
  varying float vComp;
  varying float vIsCent;
  varying float vPhase;

  uniform float uTime;
  uniform float uPulse;
  uniform float uOpacity;

  void main(){
    vec2  uv = gl_PointCoord - 0.5;
    float d  = length(uv);
    if(d > 0.5) discard;

    // Fabric mode: rectangular cell-like structure
    // simulates the woven geometry of compressed time
    float cell = max(abs(uv.x), abs(uv.y)) * 2.0;
    float edge = abs(sin(cell * 3.14159 * (2.0 + vComp*3.0)));
    edge = pow(edge, 1.5);

    float core = exp(-d*d*60.0)*vComp;
    float alpha = (edge*0.6 + core) * uOpacity;
    alpha *= smoothstep(0.5, 0.3, d);

    vec3 col = mix(vCol, vec3(0.0,0.4,0.5), 0.2*(1.0-vComp));
    col *= 0.35 + vComp*0.65;

    if(alpha < 0.01) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

// ════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════
let depthScale   = 3.5;
let pulseRate    = 0.8;
let fieldOpacity = 0.85;
let densityStep  = 1;   // 1=all, 2=half, 3=third, 4=quarter triangles
let viewMode     = 'knots';
let liveColors   = false;

let latestLM  = null;
let snapColors = null;  // Float32Array r,g,b per landmark [468*3]

let captureCanvas, captureCtx;
let scene, camera, renderer;
let knotSystem = null;
let clock = new THREE.Clock();
let frameCount = 0, lastFPSt = Date.now();

// ════════════════════════════════════════════════
//  SCENE SETUP — full-viewport, dark, no background
// ════════════════════════════════════════════════
function initThree() {
  scene    = new THREE.Scene();
  camera   = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.01, 20);
  camera.position.z = 2.8;

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0, 0);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Render loop
  (function loop() {
    requestAnimationFrame(loop);
    const t = clock.getElapsedTime();

    // Subtle idle drift of the whole field
    if (knotSystem) {
      knotSystem.rotation.y = Math.sin(t*0.12) * 0.08;
      knotSystem.rotation.x = Math.sin(t*0.08) * 0.04;
      knotSystem.material.uniforms.uTime.value     = t;
      knotSystem.material.uniforms.uOpacity.value  = fieldOpacity;
      knotSystem.material.uniforms.uPulse.value    = pulseRate;
    }

    renderer.render(scene, camera);

    frameCount++;
    const now = Date.now();
    if (now - lastFPSt > 1000) {
      if (latestLM) document.getElementById('stat').textContent =
        `${latestLM.length + TESS.length} knots · ${frameCount} hz`;
      frameCount = 0; lastFPSt = now;
    }
  })();
}

// ════════════════════════════════════════════════
//  BUILD KNOT SYSTEM
//  All points in one BufferGeometry — landmarks + centroids
// ════════════════════════════════════════════════
function buildKnotSystem(lm, colors) {
  if (knotSystem) { scene.remove(knotSystem); knotSystem.geometry.dispose(); knotSystem.material.dispose(); }

  const nLM    = lm.length;
  const tris   = TESS.filter((_,i) => i % densityStep === 0);
  const nTri   = tris.length;
  const total  = nLM + nTri;

  const pos    = new Float32Array(total * 3);
  const col    = new Float32Array(total * 3);
  const comp   = new Float32Array(total);     // compression 0–1
  const phase  = new Float32Array(total);     // async pulse phase
  const isCent = new Float32Array(total);     // 0=landmark 1=centroid

  // Z range for normalisation — deeper = less compressed
  let zMin=Infinity, zMax=-Infinity;
  for (let i=0; i<nLM; i++) {
    if (lm[i].z < zMin) zMin = lm[i].z;
    if (lm[i].z > zMax) zMax = lm[i].z;
  }
  const zRange = Math.max(0.001, zMax - zMin);

  const AR = window.innerHeight / window.innerWidth;

  // ── Landmarks ──
  for (let i=0; i<nLM; i++) {
    pos[i*3  ] = (0.5 - lm[i].x) * 4.0;
    pos[i*3+1] = (0.5 - lm[i].y) * 4.0 * AR;
    pos[i*3+2] = (lm[i].z - zMin) / zRange * depthScale - depthScale*0.5;

    col[i*3  ] = colors ? colors[i*3  ] : 0;
    col[i*3+1] = colors ? colors[i*3+1] : 0.6 + (1-(lm[i].z-zMin)/zRange)*0.4;
    col[i*3+2] = colors ? colors[i*3+2] : 0.7 + (1-(lm[i].z-zMin)/zRange)*0.3;

    // Compression: forward (nose) = 1.0, recessed = 0.0
    comp[i]  = 1.0 - (lm[i].z - zMin) / zRange;
    phase[i] = (i * 0.618033) % (Math.PI * 2); // golden ratio phase distribution
    isCent[i] = 0;
  }

  // ── Centroids (inferred knots) ──
  for (let t=0; t<nTri; t++) {
    const [a,b,c] = tris[t];
    if (a >= nLM || b >= nLM || c >= nLM) continue;
    const idx = nLM + t;

    // Position = centroid of 3 parent landmarks
    pos[idx*3  ] = (pos[a*3  ] + pos[b*3  ] + pos[c*3  ]) / 3;
    pos[idx*3+1] = (pos[a*3+1] + pos[b*3+1] + pos[c*3+1]) / 3;
    pos[idx*3+2] = (pos[a*3+2] + pos[b*3+2] + pos[c*3+2]) / 3;

    // Color = barycentric interpolation of 3 parent vertex colors
    col[idx*3  ] = (col[a*3  ] + col[b*3  ] + col[c*3  ]) / 3;
    col[idx*3+1] = (col[a*3+1] + col[b*3+1] + col[c*3+1]) / 3;
    col[idx*3+2] = (col[a*3+2] + col[b*3+2] + col[c*3+2]) / 3;

    // Centroid compression = average of parents (emergent stability)
    comp[idx]  = (comp[a] + comp[b] + comp[c]) / 3;
    // Slightly offset phase so centroids pulse out-of-sync with parents
    phase[idx] = ((a + b + c) * 0.23) % (Math.PI * 2);
    isCent[idx] = 1;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,    3));
  geo.setAttribute('aCol',     new THREE.Float32BufferAttribute(col,    3));
  geo.setAttribute('aComp',    new THREE.Float32BufferAttribute(comp,   1));
  geo.setAttribute('aPhase',   new THREE.Float32BufferAttribute(phase,  1));
  geo.setAttribute('aIsCent',  new THREE.Float32BufferAttribute(isCent, 1));

  // Choose fragment shader by view mode
  const fragShader = viewMode === 'field'  ? FIELD_FRAG
                   : viewMode === 'fabric' ? FABRIC_FRAG
                   : KNOT_FRAG;

  const mat = new THREE.ShaderMaterial({
    vertexShader:   KNOT_VERT,
    fragmentShader: fragShader,
    transparent:    true,
    depthWrite:     false,
    blending:       THREE.AdditiveBlending,
    uniforms: {
      uTime:    { value: 0 },
      uPulse:   { value: pulseRate },
      uOpacity: { value: fieldOpacity },
    },
  });

  knotSystem = new THREE.Points(geo, mat);
  scene.add(knotSystem);
}

// ════════════════════════════════════════════════
//  CAPTURE — sample face colors from video
// ════════════════════════════════════════════════
function snap() {
  if (!latestLM) return;
  const lm  = latestLM;
  const vid = document.getElementById('camFeed');

  captureCtx.save();
  captureCtx.translate(640, 0); captureCtx.scale(-1, 1); // mirror
  captureCtx.drawImage(vid, 0, 0, 640, 480);
  captureCtx.restore();

  const px = captureCtx.getImageData(0, 0, 640, 480).data;
  snapColors = new Float32Array(lm.length * 3);

  for (let i=0; i<lm.length; i++) {
    const x   = Math.min(639, Math.max(0, Math.floor(lm[i].x * 640)));
    const y   = Math.min(479, Math.max(0, Math.floor(lm[i].y * 480)));
    const idx = (y * 640 + x) * 4;
    snapColors[i*3  ] = px[idx  ] / 255;
    snapColors[i*3+1] = px[idx+1] / 255;
    snapColors[i*3+2] = px[idx+2] / 255;
  }

  buildKnotSystem(latestLM, snapColors);
  document.getElementById('btn-snap').classList.add('snap-on');
  document.getElementById('btn-snap').textContent = 'Re-Stabilise';
  document.getElementById('btn-live').disabled = false;
  document.getElementById('lore').textContent =
    'structure · where imbalance stabilises · geometry in time';
}

function toggleLive() {
  liveColors = !liveColors;
  const btn = document.getElementById('btn-live');
  btn.textContent = liveColors ? 'Live: On' : 'Live Knots';
  btn.className   = liveColors ? 'btn on' : 'btn';
}

// ════════════════════════════════════════════════
//  VIEW MODE
// ════════════════════════════════════════════════
function setView(v) {
  viewMode = v;
  ['knots','field','fabric'].forEach(id =>
    document.getElementById('mb-'+id)?.classList.toggle('on', id===v));
  if (latestLM) buildKnotSystem(latestLM, snapColors);
}

function setDensity(v) {
  densityStep = v;
  document.getElementById('lbl-dens').textContent = v;
  if (latestLM) buildKnotSystem(latestLM, snapColors);
}

// ════════════════════════════════════════════════
//  MEDIAPIPE
// ════════════════════════════════════════════════
async function initSystem() {
  const btn = document.getElementById('btn-init');
  btn.textContent = 'Init…'; btn.disabled = true;

  initThree();

  captureCanvas = document.createElement('canvas');
  captureCanvas.width = 640; captureCanvas.height = 480;
  captureCtx = captureCanvas.getContext('2d');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{width:640,height:480,facingMode:'user'}, audio:false
    });

    document.getElementById('pipVid').srcObject   = stream;
    document.getElementById('camFeed').srcObject  = stream;
    await document.getElementById('camFeed').play();

    const fm = new FaceMesh({
      locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    fm.setOptions({
      maxNumFaces:1, refineLandmarks:false,
      minDetectionConfidence:0.6, minTrackingConfidence:0.6
    });
    fm.onResults(res => {
      if (!res.multiFaceLandmarks?.[0]) return;
      latestLM = res.multiFaceLandmarks[0];
      if (liveColors) {
        // Full re-snap every frame in live mode
        snap();
      } else if (knotSystem && knotSystem.geometry) {
        // Just update positions — keep snapped colors
        updatePositions(latestLM);
      } else {
        // First frame before snap: show cyan knots (no color)
        buildKnotSystem(latestLM, null);
      }
    });

    new Camera(document.getElementById('camFeed'), {
      onFrame: async()=>{ await fm.send({image:document.getElementById('camFeed')}); },
      width:640, height:480,
    }).start();

    btn.textContent = 'Optics Live'; btn.classList.add('on'); btn.disabled = false;
    document.getElementById('btn-snap').disabled = false;
    document.getElementById('lore').textContent =
      'atoms aren't particles · stable knots in time · where imbalance stabilises';

  } catch(e) {
    console.error(e);
    btn.textContent = 'Optic Failure'; btn.disabled = false;
  }
}

// ════════════════════════════════════════════════
//  LIVE POSITION UPDATE (without rebuilding geometry)
//  Smoothly lerps landmark positions toward live data
// ════════════════════════════════════════════════
const LERP = 0.3;
function updatePositions(lm) {
  if (!knotSystem) return;
  const posAttr = knotSystem.geometry.attributes.position;
  const arr     = posAttr.array;
  const AR      = window.innerHeight / window.innerWidth;
  const nLM     = lm.length;
  const tris    = TESS.filter((_,i) => i % densityStep === 0);

  // Compute Z range from live landmarks
  let zMin=Infinity, zMax=-Infinity;
  for (let i=0; i<nLM; i++) {
    if (lm[i].z < zMin) zMin=lm[i].z;
    if (lm[i].z > zMax) zMax=lm[i].z;
  }
  const zRange = Math.max(0.001, zMax-zMin);

  // Update landmark positions
  for (let i=0; i<nLM && i*3+2 < arr.length; i++) {
    const tx = (0.5 - lm[i].x) * 4.0;
    const ty = (0.5 - lm[i].y) * 4.0 * AR;
    const tz = (lm[i].z - zMin) / zRange * depthScale - depthScale*0.5;
    arr[i*3  ] += (tx - arr[i*3  ]) * LERP;
    arr[i*3+1] += (ty - arr[i*3+1]) * LERP;
    arr[i*3+2] += (tz - arr[i*3+2]) * LERP;
  }

  // Update centroid positions from updated landmark positions
  for (let t=0; t<tris.length; t++) {
    const [a,b,c] = tris[t];
    if (a>=nLM||b>=nLM||c>=nLM) continue;
    const idx = nLM + t;
    if (idx*3+2 >= arr.length) continue;
    arr[idx*3  ] = (arr[a*3  ] + arr[b*3  ] + arr[c*3  ]) / 3;
    arr[idx*3+1] = (arr[a*3+1] + arr[b*3+1] + arr[c*3+1]) / 3;
    arr[idx*3+2] = (arr[a*3+2] + arr[b*3+2] + arr[c*3+2]) / 3;
  }

  posAttr.needsUpdate = true;

  // Update compression values from live Z
  const compAttr = knotSystem.geometry.attributes.aComp;
  const compArr  = compAttr.array;
  for (let i=0; i<nLM && i < compArr.length; i++) {
    const targetComp = 1.0 - (lm[i].z - zMin) / zRange;
    compArr[i] += (targetComp - compArr[i]) * LERP;
  }
  compAttr.needsUpdate = true;
}
</script>
