<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeMesh | Bioluminescent Recon</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .panel { pointer-events: auto; background: rgba(0, 5, 5, 0.9); border: 1px solid #00ffcc; padding: 20px; width: 280px; color: #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        button { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 12px; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; transition: 0.3s; }
        button.active { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        video { position: fixed; bottom: 10px; right: 10px; width: 150px; opacity: 0.3; transform: scaleX(-1); border: 1px solid #333; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="ui">
        <div class="panel">
            <h1>VIBEMESH // SKIN_V4</h1>
            <p>STATUS: <span id="status">INIT_SEARCHING</span></p>
            <p>PACKET_SYNC: <span id="packet-indicator">OFFLINE</span></p>
            <button id="connectBtn">Connect Spatial Ledger</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. CHUCK CLOSE OPTICAL BLENDING SHADER ---
        const fShader = `
            uniform sampler2D uVideoTexture;
            uniform float uTime;
            varying vec2 vFaceUv; 
            varying vec3 vNormal;

            void main() {
                vec2 uv = vFaceUv;
                vec3 baseColor = texture2D(uVideoTexture, uv).rgb;
                float lum = dot(baseColor, vec3(0.299, 0.587, 0.114));

                // Chuck Close Logic: Concentric rings based on luminance
                vec2 grid = fract(uv * 110.0) - 0.5;
                float d = length(grid);
                
                // Optical Vibration: Shift rings with aggressive offsets
                float rings = floor(lum * 9.0); // Up to 9 nested shapes
                float ringStep = 0.45 / max(rings, 1.0);
                float mask = 0.0;
                
                for(float i=0.0; i<9.0; i++) {
                    if(i < rings) {
                        float r = (i + 1.0) * ringStep;
                        // Oscillating color ratios for "vibration"
                        float vibration = sin(uTime * 2.0 + i) * 0.1;
                        if(d < r + vibration) mask = (mod(i, 2.0) == 0.0) ? 1.0 : 0.4;
                    }
                }

                // Bioluminescent "Squid" Glow
                vec3 editorialGlow = mix(vec3(0.0, 0.1, 0.1), baseColor, mask);
                float light = max(dot(vNormal, vec3(0.5, 1.0, 0.5)), 0.3);
                
                gl_FragColor = vec4(editorialGlow * (light + 0.5), 1.0);
            }
        `;

        // --- 2. SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video);
        
        // Complex Subdivision (256x256) for smooth Living Clay warping
        const geometry = new THREE.SphereGeometry(2.6, 256, 256);
        const originalPos = geometry.attributes.position.clone();
        const faceUvAttr = new Float32Array(geometry.attributes.position.count * 2);
        geometry.setAttribute('vFaceUv', new THREE.BufferAttribute(faceUvAttr, 2));

        const material = new THREE.ShaderMaterial({
            vertexShader: `
                attribute vec2 vFaceUv;
                varying vec2 vFaceUvVar;
                varying vec3 vNormal;
                void main() {
                    vFaceUvVar = vFaceUv;
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `.replace('vFaceUvVar', 'vFaceUv'),
            fragmentShader: fShader,
            uniforms: { uVideoTexture: { value: videoTex }, uTime: { value: 0 } }
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        camera.position.z = 7;

        // --- 3. RECONSTRUCTION ENGINE ---
        let landmarks = null;
        let isConnected = false;
        const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults((res) => { if (res.multiFaceLandmarks) landmarks = res.multiFaceLandmarks[0]; });

        new Camera(video, { onFrame: async () => { await faceMesh.send({ image: video }); }, width: 640, height: 480 }).start();

        function updateMesh() {
            if (!isConnected || !landmarks) return;
            const pos = geometry.attributes.position;
            const uvAttr = geometry.attributes.vFaceUv;
            const sigmaSq = 0.005; // Tight Gaussian for elasticity

            // 12 Core Structural Anchors
            const anchors = [1, 10, 152, 33, 263, 61, 291, 199, 4, 454, 234, 103];

            for (let i = 0; i < pos.count; i++) {
                let v = new THREE.Vector3(originalPos.getX(i), originalPos.getY(i), originalPos.getZ(i));
                let totalW = 0;
                let agg = new THREE.Vector3(0,0,0);
                let uvAgg = new THREE.Vector2(0,0);

                anchors.forEach(idx => {
                    const lm = landmarks[idx];
                    const target = new THREE.Vector3((lm.x-0.5)*-6.5, (lm.y-0.5)*-7.5, (0.5-lm.z)*5.5);
                    const dSq = v.distanceToSquared(target);
                    const w = Math.exp(-dSq / (2.0 * sigmaSq));
                    
                    if (w > 0.001) {
                        agg.addScaledVector(target, w);
                        uvAgg.addScaledVector(new THREE.Vector2(lm.x, lm.y), w);
                        totalW += w;
                    }
                });

                if (totalW > 0) {
                    v.lerp(agg.divideScalar(totalW), 0.9);
                    const finalUv = uvAgg.divideScalar(totalW);
                    uvAttr.setXY(i, 1.0 - finalUv.x, finalUv.y); 
                }
                pos.setXYZ(i, v.x, v.y, v.z);
            }
            pos.needsUpdate = true;
            uvAttr.needsUpdate = true;
            geometry.computeVertexNormals();
        }

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value = performance.now() * 0.001;
            updateMesh();
            renderer.render(scene, camera);
        }

        document.getElementById('connectBtn').onclick = (e) => {
            isConnected = !isConnected;
            e.target.classList.toggle('active');
            document.getElementById('status').innerText = isConnected ? 'SPATIAL_SYNC_ACTIVE' : 'IDLE';
        };

        animate();
    </script>
</body>
</html>
