<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeMesh — Shore Edition</title>
  <style>
    body { margin:0; background:#0a0a1f; color:#fff; font-family:sans-serif; height:100vh; display:flex; align-items:center; justify-content:center; }
    .dashboard { padding:20px; max-width:90%; text-align:center; }
    h1 { background:linear-gradient(90deg,#00f0ff,#ff00aa); -webkit-background-clip:text; color:transparent; font-size:2.5em; }
    .preview { font-size:6em; margin:30px 0; }
    .controls { background:#111; padding:20px; border-radius:12px; }
    button { width:100%; padding:20px; font-size:1.8em; margin:15px 0; background:linear-gradient(#ff00aa,#00f0ff); border:none; border-radius:12px; color:#000; cursor:pointer; }
    input[type=range] { width:100%; margin:10px 0; }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>🏖️ VibeMesh v1.4 — Shore Live 🔥</h1>
    <div class="preview">🦾👊</div>
    <p style="font-size:1.5em; color:#00ffcc;">3D Fist-Pump Avatar (placeholder)</p>
    <div class="controls">
      <label>Bandwidth: 450 kbps</label>
      <input type="range" min="5" max="900" value="450" />
      <label>Battery: 100%</label>
      <input type="range" min="1" max="100" value="100" />
      <button onclick="alert('Fist pump sent across the Shore! 👊')">SEND FIST PUMP</button>
      <p>Packets: 0 | Tier: AVATAR3D</p>
    </div>
    <p style="margin-top:20px; color:#888; font-size:0.9em;">
      Full 3D + voice clone loads when built — this is quick iPad preview!
    </p>
  </div>
</body>
</html>
