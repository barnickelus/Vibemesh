<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Protocol · v0.8 (Close Synthesis)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0908;--surface:#11100f;--border:#2a2622;--text:#e2dcd0;--accent:#d4af37}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;padding:20px;overflow:hidden}
header{text-align:center;margin-bottom:15px;z-index:10}
.title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:500;letter-spacing:.05em}
.title em{color:var(--accent);font-style:italic}
.stage{display:flex;gap:20px;align-items:flex-start}
.frame-wrap{position:relative;background:#000;border:1px solid var(--border);box-shadow:0 20px 50px rgba(0,0,0,0.8)}
#display{display:block;width:520px;height:640px}
#overlay{position:absolute;inset:0;background:rgba(10,9,8,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;transition:opacity 1s}
#overlay.gone{opacity:0;pointer-events:none}
.right-col{width:180px;display:flex;flex-direction:column;gap:12px}
.panel{border:1px solid var(--border);padding:10px;background:var(--surface);font-size:.5rem;text-transform:uppercase;letter-spacing:.1em;color:#666}
.panel b{color:var(--accent);display:block;margin-bottom:4px}
.pip-wrap{position:relative;border:1px solid var(--border);height:130px;overflow:hidden;background:#000}
#pipCvs{width:100%;height:100%;transform:scaleX(-1)}
</style>
</head>
<body>

<header>
  <h1 class="title">Optical <em>Synthesis</em> v0.8</h1>
</header>

<div class="stage">
  <div class="frame-wrap">
    <canvas id="display" width="520" height="640"></canvas>
    <div id="overlay">
      <div style="font-family:'Cormorant Garamond';font-size:1.5rem;color:var(--accent);margin-bottom:10px">Calibrating Realism...</div>
      <div id="statusText" style="font-size:.5rem;color:#555">Sampling Texture & Palette</div>
    </div>
  </div>

  <div class="right-col">
    <div class="pip-wrap"><canvas id="pipCvs" width="180" height="130"></canvas></div>
    <div class="panel"><b>Engine</b>Tier 02 Synthesis</div>
    <div class="panel"><b>Grid</b>Tilted 45° Mosaic</div>
    <div class="panel"><b>Likeness</b>Video Projection</div>
  </div>
</div>

<video id="vid" playsinline muted autoplay style="display:none"></video>
<canvas id="glCanvas" width="520" height="640" style="display:none"></canvas>

<script>
'use strict';
const W=520, H=640, STEP=10; 
let lms=null, phase='calib', calibFrames=0;
let pose={p:0, y:0, r:0};

// --- THREE.JS SETUP ---
const glCanvas=document.getElementById('glCanvas'), renderer=new THREE.WebGLRenderer({canvas:glCanvas, antialias:true, alpha:true});
renderer.setSize(W,H);
const scene=new THREE.Scene(), cam3=new THREE.PerspectiveCamera(30,W/H,0.1,100);
cam3.position.z=4.5;

const ftCvs=document.createElement('canvas'); ftCvs.width=1024; ftCvs.height=1024;
const ftCtx=ftCvs.getContext('2d'), faceTex=new THREE.CanvasTexture(ftCvs);
// Use a slightly flatter sphere to prevent "egg head" distortion
const headMesh=new THREE.Mesh(new THREE.SphereGeometry(1,64,64), new THREE.MeshPhongMaterial({map:faceTex, shininess:2}));
headMesh.scale.set(1.15, 1.4, 0.85); 
scene.add(headMesh);
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

// --- MOSAIC ENGINE (The Chuck Close Logic) ---
const display=document.getElementById('display'), dCtx=display.getContext('2d');
const pixels=new Uint8Array(W*H*4);

function applyMosaic() {
  renderer.getContext().readPixels(0,0,W,H,0x1908,0x1401,pixels);
  dCtx.fillStyle='#0a0908'; dCtx.fillRect(0,0,W,H);
  
  // Tilted Grid Math: Rotate coordinates by 45 degrees
  const cos=Math.cos(Math.PI/4), sin=Math.sin(Math.PI/4);
  
  for(let y=-H; y<H*1.5; y+=STEP){
    for(let x=-W; x<W*1.5; x+=STEP){
      // Project tilted grid back to screen space
      const screenX = (x * cos - y * sin) + W/2;
      const screenY = (x * sin + y * cos) + H/2;
      
      if(screenX < 0 || screenX >= W || screenY < 0 || screenY >= H) continue;

      const fy=H-1-(screenY|0), i=(fy*W+(screenX|0))*4;
      if(pixels[i+3]<20) continue;

      const r=pixels[i], g=pixels[i+1], b=pixels[i+2];
      
      dCtx.save();
      dCtx.translate(screenX, screenY);
      dCtx.rotate(Math.PI/4); // Rotate individual cell
      
      // Layer 1: Base wash (Painterly jitter)
      dCtx.fillStyle=`rgb(${r+10},${g-5},${b-10})`;
      dCtx.fillRect(-STEP/2, -STEP/2, STEP-0.5, STEP-0.5);
      
      // Layer 2: The "Donut" Shape (Opposing tone for optical blending)
      dCtx.beginPath();
      dCtx.ellipse(0,0, STEP*0.35, STEP*0.25, Math.random(), 0, Math.PI*2);
      dCtx.fillStyle=`rgba(${r-20},${g+15},${b+30},0.6)`;
      dCtx.fill();
      
      // Layer 3: The Nucleus (The sharp detail)
      dCtx.beginPath();
      dCtx.arc((Math.random()-.5)*2, (Math.random()-.5)*2, STEP*0.12, 0, Math.PI*2);
      dCtx.fillStyle=`rgb(${r},${g},${b})`;
      dCtx.fill();
      
      dCtx.restore();
    }
  }
}

function updateTexture() {
  const ctx=ftCtx; ctx.clearRect(0,0,1024,1024);
  if(!lms) return;

  ctx.save();
  // Projection Mapping: Project the VIDEO directly onto the 3D UV space
  // This captures the user's actual nose, eyes, hair, and beard perfectly.
  ctx.translate(512, 512);
  ctx.scale(2.2, 2.2); // Scale to fit head mesh
  ctx.translate(-320, -240); // Center video
  ctx.drawImage(vid, 0, 0, 640, 480);
  ctx.restore();
}

function loop(){
  updateTexture(); faceTex.needsUpdate=true;
  // Improved tracking alignment
  headMesh.rotation.set(pose.p, -Math.PI/2 + pose.y, pose.r);
  renderer.render(scene,cam3);
  applyMosaic();
  requestAnimationFrame(loop);
}

function onResults(res){
  const pipCvs=document.getElementById('pipCvs'), pCtx=pipCvs.getContext('2d');
  pCtx.drawImage(vid, 0, 0, 180, 130);
  
  if(!res.multiFaceLandmarks?.length) return;
  lms=res.multiFaceLandmarks[0];

  if(phase==='calib'){
    calibFrames++;
    if(calibFrames > 30){
      phase='live'; document.getElementById('overlay').classList.add('gone');
    }
  }

  // Precision tracking math
  const top=lms[10], chin=lms[152], nose=lms[1], lE=lms[33], rE=lms[263];
  const midX = (lE.x + rE.x)/2;
  
  // Fixed Pitch/Yaw mapping to align mesh with texture
  pose.p = (chin.z - top.z) * 4.5;
  pose.y = (nose.x - midX) * -3.8;
  pose.r = (rE.y - lE.y) * 0.8;
}

async function init(){
  const faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.6});
  faceMesh.onResults(onResults);
  const cam=new Camera(document.getElementById('vid'),{onFrame:async()=>await faceMesh.send({image:vid}), width:640, height:480});
  cam.start();
  loop();
}
init();
</script>
</body>
</html>
