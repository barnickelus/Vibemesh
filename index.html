<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Protocol</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0908;--surface:#121110;--border:#252220;--text:#e8e2d8;--muted:#4e4840;--accent:#c9a96e;--dk:#7a5c2e;--green:#6a9e6a}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 24px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 35%,#1a1510 0%,var(--bg) 70%);pointer-events:none;z-index:0}
header{position:relative;z-index:1;text-align:center;margin-bottom:10px}
.ey{font-size:.45rem;letter-spacing:.35em;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:500;letter-spacing:.06em}
h1 em{font-style:italic;color:var(--accent)}
.sub{font-size:.42rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:4px}
.stage{position:relative;z-index:1;display:flex;gap:12px;align-items:flex-start}
.wrap{position:relative}
.wrap::before,.wrap::after{content:'';position:absolute;width:10px;height:10px;z-index:3;pointer-events:none}
.wrap::before{top:0;left:0;border-top:2px solid var(--dk);border-left:2px solid var(--dk)}
.wrap::after{bottom:0;right:0;border-bottom:2px solid var(--dk);border-right:2px solid var(--dk)}
#display{display:block;border:1px solid var(--border)}
#ov{position:absolute;inset:0;background:rgba(10,9,8,.90);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;transition:opacity .5s}
#ov.gone{opacity:0;pointer-events:none}
.ovt{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--accent)}
.ovs{font-size:.44rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
#go{font-family:'JetBrains Mono',monospace;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;padding:8px 18px;cursor:pointer;background:var(--accent);border:none;color:var(--bg);font-weight:500}
#go:hover{opacity:.8}
#go:disabled{opacity:.4}
.cbar{width:140px;height:2px;background:var(--border);margin-top:2px}
#cf{height:100%;background:var(--accent);width:0%;transition:width .1s}
.stat{display:flex;justify-content:space-between;font-size:.42rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:0 2px;margin-top:3px}
.rc{width:170px;display:flex;flex-direction:column;gap:6px}
.pip{position:relative;border:1px solid var(--border);overflow:hidden}
#vid{display:block;width:170px;height:128px;object-fit:cover;transform:scaleX(-1)}
.bdg{position:absolute;top:3px;right:3px;font-size:.38rem;letter-spacing:.1em;text-transform:uppercase;padding:1px 3px;border:1px solid;z-index:2}
.bdg.w{color:var(--accent);border-color:var(--accent)}
.bdg.l{color:var(--green);border-color:var(--green)}
.pan{border:1px solid var(--border);padding:6px;background:var(--surface)}
.ph{font-size:.38rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dk);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.dot{width:4px;height:4px;border-radius:50%;background:var(--border)}
.dot.on{background:var(--green);animation:pu 1.8s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.pr{margin-bottom:3px}
.pl{font-size:.36rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;display:flex;justify-content:space-between}
.pv{color:var(--accent)}
.bt{height:2px;background:var(--border);position:relative}
.bf{height:100%;background:var(--dk);position:absolute;left:0;transition:width .06s}
.ar{font-size:.34rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}
.ar span{color:var(--accent)}
.ctrls{position:relative;z-index:1;margin-top:8px;display:flex;gap:6px}
.btn{font-family:'JetBrains Mono',monospace;font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 8px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer}
.btn:hover{border-color:var(--dk);color:var(--text)}
.btn.on{border-color:var(--green);color:var(--green)}
</style>
</head>
<body>
<header>
  <div class="ey">Vibe Protocol</div>
  <h1>Optical <em>Presence</em></h1>
  <div class="sub">3D photo mesh | Chuck Close grid | 36 bytes/frame</div>
</header>
<div class="stage">
  <div>
    <div class="wrap">
      <canvas id="display" width="480" height="580"></canvas>
      <div id="ov">
        <div class="ovt" id="ovt">Vibe Protocol</div>
        <div class="ovs" id="ovs">Camera access needed</div>
        <button id="go">Enable Camera</button>
        <div class="cbar" id="cbar2" style="display:none"><div id="cf"></div></div>
      </div>
    </div>
    <div class="stat"><span id="sp">Waiting</span><span id="st">--</span><span id="sx">--</span></div>
  </div>
  <div class="rc">
    <div class="pip"><video id="vid" playsinline muted></video><div class="bdg w" id="badge">Wait</div></div>
    <div class="pan">
      <div class="ph">Expression <div class="dot" id="pdot"></div></div>
      <div class="pr"><div class="pl">Mouth <span class="pv" id="vm">0.00</span></div><div class="bt"><div class="bf" id="bm"></div></div></div>
      <div class="pr"><div class="pl">Smile <span class="pv" id="vs2">0.00</span></div><div class="bt"><div class="bf" id="bs2"></div></div></div>
      <div class="pr"><div class="pl">Eyes <span class="pv" id="ve">1.00</span></div><div class="bt"><div class="bf" id="be"></div></div></div>
      <div class="pr"><div class="pl">Yaw <span class="pv" id="vy">0.00</span></div><div class="bt"><div class="bf" id="by2"></div></div></div>
      <div class="ar">Textures: <span id="ac">1</span> | <span id="ak">36</span> b/f</div>
    </div>
  </div>
</div>
<div class="ctrls">
  <button class="btn" id="recal">Recalibrate</button>
  <button class="btn on" id="gridBtn">Grid ON</button>
</div>

<script>
var CW=480,CH=580,VW=640,VH=480,CFRAMES=45,NL=468;
var OVAL=[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
var LK={N:1,CH:152,T:10,LE:33,RE:263,LT:159,LB:145,RT:386,RB:374,LBR:105,RBR:334,MT:13,MB:14,ML:61,MR:291};
function cl(v,a,b){return v<a?a:v>b?b:v;}
function lerp(a,b,t){return a+(b-a)*t;}

var phase='w',calCnt=0,calLM=null,browBL=null;
var vb={mo:0,mc:0,bl:0,eo:1},po={y:0,p:0,r:0},pBL={nr:0.55,yo:0};
var pal={sk:[170,135,110],hr:[50,38,28],bg:[35,30,25]};

// 3D mesh state
var headGroup=null,faceMesh=null,faceGeo=null;
var calPositions=null;   // Float32Array — calibration 3D positions
var calUVs=null;         // Float32Array — UV coords
var smoothPos=null;      // Float32Array — EMA smoothed live positions
var calFW=1,calFH=1;     // calibration normalization
var calFcx=0.5,calFcy=0.5;
var neutralTex=null;
var exTex=[],lastCap=0;
var gridOn=true;

// ═══ THREE.JS — two-pass rendering ═══
var display=document.getElementById('display');
var ren=new THREE.WebGLRenderer({canvas:display,antialias:true});
ren.setSize(CW,CH,false);ren.setClearColor(0x0a0908);

var scene=new THREE.Scene();
// Environment gradient background
var bgC=document.createElement('canvas');bgC.width=2;bgC.height=256;
var bx2=bgC.getContext('2d');var bgG=bx2.createLinearGradient(0,0,0,256);
bgG.addColorStop(0,'#1a1612');bgG.addColorStop(0.4,'#110f0d');bgG.addColorStop(1,'#080706');
bx2.fillStyle=bgG;bx2.fillRect(0,0,2,256);
scene.background=new THREE.CanvasTexture(bgC);

var cam=new THREE.PerspectiveCamera(28,CW/CH,0.1,100);
cam.position.set(0,-0.05,4.0);

// Lighting
scene.add(new THREE.AmbientLight(0xffe0c8,0.45));
var kl=new THREE.DirectionalLight(0xfff0e0,0.55);kl.position.set(-2,2.5,3);scene.add(kl);
var fl3=new THREE.DirectionalLight(0xc8d8f0,0.20);fl3.position.set(2,0.5,2);scene.add(fl3);
var rl2=new THREE.DirectionalLight(0xffd0a0,0.15);rl2.position.set(0,1,-3);scene.add(rl2);

// Offscreen render target for grid post-process
var rt=new THREE.WebGLRenderTarget(CW,CH,{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter});

// ═══ GRID POST-PROCESS SHADER ═══
var gridScene=new THREE.Scene();
var gridCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);

var gVS=['varying vec2 vUv;','void main(){vUv=uv;gl_Position=vec4(position,1.0);}'].join('\n');
var gFS=[
'uniform sampler2D tScene;',
'uniform vec2 res;',
'uniform float gridSz;',
'uniform float enabled;',
'varying vec2 vUv;',
'void main(){',
'  if(enabled<0.5){gl_FragColor=texture2D(tScene,vUv);return;}',
'  vec2 px=vUv*res;',
'  vec2 cell=floor(px/gridSz);',
'  vec2 cc=(cell+0.5)*gridSz;',
'  vec4 col=texture2D(tScene,cc/res);',
'  float dist=length(px-cc)/(gridSz*0.5);',
'  float lum=dot(col.rgb,vec3(0.299,0.587,0.114));',
'  float dotR=0.50+lum*0.42;',
'  float circle=1.0-smoothstep(dotR-0.06,dotR+0.04,dist);',
'  float ring=1.0-smoothstep(dotR*1.12-0.04,dotR*1.12+0.04,dist);',
'  vec3 dark=col.rgb*0.30;',
'  vec3 bg2=vec3(0.03,0.027,0.024);',
'  vec3 final2=mix(bg2,dark,ring);',
'  final2=mix(final2,col.rgb,circle*col.a);',
'  float vig=1.0-length(vUv-0.5)*0.4;',
'  gl_FragColor=vec4(final2*vig,1.0);',
'}'
].join('\n');

var gridQuad=new THREE.Mesh(
  new THREE.PlaneGeometry(2,2),
  new THREE.ShaderMaterial({
    uniforms:{
      tScene:{value:rt.texture},
      res:{value:new THREE.Vector2(CW,CH)},
      gridSz:{value:7.0},
      enabled:{value:1.0}
    },
    vertexShader:gVS,fragmentShader:gFS,
    depthTest:false,depthWrite:false
  })
);
gridScene.add(gridQuad);

// ═══ FACE MESH SHADER — photo texture with soft oval edge ═══
var fVS=[
'varying vec2 vUv;',
'varying float vMask;',
'varying vec3 vNorm;',
'void main(){',
'  vUv=uv;',
'  float cx=uv.x-0.5,cy=uv.y-0.48;',
'  float ov=cx*cx/0.23+cy*cy/0.28;',
'  vMask=1.0-smoothstep(0.50,0.95,ov);',
'  vNorm=normalize(normalMatrix*normal);',
'  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);',
'}'
].join('\n');

var fFS=[
'uniform sampler2D faceTex;',
'varying vec2 vUv;',
'varying float vMask;',
'varying vec3 vNorm;',
'void main(){',
'  if(vMask<0.005)discard;',
'  vec4 col=texture2D(faceTex,vUv);',
'  float l=0.80+0.20*dot(vNorm,normalize(vec3(-0.2,0.3,1.0)));',
'  col.rgb*=l;',
'  col.a=smoothstep(0.0,0.12,vMask);',
'  gl_FragColor=col;',
'}'
].join('\n');

// ═══ DELAUNAY ═══
function delaunay(pts){
  var n=pts.length,i,j,k,e;if(n<3)return[];
  var mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;
  for(i=0;i<n;i++){if(pts[i].x<mnx)mnx=pts[i].x;if(pts[i].y<mny)mny=pts[i].y;if(pts[i].x>mxx)mxx=pts[i].x;if(pts[i].y>mxy)mxy=pts[i].y;}
  var dm=Math.max(mxx-mnx||1,mxy-mny||1)*10;
  var sp=[{x:mnx-dm,y:mny-dm},{x:mnx+dm*3,y:mny-dm},{x:mnx+(mxx-mnx)*0.5,y:mny+dm*3}];
  var all=pts.concat(sp);
  function mk(a,b,c){var ax=all[a].x,ay=all[a].y,bx=all[b].x,by=all[b].y,cx2=all[c].x,cy=all[c].y;var D=2*(ax*(by-cy)+bx*(cy-ay)+cx2*(ay-by));if(Math.abs(D)<1e-12)return{v:[a,b,c],cx:0,cy:0,r2:-1};var ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx2*cx2+cy*cy)*(ay-by))/D;var uy=((ax*ax+ay*ay)*(cx2-bx)+(bx*bx+by*by)*(ax-cx2)+(cx2*cx2+cy*cy)*(bx-ax))/D;return{v:[a,b,c],cx:ux,cy:uy,r2:(ax-ux)*(ax-ux)+(ay-uy)*(ay-uy)};}
  var ts=[mk(n,n+1,n+2)];
  for(i=0;i<n;i++){var px=pts[i].x,py=pts[i].y,bad=[],good=[];for(j=0;j<ts.length;j++){var t=ts[j];if(t.r2>=0&&(px-t.cx)*(px-t.cx)+(py-t.cy)*(py-t.cy)<t.r2*1.000001)bad.push(t);else good.push(t);}var edges=[];for(j=0;j<bad.length;j++){var v=bad[j].v;for(e=0;e<3;e++){var a=v[e],b=v[(e+1)%3],sh=false;for(k=0;k<bad.length;k++){if(k===j)continue;var ov=bad[k].v;if((ov[0]===a||ov[1]===a||ov[2]===a)&&(ov[0]===b||ov[1]===b||ov[2]===b)){sh=true;break;}}if(!sh)edges.push([a,b]);}}ts=good;for(j=0;j<edges.length;j++)ts.push(mk(i,edges[j][0],edges[j][1]));}
  var out=[];for(i=0;i<ts.length;i++){var tv=ts[i].v;if(tv[0]<n&&tv[1]<n&&tv[2]<n&&ts[i].r2>=0)out.push(tv);}return out;
}

// ═══ BUILD 3D FACE MESH ═══
function buildFace(lm,snapshot){
  if(headGroup) scene.remove(headGroup);
  headGroup=new THREE.Group();
  headGroup.rotation.order='YXZ';

  // Face bounding box
  var ox=OVAL.map(function(i){return lm[i].x;}),oy=OVAL.map(function(i){return lm[i].y;});
  var fcx=(Math.min.apply(null,ox)+Math.max.apply(null,ox))*0.5;
  var fcy=(Math.min.apply(null,oy)+Math.max.apply(null,oy))*0.5;
  var fw=(Math.max.apply(null,ox)-Math.min.apply(null,ox))*0.5||0.001;
  var fh=(Math.max.apply(null,oy)-Math.min.apply(null,oy))*0.5||0.001;
  calFW=fw;calFH=fh;calFcx=fcx;calFcy=fcy;

  // Z range
  var zMin=1e9,zMax=-1e9,i;
  for(i=0;i<NL;i++){var z=lm[i].z||0;if(z<zMin)zMin=z;if(z>zMax)zMax=z;}
  var zR=zMax-zMin||0.001;

  // Build 3D positions and UVs
  calPositions=new Float32Array(NL*3);
  calUVs=new Float32Array(NL*2);
  smoothPos=new Float32Array(NL*3);

  for(i=0;i<NL;i++){
    var nx=(lm[i].x-fcx)/fw;   // -1..1
    var ny=-(lm[i].y-fcy)/fh;  // -1..1, flipped
    var nz=1.0-((lm[i].z||0)-zMin)/zR; // 0..1, 1=forward

    // 3D position: X,Y from face coords, Z from MediaPipe depth
    // Scale to reasonable 3D space
    var px3=nx*0.60;
    var py3=ny*0.72+0.10;
    var pz3=nz*0.30; // depth maps to 0..0.30

    calPositions[i*3]=px3;
    calPositions[i*3+1]=py3;
    calPositions[i*3+2]=pz3;
    smoothPos[i*3]=px3;
    smoothPos[i*3+1]=py3;
    smoothPos[i*3+2]=pz3;

    // UV: map to snapshot region
    var u=cl((lm[i].x-fcx)/(fw*2.2)+0.5,0,1);
    var v=cl((lm[i].y-fcy)/(fh*2.4)+0.5,0,1);
    calUVs[i*2]=u;
    calUVs[i*2+1]=1-v; // flip for OpenGL
  }

  // Triangulate on UVs (with jitter for stability)
  var jit=[];
  for(i=0;i<NL;i++){
    jit.push({x:calUVs[i*2]+((i*7919)%100-50)*1e-9, y:calUVs[i*2+1]+((i*6271)%100-50)*1e-9});
  }
  var raw=delaunay(jit);

  // Filter oversized triangles
  var tris=[];
  for(i=0;i<raw.length;i++){
    var t=raw[i];
    var ax=jit[t[0]].x,ay=jit[t[0]].y,bx2=jit[t[1]].x,by2=jit[t[1]].y,cx2=jit[t[2]].x,cy2=jit[t[2]].y;
    var area=Math.abs((bx2-ax)*(cy2-ay)-(cx2-ax)*(by2-ay))*0.5;
    if(area<0.008&&area>0.00001) tris.push(t[0],t[1],t[2]);
  }

  // Snapshot texture
  var pad=1.2;
  var crx=Math.max(0,(fcx-fw*pad)*VW),cry=Math.max(0,(fcy-fh*pad)*VH);
  var crw=Math.min(fw*pad*2*VW,VW-crx),crh=Math.min(fh*pad*2*VH,VH-cry);
  var tc=document.createElement('canvas');tc.width=512;tc.height=512;
  tc.getContext('2d').drawImage(snapshot,crx,cry,crw,crh,0,0,512,512);
  neutralTex=new THREE.CanvasTexture(tc);
  neutralTex.minFilter=THREE.LinearFilter;neutralTex.magFilter=THREE.LinearFilter;

  // Build geometry
  faceGeo=new THREE.BufferGeometry();
  faceGeo.setAttribute('position',new THREE.BufferAttribute(smoothPos,3));
  faceGeo.setAttribute('uv',new THREE.BufferAttribute(calUVs.slice(),2));
  faceGeo.setIndex(new THREE.BufferAttribute(new Uint16Array(tris),1));
  faceGeo.computeVertexNormals();

  var faceMat=new THREE.ShaderMaterial({
    uniforms:{faceTex:{value:neutralTex}},
    vertexShader:fVS,fragmentShader:fFS,
    transparent:true,side:THREE.FrontSide,depthWrite:true
  });
  faceMesh=new THREE.Mesh(faceGeo,faceMat);
  faceMesh.renderOrder=2;
  headGroup.add(faceMesh);

  // ── Body geometry behind ──
  var skinCol=new THREE.Color(pal.sk[0]/255*0.65,pal.sk[1]/255*0.65,pal.sk[2]/255*0.65);
  var hairCol=new THREE.Color(pal.hr[0]/255*0.45,pal.hr[1]/255*0.45,pal.hr[2]/255*0.45);
  var clothCol=new THREE.Color(0.10,0.09,0.08);
  var sm=function(c){return new THREE.MeshStandardMaterial({color:c,roughness:0.85,metalness:0});};

  // Cranium — ellipsoid behind face
  var skGeo=new THREE.SphereGeometry(1,48,32);
  var skPos=skGeo.attributes.position,skIdx=skGeo.index.array;
  var keep=[];
  for(i=0;i<skIdx.length;i+=3){
    var avz=(skPos.getZ(skIdx[i])+skPos.getZ(skIdx[i+1])+skPos.getZ(skIdx[i+2]))/3;
    var avy=(skPos.getY(skIdx[i])+skPos.getY(skIdx[i+1])+skPos.getY(skIdx[i+2]))/3;
    if(!(avz>0.20&&Math.abs(avy)<0.75)) keep.push(skIdx[i],skIdx[i+1],skIdx[i+2]);
  }
  skGeo.setIndex(keep);skGeo.computeVertexNormals();
  var skull=new THREE.Mesh(skGeo,sm(hairCol));
  skull.scale.set(0.58,0.70,0.50);skull.position.set(0,0.10,-0.08);skull.renderOrder=1;
  headGroup.add(skull);

  // Ears
  for(i=0;i<2;i++){
    var side=i===0?-1:1;
    var ear=new THREE.Mesh(new THREE.SphereGeometry(0.06,10,8),sm(skinCol));
    ear.position.set(side*0.57,0.08,0);ear.scale.set(0.45,0.9,0.6);
    headGroup.add(ear);
  }

  // Neck
  var neck=new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.15,0.24,16),sm(skinCol));
  neck.position.set(0,-0.64,0.02);headGroup.add(neck);

  // Shoulders + torso
  var sh=new THREE.Mesh(new THREE.SphereGeometry(0.48,16,8,0,Math.PI*2,0,Math.PI*0.5),sm(clothCol));
  sh.position.set(0,-0.80,0);sh.scale.set(1.1,0.35,0.45);sh.rotation.x=Math.PI;headGroup.add(sh);
  var torso=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.38,0.46,16),sm(clothCol));
  torso.position.set(0,-1.04,0);torso.scale.set(1,1,0.36);headGroup.add(torso);

  scene.add(headGroup);
  document.getElementById('st').textContent=(tris.length/3)+'tri';
}

// ═══ UPDATE 3D POSITIONS from live landmarks ═══
var MAX_DISP=0.09; // max displacement in 3D units

function updateFace(liveLM){
  if(!calLM||!faceGeo||!calPositions)return;

  // Live face center
  var lox=OVAL.map(function(i){return liveLM[i].x;}),loy=OVAL.map(function(i){return liveLM[i].y;});
  var lfx=(Math.min.apply(null,lox)+Math.max.apply(null,lox))*0.5;
  var lfy=(Math.min.apply(null,loy)+Math.max.apply(null,loy))*0.5;

  // Calibration face center
  var cox=OVAL.map(function(i){return calLM[i].x;}),coy=OVAL.map(function(i){return calLM[i].y;});
  var cfx=(Math.min.apply(null,cox)+Math.max.apply(null,cox))*0.5;
  var cfy=(Math.min.apply(null,coy)+Math.max.apply(null,coy))*0.5;

  var pos=faceGeo.attributes.position;
  for(var i=0;i<NL;i++){
    // Normalize by calibration face width (lesson: prevents scale mismatch)
    var lnx=(liveLM[i].x-lfx)/calFW;
    var lny=(liveLM[i].y-lfy)/calFH;
    var cnx=(calLM[i].x-cfx)/calFW;
    var cny=(calLM[i].y-cfy)/calFH;

    // Expression displacement in 3D space
    var dx=(lnx-cnx)*0.55;
    var dy=-(lny-cny)*0.65;
    var dz=0; // z changes are unreliable from MediaPipe

    // Clamp (lesson: prevents mouth explosion)
    dx=cl(dx,-MAX_DISP,MAX_DISP);
    dy=cl(dy,-MAX_DISP,MAX_DISP);

    // Target = calibration + displacement
    var tx=calPositions[i*3]+dx;
    var ty=calPositions[i*3+1]+dy;
    var tz=calPositions[i*3+2]+dz;

    // EMA smooth (lesson: 0.20 sweet spot)
    smoothPos[i*3]=lerp(smoothPos[i*3],tx,0.20);
    smoothPos[i*3+1]=lerp(smoothPos[i*3+1],ty,0.20);
    smoothPos[i*3+2]=lerp(smoothPos[i*3+2],tz,0.20);
  }
  pos.needsUpdate=true;
  faceGeo.computeVertexNormals();
}

// ═══ TEXTURE ACCUMULATION ═══
function tryCapture(){
  var now=Date.now();if(now-lastCap<1500||exTex.length>=12)return;
  var mo=vb.mo,mc=vb.mc,eo=vb.eo,ya=po.y;
  var isDiff=true;
  for(var i=0;i<exTex.length;i++){
    var e=exTex[i];
    if(!(Math.abs(e.mo-mo)>0.015||Math.abs(e.mc-mc)>0.15||Math.abs(e.eo-eo)>0.2||Math.abs(e.ya-ya)>0.15)){isDiff=false;break;}
  }
  if(!isDiff||!(mo>0.025||Math.abs(mc)>0.15||eo<0.7||eo>1.1||Math.abs(ya)>0.2))return;

  // Capture face region
  var pad=1.2;
  var crx=Math.max(0,(calFcx-calFW*pad)*VW),cry=Math.max(0,(calFcy-calFH*pad)*VH);
  var crw=Math.min(calFW*pad*2*VW,VW-crx),crh=Math.min(calFH*pad*2*VH,VH-cry);
  var tc=document.createElement('canvas');tc.width=512;tc.height=512;
  tc.getContext('2d').drawImage(vid,crx,cry,crw,crh,0,0,512,512);
  var tex=new THREE.CanvasTexture(tc);tex.minFilter=THREE.LinearFilter;tex.magFilter=THREE.LinearFilter;
  exTex.push({tex:tex,mo:mo,mc:mc,eo:eo,ya:ya});
  lastCap=now;
  document.getElementById('sx').textContent=(1+exTex.length)+' tex';
  document.getElementById('ac').textContent=1+exTex.length;
}

function selectTex(){
  if(!faceMesh||!exTex.length)return;
  var best=neutralTex,bd=vb.mo*10+Math.abs(vb.mc)+Math.abs(1-vb.eo)+Math.abs(po.y)*0.5;
  for(var i=0;i<exTex.length;i++){
    var e=exTex[i];
    var dd=Math.abs(e.mo-vb.mo)*10+Math.abs(e.mc-vb.mc)+Math.abs(e.eo-vb.eo)+Math.abs(e.ya-po.y)*0.5;
    if(dd<bd){bd=dd;best=e.tex;}
  }
  faceMesh.material.uniforms.faceTex.value=best;
}

// ═══ POSE & EXPRESSION ═══
function dz(v,t){if(Math.abs(v)<t)return 0;return(v>0?1:-1)*(Math.abs(v)-t)/(1-t);}
function getPose(lm){var n=lm[LK.N],le=lm[LK.LE],re=lm[LK.RE],ch=lm[LK.CH];var emx=(le.x+re.x)*0.5,es=Math.abs(re.x-le.x);var ry=es>0.01?(n.x-emx)/es:0;var yaw=dz(ry-pBL.yo,0.03)*Math.PI*0.72;var emy=(le.y+re.y)*0.5,fh=ch.y-emy;var nr=fh>0.01?(n.y-emy)/fh:0.55;var pitch=dz(nr-pBL.nr,0.012)*Math.PI*1.2;var ddx=re.x-le.x,ddy=re.y-le.y;var roll=dz(-Math.atan2(ddy,ddx),0.015)*0.65;return{y:cl(yaw,-0.9,0.9),p:cl(pitch,-0.65,0.65),r:cl(roll,-0.4,0.4)};}
function getVibe(lm){var fH=Math.sqrt(Math.pow(lm[LK.T].x-lm[LK.CH].x,2)+Math.pow(lm[LK.T].y-lm[LK.CH].y,2));if(fH<0.01)return null;var mO=Math.sqrt(Math.pow(lm[LK.MT].x-lm[LK.MB].x,2)+Math.pow(lm[LK.MT].y-lm[LK.MB].y,2))/fH;var cY=(lm[LK.ML].y+lm[LK.MR].y)*0.5,mY=(lm[LK.MT].y+lm[LK.MB].y)*0.5;var mC=cl((mY-cY)/(fH*0.055),-1,1);var bY=(lm[LK.LBR].y+lm[LK.RBR].y)*0.5,eY=(lm[LK.LT].y+lm[LK.RT].y)*0.5;var bd=eY-bY,bl2=0;if(browBL!==null)bl2=cl((bd-browBL)/(fH*0.16)*0.058,-0.055,0.075);var lE=Math.abs(lm[LK.LT].y-lm[LK.LB].y),rE=Math.abs(lm[LK.RT].y-lm[LK.RB].y);var eo=cl((lE+rE)/(fH*0.095),0,1.35);return{mo:cl(mO*1.85-0.04,0,0.12),mc:mC,bl:bl2,eo:eo};}

// ═══ CALIBRATION ═══
var vid=document.getElementById('vid');
function accLM(lm){if(!calLM){calLM=[];for(var i=0;i<lm.length;i++)calLM.push({x:lm[i].x,y:lm[i].y,z:lm[i].z||0});}else{for(var j=0;j<lm.length;j++){calLM[j].x=calLM[j].x*0.82+lm[j].x*0.18;calLM[j].y=calLM[j].y*0.82+lm[j].y*0.18;calLM[j].z=calLM[j].z*0.82+(lm[j].z||0)*0.18;}}}

function finishCal(){
  if(!calLM)return;
  var snap=document.createElement('canvas');snap.width=VW;snap.height=VH;
  snap.getContext('2d').drawImage(vid,0,0,VW,VH);

  // Sample colors
  try{
    var sc=snap.getContext('2d');
    var sp=sc.getImageData(cl(Math.round(calLM[116].x*VW)-3,0,VW),cl(Math.round(calLM[116].y*VH)-3,0,VH),7,7).data;
    var sr=0,sg=0,sb=0,sn=0;
    for(var q=0;q<sp.length;q+=4){sr+=sp[q];sg+=sp[q+1];sb+=sp[q+2];sn++;}
    if(sn>0)pal.sk=[sr/sn|0,sg/sn|0,sb/sn|0];
    var hp=sc.getImageData(cl(Math.round(calLM[10].x*VW)-4,0,VW),cl(Math.round((calLM[10].y-0.04)*VH)-4,0,VH),9,9).data;
    var hr=0,hg=0,hb=0,hn=0;
    for(q=0;q<hp.length;q+=4){hr+=hp[q];hg+=hp[q+1];hb+=hp[q+2];hn++;}
    if(hn>0)pal.hr=[hr/hn|0,hg/hn|0,hb/hn|0];
    var bp=sc.getImageData(5,5,10,10).data;
    var br=0,bgi=0,bb=0,bn=0;
    for(q=0;q<bp.length;q+=4){br+=bp[q];bgi+=bp[q+1];bb+=bp[q+2];bn++;}
    if(bn>0)pal.bg=[br/bn|0,bgi/bn|0,bb/bn|0];
  }catch(e){}

  // Update environment gradient
  var bgC2=document.createElement('canvas');bgC2.width=2;bgC2.height=256;
  var bx3=bgC2.getContext('2d');var bgG2=bx3.createLinearGradient(0,0,0,256);
  bgG2.addColorStop(0,'rgb('+(pal.bg[0]*0.18|0)+','+(pal.bg[1]*0.18|0)+','+(pal.bg[2]*0.18|0)+')');
  bgG2.addColorStop(0.4,'rgb('+(pal.bg[0]*0.10|0)+','+(pal.bg[1]*0.10|0)+','+(pal.bg[2]*0.10|0)+')');
  bgG2.addColorStop(1,'rgb('+(pal.bg[0]*0.04|0)+','+(pal.bg[1]*0.04|0)+','+(pal.bg[2]*0.04|0)+')');
  bx3.fillStyle=bgG2;bx3.fillRect(0,0,2,256);
  scene.background=new THREE.CanvasTexture(bgC2);

  buildFace(calLM,snap);

  var n=calLM[LK.N],le=calLM[LK.LE],re=calLM[LK.RE],ch=calLM[LK.CH];
  var es=Math.abs(re.x-le.x);
  pBL.yo=es>0.01?(n.x-(le.x+re.x)*0.5)/es:0;
  var emy=(le.y+re.y)*0.5;
  pBL.nr=(ch.y-emy)>0.01?(n.y-emy)/(ch.y-emy):0.55;
  exTex=[];lastCap=Date.now();
}

// ═══ PHASE ═══
function setP(p){phase=p;var ov=document.getElementById('ov'),ot=document.getElementById('ovt'),os=document.getElementById('ovs'),cb=document.getElementById('cbar2'),btn=document.getElementById('go'),bdg=document.getElementById('badge');document.getElementById('sp').textContent=p==='w'?'Waiting':p==='s'?'Searching':p==='c'?'Calibrating':'Live';btn.style.display=p==='w'?'':'none';
if(p==='w'){ov.classList.remove('gone');ot.textContent='Vibe Protocol';os.textContent='Camera access needed';cb.style.display='none';bdg.className='bdg w';bdg.textContent='Wait';}
else if(p==='s'){ov.classList.remove('gone');ot.textContent='Searching';os.textContent='Show your face';cb.style.display='none';bdg.className='bdg w';bdg.textContent='Search';}
else if(p==='c'){ov.classList.remove('gone');ot.textContent='Calibrating';os.textContent='Hold still';cb.style.display='block';bdg.className='bdg w';bdg.textContent='Cal';}
else if(p==='l'){ov.classList.add('gone');bdg.className='bdg l';bdg.textContent='Live';document.getElementById('pdot').className='dot on';}}
function startCal(){calCnt=0;calLM=null;browBL=null;pBL={nr:0.55,yo:0};exTex=[];setP('c');}

// ═══ MAIN LOOP ═══
var fm;
function onRes(results){
  if(!results.multiFaceLandmarks||!results.multiFaceLandmarks.length){if(phase!=='w'&&phase!=='c')setP('s');return;}
  var lm=results.multiFaceLandmarks[0];
  if(phase==='s'||phase==='w')startCal();

  if(phase==='c'){
    calCnt++;document.getElementById('cf').style.width=(calCnt/CFRAMES*100)+'%';
    accLM(lm);
    var bd=(lm[159].y+lm[386].y)*0.5-(lm[105].y+lm[334].y)*0.5;
    browBL=browBL===null?bd:browBL*0.88+bd*0.12;
    if(calCnt>=CFRAMES){try{finishCal();}catch(e){console.error(e);}setP('l');}
    return;
  }

  // ── LIVE ──
  var p3=getPose(lm);
  po.y=lerp(po.y,p3.y,0.07);po.p=lerp(po.p,p3.p,0.06);po.r=lerp(po.r,p3.r,0.07);
  var nv=getVibe(lm);
  if(nv){vb.mo=lerp(vb.mo,nv.mo,0.18);vb.mc=lerp(vb.mc,nv.mc,0.18);vb.bl=lerp(vb.bl,nv.bl,0.18);vb.eo=lerp(vb.eo,nv.eo,0.14);}

  updateFace(lm);
  tryCapture();
  if(exTex.length>0)selectTex();

  // Head rotation (mirrored) + breathing
  if(headGroup){
    headGroup.rotation.y=-po.y;
    headGroup.rotation.x=po.p;
    headGroup.rotation.z=po.r;
    var breath=Math.sin(performance.now()*0.002)*0.005;
    headGroup.scale.set(1+breath,1+breath*0.4,1+breath);
  }

  // Two-pass render: 3D scene → RT → grid shader → screen
  ren.setRenderTarget(rt);
  ren.render(scene,cam);
  ren.setRenderTarget(null);
  gridQuad.material.uniforms.enabled.value=gridOn?1.0:0.0;
  ren.render(gridScene,gridCam);

  // UI
  var f=function(v){return(v>=0?'+':'')+v.toFixed(2);};
  document.getElementById('vm').textContent=vb.mo.toFixed(2);document.getElementById('bm').style.width=cl(vb.mo/0.12*100,0,100)+'%';
  document.getElementById('vs2').textContent=f(vb.mc);document.getElementById('bs2').style.width=cl(Math.abs(vb.mc)*50,0,100)+'%';
  document.getElementById('ve').textContent=vb.eo.toFixed(2);document.getElementById('be').style.width=cl(vb.eo/1.35*100,0,100)+'%';
  document.getElementById('vy').textContent=f(po.y);document.getElementById('by2').style.width=cl(Math.abs(po.y)/1.5*100,0,100)+'%';
}

// ═══ CAMERA ═══
var pumpOn=false;
function pump(){if(!pumpOn)return;if(vid.readyState>=2&&!vid.paused){try{fm.send({image:vid});}catch(e){}}requestAnimationFrame(pump);}
function startCam(){
  var btn=document.getElementById('go');btn.textContent='Starting...';btn.disabled=true;
  navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:false})
  .then(function(stream){vid.srcObject=stream;return vid.play();})
  .then(function(){
    document.getElementById('ovt').textContent='Loading';document.getElementById('ovs').textContent='Downloading model...';
    fm=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});
    fm.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    fm.onResults(onRes);return fm.initialize();
  })
  .then(function(){pumpOn=true;setP('s');requestAnimationFrame(pump);})
  .catch(function(e){console.error(e);document.getElementById('ovt').textContent='Error';document.getElementById('ovs').textContent=e.message||'Failed';btn.textContent='Retry';btn.disabled=false;btn.onclick=startCam;});
}

setP('w');ren.render(scene,cam);
document.getElementById('go').addEventListener('click',startCam);
document.getElementById('recal').addEventListener('click',function(){if(phase==='l')startCal();});
document.getElementById('gridBtn').addEventListener('click',function(){gridOn=!gridOn;this.textContent='Grid '+(gridOn?'ON':'OFF');this.className=gridOn?'btn on':'btn';});
</script>
</body>
