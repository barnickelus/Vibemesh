<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoBi-Net // FULL ITERATION BUILD</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { position: relative; width: 480px; height: 560px; border: 1px solid #222; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        canvas, video { position: absolute; top: 0; left: 0; }
        #ui { position: absolute; bottom: 10px; left: 10px; z-index: 100; font-size: 9px; background: rgba(0,0,0,0.9); padding: 8px; border: 1px solid #00ff0033; pointer-events: none; line-height: 1.5; }
        .hint { position: absolute; top: 10px; right: 10px; font-size: 8px; color: #444; z-index: 100; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" style="display:none"></video>
    <canvas id="ft_canvas" width="512" height="512" style="display:none"></canvas>
    <canvas id="final_canvas" width="480" height="560"></canvas>
    <div id="ui">
        LOBI-NET v0.6 [ITERATION]<br>
        MODE: <span id="mode_label" style="color:#fff">DEBUG</span><br>
        PACKET: <span style="color:#00ffff">24 BYTES</span>
    </div>
    <div class="hint">PRESS 'D' TO TOGGLE</div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════
//  1. CONSTANTS & FACE MAPPING
// ══════════════════════════════════════════════════
const W=480, H=560, VW=640, VH=480;
let isDevMode = true; 

const LM={
  NOSE:1, CHIN:152, TOP:10, MOUTH_T:13, MOUTH_B:14, MOUTH_L:61, MOUTH_R:291
};

// State
let vibe={mouthOpen:0, yaw:0, pitch:0, roll:0};
let liveLM = null;

// ══════════════════════════════════════════════════
//  2. THREE.JS & TEXTURE ENGINE
// ══════════════════════════════════════════════════
const ftCanvas = document.getElementById('ft_canvas');
const ftCtx = ftCanvas.getContext('2d', {alpha:false});
const faceTex = new THREE.CanvasTexture(ftCanvas);

const scene = new THREE.Scene();
const cam3 = new THREE.PerspectiveCamera(35, (W/2)/H, 0.1, 1000);
cam3.position.set(0, 0, 4.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);

// Materials
const faceMat = new THREE.MeshBasicMaterial({ map: faceTex });
const hiFiMat = new THREE.MeshStandardMaterial({ 
    color: 0x111111, roughness: 0.1, metalness: 0.9, emissive: 0x001122 
});

const headMesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.0, 1.2), faceMat);
scene.add(headMesh);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const pLight = new THREE.PointLight(0xffffff, 1.5);
pLight.position.set(2, 2, 5);
scene.add(pLight);

// ══════════════════════════════════════════════════
//  3. TRIANGLE WARPER (CORE ENGINE)
// ══════════════════════════════════════════════════
function warpTriangle(ctx, img, p0, p1, p2, u0, u1, u2) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(u0.x, u0.y);
    ctx.lineTo(u1.x, u1.y);
    ctx.lineTo(u2.x, u2.y);
    ctx.closePath();
    ctx.clip();

    const d = (u0.x * (u1.y - u2.y) + u1.x * (u2.y - u0.y) + u2.x * (u0.y - u1.y));
    const a = ((p0.x * (u1.y - u2.y) + p1.x * (u2.y - u0.y) + p2.x * (u0.y - u1.y)) / d);
    const b = ((p0.x * (u1.x - u2.x) + p1.x * (u2.x - u0.x) + p2.x * (u0.x - u1.x)) / -d);
    const c = p0.x - a * u0.x - b * u0.y;
    const e = ((p0.y * (u1.y - u2.y) + p1.y * (u2.y - u0.y) + p2.y * (u0.y - u1.y)) / d);
    const f = ((p0.y * (u1.x - u2.x) + p1.x * (u2.x - u0.x) + p2.x * (u0.x - u1.x)) / -d);
    const g = p0.y - e * u0.x - f * u0.y;

    ctx.setTransform(a, e, b, f, c, g);
    ctx.drawImage(img, 0, 0);
    ctx.restore();
}

function drawFace() {
    if (!liveLM) return;
    ftCtx.fillStyle = 'black';
    ftCtx.fillRect(0,0,512,512);
    
    // Example Face Warping Triangle (Simplified for brevity, but uses warpTriangle logic)
    const p1 = liveLM[LM.TOP], p2 = liveLM[LM.CHIN], p3 = liveLM[LM.NOSE];
    warpTriangle(ftCtx, vid, 
        {x:p1.x*VW, y:p1.y*VH}, {x:p2.x*VW, y:p2.y*VH}, {x:p3.x*VW, y:p3.y*VH},
        {x:256, y:50}, {x:256, y:450}, {x:256, y:250}
    );
}

// ══════════════════════════════════════════════════
//  4. POST-PROCESSING (applyChuckClose)
// ══════════════════════════════════════════════════
function applyChuckClose() {
    const ctx = document.getElementById('final_canvas').getContext('2d');
    const size = isDevMode ? 4 : 8; 
    const imageData = ctx.getImageData(0, 0, W, H);
    ctx.clearRect(0,0,W,H);
    
    for (let y = 0; y < H; y += size) {
        for (let x = 0; x < W; x += size) {
            const idx = (y * W + x) * 4;
            const r = imageData.data[idx], g = imageData.data[idx+1], b = imageData.data[idx+2];
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.beginPath();
            ctx.arc(x + size/2, y + size/2, size/2.2, 0, Math.PI*2);
            ctx.fill();
        }
    }
}

// ══════════════════════════════════════════════════
//  5. THE ITERATION TICK
// ══════════════════════════════════════════════════
function tick() {
    // 24-Byte Data Drive
    headMesh.rotation.x = vibe.pitch;
    headMesh.rotation.y = -Math.PI/2 + vibe.yaw;
    headMesh.scale.y = 1 + (vibe.mouthOpen * 0.4);

    const mainCtx = document.getElementById('final_canvas').getContext('2d');
    mainCtx.clearRect(0, 0, W, H);

    if (isDevMode) {
        renderDevView(mainCtx);
    } else {
        renderImmersiveView(mainCtx);
    }
}

function renderDevView(ctx) {
    // LEFT: SOURCE + DEBUG DOTS
    ctx.drawImage(vid, 0, 0, W/2, H);
    ctx.fillStyle = "#0f0";
    [LM.TOP, LM.CHIN, LM.NOSE, LM.MOUTH_T, LM.MOUTH_B].forEach(i => {
        const pt = liveLM[i];
        ctx.beginPath(); ctx.arc(pt.x*W/2, pt.y*H, 3, 0, 7); ctx.fill();
    });

    // RIGHT: PROTOCOL OUTPUT (HI-FI)
    headMesh.material = hiFiMat;
    renderer.setViewport(0, 0, W/2, H);
    renderer.render(scene, cam3);
    ctx.drawImage(renderer.domElement, W/2, 0, W/2, H);
    
    renderDataHUD(ctx);
}

function renderImmersiveView(ctx) {
    headMesh.material = faceMat;
    drawFace();
    faceTex.needsUpdate = true;
    renderer.setViewport(0, 0, W, H);
    renderer.render(scene, cam3);
    ctx.drawImage(renderer.domElement, 0, 0, W, H);
    applyChuckClose();
}

function renderDataHUD(ctx) {
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(W/2-70, H-90, 140, 70);
    ctx.fillStyle = "#0ff";
    ctx.font = "bold 11px monospace";
    ctx.fillText(`MOUTH: ${(vibe.mouthOpen*100).toFixed(1)}%`, W/2-60, H-65);
    ctx.fillText(`YAW:   ${vibe.yaw.toFixed(2)}`, W/2-60, H-45);
    ctx.fillText(`PITCH: ${vibe.pitch.toFixed(2)}`, W/2-60, H-25);
}

// ══════════════════════════════════════════════════
//  6. MEDIAPIPE & START
// ══════════════════════════════════════════════════
window.addEventListener('keydown', e => { if(e.key.toLowerCase()==='d') isDevMode = !isDevMode; });

function onResults(results) {
    if (!results.multiFaceLandmarks || !results.multiFaceLandmarks[0]) return;
    liveLM = results.multiFaceLandmarks[0];
    
    // Simple Vibe Math
    const dist = Math.abs(liveLM[LM.MOUTH_T].y - liveLM[LM.MOUTH_B].y);
    vibe.mouthOpen = Math.min(dist * 8.0, 1.0);
    vibe.yaw = (liveLM[LM.NOSE].x - 0.5) * 1.5;
    vibe.pitch = (liveLM[LM.NOSE].y - 0.5) * -1.2;
    
    tick();
}

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
faceMesh.onResults(onResults);

const camera = new Camera(vid, {onFrame: async () => { await faceMesh.send({image: vid}); }, width: 640, height: 480});
camera.start();

</script>
</body>
</html>
