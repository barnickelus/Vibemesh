<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vibe Protocol · v1.0 (Segmented Synthesis)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0908;--border:#2a2622;--accent:#c9a96e}
body{background:var(--bg);color:#e2dcd0;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;padding:20px;overflow:hidden}
.title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:15px}
.title em{color:var(--accent);font-style:italic}
.stage{display:flex;gap:20px}
.frame-wrap{position:relative;background:#000;border:1px solid var(--border);box-shadow:0 30px 60px rgba(0,0,0,0.9)}
#display{display:block;width:520px;height:640px}
.right-col{width:200px;display:flex;flex-direction:column;gap:12px}
.panel{border:1px solid var(--border);padding:10px;background:#11100f;font-size:.45rem;text-transform:uppercase}
.panel b{color:var(--accent);display:block;margin-bottom:4px}
.packet-view{font-family:monospace;color:#6a9e6a;height:120px;overflow:hidden;background:#050505;padding:5px;border:1px solid #1a1a1a;font-size:.4rem}
</style>
</head>
<body>

<header><h1 class="title">LoBi-Net <em>Segmented</em> v1.0</h1></header>

<div class="stage">
  <div class="frame-wrap">
    <canvas id="display" width="520" height="640"></canvas>
  </div>

  <div class="right-col">
    <div class="panel"><b>Protocol</b>Identity Segmentation</div>
    <div class="panel"><b>Packet Log</b><div id="packet" class="packet-view"></div></div>
    <div class="panel"><b>Bitrate</b>~2.8 kbps</div>
    <div class="panel" style="color:#666">Receiving cluster deltas. Local reconstruction active.</div>
  </div>
</div>

<video id="vid" playsinline muted autoplay style="display:none"></video>
<canvas id="glCanvas" width="520" height="640" style="display:none"></canvas>

<script>
'use strict';
const W=520, H=640, STEP=9; // Tight grid for detail
let lms=null, phase='live';
let pose={p:0, y:0, r:0};
let pal={skin:'#d4b196', hair:'#211d1a', beard:'#2a2521', eyes:'#4a607a', lip:'#8e544d'};

// THREE.JS
const glCanvas=document.getElementById('glCanvas'), renderer=new THREE.WebGLRenderer({canvas:glCanvas, antialias:true, alpha:true});
renderer.setSize(W,H);
const scene=new THREE.Scene(), cam3=new THREE.PerspectiveCamera(30,W/H,0.1,100);
cam3.position.z=4.6;

const ftCvs=document.createElement('canvas'); ftCvs.width=1024; ftCvs.height=1024;
const ftCtx=ftCvs.getContext('2d'), faceTex=new THREE.CanvasTexture(ftCvs);
const headMesh=new THREE.Mesh(new THREE.SphereGeometry(1,64,64), new THREE.MeshPhongMaterial({map:faceTex, shininess:1}));
headMesh.scale.set(1.15, 1.45, 0.95);
scene.add(headMesh);
scene.add(new THREE.AmbientLight(0xffffff, 1.0));

// THE SEGMENTATION ENGINE (Invisible Puppet Mask)
function updateSegmentedTexture() {
  const ctx=ftCtx; ctx.clearRect(0,0,1024,1024);
  if(!lms) return;
  const CX=512, CY=512, S=1100;
  const getP=i=>({x:CX+(lms[i].x-0.5)*S, y:CY+(lms[i].y-0.5)*S});

  const drawSegment=(indices, color, blur=0)=>{
    ctx.beginPath(); 
    indices.forEach((idx,i)=>{ const p=getP(idx); if(i===0)ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
    ctx.closePath();
    ctx.fillStyle=color;
    if(blur) ctx.filter=`blur(${blur}px)`;
    ctx.fill();
    ctx.filter='none';
  };

  // 1. Hair Cluster (Capturing the long hair flow)
  ctx.fillStyle=pal.hair; ctx.fillRect(0,0,1024,1024);

  // 2. Skin Segment (Face Outline)
  const jaw=[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
  drawSegment(jaw, pal.skin);

  // 3. The Beard (Lower face lock)
  const beard=[204,202,200,18,420,422,424,432,411,427,225,211,182,191];
  drawSegment(beard, pal.beard, 15);

  // 4. Nose Bridge Structure (The "Invisible" anchor)
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=12; ctx.lineCap='round';
  ctx.beginPath(); 
  [168,6,197,195,5].forEach((idx,i)=>{ const p=getP(idx); if(i===0)ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
  ctx.stroke();

  // 5. Eyes & Mouth (Puppet deltas)
  drawSegment([33,160,158,133,153,144], '#fff'); // L Eye
  drawSegment([362,385,387,263,373,380], '#fff'); // R Eye
  drawSegment([61,185,40,37,0,267,270,409,291,375,321,405,314,17,84,181,91,146], pal.lip);
}

// MOSAIC RENDERER (The Chuck Close Visualizer)
const display=document.getElementById('display'), dCtx=display.getContext('2d');
const pixels=new Uint8Array(W*H*4);

function applyMosaic() {
  renderer.getContext().readPixels(0,0,W,H,0x1908,0x1401,pixels);
  dCtx.fillStyle='#0a0908'; dCtx.fillRect(0,0,W,H);
  const cos=Math.cos(Math.PI/4), sin=Math.sin(Math.PI/4);
  
  for(let y=-H; y<H*1.5; y+=STEP){
    for(let x=-W; x<W*1.5; x+=STEP){
      const sX=(x*cos-y*sin)+W/2, sY=(x*sin+y*cos)+H/2;
      if(sX<0||sX>=W||sY<0||sY>=H) continue;
      const i=( (H-1-(sY|0))*W+(sX|0) )*4;
      if(pixels[i+3]<20) continue;

      const r=pixels[i], g=pixels[i+1], b=pixels[i+2];
      dCtx.save(); dCtx.translate(sX, sY); dCtx.rotate(Math.PI/4);
      
      // Paint the "Cell" based on the Segmented Map
      dCtx.fillStyle=`rgb(${r-10},${g-10},${b-10})`;
      dCtx.fillRect(-STEP/2,-STEP/2,STEP-1,STEP-1);
      
      // Optical Vibration (the inner "Close" blobs)
      dCtx.beginPath();
      dCtx.ellipse(0,0, STEP*0.3, STEP*0.2, (r+g+b)/100, 0, Math.PI*2);
      dCtx.fillStyle=`rgba(${r+40},${g+20},${b},0.4)`; dCtx.fill();
      
      dCtx.restore();
    }
  }
}

function loop(){
  updateSegmentedTexture(); faceTex.needsUpdate=true;
  headMesh.rotation.set(pose.p, -Math.PI/2 + pose.y, pose.r);
  renderer.render(scene,cam3);
  applyMosaic();
  requestAnimationFrame(loop);
}

function onResults(res){
  if(!res.multiFaceLandmarks?.length) return;
  lms=res.multiFaceLandmarks[0];
  const top=lms[10], chin=lms[152], nose=lms[1], lE=lms[33], rE=lms[263];
  pose.p = (chin.z - top.z) * 4.5;
  pose.y = (nose.x - (lE.x+rE.x)/2) * -3.8;
  pose.r = (rE.y - lE.y) * 1.5;

  const packet = { pitch:pose.p.toFixed(2), yaw:pose.y.toFixed(2), segments:["hair","skin","beard","nose"] };
  document.getElementById('packet').innerText = JSON.stringify(packet, null, 2);
}

async function init(){
  const faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.6});
  faceMesh.onResults(onResults);
  const cam=new Camera(document.getElementById('vid'),{onFrame:async()=>await faceMesh.send({image:vid}), width:640, height:480});
  cam.start();
  loop();
}
init();
</script>
</body>
</html>
