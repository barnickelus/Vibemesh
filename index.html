<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeMesh — Shore Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { margin:0; background:#0a0a1f; color:#fff; font-family:Impact,sans-serif; overflow:hidden; }
    .header { text-align:center; padding:20px; background:linear-gradient(#00f0ff,#ff00aa); -webkit-background-clip:text; color:transparent; font-size:2.8em; }
    .avatar { width:320px; height:320px; margin:20px auto; border-radius:20px; overflow:hidden; background:#000; }
    .controls { background:#111; padding:20px; margin:20px; border-radius:16px; }
    button { width:100%; padding:18px; font-size:22px; background:linear-gradient(#ff00aa,#00f0ff); border:none; border-radius:12px; color:#000; margin:10px 0; cursor:pointer; }
    input[type=range] { width:100%; accent-color:#00f0ff; }
    .live { text-align:center; color:#00ffcc; font-size:1.2em; }
  </style>
</head>
<body>
  <div class="header">🏖️ VibeMesh v1.4 — Shore Live 🔥</div>
  
  <div class="avatar" id="three"></div>
  
  <div class="controls">
    <div>Bandwidth: <span id="bw">450</span> kbps</div>
    <input type="range" min="5" max="900" value="450" oninput="document.getElementById('bw').innerText=this.value">
    
    <div>Battery: <span id="bat">100</span>%</div>
    <input type="range" min="1" max="100" value="100" oninput="document.getElementById('bat').innerText=this.value">
    
    <button onclick="sendFistPump()">👊 SEND FIST PUMP</button>
    <button onclick="speak()">🎤 PLAY CLONED VOICE</button>
  </div>
  
  <div class="live">Tier: AVATAR3D • Packets: LIVE • Cloud Ready 100%</div>

  <script>
    // Simple Three.js 3D head
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 320/320, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(320, 320);
    document.getElementById('three').appendChild(renderer.domElement);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 32, 32),
      new THREE.MeshStandardMaterial({color:0xffaa00, metalness:0.6})
    );
    scene.add(head);
    camera.position.z = 5;

    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5,5,5);
    scene.add(light);

    function animate() {
      requestAnimationFrame(animate);
      head.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    function sendFistPump() {
      alert("👊 FIST PUMP SENT ACROSS THE SHORE!!!");
    }

    function speak() {
      const u = new SpeechSynthesisUtterance("Yo CB from the Shore — 3 Guys pizza slice in hand bro!");
      u.pitch = 1.1;
      u.rate = 1.15;
      speechSynthesis.speak(u);
    }
  </script>
</body>
</html>
