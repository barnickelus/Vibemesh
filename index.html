<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeMesh — Shore Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { margin:0; background:#0a0a1f; color:#fff; font-family:Impact,sans-serif; overflow:hidden; }
    .header { text-align:center; padding:15px; background:linear-gradient(#00f0ff,#ff00aa); -webkit-background-clip:text; color:transparent; font-size:2.5em; }
    .avatar { width:320px; height:320px; margin:20px auto; border-radius:20px; overflow:hidden; background:#000; box-shadow:0 0 30px #00f0ff; }
    .controls { background:#111; padding:20px; margin:20px; border-radius:16px; }
    button { width:100%; padding:16px; font-size:20px; background:linear-gradient(#ff00aa,#00f0ff); border:none; border-radius:12px; color:#000; margin:10px 0; cursor:pointer; }
    .live { text-align:center; color:#00ffcc; font-size:1.1em; }
  </style>
</head>
<body>
  <div class="header">🏖️ VibeMesh v1.4 — LIVE GESTURE PUPPETRY 🔥</div>
  
  <div class="avatar" id="three"></div>
  
  <div class="controls">
    <button onclick="fistPump()">👊 FIST PUMP</button>
    <button onclick="nod()">🙂 NOD</button>
    <button onclick="laugh()">😂 LAUGH</button>
  </div>
  
  <div class="live">Tap a gesture — watch the avatar puppet in real-time!</div>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 320/320, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(320, 320);
    document.getElementById('three').appendChild(renderer.domElement);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 32, 32),
      new THREE.MeshStandardMaterial({color:0xffaa00, metalness:0.6})
    );
    scene.add(head);
    camera.position.z = 5;

    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5,5,5);
    scene.add(light);

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    function fistPump() {
      head.scale.set(1.3,1.3,1.3);
      setTimeout(() => head.scale.set(1,1,1), 200);
    }

    function nod() {
      head.rotation.x = -0.4;
      setTimeout(() => head.rotation.x = 0, 300);
    }

    function laugh() {
      head.rotation.z = 0.3;
      setTimeout(() => head.rotation.z = -0.3, 150);
      setTimeout(() => head.rotation.z = 0, 300);
    }
  </script>
</body>
</html>
