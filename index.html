<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>VibeMesh | v17.1 Surface Fix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --magenta: #ff00ff; --bg: #020205; }
body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
.control-deck { position: absolute; top: 20px; right: 20px; width: 280px; background: rgba(10,10,22,0.9); 
                border: 1px solid #1a1a2a; border-radius: 12px; padding: 20px; z-index: 100; backdrop-filter: blur(10px); }
.deck-title { font-size: 0.7em; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid #1a1a2a; padding-bottom: 8px; }
.btn { width: 100%; padding: 12px; background: #111; color: var(--neon); border: 1px solid #222; border-radius: 6px; 
       font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.3s; text-transform: uppercase; font-size: 0.75em; }
.btn.active { background: var(--neon); color: #000; border-color: var(--neon); box-shadow: 0 0 15px rgba(0,240,255,0.3); }
video { display: none; }
</style>
</head>
<body>

<div class="control-deck">
    <div class="deck-title">VIBEMESH // COMMAND DECK</div>
    <button class="btn active" id="btn-init" onclick="initSystem()">1. Start Hardware</button>
    <button class="btn" id="btn-toggle" onclick="toggleRenderMode()">2. Activate Shaded Surface</button>
</div>

<div style="display: flex; width: 100vw; height: 100vh;">
    <div id="v-tx" style="flex:1; position:relative;"></div>
    <div id="v-rx" style="flex:1; position:relative;"></div>
</div>

<video id="webcam" playsinline></video>

<script>
let localScene, remoteScene, latestLandmarks = null;
let isSurfaceMode = false;

function buildNode(containerId) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, (window.innerWidth/2)/window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 4.5);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth/2, window.innerHeight);
    document.getElementById(containerId).appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(468 * 3);
    const colors = new Float32Array(468 * 3);
    
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    // Core Fix: Proper indexing for the 892 faces
    geo.setIndex(FACEMESH_TESSELATION.flat());

    const points = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.02, vertexColors: true }));
    const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ 
        vertexColors: true, 
        side: THREE.DoubleSide, 
        flatShading: false 
    }));

    // Add lighting required for the Shaded Surface
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(0, 5, 5);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x404040));

    scene.add(points); // Start with points
    return { scene, camera, renderer, points, mesh, geo, pos, colors };
}

async function initSystem() {
    localScene = buildNode('v-tx');
    remoteScene = buildNode('v-rx');
    
    const video = document.getElementById('webcam');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream; video.play();

    const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
    faceMesh.onResults(res => {
        if (!res.multiFaceLandmarks?.[0]) return;
        latestLandmarks = res.multiFaceLandmarks[0];
        [localScene, remoteScene].forEach(node => {
            for (let i = 0; i < 468; i++) {
                node.pos[i*3] = (latestLandmarks[i].x - 0.5) * -5;
                node.pos[i*3+1] = (latestLandmarks[i].y - 0.5) * -5;
                node.pos[i*3+2] = (latestLandmarks[i].z * -5);
                node.colors[i*3] = 0.8; node.colors[i*3+1] = 0.6; node.colors[i*3+2] = 0.5;
            }
            node.geo.attributes.position.needsUpdate = true;
            node.geo.computeVertexNormals(); // Essential for shading
        });
    });

    new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } }).start();

    requestAnimationFrame(function animate() {
        localScene.renderer.render(localScene.scene, localScene.camera);
        remoteScene.renderer.render(remoteScene.scene, remoteScene.camera);
        requestAnimationFrame(animate);
    });
}

function toggleRenderMode() {
    isSurfaceMode = !isSurfaceMode;
    const btn = document.getElementById('btn-toggle');
    
    // Swap Points for Mesh on the Receiver side
    if (isSurfaceMode) {
        remoteScene.scene.remove(remoteScene.points);
        remoteScene.scene.add(remoteScene.mesh);
        btn.textContent = "Data Points Active";
        btn.classList.add('active');
    } else {
        remoteScene.scene.remove(remoteScene.mesh);
        remoteScene.scene.add(remoteScene.points);
        btn.textContent = "Activate Shaded Surface";
        btn.classList.remove('active');
    }
}
</script>
</body>
</html>
