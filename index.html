<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Protocol</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0908;--surface:#121110;--border:#252220;--text:#e8e2d8;--muted:#4e4840;--accent:#c9a96e;--dk:#7a5c2e;--green:#6a9e6a}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 24px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 35%,#1a1510 0%,var(--bg) 70%);pointer-events:none;z-index:0}
header{position:relative;z-index:1;text-align:center;margin-bottom:10px}
.ey{font-size:.45rem;letter-spacing:.35em;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:500;letter-spacing:.06em}
h1 em{font-style:italic;color:var(--accent)}
.sub{font-size:.42rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:4px}
.stage{position:relative;z-index:1;display:flex;gap:12px;align-items:flex-start}
.wrap{position:relative}
.wrap::before,.wrap::after{content:'';position:absolute;width:10px;height:10px;z-index:3;pointer-events:none}
.wrap::before{top:0;left:0;border-top:2px solid var(--dk);border-left:2px solid var(--dk)}
.wrap::after{bottom:0;right:0;border-bottom:2px solid var(--dk);border-right:2px solid var(--dk)}
#display{display:block;border:1px solid var(--border)}
#ov{position:absolute;inset:0;background:rgba(10,9,8,.90);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;transition:opacity .5s}
#ov.gone{opacity:0;pointer-events:none}
.ovt{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--accent)}
.ovs{font-size:.44rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
#go{font-family:'JetBrains Mono',monospace;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;padding:8px 18px;cursor:pointer;background:var(--accent);border:none;color:var(--bg);font-weight:500}
#go:hover{opacity:.8}
#go:disabled{opacity:.4}
.cbar{width:140px;height:2px;background:var(--border);margin-top:2px}
#cf{height:100%;background:var(--accent);width:0%;transition:width .1s}
.stat{display:flex;justify-content:space-between;font-size:.42rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:0 2px;margin-top:3px}
.rc{width:170px;display:flex;flex-direction:column;gap:6px}
.pip{position:relative;border:1px solid var(--border);overflow:hidden}
#vid{display:block;width:170px;height:128px;object-fit:cover;transform:scaleX(-1)}
.bdg{position:absolute;top:3px;right:3px;font-size:.38rem;letter-spacing:.1em;text-transform:uppercase;padding:1px 3px;border:1px solid;z-index:2}
.bdg.w{color:var(--accent);border-color:var(--accent)}
.bdg.l{color:var(--green);border-color:var(--green)}
.pan{border:1px solid var(--border);padding:6px;background:var(--surface)}
.ph{font-size:.38rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dk);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.dot{width:4px;height:4px;border-radius:50%;background:var(--border)}
.dot.on{background:var(--green);animation:pu 1.8s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.pr{margin-bottom:3px}
.pl{font-size:.36rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;display:flex;justify-content:space-between}
.pv{color:var(--accent)}
.bt{height:2px;background:var(--border);position:relative}
.bf{height:100%;background:var(--dk);position:absolute;left:0;transition:width .06s}
.ar{font-size:.34rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}
.ar span{color:var(--accent)}
.ctrls{position:relative;z-index:1;margin-top:8px}
.btn{font-family:'JetBrains Mono',monospace;font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 8px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer}
.btn:hover{border-color:var(--dk);color:var(--text)}
</style>
</head>
<body>
<header>
  <div class="ey">Vibe Protocol</div>
  <h1>Living <em>Clay</em></h1>
  <div class="sub">Identity locks. Expression flows. Aura radiates.</div>
</header>
<div class="stage">
  <div>
    <div class="wrap">
      <canvas id="display" width="480" height="580"></canvas>
      <div id="ov">
        <div class="ovt" id="ovt">Vibe Protocol</div>
        <div class="ovs" id="ovs">Camera access needed</div>
        <button id="go">Enable Camera</button>
        <div class="cbar" id="cbar2" style="display:none"><div id="cf"></div></div>
      </div>
    </div>
    <div class="stat"><span id="sp">Waiting</span><span id="ss">--</span><span id="sl">--</span></div>
  </div>
  <div class="rc">
    <div class="pip"><video id="vid" playsinline muted></video><div class="bdg w" id="badge">Wait</div></div>
    <div class="pan">
      <div class="ph">Expression <div class="dot" id="pdot"></div></div>
      <div class="pr"><div class="pl">Mouth <span class="pv" id="vm">0.00</span></div><div class="bt"><div class="bf" id="bm"></div></div></div>
      <div class="pr"><div class="pl">Smile <span class="pv" id="vs2">0.00</span></div><div class="bt"><div class="bf" id="bs2"></div></div></div>
      <div class="pr"><div class="pl">Eyes <span class="pv" id="ve">1.00</span></div><div class="bt"><div class="bf" id="be"></div></div></div>
      <div class="pr"><div class="pl">Yaw <span class="pv" id="vy">0.00</span></div><div class="bt"><div class="bf" id="by2"></div></div></div>
      <div class="ar"><span id="phLbl">--</span> | <span id="ac">0</span>b sent</div>
    </div>
  </div>
</div>
<div class="ctrls"><button class="btn" id="recal">Reset</button></div>

<script>
var CW=480,CH=580,NL=468;
var OVAL=[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
var L={N:1,CH:152,T:10,LE:33,RE:263,LT:159,LB:145,RT:386,RB:374,LBR:105,RBR:334,MT:13,MB:14,ML:61,MR:291};
function cl(v,a,b){return v<a?a:v>b?b:v;}
function lerp(a,b,t){return a+(b-a)*t;}
function d2(a,b){return Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y));}

var phase='w',calCnt=0,calLM=null,browBL=null;
var vb={mo:0,mc:0,bl:0,eo:1},po={y:0,p:0,r:0},pBL={nr:0.55,yo:0};

// ═══════════════════════════════════════
//  TWO-LAYER ARCHITECTURE
//
//  LAYER 1: IDENTITY (slow, locks)
//   - PARAMS object holds face measurements
//   - curParams smoothly follows PARAMS
//   - After 120 frames, identity LOCKS
//   - All geometry from smooth deform fields
//
//  LAYER 2: EXPRESSION (fast, reactive)
//   - Gentle vertex offsets (much smaller than before)
//   - Breathing animation
//   - Aura particle system
// ═══════════════════════════════════════

// Identity params — what the protocol transmits
var PARAMS={
  faceWidth:0.55, faceHeight:0.72,
  eyeSepX:0.30, eyeY:0.16, eyeDepth:0.35,
  browY:0.34, browZ:0.14,
  noseBridgeZ:0.18, noseTipZ:0.38, noseTipY:-0.10,
  noseWidth:0.10,
  lipUpperZ:0.16, lipLowerZ:0.14,
  mouthWidth:0.16, mouthY:-0.28,
  chinZ:0.18, chinY:-0.60,
  jawWidth:0.52, jawY:-0.40,
  cheekZ:0.10, cheekX:0.50,
  foreheadZ:-0.10,
  earX:0.90,
  jawTaper:0.08,
  orbitalRim:0.06,
  nasalFold:0.04
};
// Smoothed display version
var curParams={};
for(var k in PARAMS) curParams[k]=PARAMS[k];

var HYoff=0.06;
var clayMesh=null,clayGeo=null,nV=0;
var sphereNormals=null,currentPos=null,colors=null,sculptW=null,regionTags=null;
var formBlend=0,frameCount=0,totalBytes=0;
var identityLocked=false;

var CLAY=[0.72,0.58,0.45];
var R_NONE=0,R_MOUTH=1,R_JAW=2,R_EYE_L=3,R_EYE_R=4,R_BROW_L=5,R_BROW_R=6,R_NOSE=7,R_CHEEK=8,R_FOREHEAD=9;

// Aura particles
var auraParts=[],auraGeo=null,auraMat=null;

// ═══ THREE.JS ═══
var display=document.getElementById('display');
var ren=new THREE.WebGLRenderer({canvas:display,antialias:true});
ren.setSize(CW,CH,false);ren.setClearColor(0x0a0908);
ren.toneMapping=THREE.ACESFilmicToneMapping;ren.toneMappingExposure=1.1;
var scene=new THREE.Scene();
var bgCV=document.createElement('canvas');bgCV.width=2;bgCV.height=256;
var bgx=bgCV.getContext('2d');var bgG=bgx.createLinearGradient(0,0,0,256);
bgG.addColorStop(0,'#1a1612');bgG.addColorStop(0.4,'#110f0d');bgG.addColorStop(1,'#080706');
bgx.fillStyle=bgG;bgx.fillRect(0,0,2,256);scene.background=new THREE.CanvasTexture(bgCV);
var cam=new THREE.PerspectiveCamera(30,CW/CH,0.1,100);cam.position.set(0,0,3.8);
scene.add(new THREE.AmbientLight(0xffe0c8,0.35));
var kl=new THREE.DirectionalLight(0xfff0e0,0.6);kl.position.set(-2,2.5,3);scene.add(kl);
var fl2=new THREE.DirectionalLight(0xc8d8f0,0.25);fl2.position.set(2,0.5,2);scene.add(fl2);
var rl=new THREE.DirectionalLight(0xffd0a0,0.2);rl.position.set(0,1,-3);scene.add(rl);

// ═══════════════════════════════════════
//  PARAMETERIZED DEFORMATION FIELDS
//  Every vertex computed from smooth fields.
//  Parameters control field positions/sizes.
// ═══════════════════════════════════════

function computePos(sn,P,blend){
  var HX=P.faceWidth, HY=P.faceHeight, HZ=0.52;
  var x=sn.x*HX, y=sn.y*HY+HYoff, z=sn.z*HZ;

  // Helper: apply one radial deformation
  function def(cx,cy,cz, dx,dy,dz, r){
    var ddx=sn.x-cx,ddy=sn.y-cy,ddz=sn.z-cz;
    var dist=Math.sqrt(ddx*ddx+ddy*ddy+ddz*ddz);
    if(dist<r){var w=(1-dist/r);w=w*w*blend;x+=dx*w;y+=dy*w;z+=dz*w;}
  }

  // Eye sockets — deep indentations
  def(-P.eyeSepX,P.eyeY,0.82, 0,0,-P.eyeDepth, 0.24);
  def(P.eyeSepX,P.eyeY,0.82, 0,0,-P.eyeDepth, 0.24);
  // Orbital rim — ridge around each eye socket
  def(-P.eyeSepX,P.eyeY+0.12,0.86, 0,0.01,P.orbitalRim, 0.16);
  def(P.eyeSepX,P.eyeY+0.12,0.86, 0,0.01,P.orbitalRim, 0.16);
  def(-P.eyeSepX,P.eyeY-0.10,0.84, 0,-0.01,P.orbitalRim*0.7, 0.14);
  def(P.eyeSepX,P.eyeY-0.10,0.84, 0,-0.01,P.orbitalRim*0.7, 0.14);
  // Brow ridge — prominent shelf above eyes
  def(-P.eyeSepX*0.85,P.browY,0.85, 0,0.03,P.browZ, 0.26);
  def(P.eyeSepX*0.85,P.browY,0.85, 0,0.03,P.browZ, 0.26);
  def(0,P.browY+0.02,0.90, 0,0.02,P.browZ*0.6, 0.18);
  // Nose bridge — ridge from brow to tip
  def(0,0.08,0.94, 0,0,P.noseBridgeZ, 0.14);
  def(0,0.00,0.95, 0,0,P.noseBridgeZ*0.8, 0.12);
  // Nose tip — strong forward projection
  def(0,P.noseTipY,0.92, 0,-0.03,P.noseTipZ, 0.16);
  // Nose sides — narrow the bridge
  def(-0.14,0.02,0.88, 0.03,0,-0.04, 0.12);
  def(0.14,0.02,0.88, -0.03,0,-0.04, 0.12);
  // Nostrils — flare at base
  def(-P.noseWidth,-0.16,0.88, -0.03,0,0.05, 0.10);
  def(P.noseWidth,-0.16,0.88, 0.03,0,0.05, 0.10);
  // Nasolabial folds — creases from nose to mouth corners
  def(-0.18,-0.20,0.85, -0.01,-0.01,-P.nasalFold, 0.10);
  def(0.18,-0.20,0.85, 0.01,-0.01,-P.nasalFold, 0.10);
  // Upper lip — mound forward
  def(0,P.mouthY,0.88, 0,0,P.lipUpperZ, P.mouthWidth);
  // Lower lip
  def(0,P.mouthY-0.10,0.84, 0,0,P.lipLowerZ, P.mouthWidth*0.85);
  // Lip crease — slight indent between lips
  def(0,P.mouthY-0.05,0.92, 0,0,-0.04, 0.06);
  // Philtrum — groove above upper lip
  def(0,-0.20,0.94, 0,0,-0.06, 0.05);
  // Chin — project forward and narrow
  def(0,P.chinY,0.68, 0,-0.04,P.chinZ, 0.20);
  def(0,P.chinY+0.06,0.78, 0,0,P.chinZ*0.5, 0.14);
  // Jaw angles — wide corners
  def(-P.jawWidth,P.jawY,0.45, -0.04,0,0, 0.20);
  def(P.jawWidth,P.jawY,0.45, 0.04,0,0, 0.20);
  // Jaw taper — narrow from cheek to chin
  def(-0.35,-0.55,0.40, P.jawTaper,0.02,0, 0.18);
  def(0.35,-0.55,0.40, -P.jawTaper,0.02,0, 0.18);
  // Under jaw — tuck inward
  def(0,-0.50,0.30, 0,0.02,-0.06, 0.20);
  // Cheekbones — prominent lateral
  def(-P.cheekX,0.00,0.72, -0.04,0,P.cheekZ, 0.22);
  def(P.cheekX,0.00,0.72, 0.04,0,P.cheekZ, 0.22);
  // Cheek hollows — indent below cheekbone
  def(-0.40,-0.12,0.70, 0.02,0,-0.04, 0.14);
  def(0.40,-0.12,0.70, -0.02,0,-0.04, 0.14);
  // Temples — indent
  def(-0.58,0.30,0.55, 0.04,0,-0.04, 0.18);
  def(0.58,0.30,0.55, -0.04,0,-0.04, 0.18);
  // Forehead — slopes backward at top
  def(0,0.70,0.58, 0,0.03,P.foreheadZ, 0.32);
  def(0,0.55,0.72, 0,0,P.foreheadZ*0.4, 0.22);
  // Skull taper — narrower at top
  def(-0.45,0.60,0.30, 0.03,0,0, 0.20);
  def(0.45,0.60,0.30, -0.03,0,0, 0.20);
  // Under chin taper
  def(0,-0.68,0.15, 0,0,-0.08, 0.24);
  // Back of head
  def(0,0.08,-0.92, 0,0,0.06, 0.35);
  // Ears
  def(-P.earX,0.02,0.10, -0.06,0,0, 0.14);
  def(P.earX,0.02,0.10, 0.06,0,0, 0.14);

  return{x:x,y:y,z:z};
}

// Apply params to rebuild mesh (called every frame)
function applyParams(blend){
  if(!clayGeo) return;
  var pos=clayGeo.attributes.position;
  for(var i=0;i<nV;i++){
    var p=computePos(sphereNormals[i],curParams,blend);
    // Expression offsets (LAYER 2 — gentle)
    var dx=0,dy=0;
    var mo=vb.mo*3.5,mc=vb.mc,eo=vb.eo,bl=vb.bl*2.5;
    switch(regionTags[i]){
      case R_MOUTH:dy-=mo*0.018;dx+=mc*0.003*(p.x>0?1:-1);dy+=mc*0.006;break;
      case R_JAW:dy-=mo*0.012;break;
      case R_EYE_L:case R_EYE_R:dy+=(eo-1)*0.006;break;
      case R_BROW_L:case R_BROW_R:dy+=bl*0.010;break;
      case R_NOSE:dy+=mc*0.002;break;
    }
    var tx=p.x+dx, ty=p.y+dy, tz=p.z;
    currentPos[i*3]=lerp(currentPos[i*3],tx,0.18);
    currentPos[i*3+1]=lerp(currentPos[i*3+1],ty,0.18);
    currentPos[i*3+2]=lerp(currentPos[i*3+2],tz,0.18);
    pos.setXYZ(i,currentPos[i*3],currentPos[i*3+1],currentPos[i*3+2]);
  }
  pos.needsUpdate=true;
  clayGeo.attributes.color.needsUpdate=true;
  clayGeo.computeVertexNormals();
}

// ═══ BUILD CLAY ═══
function buildClay(){
  if(clayMesh) scene.remove(clayMesh);
  // Reset params to defaults
  PARAMS.faceWidth=0.55;PARAMS.faceHeight=0.72;PARAMS.eyeSepX=0.30;PARAMS.eyeY=0.16;
  PARAMS.eyeDepth=0.35;PARAMS.browY=0.34;PARAMS.browZ=0.14;PARAMS.noseBridgeZ=0.18;
  PARAMS.noseTipZ=0.38;PARAMS.noseTipY=-0.10;PARAMS.noseWidth=0.10;PARAMS.lipUpperZ=0.16;
  PARAMS.lipLowerZ=0.14;PARAMS.mouthWidth=0.16;PARAMS.mouthY=-0.28;PARAMS.chinZ=0.18;
  PARAMS.chinY=-0.60;PARAMS.jawWidth=0.52;PARAMS.jawY=-0.40;PARAMS.cheekZ=0.10;
  PARAMS.cheekX=0.50;PARAMS.foreheadZ=-0.10;PARAMS.earX=0.90;
  PARAMS.jawTaper=0.08;PARAMS.orbitalRim=0.06;PARAMS.nasalFold=0.04;
  for(var k2 in PARAMS) curParams[k2]=PARAMS[k2];

  var geo=new THREE.SphereGeometry(1,64,48);
  clayGeo=geo;
  var pos=geo.attributes.position;
  nV=pos.count;
  sphereNormals=[];currentPos=new Float32Array(nV*3);
  colors=new Float32Array(nV*3);sculptW=new Float32Array(nV);regionTags=new Uint8Array(nV);

  for(var i=0;i<nV;i++){
    var ox=pos.getX(i),oy=pos.getY(i),oz=pos.getZ(i);
    sphereNormals.push({x:ox,y:oy,z:oz});
    var hx=ox*0.55,hy=oy*0.70+HYoff,hz=oz*0.52;
    currentPos[i*3]=hx;currentPos[i*3+1]=hy;currentPos[i*3+2]=hz;
    pos.setXYZ(i,hx,hy,hz);
    colors[i*3]=CLAY[0];colors[i*3+1]=CLAY[1];colors[i*3+2]=CLAY[2];
    var front=oz>0.3;
    if(front&&oy<-0.15&&oy>-0.50&&Math.abs(ox)<0.30)regionTags[i]=R_MOUTH;
    else if(oy<=-0.50)regionTags[i]=R_JAW;
    else if(front&&oy>0.05&&oy<0.30&&ox<-0.10)regionTags[i]=R_EYE_L;
    else if(front&&oy>0.05&&oy<0.30&&ox>0.10)regionTags[i]=R_EYE_R;
    else if(front&&oy>=0.30&&oy<0.50&&ox<0)regionTags[i]=R_BROW_L;
    else if(front&&oy>=0.30&&oy<0.50&&ox>0)regionTags[i]=R_BROW_R;
    else if(front&&oy>-0.15&&oy<0.12&&Math.abs(ox)<0.22)regionTags[i]=R_NOSE;
    else if(front&&oy>=0.50)regionTags[i]=R_FOREHEAD;
    else if(front&&Math.abs(ox)>0.30)regionTags[i]=R_CHEEK;
    else regionTags[i]=R_NONE;
  }
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  geo.computeVertexNormals();
  var mat=new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.80,metalness:0.02});
  clayMesh=new THREE.Mesh(geo,mat);clayMesh.rotation.order='YXZ';

  var skinMat=new THREE.MeshStandardMaterial({color:new THREE.Color(CLAY[0]*0.7,CLAY[1]*0.7,CLAY[2]*0.7),roughness:0.85});
  var clothMat=new THREE.MeshStandardMaterial({color:new THREE.Color(0.10,0.09,0.08),roughness:0.9});
  var neck=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.16,0.26,16),skinMat);
  neck.position.set(0,-0.74,0);clayMesh.add(neck);
  var sh=new THREE.Mesh(new THREE.SphereGeometry(0.48,16,8,0,Math.PI*2,0,Math.PI*0.5),clothMat);
  sh.position.set(0,-0.90,0);sh.scale.set(1.1,0.36,0.46);sh.rotation.x=Math.PI;clayMesh.add(sh);
  var torso=new THREE.Mesh(new THREE.CylinderGeometry(0.43,0.38,0.48,16),clothMat);
  torso.position.set(0,-1.14,0);torso.scale.set(1,1,0.36);clayMesh.add(torso);

  scene.add(clayMesh);
  formBlend=0;frameCount=0;totalBytes=0;identityLocked=false;

  // Clear old aura
  for(var ai=0;ai<auraParts.length;ai++) scene.remove(auraParts[ai]);
  auraParts=[];
}

// ═══════════════════════════════════════
//  LAYER 1: IDENTITY — extract + apply
//  Rate: 0.01 (very slow convergence)
//  Locks after 120 frames (~4 seconds)
// ═══════════════════════════════════════
function updateIdentity(lm){
  if(identityLocked) return;

  var ox=OVAL.map(function(i){return lm[i].x;}),oy=OVAL.map(function(i){return lm[i].y;});
  var fcx=(Math.min.apply(null,ox)+Math.max.apply(null,ox))*0.5;
  var fcy=(Math.min.apply(null,oy)+Math.max.apply(null,oy))*0.5;
  var fw=Math.max.apply(null,ox)-Math.min.apply(null,ox);
  var fh=Math.max.apply(null,oy)-Math.min.apply(null,oy);
  if(fw<0.01||fh<0.01) return;

  var rate=0.015; // convergence rate — still slow but stronger base needs slightly faster
  function S(a,b){return lerp(a,b,rate);}

  var faceRatio=cl(fw/fh,0.60,1.0);
  PARAMS.faceWidth=S(PARAMS.faceWidth, 0.50+faceRatio*0.10);
  PARAMS.faceHeight=S(PARAMS.faceHeight, 0.78-faceRatio*0.10);

  var eyeSep=d2(lm[L.LE],lm[L.RE])/fw;
  PARAMS.eyeSepX=S(PARAMS.eyeSepX, cl(eyeSep*0.55,0.22,0.40));

  var eyeY=((lm[L.LE].y+lm[L.RE].y)*0.5-fcy)/fh;
  PARAMS.eyeY=S(PARAMS.eyeY, cl(0.16-eyeY*0.3,0.08,0.24));

  var noseZ=-(lm[L.N].z||0);
  PARAMS.noseTipZ=S(PARAMS.noseTipZ, cl(0.30+noseZ*3.0,0.22,0.50));
  PARAMS.noseBridgeZ=S(PARAMS.noseBridgeZ, cl(0.14+noseZ*1.5,0.10,0.28));

  var noseW=d2(lm[48]||lm[L.N],lm[278]||lm[L.N])/fw;
  PARAMS.noseWidth=S(PARAMS.noseWidth, cl(noseW*0.35,0.05,0.16));

  var mouthW=d2(lm[L.ML],lm[L.MR])/fw;
  PARAMS.mouthWidth=S(PARAMS.mouthWidth, cl(mouthW*0.28,0.10,0.22));

  var mouthY=((lm[L.MT].y+lm[L.MB].y)*0.5-fcy)/fh;
  PARAMS.mouthY=S(PARAMS.mouthY, cl(-0.22-mouthY*0.18,-0.38,-0.18));

  var jawW=d2(lm[132],lm[361])/fw;
  PARAMS.jawWidth=S(PARAMS.jawWidth, cl(jawW*0.42,0.38,0.62));

  var browDist=((lm[L.LE].y+lm[L.RE].y)*0.5-lm[L.LBR].y)/fh;
  PARAMS.browZ=S(PARAMS.browZ, cl(0.08+browDist*0.8,0.06,0.20));

  var lipU=Math.abs(lm[L.MT].y-(lm[0]||lm[L.MT]).y)/fh;
  PARAMS.lipUpperZ=S(PARAMS.lipUpperZ, cl(0.10+lipU*3.0,0.08,0.22));

  var chinZ=-(lm[L.CH].z||0);
  PARAMS.chinZ=S(PARAMS.chinZ, cl(0.12+chinZ*2.0,0.08,0.25));

  PARAMS.cheekX=S(PARAMS.cheekX, cl(jawW*0.38+0.12,0.38,0.58));
  PARAMS.cheekZ=S(PARAMS.cheekZ, cl(0.06+browDist*0.4,0.04,0.16));

  totalBytes+=36+32; // expression + identity packet
  frameCount++;
  document.getElementById('ac').textContent=totalBytes;

  // Lock identity after convergence
  if(frameCount>=120){
    identityLocked=true;
    document.getElementById('phLbl').textContent='Identity locked';
  }
}

// ═══════════════════════════════════════
//  LAYER 2: EXPRESSION AURA
//  Particles orbiting the head that respond
//  to expression intensity. The vibe made visible.
// ═══════════════════════════════════════
function updateAura(){
  if(!clayMesh) return;

  var now=performance.now()*0.001;
  var intensity=vb.mo*3+Math.abs(vb.mc)+Math.abs(vb.bl)*2+(1-vb.eo);

  // Spawn new particles based on expression intensity
  var spawnCount=Math.floor(cl(intensity*2,0,4));
  for(var i=0;i<spawnCount;i++){
    var angle=Math.random()*Math.PI*2;
    var yAngle=Math.random()*Math.PI-Math.PI*0.5;
    var radius=0.75+Math.random()*0.3;

    var pGeo=new THREE.SphereGeometry(0.015+intensity*0.008,6,6);
    // Color based on expression: warm=talking, cool=calm
    var hue=0.08+vb.mc*0.1; // orange-gold shifted by smile
    var sat=0.4+intensity*0.3;
    var val=0.5+intensity*0.4;
    var col=new THREE.Color();col.setHSL(hue,sat,val);
    var pMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.6});
    var particle=new THREE.Mesh(pGeo,pMat);

    particle.position.set(
      Math.cos(angle)*radius*Math.cos(yAngle),
      Math.sin(yAngle)*radius*0.8+0.06,
      Math.sin(angle)*radius*Math.cos(yAngle)
    );
    particle.userData={
      born:now,
      life:0.8+Math.random()*0.6,
      vx:Math.cos(angle)*0.3,
      vy:0.2+Math.random()*0.3,
      vz:Math.sin(angle)*0.3
    };
    auraParts.push(particle);
    scene.add(particle);
  }

  // Update + cull particles
  var alive=[];
  for(var j=0;j<auraParts.length;j++){
    var p=auraParts[j];
    var age=now-p.userData.born;
    if(age>p.userData.life){
      scene.remove(p);p.geometry.dispose();p.material.dispose();
      continue;
    }
    var t=age/p.userData.life;
    p.position.x+=p.userData.vx*0.003;
    p.position.y+=p.userData.vy*0.004;
    p.position.z+=p.userData.vz*0.003;
    p.material.opacity=0.6*(1-t*t); // fade out
    p.scale.setScalar(1+t*0.5);     // grow slightly
    alive.push(p);
  }
  auraParts=alive;
}

// ═══ COLOR SAMPLING ═══
function updateColor(lm,vid2){
  if(!clayGeo) return;
  var ox=OVAL.map(function(i){return lm[i].x;}),oy=OVAL.map(function(i){return lm[i].y;});
  var fcx=(Math.min.apply(null,ox)+Math.max.apply(null,ox))*0.5;
  var fcy=(Math.min.apply(null,oy)+Math.max.apply(null,oy))*0.5;
  var fw=(Math.max.apply(null,ox)-Math.min.apply(null,ox))*0.5||0.001;
  var fh=(Math.max.apply(null,oy)-Math.min.apply(null,oy))*0.5||0.001;

  var cc=document.createElement('canvas');cc.width=640;cc.height=480;
  var ccx=cc.getContext('2d');
  try{ccx.drawImage(vid2,0,0,640,480);}catch(e){return;}

  for(var si=0;si<8;si++){
    var sli=Math.floor(Math.random()*NL);
    var slp=lm[sli];
    var px=cl(Math.round(slp.x*640),0,639),py=cl(Math.round(slp.y*480),0,479);
    var pd;try{pd=ccx.getImageData(px,py,1,1).data;}catch(e2){continue;}
    var tr=pd[0]/255,tg=pd[1]/255,tb=pd[2]/255;
    var snx=(slp.x-fcx)/fw,sny=-(slp.y-fcy)/fh;

    for(var vi=0;vi<nV;vi++){
      var sn=sphereNormals[vi];
      if(sn.z<0.2)continue;
      var ddx=sn.x-snx,ddy=sn.y-sny;
      var dd=Math.sqrt(ddx*ddx+ddy*ddy);
      if(dd<0.22){
        var w=0.012*(1-dd/0.22);
        colors[vi*3]=lerp(colors[vi*3],tr,w);
        colors[vi*3+1]=lerp(colors[vi*3+1],tg,w);
        colors[vi*3+2]=lerp(colors[vi*3+2],tb,w);
        sculptW[vi]=cl(sculptW[vi]+w*0.15,0,1);
      }
    }
  }

  var avg=0;for(var wi=0;wi<nV;wi++)avg+=sculptW[wi];avg/=nV;
  document.getElementById('sl').textContent=(avg*100).toFixed(0)+'%';
}

// ═══ POSE & VIBE ═══
function dz(v,t){if(Math.abs(v)<t)return 0;return(v>0?1:-1)*(Math.abs(v)-t)/(1-t);}
function getPose(lm){var n=lm[L.N],le=lm[L.LE],re=lm[L.RE],ch=lm[L.CH];var emx=(le.x+re.x)*0.5,es=Math.abs(re.x-le.x);var ry=es>0.01?(n.x-emx)/es:0;var yaw=dz(ry-pBL.yo,0.03)*Math.PI*0.72;var emy=(le.y+re.y)*0.5,fh=ch.y-emy;var nr=fh>0.01?(n.y-emy)/fh:0.55;var pitch=dz(nr-pBL.nr,0.012)*Math.PI*1.2;var dx=re.x-le.x,dy=re.y-le.y;var roll=dz(-Math.atan2(dy,dx),0.015)*0.65;return{y:cl(yaw,-0.9,0.9),p:cl(pitch,-0.65,0.65),r:cl(roll,-0.4,0.4)};}
function getVibe(lm){var fH=Math.sqrt(Math.pow(lm[L.T].x-lm[L.CH].x,2)+Math.pow(lm[L.T].y-lm[L.CH].y,2));if(fH<0.01)return null;var mO=Math.sqrt(Math.pow(lm[L.MT].x-lm[L.MB].x,2)+Math.pow(lm[L.MT].y-lm[L.MB].y,2))/fH;var cY=(lm[L.ML].y+lm[L.MR].y)*0.5,mY=(lm[L.MT].y+lm[L.MB].y)*0.5;var mC=cl((mY-cY)/(fH*0.055),-1,1);var bY=(lm[L.LBR].y+lm[L.RBR].y)*0.5,eY=(lm[L.LT].y+lm[L.RT].y)*0.5;var bd=eY-bY,bl2=0;if(browBL!==null)bl2=cl((bd-browBL)/(fH*0.16)*0.058,-0.055,0.075);var lE=Math.abs(lm[L.LT].y-lm[L.LB].y),rE=Math.abs(lm[L.RT].y-lm[L.RB].y);var eo=cl((lE+rE)/(fH*0.095),0,1.35);return{mo:cl(mO*1.85-0.04,0,0.12),mc:mC,bl:bl2,eo:eo};}

// ═══ CALIBRATION ═══
var vid=document.getElementById('vid');
function accLM(lm){if(!calLM){calLM=[];for(var i=0;i<lm.length;i++)calLM.push({x:lm[i].x,y:lm[i].y,z:lm[i].z||0});}else{for(var j=0;j<lm.length;j++){calLM[j].x=calLM[j].x*0.82+lm[j].x*0.18;calLM[j].y=calLM[j].y*0.82+lm[j].y*0.18;calLM[j].z=calLM[j].z*0.82+(lm[j].z||0)*0.18;}}}
function finishCal(){if(!calLM)return;var n=calLM[L.N],le=calLM[L.LE],re=calLM[L.RE],ch=calLM[L.CH];var es=Math.abs(re.x-le.x);pBL.yo=es>0.01?(n.x-(le.x+re.x)*0.5)/es:0;var emy=(le.y+re.y)*0.5;pBL.nr=(ch.y-emy)>0.01?(n.y-emy)/(ch.y-emy):0.55;}

// ═══ PHASE ═══
function setP(p){phase=p;var ov=document.getElementById('ov'),ot=document.getElementById('ovt'),os=document.getElementById('ovs'),cb=document.getElementById('cbar2'),btn=document.getElementById('go'),bdg=document.getElementById('badge');document.getElementById('sp').textContent=p==='w'?'Waiting':p==='s'?'Searching':p==='c'?'Calibrating':'Live';btn.style.display=p==='w'?'':'none';
if(p==='w'){ov.classList.remove('gone');ot.textContent='Vibe Protocol';os.textContent='Camera access needed';cb.style.display='none';bdg.className='bdg w';bdg.textContent='Wait';}
else if(p==='s'){ov.classList.remove('gone');ot.textContent='Searching';os.textContent='Show your face';cb.style.display='none';bdg.className='bdg w';bdg.textContent='Search';}
else if(p==='c'){ov.classList.remove('gone');ot.textContent='Calibrating';os.textContent='Hold still';cb.style.display='block';bdg.className='bdg w';bdg.textContent='Cal';}
else if(p==='l'){ov.classList.add('gone');bdg.className='bdg l';bdg.textContent='Live';document.getElementById('pdot').className='dot on';}}
function startCal(){calCnt=0;calLM=null;browBL=null;pBL={nr:0.55,yo:0};buildClay();setP('c');}

// ═══ MAIN LOOP ═══
var fm;
function onRes(results){
  if(!results.multiFaceLandmarks||!results.multiFaceLandmarks.length){if(phase!=='w'&&phase!=='c')setP('s');return;}
  var lm=results.multiFaceLandmarks[0];
  if(phase==='s'||phase==='w')startCal();

  if(phase==='c'){calCnt++;document.getElementById('cf').style.width=(calCnt/45*100)+'%';accLM(lm);var bd=(lm[159].y+lm[386].y)*0.5-(lm[105].y+lm[334].y)*0.5;browBL=browBL===null?bd:browBL*0.88+bd*0.12;if(calCnt>=45){try{finishCal();}catch(e){console.error(e);}setP('l');}return;}

  // Pose + Expression
  var p3=getPose(lm);po.y=lerp(po.y,p3.y,0.07);po.p=lerp(po.p,p3.p,0.06);po.r=lerp(po.r,p3.r,0.07);
  var nv=getVibe(lm);if(nv){vb.mo=lerp(vb.mo,nv.mo,0.18);vb.mc=lerp(vb.mc,nv.mc,0.18);vb.bl=lerp(vb.bl,nv.bl,0.18);vb.eo=lerp(vb.eo,nv.eo,0.14);}

  // Form blend (sphere → human)
  formBlend=cl(formBlend+0.025,0,1);
  var eased=formBlend<0.5?2*formBlend*formBlend:1-Math.pow(-2*formBlend+2,2)/2;

  // LAYER 1: Identity (slow, locks after 120 frames)
  if(formBlend>=0.9) updateIdentity(lm);

  // Smoothly follow PARAMS
  for(var k3 in PARAMS){curParams[k3]=lerp(curParams[k3],PARAMS[k3],0.08);}
  if(!identityLocked){document.getElementById('phLbl').textContent=formBlend<0.9?'Forming':'Measuring';document.getElementById('ss').textContent='F'+frameCount;}

  // Rebuild mesh from smooth fields
  applyParams(eased);

  // Color
  updateColor(lm,vid);

  // LAYER 2: Aura
  updateAura();

  // Breathing
  if(clayMesh){
    var breath=Math.sin(performance.now()*0.002)*0.008;
    clayMesh.scale.set(1+breath,1+breath*0.5,1+breath);
    clayMesh.rotation.y=-po.y;clayMesh.rotation.x=po.p;clayMesh.rotation.z=po.r;
  }

  ren.render(scene,cam);

  // UI
  var f=function(v){return(v>=0?'+':'')+v.toFixed(2);};
  document.getElementById('vm').textContent=vb.mo.toFixed(2);document.getElementById('bm').style.width=cl(vb.mo/0.12*100,0,100)+'%';
  document.getElementById('vs2').textContent=f(vb.mc);document.getElementById('bs2').style.width=cl(Math.abs(vb.mc)*50,0,100)+'%';
  document.getElementById('ve').textContent=vb.eo.toFixed(2);document.getElementById('be').style.width=cl(vb.eo/1.35*100,0,100)+'%';
  document.getElementById('vy').textContent=f(po.y);document.getElementById('by2').style.width=cl(Math.abs(po.y)/1.5*100,0,100)+'%';
}

// ═══ CAMERA ═══
var pumpOn=false;
function pump(){if(!pumpOn)return;if(vid.readyState>=2&&!vid.paused){try{fm.send({image:vid});}catch(e){}}requestAnimationFrame(pump);}
function startCam(){var btn=document.getElementById('go');btn.textContent='Starting...';btn.disabled=true;
navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:false})
.then(function(stream){vid.srcObject=stream;return vid.play();})
.then(function(){document.getElementById('ovt').textContent='Loading';document.getElementById('ovs').textContent='Downloading model...';fm=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});fm.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});fm.onResults(onRes);return fm.initialize();})
.then(function(){pumpOn=true;setP('s');requestAnimationFrame(pump);})
.catch(function(e){console.error(e);document.getElementById('ovt').textContent='Error';document.getElementById('ovs').textContent=e.message||'Failed';btn.textContent='Retry';btn.disabled=false;btn.onclick=startCam;});}

buildClay();setP('w');ren.render(scene,cam);
document.getElementById('go').addEventListener('click',startCam);
document.getElementById('recal').addEventListener('click',function(){if(phase==='l'){buildClay();startCal();}});
</script>
