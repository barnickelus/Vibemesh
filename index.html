<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh v6.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
/* ── Reset & Core Layout ── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#06060f;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;overflow-x:hidden;overflow-y:auto; /* Restored vertical scrolling */
  display: flex; flex-direction: column;
}

/* ── Header ── */
.hdr{text-align:center;padding:16px 12px 6px; flex-shrink: 0;}
.hdr h1{font-size:clamp(1.4em,4vw,2.1em);font-weight:900;letter-spacing:1px;
  background:linear-gradient(90deg,#00f0ff,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr sub{display:block;font-size:.58em;color:#444;letter-spacing:3px;text-transform:uppercase;margin-top:2px}

/* ── Call layout ── */
.call{display:flex;justify-content:center;gap:18px;padding:8px 14px 4px;flex-wrap:wrap; flex-shrink: 0;}
.avatar-box{display:flex;flex-direction:column;align-items:center;gap:6px}
.av-label{font-size:.72em;font-weight:700;color:#00ffcc;letter-spacing:2px;text-transform:uppercase}

.av-frame{
  position:relative;width:300px;height:360px;border-radius:16px;overflow:hidden;
  background:#08081a;box-shadow:0 0 0 1px #ffffff0a, 0 0 40px #00f0ff12;
}
.av-frame canvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* ── PIP & Badges ── */
.pip{
  position:absolute;bottom:10px;right:10px;width:68px;height:52px;
  border-radius:8px;overflow:hidden;border:2px solid #00f0ff55;
  background:#000;z-index:30;box-shadow:0 2px 10px #0008;
}
.pip video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.tier-badge{
  position:absolute;top:9px;left:10px;padding:3px 9px;border-radius:20px;
  font-size:.56em;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  background:#00f0ff12;border:1px solid #00f0ff44;color:#00f0ff;z-index:20;
}

/* ── Controls Panel (Scrollable Container) ── */
.panel{
  background:#0c0c1e;padding:18px 16px;margin:10px 14px 20px;border-radius:14px;
  border:1px solid #ffffff07; flex-grow: 1; max-width: 650px; align-self: center;
  width: calc(100% - 28px);
}

.section-label{font-size:.65em;color:#555;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.style-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.sb{
  padding:6px 12px;font-size:.7em;font-weight:600;font-family:inherit;
  background:#121224;color:#666;border:1px solid #ffffff0a;border-radius:7px;
  cursor:pointer;transition:all .15s;
}
.sb.on{background:#00f0ff18;color:#00f0ff;border-color:#00f0ff55}

.sliders{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px 20px;margin-bottom:16px}
.sl-item label{display:block;font-size:.6em;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.sl-row{display:flex;align-items:center;gap:8px}
input[type=range]{flex:1;accent-color:#00f0ff;height:4px}
.sl-val{font-size:.75em;color:#00f0ff;min-width:35px;text-align:right}

.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.btn{
  flex:1;min-width:120px;padding:12px;font-size:.8em;font-weight:700;
  border:none;border-radius:10px;cursor:pointer;transition:all .15s;
}
.btn-primary{background:linear-gradient(135deg,#ff00aa,#00f0ff);color:#000}
.btn-orange{background:linear-gradient(135deg,#ff6600,#ffcc00);color:#000}
.btn-ghost{background:#16162a;color:#888;border:1px solid #ffffff10}

/* ── Stats ── */
.stats{display:flex;justify-content:center;gap:0;padding:0 14px 15px;flex-wrap:wrap;flex-shrink: 0;}
.stat{font-size:.65em;color:#444;padding:4px 12px;border-right:1px solid #ffffff08}
.stat b{color:#00ffcc}
.statusbar{text-align:center;padding:10px;font-size:.75em;color:#555;border-top:1px solid #ffffff05;background:#06060f}

/* ── Overlays ── */
.snap-ov{position:absolute;inset:0;background:#000000dd;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:40}
.snap-ov.show{display:flex}
.snap-num{font-size:5em;font-weight:900;color:#00f0ff}
</style>
</head>
<body>

<div class="hdr">
  <h1>🏖️ VibeMesh v6.2</h1>
  <sub>Wireframe + Shore Edition · Optimized Access</sub>
</div>

<div class="call">
  <div class="avatar-box">
    <div class="av-label">Local · Vancouver</div>
    <div class="av-frame" id="localFrame">
      <div class="pip"><video id="pipLocal" autoplay muted playsinline></video></div>
      <div class="tier-badge" id="localBadge">READY</div>
      <div class="snap-ov" id="snapOv"><div class="snap-num" id="snapCount">5</div></div>
    </div>
  </div>
  <div class="avatar-box">
    <div class="av-label">Remote · JerseyBro</div>
    <div class="av-frame" id="remoteFrame">
      <div class="tier-badge" id="remoteBadge">WAITING</div>
    </div>
  </div>
</div>

<div class="panel">
  <div class="section-label">Mesh Visualization</div>
  <div class="style-row">
    <button class="sb on" id="sb-wire"    onclick="setStyle('wire')">🕸 Wireframe</button>
    <button class="sb"    id="sb-rings"   onclick="setStyle('rings')">● Rings</button>
    <button class="sb"    id="sb-dots"    onclick="setStyle('dots')">· Dots</button>
    <button class="sb"    id="sb-solid"   onclick="setStyle('solid')">■ Solid</button>
  </div>

  <div class="sliders">
    <div class="sl-item">
      <label>Bandwidth → Detail</label>
      <div class="sl-row">
        <input type="range" min="10" max="900" value="900" id="bwSlider" oninput="onBw(+this.value)">
        <div class="sl-val"><span id="bwVal">900</span>k</div>
      </div>
    </div>
    <div class="sl-item">
      <label>Depth Intensity</label>
      <div class="sl-row">
        <input type="range" min="1" max="25" value="12" oninput="onDepth(+this.value)">
        <div class="sl-val" id="depthVal">12×</div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="camBtn" onclick="startCamera()">📷 Start Camera</button>
    <button class="btn btn-primary" id="snapBtn" onclick="startSnap()" disabled>📸 Snap Portrait</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-orange"  id="liveBtn" onclick="toggleLive()" disabled>⚡ Live Puppet</button>
    <button class="btn btn-ghost"   onclick="savePortrait()">💾 Save PNG</button>
  </div>
</div>

<div class="stats">
  <div class="stat">Tier <b id="tierLbl">AVATAR3D</b></div>
  <div class="stat">Tris <b id="trisLbl">—</b></div>
  <div class="stat">RTT <b id="rttLbl">—</b>ms</div>
</div>
<div class="statusbar" id="statusbar">Initialize camera to begin stream</div>

<video id="camFeed" autoplay muted playsinline style="display:none"></video>

<script>
// Logic adapted from index 9.html
let cellStyle = 'wire';
let depthScale = 12;
let cameraOn = false, puppetActive = false;
let localS, remoteS, lastLandmarks;

// Enhanced setStyle to handle material properties directly
function setStyle(s) {
  cellStyle = s;
  document.querySelectorAll('.sb').forEach(b => b.classList.remove('on'));
  const activeBtn = document.getElementById('sb-' + s);
  if (activeBtn) activeBtn.classList.add('on');

  const isWire = (s === 'wire');
  
  [localS, remoteS].forEach(sc => {
    if (sc?.mesh) {
      sc.mesh.material.wireframe = isWire;
      sc.mesh.material.needsUpdate = true;
    }
  });

  // Trigger re-draw for textured styles
  if (!isWire && localS?.snapLM) {
    const cells = buildMesh(localS, localS.snapLM, document.getElementById('camFeed'), 'AVATAR3D');
    fillCells(localS, cells);
  }
}

// Optimized Scene Setup
function makeScene(id) {
  const el = document.getElementById(id);
  const sc = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(38, 300/360, 0.1, 100);
  cam.position.z = 2.2;
  
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(300, 360);
  el.insertBefore(renderer.domElement, el.firstChild);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(1, 1, 2);
  sc.add(light, new THREE.AmbientLight(0x404040));

  return { scene: sc, camera: cam, renderer, mesh: null, texCanvas: document.createElement('canvas') };
}

// Note: Re-integrating buildMesh and puppet logic from v6.1
// with the addition of material.wireframe toggle.

function init() {
  localS = makeScene('localFrame');
  remoteS = makeScene('remoteFrame');
  animate();
}

function animate() {
  requestAnimationFrame(animate);
  localS.renderer.render(localS.scene, localS.camera);
  remoteS.renderer.render(remoteS.scene, remoteS.camera);
}

// Minimal implementation of UI hooks for v6.2 compatibility
function onBw(v) { document.getElementById('bwVal').textContent = v; }
function onDepth(v) { depthScale = v; document.getElementById('depthVal').textContent = v + '×'; }
function setStatus(m) { document.getElementById('statusbar').textContent = m; }

window.onload = init;

// Remaining MediaPipe and WebRTC logic remains persistent from index 9.html
</script>
</body>
</html>
