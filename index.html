<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeMesh | Stable Recon V5</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .panel { pointer-events: auto; background: rgba(0, 10, 10, 0.95); border: 1px solid #00ffcc; padding: 20px; width: 300px; box-shadow: 0 0 25px rgba(0, 255, 204, 0.15); }
        button { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 12px; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; font-weight: bold; }
        button.active { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        #console { margin-top: 15px; font-size: 9px; color: #008877; border-top: 1px solid #004433; padding-top: 10px; height: 60px; overflow: hidden; }
        video { position: fixed; bottom: 10px; right: 10px; width: 140px; opacity: 0.3; transform: scaleX(-1); border: 1px solid #004433; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="ui">
        <div class="panel">
            <h1>VIBEMESH // V5</h1>
            <p>ASSET: LIVING_CLAY_STABLE</p>
            <p>STATUS: <span id="status">INIT_SEARCHING</span></p>
            <button id="connectBtn">Connect Spatial Ledger</button>
            <div id="console">> LOG: System Booting...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. BIOLUMINESCENT CHUCK CLOSE SHADER ---
        const vShader = `
            attribute vec2 customUv;
            varying vec2 vFinalUv;
            varying vec3 vNormal;
            void main() {
                vFinalUv = customUv;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fShader = `
            uniform sampler2D uVideoTexture;
            uniform float uTime;
            varying vec2 vFinalUv;
            varying vec3 vNormal;

            void main() {
                vec2 uv = vFinalUv;
                vec3 sampled = texture2D(uVideoTexture, uv).rgb;
                float lum = dot(sampled, vec3(0.299, 0.587, 0.114));

                // Chuck Close Optical Blending: 9-Layer Concentric Rings
                vec2 grid = fract(uv * 120.0) - 0.5;
                float dist = length(grid);
                
                float rings = floor(lum * 9.0);
                float stepSize = 0.45 / 9.0;
                float skinMask = 0.15; // Base ambient skin
                
                for(float i=0.0; i<9.0; i++) {
                    if(i < rings) {
                        float r = (i + 1.0) * stepSize;
                        // Optical vibration using color ratio offsets
                        float vib = sin(uTime * 3.0 + i) * 0.05;
                        if(dist < r + vib) {
                            skinMask = (mod(i, 2.0) == 0.0) ? 0.9 : 0.4;
                        }
                    }
                }

                vec3 biolume = mix(vec3(0.0, 0.05, 0.05), sampled, skinMask);
                float diffuse = max(dot(vNormal, vec3(0.5, 1.0, 0.5)), 0.2);
                gl_FragColor = vec4(biolume * (diffuse + 0.4), 1.0);
            }
        `;

        // --- 2. CORE ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video);
        
        // High-Density living clay (256x256)
        const geometry = new THREE.SphereGeometry(2.6, 256, 256);
        const originalPos = geometry.attributes.position.clone();
        
        // Custom attribute for pinned UV mapping
        const customUvAttr = new Float32Array(geometry.attributes.position.count * 2);
        geometry.setAttribute('customUv', new THREE.BufferAttribute(customUvAttr, 2));

        const material = new THREE.ShaderMaterial({
            vertexShader: vShader,
            fragmentShader: fShader,
            uniforms: { uVideoTexture: { value: videoTex }, uTime: { value: 0 } }
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        camera.position.z = 7;

        // --- 3. RECONSTRUCTION PIPELINE ---
        let landmarks = null;
        let isConnected = false;
        const log = (msg) => { document.getElementById('console').innerText = "> LOG: " + msg; };

        const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6 });
        faceMesh.onResults((res) => { if (res.multiFaceLandmarks) landmarks = res.multiFaceLandmarks[0]; });

        const cameraStream = new Camera(video, { 
            onFrame: async () => { await faceMesh.send({ image: video }); }, 
            width: 640, height: 480 
        });
        cameraStream.start().then(() => log("Stream Active")).catch(() => log("Camera Failed"));

        function updateRecon() {
            if (!isConnected || !landmarks) return;
            const pos = geometry.attributes.position;
            const uvAttr = geometry.attributes.customUv;
            const sigmaSq = 0.005; // Tight Gaussian elasticity

            // 12 Core Semantic Anchors
            const anchors = [1, 10, 152, 33, 263, 61, 291, 199, 4, 454, 234, 103];

            for (let i = 0; i < pos.count; i++) {
                let v = new THREE.Vector3(originalPos.getX(i), originalPos.getY(i), originalPos.getZ(i));
                let totalW = 0;
                let aggPos = new THREE.Vector3(0,0,0);
                let aggUv = new THREE.Vector2(0,0);

                anchors.forEach(idx => {
                    const lm = landmarks[idx];
                    // Semantic Compression: Project 2D to Volumetric Space
                    const target = new THREE.Vector3((lm.x-0.5)*-6.5, (lm.y-0.5)*-8.0, (0.5-lm.z)*6.0);
                    const dSq = v.distanceToSquared(target);
                    const w = Math.exp(-dSq / (2.0 * sigmaSq));
                    
                    if (w > 0.001) {
                        aggPos.addScaledVector(target, w);
                        aggUv.addScaledVector(new THREE.Vector2(lm.x, lm.y), w);
                        totalW += w;
                    }
                });

                if (totalW > 0) {
                    v.lerp(aggPos.divideScalar(totalW), 0.92);
                    const fUv = aggUv.divideScalar(totalW);
                    uvAttr.setXY(i, 1.0 - fUv.x, fUv.y); 
                }
                pos.setXYZ(i, v.x, v.y, v.z);
            }
            pos.needsUpdate = true;
            uvAttr.needsUpdate = true;
            geometry.computeVertexNormals();
        }

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value = performance.now() * 0.001;
            updateRecon();
            renderer.render(scene, camera);
        }

        document.getElementById('connectBtn').onclick = (e) => {
            isConnected = !isConnected;
            e.target.classList.toggle('active');
            log(isConnected ? "Spatial Ledger Connected" : "Ledger Disconnected");
            document.getElementById('status').innerText = isConnected ? 'SYNC_ACTIVE' : 'IDLE';
        };

        animate();
    </script>
</body>
</html>
