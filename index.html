<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh | LoBi-Net Simulation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --alert: #ff0055; --bg: #020205; --panel: #0a0a16; }
body{background:var(--bg);color:#fff;font-family:'Courier New', monospace;margin:0;overflow:hidden}

.app-container { display: flex; flex-direction: column; height: 100vh; }
.stage{display:flex;justify-content:center;gap:15px;padding:20px;flex-grow: 1;}
.viewport{position:relative;width:45%;max-width:500px;background:#000;border:1px solid #1a1a2a;border-radius:12px;overflow:hidden;}
.tag{position:absolute;top:15px;left:15px;font-size:0.6em;color:var(--neon);letter-spacing:2px;z-index:10;text-transform:uppercase; background:rgba(0,0,0,0.8); padding:4px 8px;}

/* Network Monitor UI */
.network-deck{background:var(--panel);padding:20px 30px;border-top:1px solid #1a1a2a; display: flex; flex-direction: column; gap: 15px;}
.throttle-row { display: flex; align-items: center; gap: 20px; }
.throttle-row label { font-size: 0.7em; color: #888; text-transform: uppercase; letter-spacing: 1px; width: 150px;}
input[type=range] { flex-grow: 1; accent-color: var(--neon); cursor: pointer; }
.readout { font-size: 1.2em; font-weight: bold; color: var(--neon); width: 120px; text-align: right; }

.monitor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.m-card { background: #05050a; padding: 12px; border: 1px solid #111; border-radius: 6px; text-align: center; }
.m-card span { display: block; font-size: 0.6em; color: #555; text-transform: uppercase; margin-bottom: 5px; }
.m-card strong { font-size: 1.1em; color: #fff; }
.alert-text { color: var(--alert) !important; }

.controls { display: flex; gap: 10px; margin-top: 10px; }
.btn { flex: 1; padding: 15px; background: #111; color: #888; border: 1px solid #222; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;}
.btn.active { background: var(--neon); color: #000; border-color: var(--neon); }

video { display: none; }
</style>
</head>
<body>

<div class="app-container">
  <div class="stage">
    <div class="viewport" id="v-sender">
      <div class="tag">NODE_1: SENDER (TX)</div>
    </div>
    <div class="viewport" id="v-receiver">
      <div class="tag" style="color:#b266ff">NODE_2: RENDERER (RX)</div>
    </div>
  </div>

  <div class="network-deck">
    <div class="throttle-row">
      <label>LoBi-Net Throttle</label>
      <input type="range" id="bw-slider" min="1" max="250" value="200" oninput="updateSlider()">
      <div class="readout" id="bw-display">200 KB/s</div>
    </div>

    <div class="monitor-grid">
      <div class="m-card"><span>Payload Size</span><strong>5.6 KB</strong></div>
      <div class="m-card"><span>TX Rate (Sender)</span><strong id="mon-tx">0 FPS</strong></div>
      <div class="m-card"><span>RX Rate (Receiver)</span><strong id="mon-rx">0 FPS</strong></div>
      <div class="m-card"><span>UDP Packet Loss</span><strong id="mon-drop" class="alert-text">0%</strong></div>
    </div>

    <div class="controls">
      <button class="btn active" id="btn-init" onclick="initSystem()">1. Initialize Optics</button>
      <button class="btn" id="btn-snap" onclick="triggerDataDump()" disabled>2. Transmit Color Matrix</button>
      <button class="btn" id="btn-puppet" onclick="toggleNetwork()" disabled>3. Open XYZ Telemetry</button>
    </div>
  </div>
</div>

<video id="webcam" playsinline></video>

<script>
let localScene, remoteScene, isTransmitting = false;
let latestLandmarks = null;
let captureCanvas, captureCtx;

// Network Simulation State
let maxBytesPerSecond = 200 * 1024; 
const PACKET_SIZE_BYTES = 5616; // 468 points * 3 coords * 4 bytes (Float32)
let currentSecond = Math.floor(Date.now() / 1000);
let bytesUsedThisSecond = 0;

// Metrics Logging
let txFrames = 0, rxFrames = 0, droppedFrames = 0;

function updateSlider() {
    const val = document.getElementById('bw-slider').value;
    document.getElementById('bw-display').textContent = val + " KB/s";
    maxBytesPerSecond = val * 1024;
}

// Reset metric counters every second
setInterval(() => {
    document.getElementById('mon-tx').textContent = txFrames + " FPS";
    document.getElementById('mon-rx').textContent = rxFrames + " FPS";
    
    const dropRate = txFrames > 0 ? Math.round((droppedFrames / txFrames) * 100) : 0;
    document.getElementById('mon-drop').textContent = dropRate + "%";
    
    txFrames = 0; rxFrames = 0; droppedFrames = 0;
}, 1000);

// Procedural texture for the receiver
function createRingTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.beginPath(); ctx.arc(32, 32, 28, 0, Math.PI * 2); ctx.lineWidth = 6; ctx.strokeStyle = '#fff'; ctx.stroke();
    ctx.beginPath(); ctx.arc(32, 32, 12, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
    return new THREE.CanvasTexture(canvas);
}

function buildNodeEnv(containerId, isReceiver) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 500/500, 0.1, 100);
    camera.position.set(0, 0, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(renderer.domElement.parentElement.clientWidth, renderer.domElement.parentElement.clientHeight);
    document.getElementById(containerId).appendChild(renderer.domElement);

    const grid = new THREE.GridHelper(10, 20, isReceiver ? 0xb266ff : 0x00f0ff, 0x111122);
    grid.position.y = -1.5; grid.position.z = -1;
    scene.add(grid);

    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(468 * 3);
    const col = new Float32Array(468 * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

    let mat;
    if (isReceiver) {
        mat = new THREE.PointsMaterial({ size: 0.12, map: createRingTexture(), vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
    } else {
        mat = new THREE.PointsMaterial({ size: 0.03, color: 0x00f0ff, transparent: true, opacity: 0.6 });
    }

    const mesh = new THREE.Points(geo, mat);
    scene.add(mesh);

    window.addEventListener('resize', () => {
        const parent = renderer.domElement.parentElement;
        camera.aspect = parent.clientWidth / parent.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(parent.clientWidth, parent.clientHeight);
    });

    return { scene, camera, renderer, mesh, pos, col };
}

async function initSystem() {
    document.getElementById('btn-init').textContent = "Booting...";
    localScene = buildNodeEnv('v-sender', false);
    remoteScene = buildNodeEnv('v-receiver', true);

    const video = document.getElementById('webcam');
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    video.srcObject = stream; video.play();

    captureCanvas = document.createElement('canvas');
    captureCanvas.width = 640; captureCanvas.height = 480;
    captureCtx = captureCanvas.getContext('2d');

    const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
    
    faceMesh.onResults(res => {
        if (!res.multiFaceLandmarks?.[0]) return;
        latestLandmarks = res.multiFaceLandmarks[0];
        
        // 1. SENDER: Always updates instantly (Zero Latency locally)
        updateGeometry(localScene, latestLandmarks);
        
        // 2. NETWORK BRIDGE
        if (isTransmitting) {
            txFrames++;
            const now = Math.floor(Date.now() / 1000);
            if (now !== currentSecond) {
                currentSecond = now;
                bytesUsedThisSecond = 0;
            }

            if (bytesUsedThisSecond + PACKET_SIZE_BYTES <= maxBytesPerSecond) {
                // Packet Success -> Send to Receiver
                bytesUsedThisSecond += PACKET_SIZE_BYTES;
                rxFrames++;
                updateGeometry(remoteScene, latestLandmarks);
            } else {
                // Packet Dropped -> Receiver misses this frame
                droppedFrames++;
            }
        }
    });

    const cameraUtils = new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } });
    cameraUtils.start();

    requestAnimationFrame(function animate() {
        localScene.renderer.render(localScene.scene, localScene.camera);
        remoteScene.renderer.render(remoteScene.scene, remoteScene.camera);
        requestAnimationFrame(animate);
    });

    document.getElementById('btn-init').classList.remove('active');
    const snapBtn = document.getElementById('btn-snap');
    snapBtn.disabled = false; snapBtn.classList.add('active');
}

function triggerDataDump() {
    if (!latestLandmarks) return;
    const video = document.getElementById('webcam');
    captureCtx.drawImage(video, 0, 0);

    const colArray = remoteScene.col;
    latestLandmarks.forEach((pt, i) => {
        const px = Math.min(Math.floor(pt.x * 640), 639);
        const py = Math.min(Math.floor(pt.y * 480), 479);
        const pixel = captureCtx.getImageData(px, py, 1, 1).data;
        colArray[i*3] = pixel[0]/255; colArray[i*3+1] = pixel[1]/255; colArray[i*3+2] = pixel[2]/255;
    });

    remoteScene.mesh.geometry.attributes.color.needsUpdate = true;
    updateGeometry(remoteScene, latestLandmarks);

    document.getElementById('btn-snap').classList.remove('active');
    document.getElementById('btn-snap').textContent = "Color Locked";
    
    const pupBtn = document.getElementById('btn-puppet');
    pupBtn.disabled = false; pupBtn.classList.add('active');
}

function updateGeometry(node, lm) {
    const pos = node.pos;
    lm.forEach((pt, i) => {
        pos[i*3] = (pt.x - 0.5) * -4.5;
        pos[i*3+1] = (pt.y - 0.5) * -4.5;
        pos[i*3+2] = (pt.z * -4);
    });
    node.mesh.geometry.attributes.position.needsUpdate = true;
}

function toggleNetwork() {
    isTransmitting = !isTransmitting;
    const btn = document.getElementById('btn-puppet');
    if(isTransmitting) {
        btn.textContent = "Telemetry Live";
        btn.style.background = "var(--neon)"; btn.style.color = "#000";
    } else {
        btn.textContent = "3. Open XYZ Telemetry";
        btn.style.background = "#111"; btn.style.color = "#888";
    }
}
</script>
</body>
</html>
