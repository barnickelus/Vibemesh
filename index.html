<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh v9.6 | The Close Wrap</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --accent: #00f0ff; --panel-bg: #0c0c1e; }
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05050a;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden}
.hdr{text-align:center;padding:20px 10px 10px}
.hdr h1{font-size:1.6em;font-weight:900;background:linear-gradient(90deg,#00f0ff,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;letter-spacing:2px}
.call{display:flex;justify-content:center;gap:20px;padding:10px;flex-wrap:wrap}
.av-frame{position:relative;width:320px;height:400px;border-radius:18px;background:#08081a;border:1px solid rgba(255,255,255,0.05);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.7)}
.av-frame canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.pip{position:absolute;bottom:12px;right:12px;width:80px;height:60px;border-radius:10px;border:2px solid rgba(0,240,255,0.3);overflow:hidden;z-index:30}
.pip video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}

.build-ov{position:absolute;inset:0;background:rgba(5,5,10,0.9);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;display:none}
.build-lbl{font-size:.6em;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.build-track{width:180px;height:3px;background:#111;border-radius:2px;overflow:hidden}
.build-bar{height:100%;width:0%;background:linear-gradient(90deg,#00f0ff,#ff00aa);transition:width .3s}

.panel{max-width:640px;margin:10px auto;background:var(--panel-bg);padding:24px;border-radius:24px;border:1px solid rgba(255,255,255,0.03)}
.style-row{display:flex;gap:10px;margin-bottom:20px}
.sb{flex:1;padding:12px;font-size:.65em;font-weight:800;background:#16162d;color:#555;border:1px solid rgba(255,255,255,0.05);border-radius:12px;cursor:pointer;text-transform:uppercase}
.sb.on{background:rgba(0,240,255,0.1);color:var(--accent);border-color:rgba(0,240,255,0.4)}
.sliders{display:grid;grid-template-columns:1fr 1fr;gap:25px;margin-bottom:20px}
.sl-item label{display:block;font-size:.55em;color:#444;text-transform:uppercase;margin-bottom:8px;letter-spacing:1px}
input[type=range]{width:100%;accent-color:var(--accent);height:4px;background:#1a1a35}
.btn-row{display:flex;gap:12px}
.btn{flex:1;padding:16px;font-weight:800;border:none;border-radius:14px;cursor:pointer;text-transform:uppercase;font-size:.7em;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,#ff00aa,#00f0ff);color:#000}
.btn-ghost{background:#1a1a35;color:#888;border:1px solid rgba(255,255,255,0.05)}
</style>
</head>
<body>

<div class="hdr"><h1>VibeMesh v9.6</h1></div>

<div class="call">
  <div class="av-frame" id="localFrame">
    <div class="build-ov" id="localBuildOv">
      <div class="build-lbl" id="localBuildLbl">Sampling Biometrics</div>
      <div class="build-track"><div class="build-bar" id="localBuildBar"></div></div>
    </div>
    <div class="pip"><video id="pipLocal" autoplay muted playsinline></video></div>
  </div>
  <div class="av-frame" id="remoteFrame"></div>
</div>

<div class="panel">
  <div class="style-row">
    <button class="sb on" id="btn-rings" onclick="setStyle('rings')">Rings</button>
    <button class="sb" id="btn-dots" onclick="setStyle('dots')">Dots</button>
    <button class="sb" id="btn-cross" onclick="setStyle('cross')">Cross</button>
  </div>
  <div class="sliders">
    <div class="sl-item"><label>3D Depth</label><input type="range" id="depthSlider" min="1" max="40" value="20"></div>
    <div class="sl-item"><label>Elasticity</label><input type="range" id="sigmaSlider" min="1" max="10" value="4"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="startCamera()">Init Optics</button>
    <button class="btn btn-primary" id="snapBtn" onclick="startSnap()" disabled>Biometric Scan</button>
    <button class="btn btn-primary" id="liveBtn" onclick="toggleLive()" disabled style="background:#ff6600">Start Stream</button>
  </div>
</div>

<video id="camFeed" autoplay muted playsinline style="display:none"></video>

<script>
'use strict';

// ── CONFIG ──
const ANCHORS = [33,133,362,263,1,4,61,291,152,10,187,411]; 
const TIERS = { AVATAR3D:{W:30, H:36}, PUPPET:{W:16, H:20}, SPRITE:{W:8, H:10}, GLYPH:{W:4, H:5} };
const CELL_STEP = 34; 

let localS, lastLM, cellStyle = 'rings', puppetActive = false;

function makeScene(id) {
  const sc = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(38, 320/400, 0.1, 100);
  cam.position.z = 2.5;
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(320, 400);
  document.getElementById(id).appendChild(renderer.domElement);
  
  sc.add(new THREE.AmbientLight(0xffffff, 1.0));
  const dir = new THREE.DirectionalLight(0xffffff, 0.5); dir.position.set(0,1,2); sc.add(dir);

  return { scene:sc, camera:cam, renderer, mesh:null, texCanvas:document.createElement('canvas'), basePos:null, snapLM:null };
}

// ── THE CHUCK CLOSE RENDERING ENGINE ──
function drawCell(ctx, cx, cy, r, g, b) {
  const rad = 17, lum = (r*0.299 + g*0.587 + b*0.114) / 255;
  const contrast = 1.3;
  const adj = (c) => Math.min(255, Math.max(0, ((c/255 - 0.5) * contrast + 0.5) * 255));
  const fr = adj(r), fg = adj(g), fb = adj(b);
  
  const dRGB = `rgb(${fr*0.3},${fg*0.3},${fb*0.3})`;
  const hRGB = `rgb(${Math.min(255,fr*1.6)},${Math.min(255,fg*1.6)},${Math.min(255,fb*1.6)})`;

  if(cellStyle === 'rings') {
    ctx.fillStyle = dRGB; ctx.fillRect(cx-rad, cy-rad, rad*2, rad*2);
    const nR = Math.max(3, Math.round(2 + lum * 6));
    for(let i=nR; i>=1; i--) {
      ctx.beginPath();
      ctx.arc(cx + (Math.random()-0.5)*1.5, cy + (Math.random()-0.5)*1.5, rad * (i/nR) * 0.94, 0, Math.PI*2);
      ctx.fillStyle = i%2 === 0 ? `rgb(${fr},${fg},${fb})` : hRGB;
      ctx.fill();
    }
  } else {
    ctx.fillStyle = `rgb(${fr},${fg},${fb})`;
    ctx.beginPath(); ctx.arc(cx, cy, rad * lum * 1.3, 0, Math.PI*2); ctx.fill();
  }
}

// ── BIOMETRIC SAMPLING & WRAP ──
async function buildMesh(sc, lm, tierName) {
  const cfg = TIERS[tierName];
  const W = cfg.W, H = cfg.H;
  const feed = document.getElementById('camFeed');
  
  // Capture current frame for sampling
  const sCanv = document.createElement('canvas');
  sCanv.width = feed.videoWidth; sCanv.height = feed.videoHeight;
  const sCtx = sCanv.getContext('2d');
  sCtx.drawImage(feed, 0, 0);

  // Bounding Box Logic (Mirroring)
  let x0=1, x1=0, y0=1, y1=0;
  lm.forEach(p => { const mx=1-p.x; if(mx<x0) x0=mx; if(mx>x1) x1=mx; if(p.y<y0) y0=p.y; if(p.y>y1) y1=p.y; });
  sc.snapBBox = { x0, x1, y0, y1, w:x1-x0, h:y1-y0 };
  sc.snapAnchors = ANCHORS.map(i => ({ idx:i, u:(1-lm[i].x-x0)/(x1-x0), v:(lm[i].y-y0)/(y1-y0) }));
  sc.snapLM = lm.map(p => ({...p}));

  sc.texCanvas.width = W * CELL_STEP; sc.texCanvas.height = H * CELL_STEP;
  const ctx = sc.texCanvas.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,sc.texCanvas.width, sc.texCanvas.height);

  // Create Wire Mesh
  const nV = (W+1)*(H+1), pos = new Float32Array(nV*3), uv = new Float32Array(nV*2), indices = [];
  for(let j=0; j<=H; j++) {
    for(let i=0; i<=W; i++) {
      const u=i/W, v=j/H, vi=j*(W+1)+i;
      pos[vi*3]=(u-0.5)*2.2; pos[vi*3+1]=(0.5-v)*2.8; pos[vi*3+2]=-lm[0].z;
      uv[vi*2]=u; uv[vi*2+1]=1-v;
      if(i<W && j<H) {
        const tl=j*(W+1)+i, tr=tl+1, bl=(j+1)*(W+1)+i, br=bl+1;
        indices.push(tl,bl,tr, bl,br,tr);
      }
    }
  }

  if(sc.mesh) { sc.mesh.geometry.dispose(); sc.mesh.material.dispose(); sc.scene.remove(sc.mesh); }
  sc.tex = new THREE.CanvasTexture(sc.texCanvas);
  sc.mesh = new THREE.Mesh(new THREE.BufferGeometry(), new THREE.MeshStandardMaterial({ map:sc.tex, flatShading:true }));
  sc.mesh.geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  sc.mesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  sc.mesh.geometry.setIndex(indices);
  sc.scene.add(sc.mesh);
  sc.basePos = pos.slice(); sc.snapW = W; sc.snapH = H;

  // Sampler: Loop through the grid and grab pixel data from the specific face region
  for(let j=0; j<H; j++) {
    for(let i=0; i<W; i++) {
      const vx = Math.floor((x0 + (i/W) * (x1-x0)) * sCanv.width);
      const vy = Math.floor((y0 + (j/H) * (y1-y0)) * sCanv.height);
      const pix = sCtx.getImageData(vx, vy, 1, 1).data;
      drawCell(ctx, i*CELL_STEP+17, j*CELL_STEP+17, pix[0], pix[1], pix[2]);
    }
  }
  sc.tex.needsUpdate = true;
}

async function startSnap() {
  const ov = document.getElementById('localBuildOv'), bar = document.getElementById('localBuildBar');
  ov.style.display = 'flex';
  const passes = ['GLYPH', 'SPRITE', 'PUPPET', 'AVATAR3D'];
  for(let i=0; i<passes.length; i++) {
    bar.style.width = ((i+1)/4*100)+'%';
    await buildMesh(localS, lastLM, passes[i]);
    await new Promise(r => setTimeout(r, 450));
  }
  ov.style.display = 'none';
  document.getElementById('liveBtn').disabled = false;
}

function puppet(sc, liveLM) {
  if(!sc.mesh || !sc.snapAnchors) return;
  const pos = sc.mesh.geometry.attributes.position.array;
  const W = sc.snapW, H = sc.snapH, bb = sc.snapBBox;
  const d = parseFloat(document.getElementById('depthSlider').value);
  const sig = parseFloat(document.getElementById('sigmaSlider').value) * 0.01;

  for(let j=0; j<=H; j++) {
    for(let i=0; i<=W; i++) {
      const vi = j*(W+1)+i, u = i/W, v = j/H;
      let du=0, dv=0, dz=0, tw=0;
      for(const a of sc.snapAnchors) {
        const w = Math.exp(-((a.u-u)**2 + (a.v-v)**2)/(2 * sig * sig));
        const lUV = { u:(1-liveLM[a.idx].x-bb.x0)/bb.w, v:(liveLM[a.idx].y-bb.y0)/bb.h };
        du += (lUV.u - a.u)*w; dv += (lUV.v - a.v)*w; dz += (liveLM[a.idx].z - sc.snapLM[a.idx].z)*w;
        tw += w;
      }
      if(tw > 0) {
        pos[vi*3] = sc.basePos[vi*3] + (du/tw)*2.2;
        pos[vi*3+1] = sc.basePos[vi*3+1] - (dv/tw)*2.8;
        pos[vi*3+2] = sc.basePos[vi*3+2] - (dz/tw * d * 0.2);
      }
    }
  }
  sc.mesh.geometry.attributes.position.needsUpdate = true;
  sc.mesh.geometry.computeVertexNormals();
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById('pipLocal').srcObject = stream;
  const feed = document.getElementById('camFeed'); feed.srcObject = stream;
  const faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
  faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true });
  faceMesh.onResults(res => {
    if(!res.multiFaceLandmarks?.[0]) return;
    lastLM = res.multiFaceLandmarks[0];
    if(puppetActive) puppet(localS, lastLM);
  });
  new Camera(feed, { onFrame: async () => { await faceMesh.send({ image: feed }); } }).start();
  document.getElementById('snapBtn').disabled = true; 
  setTimeout(() => document.getElementById('snapBtn').disabled = false, 1500);
}

function toggleLive() { puppetActive = !puppetActive; document.getElementById('liveBtn').textContent = puppetActive ? "Halt Stream" : "Start Stream"; }
function setStyle(s) { cellStyle = s; document.querySelectorAll('.sb').forEach(b => b.classList.remove('on')); document.getElementById('btn-'+s).classList.add('on'); }

window.onload = () => {
  localS = makeScene('localFrame');
  (function render() { requestAnimationFrame(render); localS.renderer.render(localS.scene, localS.camera); })();
};
</script>
</body>
</html>
