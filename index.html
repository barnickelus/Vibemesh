<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeMesh | Chuck Close Matrix V10</title>
    <style>
        body { margin: 0; background: #010101; color: #ffaa00; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .panel { pointer-events: auto; background: rgba(5, 5, 5, 0.9); border: 1px solid #444; padding: 20px; width: 300px; }
        button { background: #222; color: #ffaa00; border: 1px solid #ffaa00; padding: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        #console { margin-top: 10px; font-size: 10px; color: #888; height: 60px; overflow-y: auto; border-top: 1px solid #333; }
        video { position: fixed; bottom: 10px; right: 10px; width: 160px; opacity: 0.3; transform: scaleX(-1); border: 1px solid #333; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="ui">
        <div class="panel">
            <h2 style="margin:0 0 10px 0; font-size: 18px;">LO-BI NET // RECON</h2>
            <p style="font-size: 10px; color: #666;">SKIN: CHUCK_CLOSE_MATRIX_V10</p>
            <button id="startBtn">SYNC SPATIAL LEDGER</button>
            <div id="console">> Awaiting stream...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        const video = document.getElementById('webcam');
        const log = (m) => { document.getElementById('console').innerHTML = `> ${m}<br>` + document.getElementById('console').innerHTML; };

        // --- 1. THREE.JS SCENE ---
        const scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 100);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const videoTex = new THREE.VideoTexture(video);

        // --- 2. DUAL-UV CHUCK CLOSE SHADER ---
        const matrixMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTexture: { value: videoTex },
                uTime: { value: 0 },
                uGridDensity: { value: 54.0 } // Adjust for tile size
            },
            vertexShader: `
                varying vec2 vCanonicalUv; 
                varying vec2 vScreenUv;

                void main() {
                    vCanonicalUv = uv; // Grid wraps around the 3D shape
                    
                    // Project 3D vertex to 2D screen space to sample camera color
                    vec4 worldPos = modelMatrix * vec4(position, 1.0);
                    vec4 clipPos = projectionMatrix * viewMatrix * worldPos;
                    vScreenUv = (clipPos.xy / clipPos.w) * 0.5 + 0.5;

                    gl_Position = clipPos;
                }
            `,
            fragmentShader: `
                uniform sampler2D uTexture;
                uniform float uTime;
                uniform float uGridDensity;
                varying vec2 vCanonicalUv;
                varying vec2 vScreenUv;

                void main() {
                    // Create contiguous tiles using Canonical UVs
                    vec2 cellUv = floor(vCanonicalUv * uGridDensity) / uGridDensity;
                    vec2 localUv = fract(vCanonicalUv * uGridDensity) - 0.5;

                    // Sample live color from Screen UVs (inverted for mirror effect)
                    vec3 colorData = texture2D(uTexture, vec2(1.0 - vScreenUv.x, vScreenUv.y)).rgb;
                    
                    // The Chuck Close Logic: Edge-to-edge tiling
                    float dist = length(localUv);
                    
                    // Base tile color (Darker)
                    vec3 finalColor = colorData * 0.7; 

                    // Primary internal shape (Diamond/Circle blend)
                    float shape = smoothstep(0.45, 0.4, dist);
                    vec3 secondaryColor = colorData * 1.3; // Vibrance
                    
                    // Shift the secondary color slightly for "vibration"
                    secondaryColor.r += sin(uTime + cellUv.x * 10.0) * 0.1;
                    
                    finalColor = mix(finalColor, secondaryColor, shape);

                    // Inner core (Optical center)
                    float core = smoothstep(0.15, 0.1, dist);
                    finalColor = mix(finalColor, vec3(1.0) * colorData, core);

                    // Subtle grid borders
                    float border = smoothstep(0.48, 0.5, max(abs(localUv.x), abs(localUv.y)));
                    finalColor = mix(finalColor, finalColor * 0.2, border);

                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `
        });

        // --- 3. MEDIAPIPE TO GEOMETRY ---
        const geometry = new THREE.BufferGeometry();
        const mesh = new THREE.Mesh(geometry, matrixMaterial);
        scene.add(mesh);

        let isInitialized = false;

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });

        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                const landmarks = results.multiFaceLandmarks[0];
                
                if (!isInitialized) {
                    // Map initial positions to a normalized 0-1 "Pelt Map" for Canonical UVs
                    const uvs = landmarks.map(l => [l.x, 1.0 - l.y]).flat();
                    geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
                    
                    // Generate indices for the standard MediaPipe triangles
                    const indices = [];
                    for (let i = 0; i < window.FACEMESH_TESSELATION.length; i++) {
                        indices.push(window.FACEMESH_TESSELATION[i][0], window.FACEMESH_TESSELATION[i][1], window.FACEMESH_TESSELATION[i][2]);
                    }
                    geometry.setIndex(indices);
                    isInitialized = true;
                    log("TOPOLOGY LOCKED.");
                }

                const positions = new Float32Array(landmarks.length * 3);
                for (let i = 0; i < landmarks.length; i++) {
                    positions[i*3] = (landmarks[i].x - 0.5) * aspect * 2.5;
                    positions[i*3+1] = -(landmarks[i].y - 0.5) * 2.5;
                    positions[i*3+2] = -landmarks[i].z * 2;
                }
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.attributes.position.needsUpdate = true;
                geometry.computeVertexNormals();
            }
        });

        const cam = new Camera(video, {
            onFrame: async () => { await faceMesh.send({ image: video }); },
            width: 640, height: 480
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            log("BOOTING SYSTEM...");
            cam.start();
        });

        function animate() {
            requestAnimationFrame(animate);
            matrixMaterial.uniforms.uTime.value = performance.now() * 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            const nA = window.innerWidth / window.innerHeight;
            camera.left = -nA; camera.right = nA;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
