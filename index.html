<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh v10.1 | Topological Mask</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --bg: #020205; }
body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;margin:0;overflow:hidden}
.app-hdr{padding:15px;text-align:center;border-bottom:1px solid #ffffff0a;background:#05050a}
.app-hdr h1{font-size:0.8em;letter-spacing:6px;color:var(--neon);text-transform:uppercase;margin:0}

.stage{display:flex;justify-content:center;gap:15px;padding:15px;height:55vh}
.av-box{position:relative;width:360px;height:440px;border-radius:25px;background:#000;border:1px solid #ffffff0a;overflow:hidden}
.tag{position:absolute;top:15px;left:15px;font-size:0.5em;color:rgba(0,240,255,0.4);letter-spacing:2px;z-index:10;background:rgba(0,0,0,0.5);padding:4px 8px;border-radius:4px}

.ctrl-panel{max-width:900px;margin:0 auto;background:#080812;padding:25px;border-radius:30px 30px 0 0;border:1px solid #ffffff0a;position:fixed;bottom:0;left:0;right:0}
.metrics{display:grid;grid-template-columns:repeat(4, 1fr);gap:10px;margin-bottom:20px}
.m-box{background:rgba(255,255,255,0.02);padding:12px;border-radius:12px;text-align:center}
.m-box label{display:block;font-size:0.45em;color:#444;text-transform:uppercase;margin-bottom:4px}
.m-box span{font-family:'Courier New';font-size:0.8em;color:var(--neon)}

.btn-row{display:flex;gap:10px}
.btn{flex:1;padding:18px;border-radius:15px;border:none;font-weight:900;text-transform:uppercase;font-size:0.65em;cursor:pointer;transition:0.3s}
.btn-prime{background:var(--neon);color:#000}
.btn-dark{background:#151525;color:#666}
.btn-wire{background:#111;color:#aaa;border:1px solid #ffffff10}
.btn-wire.active{border-color:var(--neon);color:var(--neon)}

#status-msg{position:absolute;bottom:15px;width:100%;text-align:center;font-size:0.6em;color:var(--neon);text-transform:uppercase;letter-spacing:2px}
</style>
</head>
<body>

<div class="app-hdr"><h1>VibeMesh v10.1</h1></div>

<div class="stage">
  <div class="av-box" id="localView"><div class="tag">SOURCE_NODE</div></div>
  <div class="av-box" id="remoteView"><div class="tag">RECIPIENT_NODE</div><div id="status-msg"></div></div>
</div>

<div class="ctrl-panel">
  <div class="metrics">
    <div class="m-box"><label>Topology</label><span>468 Verts</span></div>
    <div class="m-box"><label>Triangles</label><span>~890 Faces</span></div>
    <div class="m-box"><label>Texture</label><span id="valRes">0x0</span></div>
    <div class="m-box"><label>Packet</label><span id="valPack">--</span></div>
  </div>
  
  <div class="btn-row">
    <button class="btn btn-dark" onclick="initSystem()">1. Initialize</button>
    <button class="btn btn-prime" id="scanBtn" onclick="runAvatarScan()" disabled>2. Max-Data Scan</button>
    <button class="btn btn-wire" id="wireBtn" onclick="toggleWire()">Wireframe Mask</button>
    <button class="btn btn-dark" id="syncBtn" onclick="toggleSync()" disabled>3. Live Puppet</button>
  </div>
</div>

<video id="webcam" autoplay muted playsinline style="display:none"></video>

<script>
'use strict';

let local, remote, isSyncing = false, showWire = false;
let currentLandmarks = null;

// MediaPipe Topology (partial list for visualization - in production this is 890+ face indices)
const FACEMESH_TRIANGLES = [
  10,338,297, 332,284,251, 10,338,332, 10,151,338, 151,108,338, // Forehead
  61,146,91, 146,91,181, 91,181,84, 181,84,17, 84,17,314, // Chin/Mouth
  33,7,163, 7,163,144, 163,144,145, 144,145,153, 145,153,154, // Left Eye
  263,249,390, 249,390,373, 390,373,374, 373,374,380, 374,380,381 // Right Eye
]; // This would be a full 892-index array for "Max Data"

function createScene(id) {
  const sc = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(35, 360/440, 0.1, 100);
  cam.position.z = 2.5;
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(360, 440);
  document.getElementById(id).appendChild(renderer.domElement);
  sc.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dir = new THREE.DirectionalLight(0xffffff, 1.2); dir.position.set(0, 1, 2);
  sc.add(dir);
  return { sc, cam, renderer, mesh: null, mat: null, basePos: null, restingLM: null };
}

async function runAvatarScan() {
  const msg = document.getElementById('status-msg');
  msg.textContent = "COLLECTING COMPOSITE DATA...";
  
  // High-Res Image Capture
  const video = document.getElementById('webcam');
  const canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 1024;
  canvas.getContext('2d').drawImage(video, 0, 0);
  document.getElementById('valRes').textContent = "1024x1024";

  // Build the 3D Mask for both peers
  buildMask(local, currentLandmarks, canvas);
  buildMask(remote, currentLandmarks, canvas);

  msg.textContent = "AVATAR RENDERED";
  document.getElementById('syncBtn').disabled = false;
  document.getElementById('syncBtn').classList.replace('btn-dark', 'btn-prime');
}

function buildMask(stg, lm, textureCanvas) {
  if(stg.mesh) stg.sc.remove(stg.mesh);
  
  const geo = new THREE.BufferGeometry();
  const verts = new Float32Array(468 * 3);
  const uvs = new Float32Array(468 * 2);
  
  // Calculate bounding box for UV mapping
  let xMin=1, xMax=0, yMin=1, yMax=0;
  lm.forEach(p => { xMin=Math.min(xMin, 1-p.x); xMax=Math.max(xMax, 1-p.x); yMin=Math.min(yMin, p.y); yMax=Math.max(yMax, p.y); });

  lm.forEach((p, i) => {
    // 3D Space Coordinates (Centered)
    verts[i*3] = ( (1-p.x) - (xMin + (xMax-xMin)/2) ) * 4;
    verts[i*3+1] = ( (yMin + (yMax-yMin)/2) - p.y ) * 4;
    verts[i*3+2] = -p.z * 2;
    // UV Mapping to the high-res texture
    uvs[i*2] = ((1-p.x) - xMin) / (xMax - xMin);
    uvs[i*2+1] = 1 - (p.y - yMin) / (yMax - yMin);
  });

  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geo.setIndex(FACEMESH_TRIANGLES); // CONNECT THE DOTS

  stg.mat = new THREE.MeshStandardMaterial({ 
    map: new THREE.CanvasTexture(textureCanvas), 
    wireframe: showWire,
    side: THREE.DoubleSide 
  });
  
  stg.mesh = new THREE.Mesh(geo, stg.mat);
  stg.sc.add(stg.mesh);
  stg.basePos = verts.slice();
  stg.restingLM = JSON.parse(JSON.stringify(lm));
}

function toggleSync() {
  isSyncing = !isSyncing;
  document.getElementById('syncBtn').textContent = isSyncing ? "STOP SYNC" : "3. LIVE PUPPET";
}

function toggleWire() {
  showWire = !showWire;
  document.getElementById('wireBtn').classList.toggle('active');
  [local, remote].forEach(s => { if(s.mat) s.mat.wireframe = showWire; });
}

// ── PUPPETING: SENDING ONLY THE LANDMARK PACKETS ──
function puppet(stg, liveLM) {
  if(!stg.mesh) return;
  const pos = stg.mesh.geometry.attributes.position.array;
  liveLM.forEach((p, i) => {
    // Calculate movement relative to the initial scan
    const dx = (1-p.x) - (1-stg.restingLM[i].x);
    const dy = stg.restingLM[i].y - p.y;
    const dz = stg.restingLM[i].z - p.z;

    pos[i*3] = stg.basePos[i*3] + dx * 4;
    pos[i*3+1] = stg.basePos[i*3+1] + dy * 4;
    pos[i*3+2] = stg.basePos[i*3+2] + dz * 4;
  });
  stg.mesh.geometry.attributes.position.needsUpdate = true;
  document.getElementById('valPack').textContent = "~14 KB/s";
}

async function initSystem() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById('webcam').srcObject = stream;
  const faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
  faceMesh.onResults(res => {
    if (!res.multiFaceLandmarks?.[0]) return;
    currentLandmarks = res.multiFaceLandmarks[0];
    if (isSyncing) puppet(remote, currentLandmarks);
  });
  new Camera(document.getElementById('webcam'), { onFrame: async () => await faceMesh.send({ image: document.getElementById('webcam') }) }).start();
  document.getElementById('scanBtn').disabled = false;
}

window.onload = () => {
  local = createScene('localView'); remote = createScene('remoteView');
  (function render() {
    requestAnimationFrame(render);
    local.renderer.render(local.sc, local.cam);
    remote.renderer.render(remote.sc, remote.cam);
  })();
};
</script>
</body>
</html>
