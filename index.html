<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeMesh | Volumetric Reconstruction</title>
    <style>
        body { margin: 0; background: #000; color: #ffb894; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .controls { pointer-events: auto; background: rgba(10, 5, 2, 0.95); padding: 20px; border: 1px solid #ffb894; width: 280px; }
        button { background: transparent; color: #ffb894; border: 1px solid #ffb894; padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 10px; width: 100%; margin-top: 10px; }
        button.active { background: #ffb894; color: #000; }
        video { position: fixed; bottom: 10px; right: 10px; width: 160px; opacity: 0.4; transform: scaleX(-1); border: 1px solid #444; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="ui">
        <div class="controls">
            <h1>VIBEMESH // RECON</h1>
            <p>STATUS: <span id="status">IDLE_SEARCHING</span></p>
            <p>PACKET_SYNC: <span id="packet-indicator">OFFLINE</span></p>
            <button id="connectBtn">Connect Spatial Ledger</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SHADER: Landmark-Pinned Texture ---
        const fShader = `
            uniform sampler2D uVideoTexture;
            varying vec2 vFaceUv; 
            varying vec3 vNormal;
            void main() {
                vec2 uv = vFaceUv; 
                vec3 sampled = texture2D(uVideoTexture, uv).rgb;
                
                // Mosaic grid overlay
                vec2 grid = fract(uv * 120.0) - 0.5;
                float d = length(grid);
                float mask = 1.0 - smoothstep(0.1, 0.4, d);

                float light = max(dot(vNormal, vec3(0.5, 1.0, 0.5)), 0.2);
                gl_FragColor = vec4(sampled * mask * (light + 0.3), 1.0);
            }
        `;

        // --- 2. SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video);
        
        // Use higher density mesh for "Self-Modulation"
        const geometry = new THREE.SphereGeometry(2.5, 128, 128);
        const originalPos = geometry.attributes.position.clone();
        
        // Add a custom attribute to map Video-Space to Vertex-Space
        const faceUvAttr = new Float32Array(geometry.attributes.position.count * 2);
        geometry.setAttribute('vFaceUv', new THREE.BufferAttribute(faceUvAttr, 2));

        const material = new THREE.ShaderMaterial({
            vertexShader: `
                attribute vec2 vFaceUv;
                varying vec2 vFaceUvVar;
                varying vec3 vNormal;
                void main() {
                    vFaceUvVar = vFaceUv;
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `.replace('vFaceUvVar', 'vFaceUv'),
            fragmentShader: fShader,
            uniforms: { uVideoTexture: { value: videoTex } }
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        camera.position.z = 7;

        // --- 3. RECONSTRUCTION ENGINE ---
        let landmarks = null;
        let isConnected = false;

        const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults((res) => { if (res.multiFaceLandmarks) landmarks = res.multiFaceLandmarks[0]; });

        new Camera(video, { onFrame: async () => { await faceMesh.send({ image: video }); }, width: 640, height: 480 }).start();

        function updateRecon() {
            if (!isConnected || !landmarks) return;
            const pos = geometry.attributes.position;
            const uvAttr = geometry.attributes.vFaceUv;
            const sigma = 1.1;

            // Expanded Landmark Set for Actual Contours (40 points)
            const subset = [1, 10, 152, 33, 263, 61, 291, 199, 4, 454, 234, 103, 332];

            for (let i = 0; i < pos.count; i++) {
                let v = new THREE.Vector3(originalPos.getX(i), originalPos.getY(i), originalPos.getZ(i));
                let totalW = 0;
                let agg = new THREE.Vector3(0,0,0);
                let uvAgg = new THREE.Vector2(0,0);

                subset.forEach(idx => {
                    const lm = landmarks[idx];
                    // Correct Projection: Shift the center and push "Z" outward
                    const target = new THREE.Vector3(
                        (lm.x - 0.5) * -6, 
                        (lm.y - 0.5) * -6, 
                        (0.5 - lm.z) * 4 // Push outward into volume
                    );
                    
                    const d = v.distanceTo(target);
                    const w = Math.exp(-(d*d)/(2*sigma*sigma));
                    
                    if (w > 0.01) {
                        agg.addScaledVector(target, w);
                        uvAgg.addScaledVector(new THREE.Vector2(lm.x, lm.y), w);
                        totalW += w;
                    }
                });

                if (totalW > 0) {
                    v.lerp(agg.divideScalar(totalW), 0.85);
                    const finalUv = uvAgg.divideScalar(totalW);
                    uvAttr.setXY(i, 1.0 - finalUv.x, finalUv.y); // Flip X for mirror
                }
                pos.setXYZ(i, v.x, v.y, v.z);
            }
            pos.needsUpdate = true;
            uvAttr.needsUpdate = true;
            geometry.computeVertexNormals();
        }

        function animate() {
            requestAnimationFrame(animate);
            updateRecon();
            renderer.render(scene, camera);
        }

        document.getElementById('connectBtn').onclick = (e) => {
            isConnected = !isConnected;
            e.target.classList.toggle('active');
            document.getElementById('status').innerText = isConnected ? 'SPATIAL_SYNC_ACTIVE' : 'IDLE';
        };

        animate();
    </script>
</body>
</html>
