<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeMesh — Shore Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { margin:0; background:#0a0a1f; color:#fff; font-family:Impact,sans-serif; overflow-x:hidden; }
    .header { text-align:center; padding:15px; background:linear-gradient(90deg,#00f0ff,#ff00aa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-size:2.5em; }
    .call { display:flex; justify-content:space-around; padding:20px; flex-wrap:wrap; gap:20px; }
    .avatar-box { text-align:center; }
    .avatar { width:280px; height:280px; border-radius:20px; overflow:hidden; background:#111; box-shadow:0 0 30px #00f0ff; position:relative; }
    .avatar canvas { display:block; }
    .name { margin:10px 0; font-size:1.4em; color:#00ffcc; }
    .controls { background:#111; padding:20px; margin:20px; border-radius:16px; }
    button { width:100%; padding:16px; font-size:20px; background:linear-gradient(#ff00aa,#00f0ff); border:none; border-radius:12px; color:#000; margin:10px 0; cursor:pointer; font-family:Impact,sans-serif; }
    button:active { opacity:0.8; }
    input[type=range] { width:100%; accent-color:#00f0ff; margin:6px 0 14px; }
    .live { text-align:center; color:#00ffcc; font-size:1.1em; padding-bottom:20px; }
    label { font-size:0.9em; color:#aaa; }
  </style>
</head>
<body>
  <div class="header">🏖️ VibeMesh v1.4 — LIVE CALL 🔥</div>

  <div class="call">
    <div class="avatar-box">
      <div class="name">You (Vancouver)</div>
      <div class="avatar" id="local"></div>
    </div>
    <div class="avatar-box">
      <div class="name">JerseyBro</div>
      <div class="avatar" id="remote"></div>
    </div>
  </div>

  <div class="controls">
    <label>Bandwidth: <span id="bw">450</span> kbps</label>
    <input type="range" min="5" max="900" value="450" oninput="updateBw(this.value)">

    <label>Battery: <span id="bat">100</span>%</label>
    <input type="range" min="1" max="100" value="100" oninput="document.getElementById('bat').innerText=this.value">

    <button onclick="sendFistPump()">👊 SEND FIST PUMP</button>
    <button onclick="speak()">🎤 PLAY CLONED VOICE</button>
  </div>

  <div class="live">Tier: <span id="tier">AVATAR3D</span> • Packets: <span id="packets">0</span></div>

  <script>
    let packetCount = 0;
    let currentTier = 'AVATAR3D';

    function makeScene(containerId, headColor) {
      const container = document.getElementById(containerId);
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
      camera.position.z = 5;

      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      const point = new THREE.PointLight(0xffffff, 1.2);
      point.position.set(5, 5, 5);
      scene.add(ambient);
      scene.add(point);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 32, 32),
        new THREE.MeshStandardMaterial({ color: headColor, metalness: 0.6, roughness: 0.3 })
      );
      scene.add(head);

      const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
      const eyeGeo = new THREE.SphereGeometry(0.18, 16, 16);
      const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
      const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
      eyeL.position.set(-0.45, 0.35, 1.1);
      eyeR.position.set(0.45, 0.35, 1.1);
      scene.add(eyeL, eyeR);

      const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(280, 280);
      container.appendChild(renderer.domElement);

      return { scene, camera, renderer, head };
    }

    const local = makeScene('local', 0xffaa00);
    const remote = makeScene('remote', 0x00aaff);

    function makeGlyph(containerId) {
      const el = document.createElement('div');
      el.style.cssText = 'display:none;align-items:center;justify-content:center;font-size:100px;width:280px;height:280px;';
      document.getElementById(containerId).appendChild(el);
      return el;
    }
    const glyphLocal = makeGlyph('local');
    const glyphRemote = makeGlyph('remote');

    function animate() {
      requestAnimationFrame(animate);
      if (currentTier === 'AVATAR3D' || currentTier === 'PUPPET') {
        local.head.rotation.y += 0.015;
        remote.head.rotation.y += 0.012;
        local.renderer.render(local.scene, local.camera);
        remote.renderer.render(remote.scene, remote.camera);
      }
    }
    animate();

    function updateBw(bw) {
      document.getElementById('bw').innerText = bw;
      const tier = bw < 30 ? 'GLYPH' : bw < 80 ? 'SPRITE' : bw < 250 ? 'PUPPET' : 'AVATAR3D';
      setTier(tier);
      document.getElementById('packets').innerText = ++packetCount;
    }

    function setTier(tier) {
      currentTier = tier;
      document.getElementById('tier').innerText = tier;

      const show3D = tier === 'AVATAR3D' || tier === 'PUPPET';
      local.renderer.domElement.style.display = show3D ? 'block' : 'none';
      remote.renderer.domElement.style.display = show3D ? 'block' : 'none';

      const glyph = tier === 'GLYPH' ? '😎👀' : tier === 'SPRITE' ? '🕺💃' : '';
      glyphLocal.style.display = show3D ? 'none' : 'flex';
      glyphRemote.style.display = show3D ? 'none' : 'flex';
      glyphLocal.innerText = glyph;
      glyphRemote.innerText = glyph;
    }

    function sendFistPump() {
      local.head.scale.set(1.3, 1.3, 1.3);
      setTimeout(() => local.head.scale.set(1, 1, 1), 200);
      remote.head.scale.set(1.3, 1.3, 1.3);
      setTimeout(() => remote.head.scale.set(1, 1, 1), 300);
      document.getElementById('packets').innerText = ++packetCount;
    }

    function speak() {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance("Yo CB from the Shore — 3 Guys pizza slice in hand bro!");
      u.pitch = 1.1;
      u.rate = 1.15;
      u.onerror = () => {};
      window.speechSynthesis.speak(u);
    }
  </script>
</body>
</html>
