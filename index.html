<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeMesh v10.3 | Spatial Grid-Lock</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --neon: #00f0ff; --grid: rgba(0, 240, 255, 0.15); }
body{background:#010105;color:#fff;font-family:'Monaco', monospace;margin:0;overflow:hidden}

.stage{display:flex;justify-content:center;gap:10px;padding:10px;height:60vh}
.viewport{position:relative;width:450px;height:550px;background:#000;border:1px solid #1a1a2a;overflow:hidden}
.ui-overlay{position:absolute;top:10px;left:10px;font-size:0.5em;color:var(--neon);z-index:10;pointer-events:none}

.control-deck{position:fixed;bottom:0;left:0;right:0;background:#050510;padding:25px;border-top:1px solid #1a1a2a;display:grid;grid-template-columns:1fr 300px;gap:20px}
.metrics{display:grid;grid-template-columns:repeat(3, 1fr);gap:10px}
.m-tile{background:#0a0a1a;padding:10px;border:1px solid #1a1a2a;text-align:center}
.m-tile label{display:block;font-size:0.5em;color:#444;margin-bottom:5px}
.m-tile span{color:var(--neon);font-size:0.8em}

.btn{padding:15px;background:var(--neon);color:#000;border:none;font-weight:900;cursor:pointer;text-transform:uppercase;font-size:0.7em}
.btn-off{background:#111;color:#444}
</style>
</head>
<body>

<div class="stage">
  <div class="viewport" id="v1">
    <div class="ui-overlay">NODE_01 // SOURCE_CAPTURE</div>
  </div>
  <div class="viewport" id="v2">
    <div class="ui-overlay">NODE_02 // SPATIAL_RECONSTRUCTION</div>
  </div>
</div>

<div class="control-deck">
  <div class="metrics">
    <div class="m-tile"><label>Grid Gravity</label><span id="valGrav">Active</span></div>
    <div class="m-tile"><label>Point Volume</label><span>468 Units</span></div>
    <div class="m-tile"><label>Sync Delta</label><span id="valDelta">0.00ms</span></div>
  </div>
  <div style="display:flex; flex-direction:column; gap:10px">
    <button class="btn" onclick="initCore()">Initialize Spatial Grid</button>
    <button class="btn btn-off" id="syncBtn" onclick="isSyncing = !isSyncing" disabled>Engage Grid Sync</button>
  </div>
</div>

<video id="webcam" style="display:none"></video>

<script>
let scene1, scene2, isSyncing = false;

function setupGridWorld(containerId) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 450/550, 0.1, 1000);
    camera.position.set(1, 1, 4);
    camera.lookAt(0,0,0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(450, 550);
    document.getElementById(containerId).appendChild(renderer.domElement);

    // ── THE SPATIAL GRID (Environment Gravity) ──
    const gridHelper = new THREE.GridHelper(10, 20, 0x00f0ff, 0x111122);
    gridHelper.position.y = -1.5;
    scene.add(gridHelper);

    // Bounding Room Points
    const roomGeo = new THREE.BoxGeometry(4, 4, 4);
    const roomMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true, transparent: true, opacity: 0.05 });
    const room = new THREE.Mesh(roomGeo, roomMat);
    scene.add(room);

    // ── AVATAR MESH ──
    const faceGeo = new THREE.BufferGeometry();
    const faceMat = new THREE.PointsMaterial({ 
        size: 0.025, 
        vertexColors: true 
    });
    
    const positions = new Float32Array(468 * 3);
    const colors = new Float32Array(468 * 3);
    faceGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    faceGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    const facePoints = new THREE.Points(faceGeo, faceMat);
    scene.add(facePoints);

    return { scene, camera, renderer, facePoints, positions, colors };
}

async function initCore() {
    const video = document.getElementById('webcam');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    video.play();

    const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
    
    faceMesh.onResults(results => {
        if (!results.multiFaceLandmarks?.[0]) return;
        const landmarks = results.multiFaceLandmarks[0];
        
        // Update Local Grid
        updateGridNode(scene1, landmarks, video);
        
        if (isSyncing) {
            updateGridNode(scene2, landmarks, video);
        }
    });

    const camera = new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } });
    camera.start();
    
    document.getElementById('syncBtn').disabled = false;
    document.getElementById('syncBtn').classList.remove('btn-off');
}

function updateGridNode(node, lm, video) {
    const pos = node.facePoints.geometry.attributes.position.array;
    const col = node.facePoints.geometry.attributes.color.array;
    
    // Create a hidden canvas to sample colors at the grid points
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    lm.forEach((point, i) => {
        // Map to XYZ Grid Space (-2 to 2)
        pos[i * 3]     = (point.x - 0.5) * -4; 
        pos[i * 3 + 1] = (point.y - 0.5) * -4;
        pos[i * 3 + 2] = point.z * -4;

        // Sample Color Data Point at this specific Grid Intersection
        const pixel = ctx.getImageData(point.x * video.videoWidth, point.y * video.videoHeight, 1, 1).data;
        col[i * 3]     = pixel[0] / 255;
        col[i * 3 + 1] = pixel[1] / 255;
        col[i * 3 + 2] = pixel[2] / 255;
    });

    node.facePoints.geometry.attributes.position.needsUpdate = true;
    node.facePoints.geometry.attributes.color.needsUpdate = true;
}

window.onload = () => {
    scene1 = setupGridWorld('v1');
    scene2 = setupGridWorld('v2');
    
    function animate() {
        requestAnimationFrame(animate);
        scene1.renderer.render(scene1.scene, scene1.camera);
        scene2.renderer.render(scene2.scene, scene2.camera);
    }
    animate();
};
</script>
</body>
</html>
