<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeMesh | LoBi-Net Prototype</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .controls { pointer-events: auto; background: rgba(0, 20, 20, 0.8); padding: 15px; border: 1px solid #00ffcc; border-radius: 4px; }
        button { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 8px 12px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; }
        button:hover { background: #00ffcc; color: #000; }
        button.active { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        h1 { font-size: 14px; margin: 0 0 10px 0; letter-spacing: 4px; }
        p { font-size: 9px; opacity: 0.7; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="controls">
            <h1>VIBEMESH // LOBI-NET</h1>
            <p>STATUS: <span id="status">IDLE_SEARCHING</span></p>
            <p>PROTOCOL: SEMANTIC_PRESENCE_V1</p>
            <hr style="border: 0; border-top: 1px solid #003333; margin: 10px 0;">
            <button id="connectBtn">Connect Spatial Ledger</button>
            <button id="audioBtn">Simulate Audio Pulse</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SHADER SOURCE (Prismatic LOBI-NET) ---
        const vShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fShader = `
            uniform float uTime;
            uniform float uResolution;
            uniform vec3 uBaseColor;
            uniform float uVibeEnergy;
            uniform float uVibePitch;
            varying vec2 vUv;
            varying vec3 vNormal;

            void main() {
                // 45-degree Grid Rotation
                float angle = 0.785398;
                mat2 rot = mat2(cos(angle), -sin(angle), sin(angle), cos(angle));
                vec2 gridUv = (rot * vUv) * uResolution;
                
                vec2 id = floor(gridUv);
                vec2 f = fract(gridUv);
                float dist = length(f - 0.5);

                // RMS Optical Blending Logic
                vec3 innerColor = uBaseColor * (1.5 + sin(uTime + id.x) * 0.2);
                innerColor = mix(innerColor, vec3(uVibePitch, 0.5, 1.0 - uVibePitch), uVibeEnergy * 0.5);
                
                vec3 outerRing = vec3(1.0) - uBaseColor;
                outerRing = mix(uBaseColor, outerRing, 0.2);

                // Nested "Chuck Close" Blobs
                float innerRad = 0.15 + (uVibeEnergy * 0.15);
                float outerRad = 0.45;

                vec3 color = uBaseColor * 0.1; // Gaps
                float mask1 = 1.0 - smoothstep(outerRad - 0.05, outerRad + 0.05, dist);
                color = mix(color, outerRing, mask1);
                
                float mask2 = 1.0 - smoothstep(innerRad - 0.05, innerRad + 0.05, dist);
                color = mix(color, innerColor, mask2);

                // Lighting
                float diff = max(dot(vNormal, vec3(0.5, 0.7, 1.0)), 0.0);
                gl_FragColor = vec4(color * (diff + 0.4), 0.9);
            }
        `;

        // --- 2. CONFIG & LANDMARKS ---
        let isConnected = false;
        let isAudioActive = false;
        const LANDMARKS = [
            new THREE.Vector3(0, -1.5, 1.2),   // 0: Chin
            new THREE.Vector3(-1.2, -0.5, 0.5),// 1: Left Jaw
            new THREE.Vector3(1.2, -0.5, 0.5), // 2: Right Jaw
            new THREE.Vector3(0, 0, 1.8),      // 3: Nose Tip
            new THREE.Vector3(-0.5, 0.5, 1.4), // 4: Left Eye
            new THREE.Vector3(0.5, 0.5, 1.4),  // 5: Right Eye
            new THREE.Vector3(-0.8, 0.8, 1.0), // 6: Left Brow
            new THREE.Vector3(0.8, 0.8, 1.0),  // 7: Right Brow
            new THREE.Vector3(-0.4, -0.6, 1.5),// 8: Mouth L
            new THREE.Vector3(0.4, -0.6, 1.5), // 9: Mouth R
            new THREE.Vector3(-1.5, 0, 0),     // 10: L Ear
            new THREE.Vector3(1.5, 0, 0),      // 11: R Ear
        ];

        // --- 3. SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(2, 80, 80);
        const originalPos = geometry.attributes.position.clone();
        const targetPos = geometry.attributes.position.clone();

        const material = new THREE.ShaderMaterial({
            vertexShader: vShader,
            fragmentShader: fShader,
            transparent: true,
            uniforms: {
                uTime: { value: 0 },
                uResolution: { value: 60.0 },
                uBaseColor: { value: new THREE.Color('#00ffcc') },
                uVibeEnergy: { value: 0 },
                uVibePitch: { value: 0.5 }
            }
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        camera.position.z = 5;

        // --- 4. REFINED SCULPTING MATH ---
        function updateSculpt() {
            const posAttr = geometry.attributes.position;
            const sigma = 0.7; // Gaussian spread
            const strength = 0.85;

            for (let i = 0; i < posAttr.count; i++) {
                let v = new THREE.Vector3(originalPos.getX(i), originalPos.getY(i), originalPos.getZ(i));
                
                if (isConnected) {
                    let aggTarget = new THREE.Vector3(0, 0, 0);
                    let totalWeight = 0;

                    LANDMARKS.forEach(l => {
                        const d = v.distanceTo(l);
                        const w = Math.exp(-(d * d) / (2 * (sigma * sigma)));
                        if (w > 0.001) {
                            aggTarget.addScaledVector(l, w);
                            totalWeight += w;
                        }
                    });

                    if (totalWeight > 0) {
                        aggTarget.divideScalar(totalWeight);
                        const blend = Math.min(totalWeight, 1.0) * strength;
                        v.lerp(aggTarget, blend);
                    }
                } else {
                    // Idle Rippling
                    const time = performance.now() * 0.002;
                    const noise = Math.sin(v.x * 2 + time) * Math.cos(v.y * 2 + time) * 0.1;
                    v.addScaledVector(v.clone().normalize(), noise);
                }

                targetPos.setXYZ(i, v.x, v.y, v.z);
            }
        }

        // --- 5. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            material.uniforms.uTime.value = time;

            // Handle Audio Simulation
            if (isAudioActive) {
                material.uniforms.uVibeEnergy.value = THREE.MathUtils.lerp(material.uniforms.uVibeEnergy.value, 0.4 + Math.sin(time * 10) * 0.4, 0.2);
                material.uniforms.uVibePitch.value = 0.5 + Math.sin(time * 5) * 0.3;
            } else {
                material.uniforms.uVibeEnergy.value = THREE.MathUtils.lerp(material.uniforms.uVibeEnergy.value, 0, 0.1);
            }

            updateSculpt();

            // Smoothly Lerp current mesh to target sculpt
            const posAttr = geometry.attributes.position;
            for (let i = 0; i < posAttr.count; i++) {
                const cur = new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
                const tar = new THREE.Vector3(targetPos.getX(i), targetPos.getY(i), targetPos.getZ(i));
                cur.lerp(tar, 0.1);
                posAttr.setXYZ(i, cur.x, cur.y, cur.z);
            }
            
            posAttr.needsUpdate = true;
            geometry.computeVertexNormals();
            renderer.render(scene, camera);
        }

        // --- 6. UI INTERACTION ---
        const connBtn = document.getElementById('connectBtn');
        const audioBtn = document.getElementById('audioBtn');
        const status = document.getElementById('status');

        connBtn.addEventListener('click', () => {
            isConnected = !isConnected;
            connBtn.classList.toggle('active');
            status.innerText = isConnected ? 'SPATIAL_SYNC_ACTIVE' : 'IDLE_SEARCHING';
            connBtn.innerText = isConnected ? 'Disconnect Ledger' : 'Connect Spatial Ledger';
        });

        audioBtn.addEventListener('click', () => {
            isAudioActive = !isAudioActive;
            audioBtn.classList.toggle('active');
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
